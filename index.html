            onUpdate(activeDraftId,{application,deal,updatedAt:new Date().toISOString()});
          }}
          onSaveDraft={(f,dev)=>{
            if(!activeDraftId)return;
            const term=f.term||12;
            const {application,deal}=buildAppData(f,dev,term);
            onUpdate(activeDraftId,{application,deal,updatedAt:new Date().toISOString(),tlEntry:{by:user.name,txt:'Draft saved'}});
            addToast('info',t('toast_draft_saved'),t('toast_draft_msg'));setActiveDraftId(null);setPg('dash');setPreselDev(null);
          }}
          onSubmit={(f,dev)=>{
            if(!activeDraftId)return;
            const term=f.term||12;
            const {application,deal}=buildAppData(f,dev,term);
            onUpdate(activeDraftId,{status:ST.PENDING_APPROVAL,application,deal,dealLocked:false,tlEntry:{by:user.name,txt:'Application submitted for approval'}});
            const uwEmails=(users||[]).filter(u=>u.role==='underwriter').map(u=>u.email).join(',');
            sendEmail('submitted',{to_email:uwEmails||'',to_name:'Underwriter Team',rep_name:user.name,customer_name:application.fullName,app_id:activeDraftId});
            addToast('ok',t('toast_submitted'),t('toast_submitted_msg'));setActiveDraftId(null);setPg('dash');setPreselDev(null);
          }}/></div>}
        {pg==='prices'&&<div className="page-content" style={{padding:'28px 32px'}}><PriceList devices={devicesWithPricing} onStartApp={(did,term)=>startNewApp({id:did,term})}/></div>}
      </div>
    </div>
  );
};

// ── UNDERWRITER VIEW ──────────────────────────────────────────
const UnderwriterView=({apps,onUpdate,addToast})=>{
  const {user}=useContext(Ctx);
  const [pg,setPg]=useState('queue');
  const [sel,setSel]=useState(null);
  const [q,setQ]=useState('');
  const [completedFilter,setCompletedFilter]=useState('all'); // all | today | week | month
  const [mobileMenuOpen,setMobileMenuOpen]=useState(()=>window.innerWidth>=769);
  const sidebarProps={page:pg,setPage:p=>{setPg(p);setSel(null)},apps,open:mobileMenuOpen,onClose:()=>setMobileMenuOpen(false),onOpen:()=>setMobileMenuOpen(true)};
  const HomeBtn=()=><button type="button" onClick={()=>{setPg('queue');setSel(null);}} style={{padding:4,border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',flexShrink:0}} aria-label="Home"><LogoBrand iconSize={30} textSize={13}/></button>;

  if(sel){
    const app=apps.find(a=>a.id===sel);
    if(app){
      const reviewable=[ST.PENDING_APPROVAL,ST.UNDER_REVIEW].includes(app.status);
      if(reviewable){
        return(
          <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}>
            <Sidebar {...sidebarProps}/>
            <div className="app-main" style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
              <TopBar onMenu={()=>setMobileMenuOpen(true)} homeBtn={<HomeBtn/>} title="Review application"/>
              <UWReviewFlow app={app} onUpdate={onUpdate} addToast={addToast} onBack={()=>setSel(null)}/>
            </div>
          </div>
        );
      }
      return <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}><Sidebar {...sidebarProps}/><div className="app-main" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}><TopBar onMenu={()=>setMobileMenuOpen(true)} homeBtn={<HomeBtn/>} title={APP_NAME}/><div className="page-content main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0,padding:'28px 32px'}}><AppDetail app={app} onUpdate={onUpdate} addToast={addToast} onBack={()=>setSel(null)}/></div></div></div>;
    }
  }

  const merchantCodes=(user&&user.merchantCodes)||[];
  const queue=apps.filter(a=>[ST.PENDING_APPROVAL,ST.UNDER_REVIEW].includes(a.status)&&(!merchantCodes.length||merchantCodes.includes(a.merchantCode)));
  const escalated=apps.filter(a=>a.status===ST.ESCALATED&&(!merchantCodes.length||merchantCodes.includes(a.merchantCode)));
  const underReviewMine=apps.filter(a=>[ST.PENDING_APPROVAL,ST.UNDER_REVIEW].includes(a.status)&&a.reviewLock&&a.reviewLock.by===user.id&&(!merchantCodes.length||merchantCodes.includes(a.merchantCode)));
  const completedActiveMine=apps.filter(a=>a.status===ST.ACTIVE&&a.mboReviewedBy===user.name&&(!merchantCodes.length||merchantCodes.includes(a.merchantCode)));
  const matchQ=(a)=>{
    if(!q.trim())return true;
    const s=q.toLowerCase();
    return ((a.c&&a.c.name||'').toLowerCase().includes(s)||(a.id||'').toLowerCase().includes(s)||(a.repName||a.rep||'').toLowerCase().includes(s));
  };
  const now=Date.now();
  const inRange=(iso,days)=>{
    if(!iso)return false;
    const t=Date.parse(iso);
    if(Number.isNaN(t))return false;
    return (now-t) <= days*24*60*60*1000;
  };
  const completedFiltered=completedActiveMine
    .filter(matchQ)
    .filter(a=>{
      if(completedFilter==='today')return inRange(a.updatedAt||a.createdAt,1);
      if(completedFilter==='week')return inRange(a.updatedAt||a.createdAt,7);
      if(completedFilter==='month')return inRange(a.updatedAt||a.createdAt,30);
      return true;
    });
  const pendingCount=queue.length+escalated.length;
  const pageTitle=pg==='queue'?'Review queue':pg==='uw_under_review'?'Applications under review':'Completed applications';

  return(
    <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}>
      <Sidebar {...sidebarProps}/>
      <div className="app-main main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}>
        <TopBar onMenu={()=>setMobileMenuOpen(true)} homeBtn={<HomeBtn/>} title={pageTitle}/>
        {pg==='queue'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}><div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>Review queue</h1><p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>{pendingCount} application{pendingCount!==1?'s':''} awaiting attention</p></div></div>
            {queue.length>0&&(
              <div style={{marginBottom:24}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Pending decision <span style={{background:'var(--warnBg)',color:'var(--warn)',padding:'1px 7px',borderRadius:99}}>{queue.length}</span></div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {queue.map(a=>{
                    const tot=a.dev?(a.dev.totalCost||(a.dev.dep||0)+(a.dev.weekly||0)*12):0;
                    const repFirst=(a.repName||a.rep||'').split(' ')[0];
                    const hasPendingChanges=a.status===ST.UNDER_REVIEW&&(a.application?.fieldCorrectionRequests||[]).some(r=>!r.resolvedAt);
                    const lockedByMe=a.reviewLock&&a.reviewLock.by===user.id;
                    const lockedByAnother=a.reviewLock&&a.reviewLock.by!==user.id;
                    const borderColor=lockedByAnother?'var(--purBorder)':hasPendingChanges?'var(--warnBorder)':'var(--border)';
                    return (
                    <div key={a.id} onClick={()=>setSel(a.id)} style={{background:lockedByAnother?'var(--purBg)':'white',border:`1.5px solid ${borderColor}`,borderRadius:'var(--r)',padding:'13px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'all .13s'}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--brand2)';e.currentTarget.style.boxShadow='0 2px 10px rgba(11,61,46,0.1)'}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor=borderColor;e.currentTarget.style.boxShadow='none'}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:14}}>{a.c?a.c.name:''}</div>
                        <div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{a.dev?a.dev.brand:''} {a.dev?a.dev.model:''} · {a.dev?fmtRWF(tot):'—'} total · {fmtD(a.createdAt)} · {repFirst}</div>
                        {hasPendingChanges&&<div style={{fontSize:10,color:'var(--warn)',marginTop:3,fontWeight:600}}>↩ Changes sent — awaiting rep resubmission</div>}
                        {lockedByMe&&<div style={{fontSize:10,color:'var(--brand)',marginTop:3,fontWeight:600}}>🔒 You are reviewing this</div>}
                        {lockedByAnother&&<div style={{fontSize:10,color:'var(--pur)',marginTop:3,fontWeight:600}}>🔒 Being reviewed by {a.reviewLock.byName}</div>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:10}}><Badge st={a.status}/><span style={{color:'var(--textLight)',fontSize:18}}>›</span></div>
                    </div>
                  );})}
                </div>
              </div>
            )}
            {escalated.length>0&&(
              <div style={{marginBottom:24}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--pur)',marginBottom:10}}>↑ Escalated to ops <span style={{background:'var(--purBg)',color:'var(--pur)',padding:'1px 7px',borderRadius:99}}>{escalated.length}</span></div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>{escalated.map(a=>(
                  <div key={a.id} onClick={()=>setSel(a.id)} style={{background:'var(--purBg)',border:'1.5px solid var(--purBorder)',borderRadius:'var(--r)',padding:'13px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div><div style={{fontWeight:600,fontSize:14}}>{a.c?a.c.name:''}</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{a.dev?a.dev.brand:''} {a.dev?a.dev.model:''} · awaiting ops decision</div></div>
                    <div style={{display:'flex',alignItems:'center',gap:10}}><Badge st={a.status}/><span style={{color:'var(--textLight)',fontSize:18}}>›</span></div>
                  </div>
                ))}</div>
              </div>
            )}
            {queue.length===0&&escalated.length===0&&<Empty ico="✅" title="Queue is clear" sub="All applications have been reviewed"/>}
          </div>
        )}
        {pg==='uw_under_review'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',gap:12,flexWrap:'wrap',marginBottom:14}}>
              <div>
                <h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>Applications under review</h1>
                <p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>{underReviewMine.length} application{underReviewMine.length!==1?'s':''} currently locked by you</p>
              </div>
              <input value={q} onChange={ev=>setQ(ev.target.value)} placeholder="Search name, ID, or rep…" style={{maxWidth:320,width:'100%'}}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {underReviewMine.filter(matchQ).map(a=>(
                <div key={a.id} onClick={()=>setSel(a.id)} style={{background:'white',border:'1.5px solid var(--brandPale2)',borderRadius:'var(--r)',padding:'13px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{a.c?a.c.name:''}</div>
                    <div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{a.dev?a.dev.brand:''} {a.dev?a.dev.model:''} · {fmtD(a.createdAt)} · {(a.repName||a.rep||'').split(' ')[0]}</div>
                    <div style={{fontSize:10,color:'var(--brand)',marginTop:3,fontWeight:700}}>🔒 Locked by you</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}><Badge st={a.status}/><span style={{color:'var(--textLight)',fontSize:18}}>›</span></div>
                </div>
              ))}
            </div>
            {underReviewMine.filter(matchQ).length===0&&<Empty ico="🔒" title="No applications" sub="You are not currently reviewing any applications."/>}
          </div>
        )}
        {pg==='uw_completed'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',gap:12,flexWrap:'wrap',marginBottom:14}}>
              <div>
                <h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>Completed applications</h1>
                <p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>Active contracts you reviewed (status: Active)</p>
              </div>
              <input value={q} onChange={ev=>setQ(ev.target.value)} placeholder="Search name, ID, or rep…" style={{maxWidth:320,width:'100%'}}/>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
              {[
                {k:'all',l:'All'},
                {k:'today',l:'Today'},
                {k:'week',l:'Last 7 days'},
                {k:'month',l:'Last 30 days'},
              ].map(f=>(
                <button key={f.k} type="button" onClick={()=>setCompletedFilter(f.k)} style={{padding:'7px 12px',borderRadius:999,border:'1.5px solid '+(completedFilter===f.k?'var(--brand2)':'var(--border)'),background:completedFilter===f.k?'var(--brandPale)':'white',color:completedFilter===f.k?'var(--brand2)':'var(--textMid)',fontWeight:700,fontSize:12,cursor:'pointer'}}>
                  {f.l}
                </button>
              ))}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {completedFiltered.map(a=>(
                <div key={a.id} onClick={()=>setSel(a.id)} style={{background:'white',border:'1.5px solid var(--border)',borderRadius:'var(--r)',padding:'13px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{a.c?a.c.name:''}</div>
                    <div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{a.dev?a.dev.brand:''} {a.dev?a.dev.model:''} · {fmtD(a.updatedAt||a.createdAt)} · {(a.repName||a.rep||'').split(' ')[0]}</div>
                    <div style={{fontSize:10,color:'var(--ok)',marginTop:3,fontWeight:700}}>✓ Active · reviewed by you</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}><Badge st={a.status}/><span style={{color:'var(--textLight)',fontSize:18}}>›</span></div>
                </div>
              ))}
            </div>
            {completedFiltered.length===0&&<Empty ico="✓" title="No results" sub="No active contracts match your filters."/>}
          </div>
        )}
      </div>
    </div>
  );
};

// ── GROUP ADMIN VIEW ──────────────────────────────────────────
const GroupAdminView=({apps,addToast,users,setUsers,shops,setShops,merchantGroups,setMerchantGroups})=>{
  const {user}=useContext(Ctx);
  const [pg,setPg]=useState('groups');
  const [mobileMenuOpen,setMobileMenuOpen]=useState(()=>window.innerWidth>=769);
  const sidebarProps={page:pg,setPage:p=>setPg(p),apps,open:mobileMenuOpen,onClose:()=>setMobileMenuOpen(false),onOpen:()=>setMobileMenuOpen(true)};

  const mgs=merchantGroups||[];
  const setMgs=setMerchantGroups||(()=>{});

  /* ── Groups tab ───────────────────────────────────────────── */
  const [showAddGroup,setShowAddGroup]=useState(false);
  const [groupDraft,setGroupDraft]=useState({name:'',country:'RW',contactEmail:''});
  const mkGroupId=()=>{const nums=mgs.map(g=>parseInt(String(g.id).replace(/\D/g,''),10)).filter(n=>!isNaN(n));return 'MG-'+String(((nums.length?Math.max(...nums):0)+1)).padStart(3,'0');};
  const addGroup=()=>{
    if(!groupDraft.name.trim()){addToast('err','Name required','');return;}
    const id=mkGroupId();
    setMgs([...mgs,{id,name:groupDraft.name.trim(),country:groupDraft.country,contactEmail:groupDraft.contactEmail,createdAt:new Date().toISOString()}]);
    setGroupDraft({name:'',country:'RW',contactEmail:''});setShowAddGroup(false);
    addToast('ok','Group created',groupDraft.name.trim());
  };
  const removeGroup=g=>{
    const groupShops=(shops||[]).filter(s=>s.merchantGroupId===g.id);
    if(groupShops.length>0){addToast('err','Cannot remove','Reassign all shops first');return;}
    setMgs(mgs.filter(x=>x.id!==g.id));addToast('ok','Group removed','');
  };
  const updateGroup=(id,patch)=>setMgs(mgs.map(x=>x.id===id?{...x,...patch}:x));

  /* ── Shops tab ────────────────────────────────────────────── */
  const [showAddShop,setShowAddShop]=useState(false);
  const [shopDraft,setShopDraft]=useState({name:'',location:'',merchantGroupId:''});
  const mkShopId=()=>{const nums=(shops||[]).map(s=>parseInt(String(s.id).replace(/\D/g,''),10)).filter(n=>!isNaN(n));return 'SH-'+String(((nums.length?Math.max(...nums):0)+1)).padStart(3,'0');};
  const addShop=()=>{
    if(!shopDraft.name.trim()){addToast('err','Name required','');return;}
    const id=mkShopId();
    setShops([...(shops||[]),{id,name:shopDraft.name.trim(),location:shopDraft.location.trim(),merchantGroupId:shopDraft.merchantGroupId||null,createdAt:new Date().toISOString()}]);
    setShopDraft({name:'',location:'',merchantGroupId:''});setShowAddShop(false);
    addToast('ok','Shop added',`${shopDraft.name.trim()} (${id})`);
  };

  /* ── Managers tab ─────────────────────────────────────────── */
  const [showAddMgr,setShowAddMgr]=useState(false);
  const [mgrDraft,setMgrDraft]=useState({name:'',email:'',password:'',merchantGroupId:''});
  const mkMgrId=()=>{const nums=(users||[]).filter(u=>u.id?.startsWith('MR')).map(u=>parseInt(String(u.id).slice(2),10)).filter(n=>!isNaN(n));return 'MR'+String(((nums.length?Math.max(...nums):0)+1)).padStart(2,'0');};
  const addManager=()=>{
    const name=mgrDraft.name.trim();const email=normEmail(mgrDraft.email.trim());
    if(!name||!email){addToast('err','Missing fields','Name and email are required');return;}
    if(!mgrDraft.merchantGroupId){addToast('err','Select a group','');return;}
    if((users||[]).some(u=>normEmail(u.email)===email)){addToast('err','Email already exists',email);return;}
    const id=mkMgrId();const password=mgrDraft.password.trim()||randPwd();
    const u={id,name,email,password,role:'merchant',roleLabel:'Retail Manager',merchantGroupId:mgrDraft.merchantGroupId,mustChangePassword:!mgrDraft.password.trim()};
    setUsers([...(users||[]),u]);
    sendEmail('welcome',{to_name:name,to_email:email,temp_password:password,role:'Retail Manager',login_url:window.location.href,must_change:u.mustChangePassword?'Please change your password after first login.':''});
    setMgrDraft({name:'',email:'',password:'',merchantGroupId:''});setShowAddMgr(false);
    addToast('ok','Manager added',`Welcome email sent to ${email}`);
  };

  const managers=(users||[]).filter(u=>u.role==='merchant');
  const groupName=id=>mgs.find(g=>g.id===id)?.name||id||'—';

  return(
    <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}>
      <Sidebar {...sidebarProps}/>
      <div className="app-main main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}>
        <div className="mobile-header"><button type="button" className="hamburger" onClick={()=>setMobileMenuOpen(true)} aria-label="Open menu">☰</button><LogoBrand iconSize={30} textSize={14} style={{marginRight:4}}/><span style={{fontWeight:700,fontSize:16}}>Group Admin</span></div>

        {/* ── Groups tab ──────────────────────────────────── */}
        {pg==='groups'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18,flexWrap:'wrap',gap:10}}>
              <div>
                <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>Retail Groups</h1>
                <p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>{mgs.length} group{mgs.length!==1?'s':''} · {(shops||[]).length} total shops</p>
              </div>
              <Btn v="primary" icon="＋" onClick={()=>setShowAddGroup(true)}>New group</Btn>
            </div>

            <div style={{display:'grid',gridTemplateColumns:showAddGroup?'1fr 380px':'1fr',gap:16,alignItems:'start'}}>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {mgs.map(g=>{
                  const gShops=(shops||[]).filter(s=>s.merchantGroupId===g.id);
                  const gManagers=(users||[]).filter(u=>u.role==='merchant'&&u.merchantGroupId===g.id);
                  const gReps=(users||[]).filter(u=>u.role==='rep'&&gShops.map(s=>s.id).includes(u.shopId));
                  const gApps=apps.filter(a=>gShops.map(s=>s.id).includes(a.shopId));
                  const gCompleted=gApps.filter(a=>a.status===ST.COMPLETED||a.status===ST.ACTIVE).length;
                  return(
                    <Card key={g.id} sx={{padding:16}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:12}}>
                        <div>
                          <div style={{fontWeight:800,fontSize:15}}>{g.name}</div>
                          <div style={{fontSize:11,color:'var(--textLight)',fontFamily:'DM Mono,monospace',marginTop:2}}>{g.id} {g.country&&`· ${g.country}`} {g.contactEmail&&`· ${g.contactEmail}`}</div>
                        </div>
                        <Btn v="err" sz="sm" onClick={()=>removeGroup(g)}>Remove</Btn>
                      </div>

                    <FF label="Location"><input value={shopDraft.location} onChange={e=>setShopDraft(p=>({...p,location:e.target.value}))} placeholder="e.g. Remera, Kigali"/></FF>
                    <FF label="Retail group">
                      <select value={shopDraft.merchantGroupId} onChange={e=>setShopDraft(p=>({...p,merchantGroupId:e.target.value}))}>
                        <option value="">— Unassigned —</option>

                      </select>
                    </FF>
                    <div style={{background:'var(--bg)',borderRadius:'var(--r2)',padding:'10px 13px',fontSize:11,color:'var(--textMid)'}}>ID: <span style={{fontFamily:'DM Mono,monospace',fontWeight:700}}>{mkShopId()}</span></div>

            <div style={{display:'grid',gridTemplateColumns:showAddMgr?'1fr 380px':'1fr',gap:16,alignItems:'start'}}>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>

              </div>

// ── MERCHANT VIEW ─────────────────────────────────────────────
const MerchantView=({apps,addToast,users,setUsers,shops})=>{
  const {user,merchantGroups}=useContext(Ctx);
  const t=useT();
  const [pg,setPg]=useState('sales');
  const [mobileMenuOpen,setMobileMenuOpen]=useState(()=>window.innerWidth>=769);
  const [q,setQ]=useState('');
  const [fShop,setFShop]=useState('');
  const [fRep,setFRep]=useState('');
  const [fDateFrom,setFDateFrom]=useState('');
  const [fDateTo,setFDateTo]=useState('');
  const [showAddRep,setShowAddRep]=useState(false);
  const [newRep,setNewRep]=useState({name:'',email:'',password:'',shopId:''});

  const myGroup=(merchantGroups||[]).find(g=>g.id===user.merchantGroupId);
  const myShops=(shops||[]).filter(s=>s.merchantGroupId===user.merchantGroupId);
  const myShopIds=myShops.map(s=>s.id);
  const myReps=(users||[]).filter(u=>u.role==='rep'&&myShopIds.includes(u.shopId));

  const completedApps=apps.filter(a=>{
    if(a.status!==ST.COMPLETED&&a.status!==ST.ACTIVE)return false;
    if(!myShopIds.includes(a.shopId))return false;
    if(q&&!a.c.name.toLowerCase().includes(q.toLowerCase())&&!a.id.toLowerCase().includes(q.toLowerCase()))return false;
    if(fShop&&a.shopId!==fShop)return false;
    if(fRep&&a.repId!==fRep)return false;
    if(fDateFrom){const d=new Date(a.createdAt);const from=new Date(fDateFrom);from.setHours(0,0,0,0);if(d<from)return false;}
    if(fDateTo){const d=new Date(a.createdAt);const to=new Date(fDateTo);to.setHours(23,59,59,999);if(d>to)return false;}
    return true;
  });

  const mkRepId=()=>{
    const nums=(users||[]).filter(u=>u.id?.startsWith('SR')).map(u=>parseInt(String(u.id).slice(2),10)).filter(n=>!isNaN(n));
    return 'SR'+String(((nums.length?Math.max(...nums):0)+1)).padStart(2,'0');
  };
  const addRep=()=>{
    const name=newRep.name.trim();
    const email=normEmail(newRep.email.trim());
    if(!name||!email){addToast('err','Missing fields','Name and email are required');return;}
    if(!newRep.shopId){addToast('err','Select a shop','Assign the rep to one of your shops');return;}
    if((users||[]).some(u=>normEmail(u.email)===email)){addToast('err','Email already exists',email);return;}
    const id=mkRepId();
    const password=newRep.password.trim()||randPwd();
    const u={id,name,email,password,role:'rep',roleLabel:'Sales Representative',shopId:newRep.shopId,mustChangePassword:!newRep.password.trim()};
    setUsers([...(users||[]),u]);
    sendEmail('welcome',{to_name:name,to_email:email,temp_password:password,role:'Sales Representative',login_url:window.location.href,must_change:u.mustChangePassword?'Please change your password after first login.':''});
    setNewRep({name:'',email:'',password:'',shopId:''});
    setShowAddRep(false);
    addToast('ok','Sales rep added',`Welcome email sent to ${email}`);
  };

  const sidebarProps={page:pg,setPage:p=>setPg(p),apps,open:mobileMenuOpen,onClose:()=>setMobileMenuOpen(false),onOpen:()=>setMobileMenuOpen(true)};
  const totalRevenue=completedApps.filter(a=>a.status===ST.COMPLETED).reduce((s,a)=>s+(a.dev?.totalCost||0),0);

  return(
    <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}>
      <Sidebar {...sidebarProps}/>
      <div className="app-main main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}>
        <div className="mobile-header"><button type="button" className="hamburger" onClick={()=>setMobileMenuOpen(true)} aria-label="Open menu">☰</button><LogoBrand iconSize={30} textSize={14} style={{marginRight:4}}/><span style={{fontWeight:700,fontSize:16}}>{myGroup?.name||'My Group'}</span></div>

        {pg==='sales'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{marginBottom:18,display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
              <div>
                <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>{myGroup?.name||'My Retail Group'}</h1>
                <p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>{myShops.length} shop{myShops.length!==1?'s':''} · {myReps.length} rep{myReps.length!==1?'s':''}</p>
              </div>
              <Btn v="def" sz="sm" icon="⬇" onClick={()=>{
                const rows=[['ID','Date','Status','Customer','Phone','Rep','Shop','Device','Total (RWF)','Deposit (RWF)','Monthly (RWF)']];
                completedApps.forEach(a=>rows.push([a.id,a.createdAt?new Date(a.createdAt).toLocaleDateString('en-GB'):'',SM[a.status]?.label||a.status,a.c.name||'',a.c.phone||'',a.rep||'',myShops.find(s=>s.id===a.shopId)?.name||a.shopId||'',a.dev?.brand?`${a.dev.brand} ${a.dev.model}`:'',a.dev?.totalCost||'',a.dev?.dep||'',a.dev?.weekly||'']));
                const csv=rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
                const el=document.createElement('a');el.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);el.download=`sales_${new Date().toISOString().slice(0,10)}.csv`;el.click();
              }}>Export CSV</Btn>
            </div>

            <div className="stats-grid-3" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
              {[
                ['Completed sales',completedApps.filter(a=>a.status===ST.COMPLETED).length,'var(--ok)'],
                ['Active contracts',completedApps.filter(a=>a.status===ST.ACTIVE).length,'var(--info)'],
                ['Total revenue',fmtRWF(totalRevenue),'var(--accent)'],
              ].map(([l,v,c])=>(
                <Card key={l} sx={{padding:'14px 16px'}}><div style={{fontSize:10,color:'var(--textLight)',marginBottom:5}}>{l}</div><div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div></Card>
              ))}
            </div>

            <Card sx={{padding:'14px 16px',marginBottom:14}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:10}}>
                <FF label="Search (name / ID)"><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…"/></FF>
                <FF label="Shop">
                  <select value={fShop} onChange={e=>setFShop(e.target.value)}>
                    <option value="">All shops</option>
                    {myShops.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </FF>
                <FF label="Sales rep">
                  <select value={fRep} onChange={e=>setFRep(e.target.value)}>
                    <option value="">All reps</option>
                    {myReps.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                  </select>
                </FF>
                <FF label="From"><input type="date" value={fDateFrom} onChange={e=>setFDateFrom(e.target.value)}/></FF>
                <FF label="To"><input type="date" value={fDateTo} onChange={e=>setFDateTo(e.target.value)}/></FF>
                {(q||fShop||fRep||fDateFrom||fDateTo)&&<div style={{display:'flex',alignItems:'flex-end'}}><Btn v="def" sz="sm" onClick={()=>{setQ('');setFShop('');setFRep('');setFDateFrom('');setFDateTo('');}}>Clear</Btn></div>}
              </div>
            </Card>

            {completedApps.length===0?<Empty ico="📋" title="No completed sales" sub="Completed and active contracts will appear here"/>:(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {completedApps.map(a=>{
                  const shop=myShops.find(s=>s.id===a.shopId);
                  return(
                    <Card key={a.id} sx={{padding:'13px 16px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,flexWrap:'wrap'}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:14}}>{a.c.name}</div>
                          <div style={{fontSize:10,color:'var(--textLight)',fontFamily:'DM Mono,monospace',marginTop:1}}>{a.id}</div>
                        </div>
                        <Badge st={a.status}/>
                      </div>
                      <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:11,color:'var(--textMid)',marginTop:8}}>
                        <span>📱 {a.dev?.brand} {a.dev?.model}</span>
                        <span>🏪 {shop?.name||a.shopId||'—'}</span>
                        <span>👤 {a.rep}</span>
                        <span>📅 {fmtD(a.createdAt)}</span>
                        {a.dev?.totalCost&&<span style={{fontWeight:700,color:'var(--text)'}}>{fmtRWF(a.dev.totalCost)}</span>}
                      </div>
                    </Card>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {pg==='team'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18,flexWrap:'wrap',gap:10}}>
              <div>
                <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>My Team</h1>
                <p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>Sales reps assigned to your shops</p>
              </div>
              <Btn v="primary" icon="＋" onClick={()=>setShowAddRep(true)}>Add sales rep</Btn>
            </div>

            <div style={{display:'grid',gridTemplateColumns:showAddRep?'1fr 380px':'1fr',gap:16,alignItems:'start'}}>
              <div>
                {myShops.map(shop=>{
                  const shopReps=(users||[]).filter(u=>u.role==='rep'&&u.shopId===shop.id);
                  return(
                    <Card key={shop.id} sx={{padding:16,marginBottom:12}}>
                      <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{shop.name}</div>
                      <div style={{fontSize:11,color:'var(--textLight)',marginBottom:12}}>{shop.location||'—'} · {shop.id}</div>
                      {shopReps.length===0?<div style={{fontSize:12,color:'var(--textLight)',fontStyle:'italic'}}>No reps assigned</div>:(
                        <div style={{display:'flex',flexDirection:'column',gap:6}}>
                          {shopReps.map(r=>(
                            <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'var(--bg)',borderRadius:'var(--r2)',gap:10}}>
                              <div>
                                <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
                                <div style={{fontSize:11,color:'var(--textMid)'}}>{r.email}</div>
                              </div>
                              <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                                <span style={{fontSize:10,background:'var(--brandPale)',color:'var(--brand2)',padding:'2px 8px',borderRadius:99}}>Rep</span>
                                {r.mustChangePassword&&<span style={{fontSize:10,background:'var(--warnBg)',color:'var(--warn)',padding:'2px 8px',borderRadius:99}}>Temp pwd</span>}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </Card>
                  );
                })}
                {myShops.length===0&&<Empty ico="🏪" title="No shops in your group" sub="Contact your ops admin to assign shops to your group"/>}
              </div>

              {showAddRep&&(
                <Card sx={{padding:16}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                    <div style={{fontWeight:700}}>Add sales rep</div>
                    <Btn v="def" sz="sm" onClick={()=>{setShowAddRep(false);setNewRep({name:'',email:'',password:'',shopId:''});}}>Cancel</Btn>
                  </div>

                    <FF label="Full name" req><input value={newRep.name} onChange={e=>setNewRep(p=>({...p,name:e.target.value}))} placeholder="e.g. Jean Pierre"/></FF>
                    <FF label="Email address" req><input type="email" value={newRep.email} onChange={e=>setNewRep(p=>({...p,email:e.target.value}))} placeholder="rep@company.com"/></FF>
                    <FF label="Assign to shop" req>

                        {myShops.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}

                    </FF>
                    <FF label="Password (optional — auto-generated if blank)"><input type="password" value={newRep.password} onChange={e=>setNewRep(p=>({...p,password:e.target.value}))} placeholder="Leave blank to auto-generate"/></FF>

};

const OpsView=({apps,onUpdate,addToast,devices,setDevices,users,setUsers,shops,setShops,setContracts,pricingConfig,setPricingConfig,merchantGroups,setMerchantGroups})=>{
  const {user}=useContext(Ctx);
  const [pg,setPg]=useState(()=>user?.superuser?'overview':'all');
  const [sel,setSel]=useState(null);
  const [q,setQ]=useState('');
  const [fst,setFst]=useState('');
  const [fGroup,setFGroup]=useState('');
  const [fShop,setFShop]=useState('');
  const [fRep,setFRep]=useState('');
  const [fDateFrom,setFDateFrom]=useState('');
  const [fDateTo,setFDateTo]=useState('');

  }

  const filtered=apps.filter(a=>{
    if(q&&!a.c.name.toLowerCase().includes(q.toLowerCase())&&!a.id.toLowerCase().includes(q.toLowerCase())&&!(a.rep||'').toLowerCase().includes(q.toLowerCase()))return false;
    if(fst&&a.status!==fst)return false;
    if(fGroup){const g=groupOfShop(a.shopId);if(fGroup==='__none__'?g!==null:g!==fGroup)return false;}
    if(fShop&&a.shopId!==fShop)return false;
    if(fRep&&a.repId!==fRep)return false;
    if(fDateFrom){const d=new Date(a.createdAt);const from=new Date(fDateFrom);from.setHours(0,0,0,0);if(d<from)return false;}

    return true;
  });

  const roleLabelFor=r=>({rep:'Sales Representative',underwriter:'Underwriter',ops:'Ops & Support',merchant:'Retail Manager',groupadmin:'Group Admin'}[r]||r);
  const mkUserId=r=>{
    const pref=r==='rep'?'SR':r==='underwriter'?'UW':r==='merchant'?'MR':r==='groupadmin'?'GA':'OP';
    const nums=(users||[]).filter(u=>u.id?.startsWith(pref)).map(u=>parseInt(String(u.id).slice(2),10)).filter(n=>!isNaN(n));
    const next=(nums.length?Math.max(...nums):0)+1;
    return pref+String(next).padStart(2,'0');
  };
  const mkDevId=()=>{
    const nums=(devices||[]).map(d=>parseInt(String(d.id).replace(/\D/g,''),10)).filter(n=>!isNaN(n));
    const next=(nums.length?Math.max(...nums):0)+1;
    return 'D'+String(next).padStart(2,'0');
  };
  const mkShopId=()=>{
    const nums=(shops||[]).map(s=>parseInt(String(s.id).replace(/\D/g,''),10)).filter(n=>!isNaN(n));
    const next=(nums.length?Math.max(...nums):0)+1;
    return 'SH-'+String(next).padStart(3,'0');
  };

  const RetailGroupsTab=()=>{
    const mgs=merchantGroups||[];
    const setMgs=setMerchantGroups||(()=>{});
    const [showAdd,setShowAdd]=useState(false);
    const [draft,setDraft]=useState({name:'',country:'RW',contactEmail:''});
    const mkGroupId=()=>{const nums=mgs.map(g=>parseInt(String(g.id).replace(/\D/g,''),10)).filter(n=>!isNaN(n));return 'MG-'+String(((nums.length?Math.max(...nums):0)+1)).padStart(3,'0');};
    const save=()=>{
      if(!draft.name.trim()){addToast('err','Name required','');return;}
      const id=mkGroupId();
      const next=[...mgs,{id,name:draft.name.trim(),country:draft.country,contactEmail:draft.contactEmail,createdAt:new Date().toISOString()}];
      setMgs(next);
      setDraft({name:'',country:'RW',contactEmail:''});setShowAdd(false);
      addToast('ok','Retail group created',`${draft.name.trim()} (${id})`);
    };
    const removeGroup=g=>{
      const groupShops=(shops||[]).filter(s=>s.merchantGroupId===g.id);
      if(groupShops.length>0){addToast('err','Cannot remove','Reassign all shops first');return;}
      setMgs(mgs.filter(x=>x.id!==g.id));addToast('ok','Group removed','');
    };
    const updateGroup=(id,patch)=>{setMgs(mgs.map(x=>x.id===id?{...x,...patch}:x));};
    return(
      <div className="admin-two-col" style={{display:'grid',gridTemplateColumns:showAdd?'1.1fr .9fr':'1fr',gap:14,alignItems:'start'}}>
        <Card sx={{padding:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
            <div style={{fontWeight:800}}>Retail groups <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>({(mgs||[]).length})</span></div>
            <Btn v="primary" sz="sm" onClick={()=>setShowAdd(true)} icon="＋">Add group</Btn>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {(mgs||[]).map(g=>{
              const groupShops=(shops||[]).filter(s=>s.merchantGroupId===g.id);
              const groupManagers=(users||[]).filter(u=>u.merchantGroupId===g.id);
              const groupReps=(users||[]).filter(u=>u.role==='rep'&&groupShops.map(s=>s.id).includes(u.shopId));
              return(
                <Card key={g.id} sx={{padding:14,boxShadow:'none'}}>
                  <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:10}}>
                    <div>
                      <div style={{fontWeight:800}}>{g.name} <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>({g.id})</span></div>
                      <div style={{display:'flex',gap:12,marginTop:6,fontSize:11,color:'var(--textMid)'}}>
                        <span>🏪 {groupShops.length} shop{groupShops.length!==1?'s':''}</span>
                        <span>👤 {groupReps.length} rep{groupReps.length!==1?'s':''}</span>
                        <span>🧑‍💼 {groupManagers.length} manager{groupManagers.length!==1?'s':''}</span>
                      </div>
                    </div>
                    <Btn v="err" sz="sm" onClick={()=>removeGroup(g)}>Remove</Btn>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <FF label="Group name"><input value={g.name} onChange={e=>updateGroup(g.id,{name:e.target.value})}/></FF>
                    <FF label="Contact email"><input type="email" value={g.contactEmail||''} onChange={e=>updateGroup(g.id,{contactEmail:e.target.value})} placeholder="owner@company.com"/></FF>
                  </div>
                  {groupShops.length>0&&<div style={{marginTop:10,display:'flex',gap:6,flexWrap:'wrap'}}>{groupShops.map(s=><span key={s.id} style={{fontSize:11,background:'var(--brandPale)',color:'var(--brand2)',padding:'2px 8px',borderRadius:99}}>{s.name}</span>)}</div>}
                </Card>
              );
            })}
            {(mgs||[]).length===0&&<Empty ico="🏢" title="No retail groups yet"/>}
          </div>
        </Card>
        {showAdd&&(
          <Card sx={{padding:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontWeight:800}}>New retail group</div>
              <Btn v="def" sz="sm" onClick={()=>setShowAdd(false)}>Cancel</Btn>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <FF label="Group name" req><input value={draft.name} onChange={e=>setDraft(p=>({...p,name:e.target.value}))} placeholder="e.g. Kigali Retail Ltd"/></FF>
              <FF label="Country"><input value={draft.country} onChange={e=>setDraft(p=>({...p,country:e.target.value}))} placeholder="RW"/></FF>
              <FF label="Contact email"><input type="email" value={draft.contactEmail} onChange={e=>setDraft(p=>({...p,contactEmail:e.target.value}))} placeholder="owner@company.com"/></FF>
              <div style={{background:'var(--bg)',borderRadius:'var(--r2)',padding:'10px 13px',fontSize:11,color:'var(--textMid)'}}>
                Group ID: <span style={{fontFamily:'DM Mono,monospace',fontWeight:700}}>{mkGroupId()}</span>
              </div>
              <Btn v="primary" full icon="＋" onClick={save}>Create group</Btn>
            </div>
          </Card>
        )}
      </div>
    );
  };

  const Admin=()=>{
    const tab=adminTab,setTab=setAdminTab;
    const [du,setDu]=useState('');
    const [uu,setUu]=useState('');
    const [showAddDevice,setShowAddDevice]=useState(false);
    const [showAddUser,setShowAddUser]=useState(false);
    const [showAddShop,setShowAddShop]=useState(false);
    const [newDev,setNewDev]=useState({brand:'',model:'',ram:'',rom:'',cash:''});
    const [newUser,setNewUser]=useState({name:'',email:'',password:'',role:'rep',shopId:'',merchantGroupId:'',superuser:false});
    const [newShop,setNewShop]=useState({name:'',location:'',merchantGroupId:''});
    const [cfgDraft,setCfgDraft]=useState({markupRate:Math.round(((pricingConfig||defaultPricingConfig).markupRate||0.60)*100),depositPct:Math.round(((pricingConfig||defaultPricingConfig).depositPct||0.20)*100)});
    // Company info — hooks must be at component top level
    const {companyInfo,setCompanyInfo}=useContext(Ctx);
    const [coDraft,setCoDraft]=useState(()=>({...defaultCompanyInfo,...(companyInfo||{})}));
    const sco=(k,v)=>setCoDraft(p=>({...p,[k]:v}));
    const handleCoLogo=(e)=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>sco('logo',ev.target.result);reader.readAsDataURL(file);};
    const handleCoSig=(e)=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>sco('signatorySig',ev.target.result);reader.readAsDataURL(file);};
    const saveCompany=()=>{setCompanyInfo({...coDraft});addToast('ok','Company info saved','Changes will appear on all new contracts');};

    const cfg=pricingConfig||defaultPricingConfig;

    const calcPreview=(cashStr)=>{
      const cash=Math.round(+cashStr||0);
      const total=Math.round(cash*(1+(cfgDraft.markupRate/100)));
      const deposit=Math.round(total*(cfgDraft.depositPct/100));
      const monthly=Math.round((total-deposit)/12);
      return {cash,total,deposit,monthly};
    };

    const downloadCsvTemplate=()=>{
      const rows=[['brand','model','ram','rom','cash_price_rwf'],['Tecno','Spark 40 Pro+','4GB','128GB','179000']];
      const csv=rows.map(r=>r.join(',')).join('\n');
      const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='devices_template.csv';a.click();
    };

    const handleCsvUpload=(e)=>{
      const file=e.target.files?.[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const lines=(ev.target.result||'').split('\n').map(l=>l.trim()).filter(Boolean);
        if(lines.length<2){addToast('err','CSV error','File must have a header row and at least one data row');return;}
        const header=lines[0].toLowerCase().split(',').map(h=>h.trim().replace(/"/g,''));
        const idxBrand=header.findIndex(h=>h.includes('brand'));
        const idxModel=header.findIndex(h=>h.includes('model'));
        const idxRam=header.findIndex(h=>h==='ram');
        const idxRom=header.findIndex(h=>h==='rom'||h.includes('storage'));
        const idxCash=header.findIndex(h=>h.includes('cash'));
        if(idxModel<0||idxCash<0){addToast('err','CSV error','CSV must have model and cash_price_rwf columns');return;}
        let added=0,skipped=0;
        const newDevices=[...(devices||[])];
        lines.slice(1).forEach(line=>{
          const cols=line.split(',').map(c=>c.trim().replace(/"/g,''));
          const brand=idxBrand>=0?cols[idxBrand]||'':'';
          const model=cols[idxModel]||'';
          const ram=idxRam>=0?cols[idxRam]||'':'';
          const rom=idxRom>=0?cols[idxRom]||'':'';
          const cash=+cols[idxCash]||0;
          if(!model||cash<1){skipped++;return;}
          const nums=newDevices.map(d=>parseInt(String(d.id).replace(/\D/g,''),10)).filter(n=>!isNaN(n));
          const next=(nums.length?Math.max(...nums):0)+1;
          newDevices.push({id:'D'+String(next).padStart(2,'0'),brand,model,ram,rom,cash});
          added++;
        });
        setDevices(newDevices);
        addToast('ok',`${added} device(s) imported`,skipped?`${skipped} rows skipped`:'');
      };
      reader.readAsText(file);
      e.target.value='';
    };

    const savePricing=()=>{
      const markupRate=Math.max(0,Math.min(200,+cfgDraft.markupRate||0))/100;
      const depositPct=Math.max(0,Math.min(100,+cfgDraft.depositPct||0))/100;
      setPricingConfig({markupRate,depositPct});
      addToast('ok','Pricing updated',`Markup ${Math.round(markupRate*100)}% · Deposit ${Math.round(depositPct*100)}%`);
    };

    const prev=calcPreview(newDev.cash);

    const devs=(devices||[]).filter(d=>{
      if(!du.trim()) return true;
      const s=du.toLowerCase();
      return (d.brand||'').toLowerCase().includes(s)||(d.model||'').toLowerCase().includes(s)||String(d.id).toLowerCase().includes(s);
    });
    const us=(users||[]).filter(u=>{
      if(!uu.trim()) return true;
      const s=uu.toLowerCase();
      return (u.name||'').toLowerCase().includes(s)||(u.email||'').toLowerCase().includes(s)||String(u.id).toLowerCase().includes(s);
    });

    const patchAppsDevice=(devId,devObj)=>{
      if(!setContracts)return;
      setContracts(p=>(p||[]).map(c=>{if(c.deal?.dealId!==devId)return c;const newDeal=calcDealFromDevice(devObj,pricingConfig||defaultPricingConfig);return{...c,deal:newDeal,updatedAt:new Date().toISOString()};}));
    };

    const upDev=(id,patch)=>{
      const next=(devices||[]).map(d=>d.id===id?{...d,...patch}:d);
      setDevices(next);
      const updated=next.find(d=>d.id===id);
      if(updated) patchAppsDevice(id,updated);
    };
    const rmDev=(id)=>{
      const used=(apps||[]).some(a=>a?.dev?.id===id);
      if(used){addToast('err','Cannot remove device','Device is used by existing applications');return;}
      setDevices((devices||[]).filter(d=>d.id!==id));
      addToast('ok','Device removed','');
    };
    const addDev=()=>{
      if(!newDev.brand.trim()||!newDev.model.trim()){addToast('err','Missing fields','Brand and model are required');return;}
      const cash=+newDev.cash;
      if(!cash||cash<1){addToast('err','Missing fields','Cash price is required');return;}
      const id=mkDevId();
      const d={id,brand:newDev.brand.trim(),model:newDev.model.trim(),ram:newDev.ram.trim(),rom:newDev.rom.trim(),cash};
      setDevices([...(devices||[]),d]);
      setNewDev({brand:'',model:'',ram:'',rom:'',cash:''});
      setShowAddDevice(false);
      addToast('ok','Device added',`${d.brand} ${d.model}`);
    };

    const upUser=(id,patch)=>{
      setUsers((users||[]).map(u=>u.id===id?{...u,...patch,roleLabel:roleLabelFor(patch.role||u.role)}:u));
    };
    const rmUser=(id)=>{
      if(id===user.id){addToast('err','Not allowed','You cannot remove your own account');return;}
      setUsers((users||[]).filter(u=>u.id!==id));
      addToast('ok','User removed','');
    };
    const resetPwd=(id)=>{
      const tmp=randPwd();
      const u=(users||[]).find(x=>x.id===id);
      if(!u) return;
      upUser(id,{password:tmp,mustChangePassword:true});
      sendEmail('tempPwd',{to_name:u.name,to_email:u.email,temp_password:tmp,login_url:window.location.href});
      addToast('info','Temporary password set',`Temp password emailed to ${u.email}`);
    };
    const addUser=()=>{
      const name=newUser.name.trim();
      const email=normEmail(String(newUser.email||'').trim());
      if(!name||!email){addToast('err','Missing fields','Name and full email are required');return;}
      if(!email.includes('@')||email.startsWith('@')||email.endsWith('@')){addToast('err','Invalid email','Enter a full email address (e.g. user@company.com)');return;}
      if((users||[]).some(u=>normEmail(u.email)===email)){addToast('err','Email already exists',email);return;}
      const id=mkUserId(newUser.role);
      const customPwd=String(newUser.password||'').trim();
      const password=customPwd||randPwd();
      const mustChangePassword=!customPwd;
      const u={id,name,email,password,role:newUser.role,roleLabel:roleLabelFor(newUser.role),superuser:!!newUser.superuser,mustChangePassword,...(newUser.role==='rep'&&newUser.shopId?{shopId:newUser.shopId}:{}),...(newUser.role==='merchant'&&newUser.merchantGroupId?{merchantGroupId:newUser.merchantGroupId}:{})};
      setUsers([...(users||[]),u]);
      sendEmail('welcome',{to_name:name,to_email:email,temp_password:password,role:roleLabelFor(newUser.role),login_url:window.location.href,must_change:mustChangePassword?'Please change your password after your first login.':''});
      setNewUser({name:'',email:'',password:'',role:'rep',shopId:'',merchantGroupId:'',superuser:false});
      setShowAddUser(false);
      addToast('ok','User added',`Welcome email sent to ${email}`);
    };

    return(
      <div className="fadeUp" style={{padding:'28px 32px'}}>
        <div style={{marginBottom:18}}>
          <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>Admin</h1>
          <p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>Superuser management for pricing, devices, and users</p>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
          <Btn v={tab==='pricing'?'primary':'def'} onClick={()=>setTab('pricing')}>Pricing rules</Btn>
          <Btn v={tab==='devices'?'primary':'def'} onClick={()=>setTab('devices')}>Devices</Btn>
          <Btn v={tab==='users'?'primary':'def'} onClick={()=>setTab('users')}>Users</Btn>
          {user.superuser&&<Btn v={tab==='groups'?'primary':'def'} onClick={()=>setTab('groups')}>Retail groups</Btn>}
          {user.superuser&&<Btn v={tab==='shops'?'primary':'def'} onClick={()=>setTab('shops')}>Shops</Btn>}
          {user.superuser&&<Btn v={tab==='company'?'primary':'def'} onClick={()=>setTab('company')}>Company info</Btn>}
