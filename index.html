<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cleva</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0B3D2E;--brand2:#146344;--brand3:#1D8A5E;--brandPale:#E6F3EE;--brandPale2:#D0E9DE;
  --accent:#D4700A;
  --bg:#F2F0EB;--surface:#FFFFFF;
  --border:rgba(11,61,46,0.11);--borderMed:rgba(11,61,46,0.2);
  --text:#111B15;--textMid:#4A5E52;--textLight:#8FA898;
  --ok:#1E6B3A;--okBg:#E8F5EE;--okBorder:#A8D8BC;
  --warn:#A05800;--warnBg:#FEF3E2;--warnBorder:#F0C882;
  --err:#B01C1C;--errBg:#FEE8E8;--errBorder:#F0AAAA;
  --info:#1549A0;--infoBg:#E8EFFE;--infoBorder:#A8BCEC;
  --pur:#5B21B6;--purBg:#EEE9FD;--purBorder:#C4AFEF;
  --r:10px;--r2:6px;
  --sh:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --sh2:0 4px 16px rgba(0,0,0,0.10),0 1px 4px rgba(0,0,0,0.06);
}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;line-height:1.5}
input,select,textarea,button{font-family:'DM Sans',sans-serif;font-size:14px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r2);background:white;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand2);box-shadow:0 0 0 3px rgba(20,99,68,0.10)}
input.err,select.err{border-color:var(--err)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.13);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp .22s ease}
.slideRight{animation:slideRight .2s ease}
.spin{animation:spin .7s linear infinite}

/* Mobile: touch-friendly and safe area */
@media (max-width:768px){
  body{font-size:15px;-webkit-tap-highlight-color:transparent}
  input,select,textarea,button{font-size:16px}
  button,.btn-touch{min-height:44px;min-width:44px}
}
@media (max-width:480px){
  body{font-size:14px}
}
/* Smooth scroll on iOS */
.main-scroll{-webkit-overflow-scrolling:touch}
/* Login: compact on small screens */
@media (max-width:480px){
  .login-wrap{padding:16px!important}
  .login-card{padding:20px 18px!important}
}

/* Sidebar: fixed size, no scroll; hamburger collapse on desktop; overlay on mobile */
.app-layout{display:flex;min-height:100vh;height:100vh;overflow:hidden}
.app-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.sidebar-wrapper{flex-shrink:0;height:100vh;overflow:hidden;display:flex;transition:width .22s ease}
.sidebar-backdrop{display:none}
.sidebar-collapsed-bar{display:none;width:52px;height:100vh;background:var(--brand);flex-direction:column;align-items:center;padding-top:14px;border-right:1px solid rgba(255,255,255,0.08)}
.sidebar-collapsed-bar .hamburger-desk{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);border:none;border-radius:var(--r2);color:white;cursor:pointer;font-size:18px}
.sidebar-drawer{width:210px;height:100vh;display:flex;flex-direction:column;background:var(--brand);flex-shrink:0;overflow:hidden}
.sidebar-drawer .sidebar-nav{flex:1;overflow-y:auto;padding:10px;min-height:0}
@media (min-width:769px){
  .sidebar-wrapper{width:52px}
  .sidebar-wrapper.desktop-collapsed{width:52px}
  .sidebar-wrapper.desktop-collapsed .sidebar-drawer{display:none}
  .sidebar-wrapper.desktop-collapsed .sidebar-collapsed-bar{display:flex}
  .sidebar-wrapper.desktop-expanded{width:210px}
  .sidebar-wrapper.desktop-expanded .sidebar-collapsed-bar{display:none}
  .sidebar-wrapper.desktop-expanded .sidebar-drawer{display:flex}
}
.sidebar-drawer .sidebar-collapse-btn{width:100%;padding:10px 14px;border:none;background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;text-align:left;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-drawer .sidebar-collapse-btn:hover{background:rgba(255,255,255,0.06);color:white}
@media (max-width:768px){
  .sidebar-wrapper{width:0!important;min-width:0}
  .sidebar-wrapper .sidebar-collapsed-bar{display:none!important}
  .sidebar-wrapper .sidebar-drawer{position:fixed;left:0;top:0;bottom:0;height:100vh;height:100dvh;max-height:100vh;width:260px;max-width:85vw;z-index:1001;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,0.15);padding-top:env(safe-area-inset-top)}
  .sidebar-wrapper .sidebar-drawer.mobile-open{transform:translateX(0)}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
  .sidebar-backdrop.visible{opacity:1;pointer-events:auto}
}
@media (min-width:769px){
  .sidebar-wrapper.desktop-expanded .sidebar-drawer .sidebar-collapse-btn{display:flex}
}
@media (max-width:768px){
  .sidebar-drawer .sidebar-collapse-btn{display:none}
}

/* Mobile header (hamburger + title) – fixed height, always visible on scroll */
.mobile-header{display:none;align-items:center;gap:12px;padding:12px 16px;padding-left:calc(16px + env(safe-area-inset-left));background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0}
.mobile-header .hamburger{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;font-size:18px;color:var(--text);-webkit-tap-highlight-color:transparent}
@media (max-width:768px){
  .mobile-header{display:flex;position:sticky;top:0;z-index:50;min-height:56px;box-sizing:border-box}
  .app-main{overflow:auto;-webkit-overflow-scrolling:touch}
  .mobile-header .hamburger{min-height:44px!important;height:44px}
  .app-main button{min-height:44px!important}
}

/* Page content padding on mobile */
@media (max-width:768px){
  .page-content{padding:16px 14px 24px!important}
  .page-content h1{font-size:18px!important}
}
@media (max-width:480px){.page-content{padding:14px 12px 20px!important}}

/* New application: full-page form layout */
.new-app-fullpage{height:100%;min-height:0}
.new-app-form{box-sizing:border-box}
.new-app-form header .step-connector{flex:1;max-width:40px}
@media (max-width:640px){
  .new-app-form .new-app-step-label{display:none!important}
}

/* Stats grids: single column on mobile */
@media (max-width:768px){
  .stats-grid-4{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  .stats-grid-3{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
}
@media (max-width:400px){
  .stats-grid-4,.stats-grid-3{grid-template-columns:1fr!important}
}

/* Cards / detail grids: stack on mobile */
@media (max-width:768px){
  .detail-grid-2{grid-template-columns:1fr!important;gap:12px!important}
  .form-grid-2{grid-template-columns:1fr!important}
  .form-grid-3{grid-template-columns:1fr!important}
  .step-row{flex-wrap:wrap;gap:8px!important}
  .step-row .step-connector{display:none!important}
}

/* Price list & device grids */
@media (max-width:768px){
  .price-grid{grid-template-columns:1fr!important}
  .device-select-grid{grid-template-columns:1fr!important}
}

/* Toast on mobile: full width, bottom, safe area */
@media (max-width:768px){
  .toast-container{top:auto!important;bottom:calc(16px + env(safe-area-inset-bottom))!important;left:calc(12px + env(safe-area-inset-left))!important;right:calc(12px + env(safe-area-inset-right))!important;min-width:auto!important;max-width:none!important}
}

/* Admin two-column → single column */
@media (max-width:768px){
  .admin-two-col{grid-template-columns:1fr!important}
}

/* Application cards: stack meta on small screens */
@media (max-width:480px){
  .app-card-meta{flex-wrap:wrap!important}
}

/* Home action buttons (first page – big, touch-friendly) */
.home-actions{display:flex;flex-direction:column;gap:12px;max-width:400px;margin:0 auto}
.home-action-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:18px 24px;min-height:56px;font-size:16px;font-weight:600;border-radius:var(--r);border:2px solid transparent;cursor:pointer;transition:all .15s;text-align:center;text-decoration:none;color:inherit;box-sizing:border-box}
.home-action-btn:active{transform:scale(0.98)}
@media (max-width:768px){
  .home-actions{max-width:none;gap:10px;padding:0 4px}
  .home-action-btn{min-height:52px;padding:16px 20px;font-size:15px;-webkit-tap-highlight-color:transparent}
}
/* IMEI row: stack input and button on mobile */
@media (max-width:480px){
  .imei-row{flex-direction:column!important;align-items:stretch!important}
  .imei-row .btn-wrap{width:100%!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useContext,createContext,useEffect}=React;

// ── APP CONFIG ────────────────────────────────────────────────

const EMAIL_DOMAIN='leout.rw';
const LS={USERS:'clevafin_users_v1',DEVICES:'clevafin_devices_v1',APPS:'clevafin_apps_v1',CFG:'clevafin_cfg_v1'};

// ── DEVICES & PRICING MODEL ───────────────────────────────────
// Seed devices only store cash price; financing terms are derived from config.
const DEVICES_SEED=[
  {id:'D01',brand:'Tecno',model:'Spark 40 Pro+',sku:'T-SP40PP',specs:'6.7″ AMOLED · 5000mAh · 4+128GB · A14',cash:179000},
  {id:'D02',brand:'Tecno',model:'Spark Slim',sku:'T-SLIM',specs:'6.67″ AMOLED · 5000mAh · 4+128GB · A14',cash:155000},

  {id:'D08',brand:'Tecno',model:'Spark 40 Pro',sku:'T-SP40P',specs:'6.7″ HD+ · 5000mAh · 4+128GB · A14',cash:152000},

// Default devices use the legacy weekly contract structure used across the UI.
// Superuser edits will persist in localStorage and update existing applications.
const DEVICES_DEFAULT=DEVICES_SEED.map(d=>({id:d.id,brand:d.brand,model:d.model,sku:d.sku,specs:d.specs,retail:d.cash,dep:Math.round(d.cash*0.2),weekly:Math.round((d.cash*1.27 - d.cash*0.2)/26),wks:26}));
// interestRate is applied on cash to get total price.
// depositPct is taken on total price; monthly is over 12 months.
const defaultCfg={interestRate:0.27,depositPct:0.2};
const calcDevicePricing=(d,cfg)=>{
  const rate=cfg.interestRate??defaultCfg.interestRate;
  const depPct=cfg.depositPct??defaultCfg.depositPct;
  const total=Math.round(d.cash*(1+rate));
  const deposit=Math.round(total*depPct);
  const months=12;
  const monthly=Math.round((total-deposit)/months);
  return {...d,total,deposit,monthly,months};
};

// ── STATUS ────────────────────────────────────────────────────
const ST={SUBMITTED:'submitted',IN_REVIEW:'in_review',CHANGES:'changes_requested',REJECTED:'rejected',ESCALATED:'escalated',IMEI_PENDING:'imei_pending',IMEI_VERIFIED:'imei_verified',LOCK_PENDING:'lock_pending',AWAITING_PAYMENT:'awaiting_payment',ACTIVE:'active'};
const SM={
  submitted:{label:'Pending review',c:'warn'},
  in_review:{label:'Under review',c:'info'},
  changes_requested:{label:'Changes needed',c:'warn'},
  rejected:{label:'Rejected',c:'err'},
  escalated:{label:'Escalated',c:'pur'},
  imei_pending:{label:'IMEI needed',c:'warn'},
  imei_verified:{label:'IMEI verified',c:'info'},
  lock_pending:{label:'Waiting for lock',c:'info'},
  awaiting_payment:{label:'Awaiting payment',c:'warn'},
  active:{label:'Active',c:'ok'},
};
const CC={warn:{bg:'var(--warnBg)',fg:'var(--warn)',bd:'var(--warnBorder)'},info:{bg:'var(--infoBg)',fg:'var(--info)',bd:'var(--infoBorder)'},ok:{bg:'var(--okBg)',fg:'var(--ok)',bd:'var(--okBorder)'},err:{bg:'var(--errBg)',fg:'var(--err)',bd:'var(--errBorder)'},pur:{bg:'var(--purBg)',fg:'var(--pur)',bd:'var(--purBorder)'}};

// ── HELPERS ───────────────────────────────────────────────────
const fmtRWF=n=>'RWF '+Number(n).toLocaleString();
const fmtD=d=>new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const fmtT=d=>new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let seq=4;const gid=()=>'FF-'+String(++seq).padStart(4,'0');
const OCCS=['Trader / Business owner','Teacher','Civil servant','Driver / Transport','Farmer','Healthcare worker','Student','Other'];
const RELS=['Spouse','Parent','Sibling','Child','Colleague','Friend','Other'];
const readFileAsDataURL=(file)=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});

// ── SEED DATA ─────────────────────────────────────────────────
const SEED=[
  {id:'FF-0001',status:ST.SUBMITTED,createdAt:new Date(Date.now()-10800000).toISOString(),updatedAt:new Date(Date.now()-10800000).toISOString(),
   rep:'Alice Ndayisaba',repId:'SR01',
   c:{name:'Jean Baptiste Habimana',nid:'1199880123456001',phone:'0781234567',addr:'Kimironko, Gasabo',occ:'Trader / Business owner',income:150000,kin:{name:'Marie Habimana',phone:'0789876543',rel:'Spouse'}},
   dev:DEVICES_DEFAULT[0],notes:'',reviewer:null,upya:null,imei:null,ptId:null,lockedAt:null,
   tl:[{at:new Date(Date.now()-10800000).toISOString(),by:'Alice Ndayisaba',txt:'Application submitted for review'}]},
  {id:'FF-0002',status:ST.IMEI_PENDING,createdAt:new Date(Date.now()-172800000).toISOString(),updatedAt:new Date(Date.now()-3600000).toISOString(),
   rep:'Alice Ndayisaba',repId:'SR01',
   c:{name:'Claudette Uwase',nid:'1200180123456002',phone:'0782345678',addr:'Nyamirambo, Nyarugenge',occ:'Teacher',income:180000,kin:{name:'Patrick Uwase',phone:'0786543210',rel:'Brother'}},
   dev:DEVICES_DEFAULT[2],notes:'Income confirmed via employer letter. Stable profile.',reviewer:'Jane Murekatete',upya:'UPYA-RW-2025-0892',imei:null,ptId:null,lockedAt:null,
   tl:[{at:new Date(Date.now()-172800000).toISOString(),by:'Alice Ndayisaba',txt:'Application submitted for review'},{at:new Date(Date.now()-86400000).toISOString(),by:'Jane Murekatete',txt:'Placed under review'},{at:new Date(Date.now()-3600000).toISOString(),by:'Jane Murekatete',txt:'Approved — UPYA contract UPYA-RW-2025-0892 created'}]},
  {id:'FF-0003',status:ST.ACTIVE,createdAt:new Date(Date.now()-604800000).toISOString(),updatedAt:new Date(Date.now()-432000000).toISOString(),
   rep:'Alice Ndayisaba',repId:'SR01',
   c:{name:'Emmanuel Nkurunziza',nid:'1198180123456003',phone:'0783456789',addr:'Remera, Gasabo',occ:'Driver / Transport',income:200000,kin:{name:'Grace Nkurunziza',phone:'0785432109',rel:'Spouse'}},
   dev:DEVICES_DEFAULT[4],notes:'Very stable income. Strong profile.',reviewer:'Jane Murekatete',upya:'UPYA-RW-2025-0887',imei:'353456789012345',ptId:'PT-2025-04892',lockedAt:new Date(Date.now()-432000000).toISOString(),
   tl:[{at:new Date(Date.now()-604800000).toISOString(),by:'Alice Ndayisaba',txt:'Application submitted'},{at:new Date(Date.now()-518400000).toISOString(),by:'Jane Murekatete',txt:'Approved — UPYA contract UPYA-RW-2025-0887 created'},{at:new Date(Date.now()-475200000).toISOString(),by:'Alice Ndayisaba',txt:'IMEI 353456789012345 verified via Carlcare'},{at:new Date(Date.now()-475100000).toISOString(),by:'System',txt:'Registered in PayTrigger (PT-2025-04892)'},{at:new Date(Date.now()-432000000).toISOString(),by:'Alice Ndayisaba',txt:'Phone locked — contract activated, payments enabled'}]},
  {id:'FF-0004',status:ST.ESCALATED,createdAt:new Date(Date.now()-86400000).toISOString(),updatedAt:new Date(Date.now()-1800000).toISOString(),
   rep:'Bob Nzeyimana',repId:'SR02',
   c:{name:'Florentine Mukamana',nid:'1200480123456004',phone:'0784567890',addr:'Gisozi, Gasabo',occ:'Trader / Business owner',income:350000,kin:{name:'Théogène Mukama',phone:'0784321098',rel:'Parent'}},
   dev:DEVICES_DEFAULT[1],notes:'Customer reported existing financing. Escalated to credit committee.',reviewer:'Jane Murekatete',upya:null,imei:null,ptId:null,lockedAt:null,
   tl:[{at:new Date(Date.now()-86400000).toISOString(),by:'Bob Nzeyimana',txt:'Application submitted'},{at:new Date(Date.now()-1800000).toISOString(),by:'Jane Murekatete',txt:'Escalated to credit committee — prior financing flagged'}]},
];

// ── CONTEXT ───────────────────────────────────────────────────
const Ctx=createContext(null);

// ── UI COMPONENTS ─────────────────────────────────────────────
const Badge=({st})=>{const m=SM[st]||{label:st,c:'info'};const c=CC[m.c]||CC.info;return <span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:99,fontSize:11,fontWeight:600,letterSpacing:'0.3px',background:c.bg,color:c.fg,border:`1px solid ${c.bd}`}}>{m.label}</span>;};
const Spin=({size=14,dark=false})=><span className="spin" style={{display:'inline-block',width:size,height:size,border:`2px solid ${dark?'rgba(11,61,46,0.15)':'rgba(255,255,255,0.3)'}`,borderTopColor:dark?'var(--brand2)':'white',borderRadius:'50%',verticalAlign:'middle'}}/>;

const Btn=({children,onClick,v='def',sz='md',disabled=false,loading=false,icon,full=false,style={}})=>{
  const vs={primary:{bg:'var(--brand)',fg:'white',bd:'var(--brand)',hov:'var(--brand2)'},ok:{bg:'var(--okBg)',fg:'var(--ok)',bd:'var(--okBorder)',hov:'#C0E8D0'},warn:{bg:'var(--warnBg)',fg:'var(--warn)',bd:'var(--warnBorder)',hov:'#F5DFA8'},err:{bg:'var(--errBg)',fg:'var(--err)',bd:'var(--errBorder)',hov:'#F5C0C0'},info:{bg:'var(--infoBg)',fg:'var(--info)',bd:'var(--infoBorder)',hov:'#C0D0F5'},pur:{bg:'var(--purBg)',fg:'var(--pur)',bd:'var(--purBorder)',hov:'#D8CCF8'},def:{bg:'white',fg:'var(--text)',bd:'var(--border)',hov:'var(--bg)'},ghost:{bg:'transparent',fg:'var(--textMid)',bd:'transparent',hov:'rgba(0,0,0,0.05)'}};
  const vv=vs[v]||vs.def;const pads={sm:'5px 11px',md:'9px 16px',lg:'12px 22px'};const fss={sm:12,md:14,lg:15};
  const [h,setH]=useState(false);
  return <button onClick={disabled||loading?undefined:onClick} disabled={disabled||loading} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',gap:6,padding:pads[sz],fontSize:fss[sz],fontWeight:500,borderRadius:'var(--r2)',cursor:disabled||loading?'not-allowed':'pointer',border:`1.5px solid ${disabled?'var(--border)':vv.bd}`,background:disabled?'var(--bg)':h?vv.hov:vv.bg,color:disabled?'var(--textLight)':vv.fg,width:full?'100%':'auto',justifyContent:full?'center':'flex-start',transition:'all .13s',userSelect:'none',whiteSpace:'nowrap',...style}}>{loading?<Spin dark={v==='def'||v==='ghost'} size={13}/>:icon&&<span style={{fontSize:13,lineHeight:1}}>{icon}</span>}{children}</button>;
};

const Login=({onLogin,users})=>{
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [showPass,setShowPass]=useState(false);

  const submit=async()=>{
    setErr('');
    if(!email.trim()||!pass.trim()){setErr('Enter your email and password');return;}
    setLoading(true);
    await sleep(600);
    const user=(users||[]).find(u=>u.email.toLowerCase()===email.toLowerCase().trim()&&u.password===pass);
    if(!user){setErr('Incorrect email or password');setLoading(false);return;}

          <div style={{fontSize:42,fontWeight:900,color:'white',letterSpacing:'-1.5px',marginBottom:6}}>{APP_NAME}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'3px'}}>PAYGO Underwriting Platform</div>
        </div>
        <div className="login-card" style={{background:'rgba(255,255,255,0.06)',backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:'var(--r)',padding:'28px 26px'}}>
          <div style={{fontSize:15,fontWeight:600,color:'white',marginBottom:20}}>Sign in to your account</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.55)',display:'block',marginBottom:5}}>Email address</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="you@company.com" style={{background:'rgba(255,255,255,0.10)',border:'1.5px solid rgba(255,255,255,0.15)',color:'white',borderRadius:'var(--r2)'}} className={err?'err':''}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.55)',display:'block',marginBottom:5}}>Password</label>
              <div style={{position:'relative'}}>
                <input type={showPass?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="••••••••" style={{background:'rgba(255,255,255,0.10)',border:'1.5px solid rgba(255,255,255,0.15)',color:'white',borderRadius:'var(--r2)',paddingRight:44}} className={err?'err':''}/>
                <button onClick={()=>setShowPass(p=>!p)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'rgba(255,255,255,0.45)',cursor:'pointer',fontSize:12,padding:4}}>{showPass?'Hide':'Show'}</button>
              </div>
            </div>
            {err&&<div style={{padding:'9px 12px',background:'var(--errBg)',border:'1px solid var(--errBorder)',borderRadius:'var(--r2)',fontSize:12,color:'var(--err)',fontWeight:500}}>{err}</div>}
            <button onClick={submit} disabled={loading} style={{padding:'11px 0',background:loading?'rgba(255,255,255,0.15)':'white',border:'none',borderRadius:'var(--r2)',color:loading?'rgba(255,255,255,0.5)':'var(--brand)',fontWeight:700,fontSize:14,cursor:loading?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all .15s',marginTop:4}}>
              {loading?<><Spin size={14}/> Signing in…</>:'Sign in'}
            </button>
          </div>
          <div style={{marginTop:20,padding:'12px 14px',background:'rgba(255,255,255,0.06)',borderRadius:'var(--r2)',border:'1px solid rgba(255,255,255,0.08)'}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'rgba(255,255,255,0.35)',marginBottom:8}}>Demo accounts</div>
            {(users||[]).map(u=>(
              <div key={u.id} onClick={()=>{setEmail(u.email);setPass(u.password);setErr('');}} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',cursor:'pointer',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                <span style={{fontSize:11,color:'rgba(255,255,255,0.5)',fontFamily:'DM Mono,monospace',wordBreak:'break-all'}}>{u.email}</span>

const EditAndResubmit=({app,devices,onUpdate,addToast,onBack})=>{
  const {user}=useContext(Ctx);
  const requested=app.requestedChangeFields||[];
  const highlight=(key)=>requested.includes(key)?{borderLeft:'3px solid var(--warn)',background:'var(--warnBg)',padding:'8px 10px',margin:'0 -10px 8px -10px',borderRadius:'var(--r2)'}:{};
  const [f,setF]=useState({name:app.c.name,idType:app.c.idType||'nid',nid:app.c.nid,phone:app.c.phone,addr:app.c.addr,occ:app.c.occ,income:String(app.c.income||''),kn:app.c.kin.name,kp:app.c.kin.phone,kr:app.c.kin.rel,did:app.dev.id});
  const [e,setE]=useState({});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const validate=()=>{
    const er={};
    if(!f.name.trim())er.name='Required';
    if(f.idType==='nid'){if(f.nid.replace(/\D/g,'').length!==16)er.nid='National ID must be 16 digits';}else{if(!f.nid.trim())er.nid='Passport number required';}
    if(!f.phone.trim())er.phone='Required';if(!f.addr.trim())er.addr='Required';if(!f.occ)er.occ='Required';if(!f.income||isNaN(f.income)||+f.income<1)er.income='Enter a valid amount';if(!f.kn.trim())er.kn='Required';if(!f.kp.trim())er.kp='Required';if(!f.kr)er.kr='Required';if(!f.did)er.did='Select a device';
    setE(er);return!Object.keys(er).length;
  };
  const submit=()=>{
    if(!validate())return;
    const dev=(devices||[]).find(d=>d.id===f.did);if(!dev){addToast('err','Device required','');return;}
    const c={name:f.name.trim(),idType:f.idType||'nid',nid:f.nid,phone:f.phone.trim(),addr:f.addr.trim(),occ:f.occ,income:+f.income,kin:{name:f.kn.trim(),phone:f.kp.trim(),rel:f.kr}};
    onUpdate(app.id,{c,dev,status:ST.SUBMITTED,requestedChangeFields:[],tlEntry:{by:user.name,txt:'Resubmitted after changes — returned to reviewer'}});
    addToast('ok','Application resubmitted','Sent back to the reviewer');onBack();
  };
  return(
    <div className="fadeUp" style={{padding:'28px 32px',maxWidth:820}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>
        <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>Edit & resubmit</h1><p style={{fontSize:11,color:'var(--textMid)',marginTop:1}}>{app.id} · Underwriter requested changes</p></div>
      </div>
      {app.notes&&(
        <Card sx={{padding:14,marginBottom:18,background:'var(--warnBg)',border:'1px solid var(--warnBorder)'}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--warn)',marginBottom:6}}>Underwriter note</div>
          <div style={{fontSize:13,color:'var(--text)'}}>{app.notes}</div>
          {requested.length>0&&<div style={{fontSize:11,color:'var(--textMid)',marginTop:8}}>Fields to review: <strong>{requested.join(', ')}</strong></div>}
        </Card>
      )}
      <Card sx={{padding:22}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>Customer information</div>
        <div className="form-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={highlight('name')}><FF label="Full name" req err={e.name}><input value={f.name} onChange={ev=>s('name',ev.target.value)} placeholder="As on ID" className={e.name?'err':''}/></FF></div>
          <div style={highlight('nid')}><FF label="ID type" req><select value={f.idType} onChange={ev=>{s('idType',ev.target.value);if(ev.target.value==='nid')s('nid',f.nid.replace(/\D/g,'').slice(0,16));}}><option value="nid">National ID</option><option value="passport">Passport</option></select></FF></div>
        </div>
        <div style={highlight('nid')}><FF label={f.idType==='nid'?'National ID number (16 digits)':'Passport number'} req err={e.nid}><input value={f.nid} onChange={ev=>s('nid',f.idType==='nid'?ev.target.value.replace(/\D/g,'').slice(0,16):ev.target.value)} placeholder={f.idType==='nid'?'16 digits':'e.g. AB1234567'} className={e.nid?'err':''} style={{fontFamily:'DM Mono,monospace'}}/></FF></div>
        <div className="form-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={highlight('phone')}><FF label="Phone number" req err={e.phone}><input value={f.phone} onChange={ev=>s('phone',ev.target.value)} placeholder="07XXXXXXXX" className={e.phone?'err':''}/></FF></div>
          <div style={highlight('occ')}><FF label="Occupation" req err={e.occ}><select value={f.occ} onChange={ev=>s('occ',ev.target.value)} className={e.occ?'err':''}><option value="">Select...</option>{OCCS.map(o=><option key={o}>{o}</option>)}</select></FF></div>

        <div style={{borderTop:'1.5px solid var(--border)',paddingTop:14,marginTop:4}}>

            <div style={highlight('kin_name')}><FF label="Full name" req err={e.kn}><input value={f.kn} onChange={ev=>s('kn',ev.target.value)} placeholder="Next of kin name" className={e.kn?'err':''}/></FF></div>

          </div>

// ── NEW APPLICATION ───────────────────────────────────────────
const NewApp=({onSubmit,onBack,devices})=>{
  const {user}=useContext(Ctx);
  const [step,setStep]=useState(1);
  const [f,setF]=useState({name:'',idType:'nid',nid:'',phone:'',addr:'',occ:'',income:'',kn:'',kp:'',kr:'',did:'',customerPhoto:null,idPhoto:null,incomeProof:null});
  const [e,setE]=useState({});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const handleFile=(k,file)=>{if(!file)return;readFileAsDataURL(file).then(url=>s(k,url)).catch(()=>{});};
  const v1=()=>{
    const er={};
    if(!f.name.trim())er.name='Required';
    if(f.idType==='nid'){if(f.nid.replace(/\D/g,'').length!==16)er.nid='National ID must be 16 digits';}
    else{if(!f.nid.trim())er.nid='Passport number required';}
    if(!f.phone.trim())er.phone='Required';if(!f.addr.trim())er.addr='Required';if(!f.occ)er.occ='Required';if(!f.income||isNaN(f.income)||+f.income<1)er.income='Enter a valid amount';if(!f.kn.trim())er.kn='Required';if(!f.kp.trim())er.kp='Required';if(!f.kr)er.kr='Required';
    if(!f.customerPhoto)er.customerPhoto='Take customer photo (camera)';if(!f.idPhoto)er.idPhoto='Add ID document (photo or upload)';if(!f.incomeProof)er.incomeProof='Add proof of income (upload image or PDF)';
    setE(er);return!Object.keys(er).length;
  };
  const v2=()=>{const er={};if(!f.did)er.did='Please select a device';setE(er);return!Object.keys(er).length;};
  const next=()=>{if(step===1&&v1())setStep(2);else if(step===2&&v2())setStep(3);};
  const dev=(devices||[]).find(d=>d.id===f.did);
  const STEPS=['Customer & documents','Select device','Review & submit'];
  const goStep=(s)=>{if(s<step)setStep(s);else if(s===step){}else if(s===2&&v1())setStep(2);else if(s===3&&v1()&&v2())setStep(3);};

        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
          <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Cancel</Btn>
          <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>New application</h1><p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>Step {step} of 3 — {STEPS[step-1]}</p></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:0}}>
          {STEPS.map((l,i)=>(
            <React.Fragment key={i}>
              <button type="button" onClick={()=>goStep(i+1)} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',border:'none',background:'transparent',cursor:step>i+1?'pointer':'default',borderRadius:'var(--r2)',fontSize:13,fontWeight:step===i+1?700:500,color:step>i+1?'var(--ok)':step===i+1?'var(--brand2)':'var(--textLight)'}}>
                <span style={{width:28,height:28,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,background:step>i+1?'var(--ok)':step===i+1?'var(--brand)':'var(--border)',color:step>i+1||step===i+1?'white':'var(--textLight)'}}>{step>i+1?'✓':i+1}</span>
                <span className="new-app-step-label">{l}</span>
              </button>
              {i<2&&<div style={{width:24,height:1,background:'var(--border)',margin:'0 4px',alignSelf:'center'}}/>}
            </React.Fragment>
          ))}
        </div>
      </header>
      <div style={{flex:1,minHeight:0,overflow:'auto',overflowX:'hidden',padding:'20px 0',WebkitOverflowScrolling:'touch'}}>

        {step===1&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>

            <div className="form-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>

              <FF label="ID type" req><select value={f.idType} onChange={ev=>{s('idType',ev.target.value);if(ev.target.value==='nid')s('nid',f.nid.replace(/\D/g,'').slice(0,16));}}><option value="nid">National ID</option><option value="passport">Passport</option></select></FF>
            </div>
            <FF label={f.idType==='nid'?'National ID number (16 digits)':'Passport number'} req err={e.nid}>

              <FF label="Occupation" req err={e.occ}><select value={f.occ} onChange={ev=>s('occ',ev.target.value)} className={e.occ?'err':''}><option value="">Select...</option>{OCCS.map(o=><option key={o}>{o}</option>)}</select></FF>

            <FF label="Address / location" req err={e.addr}><input value={f.addr} onChange={ev=>s('addr',ev.target.value)} placeholder="Sector, district — e.g. Kimironko, Gasabo" className={e.addr?'err':''}/></FF>

              <FF label="Proof of income" req err={e.incomeProof}><div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><label style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 16px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--r2)',cursor:'pointer',fontSize:13,fontWeight:500}}>📎 Upload (image or PDF)<input type="file" accept="image/*,.pdf,application/pdf" style={{display:'none'}} onChange={ev=>{const file=ev.target.files?.[0];if(file)handleFile('incomeProof',file);ev.target.value='';}}/></label>{f.incomeProof&&<span style={{fontSize:12,color:'var(--ok)'}}>✓ Document added</span>}</div></FF>
            </div>
            <div style={{borderTop:'1.5px solid var(--border)',paddingTop:14,marginTop:4}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>Next of kin</div>
              <div className="form-grid-3" style={{display:'grid',gridTemplateColumns:'1fr 1fr 160px',gap:12}}>
                <FF label="Full name" req err={e.kn}><input value={f.kn} onChange={ev=>s('kn',ev.target.value)} placeholder="Next of kin name" className={e.kn?'err':''}/></FF>
                <FF label="Phone" req err={e.kp}><input value={f.kp} onChange={ev=>s('kp',ev.target.value)} placeholder="07XXXXXXXX" className={e.kp?'err':''}/></FF>
                <FF label="Relationship" req err={e.kr}><select value={f.kr} onChange={ev=>s('kr',ev.target.value)} className={e.kr?'err':''}><option value="">Select...</option>{RELS.map(r=><option key={r}>{r}</option>)}</select></FF>
              </div>
            </div>
          </div>
        )}
        {step===2&&(
          <div>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>Choose device</div>
            {e.did&&<div style={{padding:'9px 13px',background:'var(--errBg)',border:'1px solid var(--errBorder)',borderRadius:'var(--r2)',fontSize:12,color:'var(--err)',marginBottom:12}}>{e.did}</div>}
            <div className="device-select-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
              {(devices||[]).map(d=>{const sel=f.did===d.id;const tot=d.dep+d.weekly*d.wks;return(
                <div key={d.id} onClick={()=>s('did',d.id)} style={{border:`${sel?2:1.5}px solid ${sel?'var(--brand2)':'var(--border)'}`,borderRadius:'var(--r)',padding:'12px 13px',cursor:'pointer',background:sel?'var(--brandPale)':'white',transition:'all .13s',position:'relative'}}>
                  {sel&&<div style={{position:'absolute',top:9,right:9,width:18,height:18,borderRadius:9,background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'white',fontWeight:700}}>✓</div>}
                  <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:1}}>{d.brand}</div>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{d.model}</div>
                  <div style={{fontSize:10,color:'var(--textLight)',marginBottom:10,lineHeight:1.5}}>{d.specs}</div>
                  {[['Deposit',fmtRWF(d.dep)],['Weekly',fmtRWF(d.weekly)],['Total',fmtRWF(tot)]].map(([k,v])=>(

        {step<3?<Btn onClick={next} v="primary" icon="→">Continue</Btn>:<Btn onClick={()=>onSubmit(f,dev)} v="primary" icon="✓">Submit for review</Btn>}

// ── IMEI FLOW ─────────────────────────────────────────────────
const IMEIFlow=({app,onUpdate,addToast,onBack})=>{
  const {user}=useContext(Ctx);
  const [imei,setImei]=useState(app.imei||'');
  const [phase,setPhase]=useState(app.status===ST.IMEI_VERIFIED?'verified':'entry');
  const [ld,setLd]=useState(null);

  const verify=async()=>{
    if(imei.length!==15||!/^\d+$/.test(imei)){addToast('err','Invalid IMEI','Must be exactly 15 digits');return;}
    setLd('carlcare');await sleep(2400);
    setLd('pt');await sleep(1700);
    const ptId='PT-2026-'+Math.floor(10000+Math.random()*90000);
    onUpdate(app.id,{imei,ptId,status:ST.IMEI_VERIFIED,tlEntry:{by:user.name,txt:`IMEI ${imei} verified via Carlcare`}});
    onUpdate(app.id,{tlEntry:{by:'System',txt:`Registered in PayTrigger (${ptId})`}});
    addToast('ok','IMEI verified','Carlcare confirmed · Registered in PayTrigger');
    setPhase('verified');setLd(null);
  };

  const confirmLocked=async()=>{
    setLd('lock');await sleep(2000);
    onUpdate(app.id,{status:ST.ACTIVE,lockedAt:new Date().toISOString(),tlEntry:{by:user.name,txt:'Phone locked — contract activated, payments enabled'}});
    addToast('ok','Contract activated!','Device added to UPYA inventory. Customer can now make payments.');
    setLd(null);onBack();
  };

  return(
    <div className="fadeUp" style={{padding:'28px 32px',maxWidth:640}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>
        <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>IMEI & activation</h1><p style={{fontSize:11,color:'var(--textMid)',marginTop:1}}>{app.id} · {app.c.name} · {app.dev.brand} {app.dev.model}</p></div>
      </div>
      <div style={{display:'flex',alignItems:'center',marginBottom:24}}>
        {[{l:'Enter & verify IMEI',done:phase==='verified'||app.status===ST.ACTIVE},{l:'Lock phone & activate',done:app.status===ST.ACTIVE}].map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div style={{width:26,height:26,borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,background:s.done?'var(--ok)':'var(--brand)',color:'white'}}>{s.done?'✓':i+1}</div>
              <span style={{fontSize:12,fontWeight:500,color:s.done?'var(--ok)':'var(--text)'}}>{s.l}</span>
            </div>
            {i<1&&<div style={{flex:1,height:1,background:'var(--border)',margin:'0 10px'}}/>}
          </React.Fragment>
        ))}
      </div>
      {app.upya&&<div style={{padding:'8px 12px',background:'var(--brandPale)',border:'1px solid var(--brandPale2)',borderRadius:'var(--r2)',fontSize:12,color:'var(--brand2)',marginBottom:16}}>UPYA Contract: <strong style={{fontFamily:'DM Mono,monospace'}}>{app.upya}</strong></div>}
      <Card sx={{padding:22}}>
        {phase==='entry'&&(
          <div>
            <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>Enter device IMEI</div>
            <p style={{fontSize:12,color:'var(--textMid)',marginBottom:18,lineHeight:1.7}}>Enter the 15-digit IMEI of the <strong>{app.dev.brand} {app.dev.model}</strong>. We'll verify it against <strong>Carlcare</strong> to confirm the device model matches, then automatically register it in <strong>PayTrigger</strong>.</p>
            <div className="imei-row" style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:8,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:0}}>
                <input value={imei} onChange={ev=>setImei(ev.target.value.replace(/\D/g,'').slice(0,15))} placeholder="15-digit IMEI number" style={{fontFamily:'DM Mono,monospace',fontSize:17,letterSpacing:'1.5px'}} maxLength={15}/>
                <div style={{fontSize:10,color:'var(--textLight)',marginTop:4}}>Dial *#06# on the device · {imei.length}/15 digits</div>
              </div>
              <div className="btn-wrap" style={{flexShrink:0}}><Btn onClick={verify} v="primary" sz="lg" loading={ld==='carlcare'||ld==='pt'} disabled={imei.length!==15} full>
                {ld==='carlcare'?'Checking…':ld==='pt'?'Registering…':'Verify IMEI'}
              </Btn></div>
            </div>
            {(ld==='carlcare'||ld==='pt')&&<div style={{padding:'10px 13px',background:'var(--infoBg)',border:'1px solid var(--infoBorder)',borderRadius:'var(--r2)',fontSize:12,color:'var(--info)',display:'flex',alignItems:'center',gap:8}}><Spin size={13} dark/><span>{ld==='carlcare'?'Verifying IMEI with Carlcare database…':'Uploading to PayTrigger locking system…'}</span></div>}
          </div>
        )}
        {phase==='verified'&&(
          <div>
            <div style={{padding:'13px 15px',background:'var(--okBg)',border:'1px solid var(--okBorder)',borderRadius:'var(--r2)',marginBottom:20}}>
              <div style={{fontWeight:600,fontSize:13,color:'var(--ok)',marginBottom:3}}>✓ IMEI verified & registered in PayTrigger</div>
              <div style={{fontSize:11,color:'var(--ok)',opacity:.85}}>IMEI: <span style={{fontFamily:'DM Mono,monospace',fontWeight:600}}>{app.imei||imei}</span>{app.ptId&&<span> · PayTrigger: <span style={{fontFamily:'DM Mono,monospace'}}>{app.ptId}</span></span>}</div>
            </div>
            <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>Now lock the phone manually</div>
            <p style={{fontSize:12,color:'var(--textMid)',lineHeight:1.7,marginBottom:14}}>Open PayTrigger and lock the device. Once the customer's phone shows the lock screen, confirm below to activate the contract and enable payments.</p>
            <div style={{padding:'10px 13px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--warn)',lineHeight:1.6,marginBottom:18}}><strong>Do not confirm</strong> until the lock screen is visible on the customer's phone.</div>
            <a href="https://paytrigger.shalltry.com/pay-trigger/" target="_blank" style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 14px',background:'var(--infoBg)',border:'1px solid var(--infoBorder)',borderRadius:'var(--r2)',color:'var(--info)',fontSize:12,fontWeight:500,textDecoration:'none',marginBottom:16}}>↗ Open PayTrigger portal</a>
            <Btn onClick={confirmLocked} v="ok" sz="lg" full loading={ld==='lock'} icon="🔒">{ld==='lock'?'Activating contract…':'Confirm phone is locked — activate contract'}</Btn>
          </div>
        )}
      </Card>
    </div>
  );
};

// ── APP DETAIL ────────────────────────────────────────────────
const AppDetail=({app,onUpdate,addToast,onBack,devices})=>{
  const {user}=useContext(Ctx);
  const [note,setNote]=useState(app.notes||'');
  const [ld,setLd]=useState(null);
  const [showRej,setShowRej]=useState(false);
  const [rejReason,setRejReason]=useState('');
  const [requestedFields,setRequestedFields]=useState(()=>app.requestedChangeFields||[]);
  const toggleRequest=(key)=>{setRequestedFields(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);};
  const isSuperuser=!!user.superuser;
  const [showEditCustomer,setShowEditCustomer]=useState(false);
  const [editC,setEditC]=useState(()=>({...app.c,kin:app.c.kin?{...app.c.kin}:{name:'',phone:'',rel:''}}));
  const [editNotes,setEditNotes]=useState(app.notes||'');
  const [newTlTxt,setNewTlTxt]=useState('');
  const saveCustomer=()=>{const c={name:editC.name.trim(),idType:editC.idType||'nid',nid:editC.nid,phone:editC.phone.trim(),addr:editC.addr.trim(),occ:editC.occ,income:+editC.income,kin:{name:editC.kin.name.trim(),phone:editC.kin.phone.trim(),rel:editC.kin.rel}};onUpdate(app.id,{c,tlEntry:{by:user.name,txt:'Customer info updated (superuser)'}});addToast('ok','Customer updated','');setShowEditCustomer(false);};
  const saveNotes=()=>{onUpdate(app.id,{notes:editNotes});addToast('ok','Notes updated','');};
  const addTlEntry=()=>{if(!newTlTxt.trim())return;onUpdate(app.id,{tlEntry:{by:user.name,txt:newTlTxt.trim()}});addToast('ok','Timeline entry added','');setNewTlTxt('');};
  useEffect(()=>{setEditNotes(app.notes||'');},[app.id,app.notes]);

  const approve=async()=>{
    setLd('ap');await sleep(2200);
    const uid='UPYA-RW-2026-'+Math.floor(1000+Math.random()*9000);
    onUpdate(app.id,{status:ST.IMEI_PENDING,notes:note,reviewer:user.name,upya:uid,tlEntry:{by:user.name,txt:`Approved — UPYA contract ${uid} created`}});
    addToast('ok','Application approved',`UPYA contract ${uid} created`);setLd(null);onBack();
  };
  const reject=async()=>{
    if(!rejReason.trim()){addToast('err','Reason required','Provide a rejection reason');return;}
    setLd('rej');await sleep(700);
    onUpdate(app.id,{status:ST.REJECTED,notes:rejReason,reviewer:user.name,tlEntry:{by:user.name,txt:`Rejected: ${rejReason}`}});
    addToast('info','Application rejected','Rep notified');setLd(null);onBack();
  };
  const requestChanges=async()=>{
    if(!note.trim()){addToast('err','Note required','Explain what changes you need before sending back.');return;}
    setLd('ch');await sleep(700);
    const fieldsTxt=requestedFields.length?` (${requestedFields.join(', ')})`:'';
    onUpdate(app.id,{status:ST.CHANGES,notes:note,reviewer:user.name,requestedChangeFields:requestedFields,tlEntry:{by:user.name,txt:`Changes requested${fieldsTxt} — returned to sales rep`}});
    addToast('warn','Changes requested','Application returned to rep');setLd(null);onBack();
  };
  const escalate=async()=>{
    if(!note.trim()){addToast('err','Note required','Explain why you are escalating before sending to credit committee.');return;}
    setLd('esc');await sleep(700);
    onUpdate(app.id,{status:ST.ESCALATED,notes:note,reviewer:user.name,tlEntry:{by:user.name,txt:'Escalated to credit committee'}});
    addToast('info','Escalated','Sent to credit committee');setLd(null);onBack();
  };

  const c=app.c,d=app.dev,tot=d.dep+d.weekly*d.wks;
  const ratio=c.income>0?(d.weekly/c.income*100):0;
  const affordOk=c.income>0&&ratio<30;
  const isUnderwriter=user.role==='underwriter';
  const reviewable=[ST.SUBMITTED,ST.IN_REVIEW,ST.ESCALATED].includes(app.status);
  const statusOptions=Object.entries(ST).map(([k,v])=>[v,SM[v]?.label||v]);
  return(
    <div className="fadeUp" style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,padding:'28px 32px'}}>
      <div className="detail-header-row" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22,flexWrap:'wrap',gap:12,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12,minWidth:0}}>
          <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>
          <div style={{minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
              <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>{app.id}</span>
              <Badge st={app.status}/>
              {app.upya&&<span style={{fontSize:10,background:'var(--brandPale)',color:'var(--brand2)',padding:'2px 8px',borderRadius:99,fontFamily:'DM Mono,monospace'}}>{app.upya}</span>}
            </div>
            <h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>{c.name}</h1>
          </div>
        </div>
        <div style={{textAlign:'right',fontSize:11,color:'var(--textLight)'}}><div>{fmtD(app.createdAt)} {fmtT(app.createdAt)}</div><div style={{marginTop:2}}>{app.rep}</div></div>
      </div>
      <div style={{flex:1,overflow:'auto',minHeight:0}}>
      <div className="detail-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <Card sx={{padding:'16px 18px'}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:13}}>Customer</div>
          {(isUnderwriter&&reviewable?[
            ['name','Full name',c.name],['nid',(c.idType==='passport'?'Passport number':'National ID'),c.nid],['phone','Phone',c.phone],['addr','Address',c.addr],['occ','Occupation',c.occ],['income','Monthly income',fmtRWF(c.income)]
          ]:[['Full name',c.name],[(c.idType==='passport'?'Passport number':'National ID'),c.nid],['Phone',c.phone],['Address',c.addr],['Occupation',c.occ],['Monthly income',fmtRWF(c.income)]]).map((arr)=>{
            if(arr.length===3) return <FldWithRequest key={arr[0]} fieldKey={arr[0]} label={arr[1]} val={arr[2]} requestedFields={requestedFields} onToggle={toggleRequest}/>;
            return <Fld key={arr[0]} label={arr[0]} val={arr[1]}/>;
          })}
          <div style={{borderTop:'1.5px solid var(--border)',paddingTop:11,marginTop:4}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Next of kin</div>
            {(isUnderwriter&&reviewable?[
              ['kin_name','Name',c.kin.name],['kin_phone','Phone',c.kin.phone],['kin_rel','Relationship',c.kin.rel]
            ]:[['Name',c.kin.name],['Phone',c.kin.phone],['Relationship',c.kin.rel]]).map((arr)=>{
              if(arr.length===3) return <FldWithRequest key={arr[0]} fieldKey={arr[0]} label={arr[1]} val={arr[2]} requestedFields={requestedFields} onToggle={toggleRequest}/>;
              return <Fld key={arr[0]} label={arr[0]} val={arr[1]}/>;
            })}
          </div>
          {(app.customerPhoto||app.idPhoto||app.incomeProof)&&(
            <div style={{borderTop:'1.5px solid var(--border)',paddingTop:11,marginTop:4}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Documents</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {app.customerPhoto&&<div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,color:'var(--textMid)'}}>Customer photo</span><a href={app.customerPhoto} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'var(--brand2)'}}>View</a><img src={app.customerPhoto} alt="Customer" style={{width:40,height:40,objectFit:'cover',borderRadius:6}}/></div>}
                {app.idPhoto&&<div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,color:'var(--textMid)'}}>ID document</span><a href={app.idPhoto} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'var(--brand2)'}}>View</a><img src={app.idPhoto} alt="ID" style={{width:40,height:40,objectFit:'cover',borderRadius:6}}/></div>}
                {app.incomeProof&&<div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,color:'var(--textMid)'}}>Proof of income</span><a href={app.incomeProof} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'var(--brand2)'}}>View</a>{app.incomeProof.startsWith('data:application/pdf')?<span style={{fontSize:10,background:'var(--surface)',padding:'2px 6px',borderRadius:4}}>PDF</span>:<img src={app.incomeProof} alt="Income" style={{width:40,height:40,objectFit:'cover',borderRadius:6}}/>}</div>}
              </div>
            </div>
          )}
        </Card>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card sx={{padding:'16px 18px'}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>Device</div>
            {!(isUnderwriter&&reviewable)&&<div style={{fontWeight:700,fontSize:15,marginBottom:1}}>{d.brand} {d.model}</div>}
            {!(isUnderwriter&&reviewable)&&<div style={{fontSize:11,color:'var(--textLight)',marginBottom:13}}>{d.specs}</div>}
            {(isUnderwriter&&reviewable?[
              ['device_id','Device',`${d.brand} ${d.model}`],['sku','SKU',d.sku],['dep','Deposit',fmtRWF(d.dep)],['weekly','Weekly × 26',fmtRWF(d.weekly)],['tot','Total contract',fmtRWF(tot)]
            ]:[['SKU',d.sku],['Deposit',fmtRWF(d.dep)],['Weekly × 26',fmtRWF(d.weekly)],['Total contract',fmtRWF(tot)]]).map((arr)=>{
              if(arr.length===3) return <FldWithRequest key={arr[0]} fieldKey={arr[0]} label={arr[1]} val={arr[2]} requestedFields={requestedFields} onToggle={toggleRequest}/>;
              return <Fld key={arr[0]} label={arr[0]} val={arr[1]}/>;
            })}
            {app.imei&&<Fld label="IMEI" val={app.imei} mono/>}
            {app.ptId&&<Fld label="PayTrigger ID" val={app.ptId} mono/>}
          </Card>
          <Card sx={{padding:'14px 16px'}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Affordability check</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
              <span style={{fontSize:12,color:'var(--textMid)'}}>Weekly repayment / income</span>
              <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16}}>{c.income>0?ratio.toFixed(1):'—'}%</span>
            </div>
            <div style={{height:7,background:'var(--bg)',borderRadius:4,overflow:'hidden',marginBottom:8}}>
              <div style={{height:'100%',borderRadius:4,width:`${Math.min(100,ratio)}%`,background:affordOk?'var(--ok)':'var(--err)',transition:'width .5s'}}/>
            </div>
            <div style={{fontSize:11,fontWeight:600,padding:'6px 10px',borderRadius:'var(--r2)',background:affordOk?'var(--okBg)':'var(--errBg)',color:affordOk?'var(--ok)':'var(--err)'}}>{affordOk?'✓ Within policy (< 30% of income)':'⚠ Exceeds policy limit (> 30% of income)'}</div>
          </Card>
        </div>
      </div>
      {isUnderwriter&&reviewable&&(
        <Card sx={{padding:18,marginBottom:14,border:'2px solid var(--brandPale2)'}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Credit decision</div>
          <div style={{fontSize:11,color:'var(--textMid)',marginBottom:10}}>Use <strong>Request change</strong> on specific fields above to mark what the rep should fix. Then add a note and click Request changes. Note is required for Request changes, Escalate, and Reject.</div>
          <FF label="Underwriter notes (required for Request changes, Escalate, Reject)"><textarea value={note} onChange={ev=>setNote(ev.target.value)} placeholder="Explain your decision or what changes you need..." rows={3}/></FF>
          <div style={{display:'flex',gap:8,marginTop:13,flexWrap:'wrap'}}>
            <Btn onClick={approve} v="ok" loading={ld==='ap'} icon="✓">Approve</Btn>
            {requestedFields.length>0&&<Btn onClick={requestChanges} v="warn" loading={ld==='ch'} icon="↩" disabled={!note.trim()}>Request changes</Btn>}
            <Btn onClick={escalate} v="pur" loading={ld==='esc'} icon="↑" disabled={!note.trim()}>Escalate</Btn>
            <Btn onClick={()=>setShowRej(p=>!p)} v="err" icon="✕">Reject</Btn>
          </div>
          {showRej&&(
            <div style={{marginTop:13,padding:'13px 15px',background:'var(--errBg)',border:'1px solid var(--errBorder)',borderRadius:'var(--r2)'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--err)',marginBottom:7}}>Rejection reason (required)</div>
              <textarea value={rejReason} onChange={ev=>setRejReason(ev.target.value)} placeholder="Explain why the application is being rejected..." rows={2} style={{borderColor:'var(--errBorder)'}}/>
              <div style={{marginTop:9}}><Btn onClick={reject} v="err" loading={ld==='rej'} disabled={!rejReason.trim()}>Confirm rejection</Btn></div>
            </div>
          )}
        </Card>
      )}
      {isSuperuser&&(
        <Card sx={{padding:18,marginBottom:14,border:'2px solid var(--purBorder)',background:'var(--purBg)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:'var(--pur)'}}>⚙ Superuser — manage application</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Set status</label><select value={app.status} onChange={ev=>{const v=ev.target.value;onUpdate(app.id,{status:v,tlEntry:{by:user.name,txt:`Status set to ${SM[v]?.label||v} (superuser)`}});addToast('ok','Status updated','');}} style={{padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid var(--border)',minWidth:180}}>{statusOptions.map(([val,label])=><option key={val} value={val}>{label}</option>)}</select></div>
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Notes</label><textarea value={editNotes} onChange={ev=>setEditNotes(ev.target.value)} placeholder="Internal notes..." rows={2} style={{width:'100%',padding:10,borderRadius:'var(--r2)',border:'1.5px solid var(--border)'}}/><div style={{marginTop:6}}><Btn onClick={saveNotes} v="def" sz="sm">Save notes</Btn></div></div>
            <div><Btn onClick={()=>{setShowEditCustomer(p=>{if(!p)setEditC({...app.c,kin:app.c.kin?{...app.c.kin}:{name:'',phone:'',rel:''}});return !p;});}} v="def" sz="sm">{showEditCustomer?'Cancel edit':'Edit customer info'}</Btn>{showEditCustomer&&(<div style={{marginTop:12,display:'flex',flexDirection:'column',gap:10}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><FF label="Name"><input value={editC.name} onChange={ev=>setEditC(p=>({...p,name:ev.target.value}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="ID type"><select value={editC.idType||'nid'} onChange={ev=>setEditC(p=>({...p,idType:ev.target.value}))}><option value="nid">National ID</option><option value="passport">Passport</option></select></FF></div><FF label={editC.idType==='passport'?'Passport number':'National ID'}><input value={editC.nid} onChange={ev=>setEditC(p=>({...p,nid:ev.target.value}))} style={{padding:'6px 10px',width:'100%',fontFamily:'DM Mono,monospace'}}/></FF><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><FF label="Phone"><input value={editC.phone} onChange={ev=>setEditC(p=>({...p,phone:ev.target.value}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Occupation"><select value={editC.occ} onChange={ev=>setEditC(p=>({...p,occ:ev.target.value}))}><option value="">Select</option>{OCCS.map(o=><option key={o} value={o}>{o}</option>)}</select></FF></div><FF label="Address"><input value={editC.addr} onChange={ev=>setEditC(p=>({...p,addr:ev.target.value}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Monthly income (RWF)"><input type="number" value={editC.income} onChange={ev=>setEditC(p=>({...p,income:ev.target.value}))} style={{padding:'6px 10px',width:'100%'}}/></FF><div style={{fontSize:11,fontWeight:600,color:'var(--textLight)',marginTop:8}}>Next of kin</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}><FF label="Name"><input value={editC.kin.name} onChange={ev=>setEditC(p=>({...p,kin:{...p.kin,name:ev.target.value}}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Phone"><input value={editC.kin.phone} onChange={ev=>setEditC(p=>({...p,kin:{...p.kin,phone:ev.target.value}}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Relationship"><select value={editC.kin.rel} onChange={ev=>setEditC(p=>({...p,kin:{...p.kin,rel:ev.target.value}}))}><option value="">Select</option>{RELS.map(r=><option key={r} value={r}>{r}</option>)}</select></FF></div><Btn onClick={saveCustomer} v="ok" sz="sm" style={{marginTop:10}}>Save customer</Btn></div>)}</div>
            {devices&&devices.length>0&&<div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Change device</label><select value={app.dev?.id} onChange={ev=>{const dev=(devices||[]).find(d=>d.id===ev.target.value);if(dev){onUpdate(app.id,{dev,tlEntry:{by:user.name,txt:`Device changed to ${dev.brand} ${dev.model} (superuser)`}});addToast('ok','Device updated','');}}} style={{padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid var(--border)',minWidth:200}}>{(devices||[]).map(d=> <option key={d.id} value={d.id}>{d.brand} {d.model} — {d.sku}</option>)}</select></div>}
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Add timeline entry</label><div style={{display:'flex',gap:8,alignItems:'center'}}><input value={newTlTxt} onChange={ev=>setNewTlTxt(ev.target.value)} placeholder="e.g. Data correction applied" style={{flex:1,padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid var(--border)'}}/><Btn onClick={addTlEntry} v="def" sz="sm" disabled={!newTlTxt.trim()}>Add</Btn></div></div>
          </div>
        </Card>
      )}
      {app.notes&&!isUnderwriter&&!isSuperuser&&<Card sx={{padding:'13px 16px',marginBottom:14,background:'var(--warnBg)',border:'1px solid var(--warnBorder)'}}><div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--warn)',marginBottom:4}}>Underwriter notes</div><div style={{fontSize:12,color:'var(--warn)'}}>{app.notes}</div></Card>}
      {app.notes&&isSuperuser&&<Card sx={{padding:'13px 16px',marginBottom:14,background:'var(--warnBg)',border:'1px solid var(--warnBorder)'}}><div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--warn)',marginBottom:4}}>Notes</div><div style={{fontSize:12,color:'var(--warn)'}}>{app.notes}</div></Card>}
      <Card sx={{padding:'16px 18px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>Activity timeline</div>
        {(app.tl||[]).map((t,i)=>(
          <div key={i} style={{display:'flex',gap:12,marginBottom:12,alignItems:'flex-start'}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,paddingTop:3}}>
              <div style={{width:8,height:8,borderRadius:4,background:i===0?'var(--brand3)':'var(--border)',border:`2px solid ${i===0?'var(--brand)':'var(--borderMed)'}`}}/>
              {i<(app.tl||[]).length-1&&<div style={{width:1,flex:1,minHeight:18,background:'var(--border)',marginTop:3}}/>}
            </div>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{t.txt}</div><div style={{fontSize:11,color:'var(--textLight)',marginTop:1}}>{t.by} · {fmtD(t.at)} at {fmtT(t.at)}</div></div>
          </div>
        ))}
      </Card>
      </div>
    </div>
  );
};

// ── SALES REP VIEW ────────────────────────────────────────────
const SalesRepView=({apps,onUpdate,addToast,devices})=>{
  const {user}=useContext(Ctx);
  const [pg,setPg]=useState('dash');
  const [sel,setSel]=useState(null);
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);
  const mine=apps.filter(a=>a.repId===user.id);
  const grps={action:mine.filter(a=>[ST.IMEI_PENDING,ST.IMEI_VERIFIED].includes(a.status)),review:mine.filter(a=>[ST.SUBMITTED,ST.IN_REVIEW,ST.ESCALATED].includes(a.status)),active:mine.filter(a=>a.status===ST.ACTIVE),other:mine.filter(a=>[ST.REJECTED,ST.CHANGES].includes(a.status))};
  const sidebarProps={page:pg,setPage:p=>{setPg(p);setSel(null)},apps,open:mobileMenuOpen,onClose:()=>setMobileMenuOpen(false),onOpen:()=>setMobileMenuOpen(true)};

  const goHome=()=>{setPg('dash');setSel(null);};
  const HomeBtn=()=><button type="button" onClick={goHome} style={{padding:'6px 12px',fontSize:12,fontWeight:600,color:'var(--brand2)',background:'var(--brandPale)',border:'1px solid var(--brandPale2)',borderRadius:'var(--r2)',cursor:'pointer',whiteSpace:'nowrap'}}>Home</button>;
  if(sel){
    const app=apps.find(a=>a.id===sel);
    if(app&&[ST.IMEI_PENDING,ST.IMEI_VERIFIED].includes(app.status))
      return <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}><Sidebar {...sidebarProps}/><div className="app-main" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}><div className="mobile-header"><button type="button" className="hamburger" onClick={()=>setMobileMenuOpen(true)} aria-label="Open menu">☰</button><HomeBtn/><span style={{fontWeight:700,fontSize:16}}>{APP_NAME}</span></div><div className="page-content main-scroll" style={{flex:1,overflow:'auto',padding:'28px 32px'}}><IMEIFlow app={app} onUpdate={onUpdate} addToast={addToast} onBack={()=>setSel(null)}/></div></div></div>;
    if(app&&app.status===ST.CHANGES&&app.repId===user.id)
      return <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}><Sidebar {...sidebarProps}/><div className="app-main" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}><div className="mobile-header"><button type="button" className="hamburger" onClick={()=>setMobileMenuOpen(true)} aria-label="Open menu">☰</button><HomeBtn/><span style={{fontWeight:700,fontSize:16}}>Edit & resubmit</span></div><div className="page-content main-scroll" style={{flex:1,overflow:'auto',padding:'28px 32px'}}><EditAndResubmit app={app} devices={devices} onUpdate={onUpdate} addToast={addToast} onBack={()=>setSel(null)}/></div></div></div>;
    if(app) return <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}><Sidebar {...sidebarProps}/><div className="app-main" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}><div className="mobile-header"><button type="button" className="hamburger" onClick={()=>setMobileMenuOpen(true)} aria-label="Open menu">☰</button><HomeBtn/><span style={{fontWeight:700,fontSize:16}}>{APP_NAME}</span></div><div className="page-content main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0,padding:'28px 32px'}}><AppDetail app={app} onUpdate={onUpdate} addToast={addToast} onBack={()=>setSel(null)}/></div></div></div>;
  }

  return(
    <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}>
      <Sidebar {...sidebarProps}/>
      <div className="app-main main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}>

                <div style={{display:'flex',flexDirection:'column',gap:8}}>{esc.map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div>

            <div style={{fontSize:11,color:'var(--textLight)',marginBottom:10}}>{all.length} result{all.length!==1?'s':''}</div>
