            </div>
            <div style={{padding:'11px 14px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--warn)',lineHeight:1.6,marginBottom:18}}>
              <strong>{t('what_to_check')}</strong> {t('what_to_check_desc')}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <Btn v="ok" full icon="←" onClick={retryImei}>{t('try_diff_imei')}</Btn>
              <div style={{height:1,background:'var(--border)',margin:'4px 0'}}/>
              <div style={{fontSize:11,color:'var(--textMid)',marginBottom:2}}>{t('imei_manual_verify')}</div>
              <FF label={t('note_uw_ops')}><textarea value={mismatchNote} onChange={e=>setMismatchNote(e.target.value)} rows={2} placeholder="Describe what was tried…" style={{resize:'vertical'}}/></FF>
              <Btn v="warn" full icon="↩" onClick={()=>sendBackFromImei(`IMEI ${imei} — ${ccResult&&!ccResult.warrantyValid?'warranty expired/invalid':'not found on Carlcare'}. ${mismatchNote||''}`)}>{t('send_back_uw_btn')}</Btn>
              <Btn v="def" full icon="⬆" onClick={()=>escalateFromImei(`IMEI ${imei} — ${ccResult&&!ccResult.warrantyValid?'warranty issue':'unverifiable'}. ${mismatchNote||''} — escalated from IMEI check.`)}>{t('escalate_ops_btn')}</Btn>
            </div>
          </div>
        )}

        {/* ── Phase: checking (manual fallback — no proxy configured or auto-check failed) ── */}
        {phase==='checking'&&(
          <div>
            {autoError&&<div style={{padding:'9px 12px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--warn)',marginBottom:14}}>{autoError}</div>}
            <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>{t('manual_check_title')}</div>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',background:'var(--bg)',borderRadius:'var(--r)',border:'1.5px solid var(--border)',marginBottom:18}}>
              <div style={{flex:1}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--textLight)',marginBottom:3}}>{t('imei_to_check_lbl')}</div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:22,fontWeight:700,letterSpacing:'2.5px',color:'var(--brand)'}}>{imei}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <Btn v="def" sz="sm" onClick={copyImei} icon={copied?'✓':'⎘'}>{copied?t('copied_btn'):t('copy_imei_btn')}</Btn>
                <Btn v="primary" sz="sm" onClick={()=>window.open(CARLCARE_MANUAL_URL,'_blank','noopener')} icon="↗">{t('open_carlcare_btn')}</Btn>
              </div>
            </div>
            <div style={{padding:'10px 14px',background:'var(--infoBg)',border:'1px solid var(--infoBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--info)',marginBottom:20,lineHeight:1.6}}>
              {t('manual_instructions')}
            </div>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:12}}>{t('what_carlcare_show')}</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button type="button" onClick={()=>confirmValid(false)} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',border:'2px solid var(--okBorder)',borderRadius:'var(--r)',background:'var(--okBg)',cursor:'pointer',textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:18,background:'var(--ok)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>✓</div>
                <div><div style={{fontWeight:700,fontSize:13,color:'var(--ok)'}}>{t('valid_match_title')}</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{t('valid_match_sub')}</div></div>
              </button>
              <button type="button" onClick={()=>{setActualSpecs({brand:d.brand||'',model:d.model||'',ram:d.ram||'',rom:d.rom||''});setPhase('mismatch');}} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',border:'2px solid var(--warnBorder)',borderRadius:'var(--r)',background:'var(--warnBg)',cursor:'pointer',textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:18,background:'var(--warn)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>⚠</div>
                <div><div style={{fontWeight:700,fontSize:13,color:'var(--warn)'}}>{t('specs_differ_title')}</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{t('specs_differ_sub')}</div></div>
              </button>
              <button type="button" onClick={()=>setPhase('notfound')} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',border:'2px solid var(--errBorder)',borderRadius:'var(--r)',background:'var(--errBg)',cursor:'pointer',textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:18,background:'var(--err)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>✕</div>
                <div><div style={{fontWeight:700,fontSize:13,color:'var(--err)'}}>{t('not_found_btn_title')}</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{t('not_found_btn_sub')}</div></div>
              </button>
            </div>
            <div style={{marginTop:14,textAlign:'right'}}>
              <Btn v="ghost" sz="sm" onClick={()=>setPhase('entry')} icon="←">{t('re_enter_imei')}</Btn>
            </div>
          </div>
        )}

        {/* ── Phase: verified (proceed to PayTrigger lock) ── */}
        {phase==='verified'&&(
          <div>
            <div style={{padding:'13px 15px',background:'var(--okBg)',border:'1.5px solid var(--okBorder)',borderRadius:'var(--r2)',marginBottom:20}}>
              <div style={{fontWeight:700,fontSize:13,color:'var(--ok)',marginBottom:4}}>{t('verified_cc_title')}</div>
              <div style={{fontSize:11,color:'var(--ok)',lineHeight:1.6}}>IMEI: <span style={{fontFamily:'DM Mono,monospace',fontWeight:700}}>{app.imei||imei}</span>{app.ptId&&<span> · PayTrigger: <span style={{fontFamily:'DM Mono,monospace'}}>{app.ptId}</span></span>}</div>
            </div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>{t('lock_pt_title')}</div>
            <p style={{fontSize:12,color:'var(--textMid)',lineHeight:1.7,marginBottom:14}}>{t('lock_pt_desc')}</p>
            <div style={{padding:'10px 13px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--warn)',lineHeight:1.6,marginBottom:18}}>{t('lock_only_once')}</div>
            <a href="https://paytrigger.shalltry.com/pay-trigger/" target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:6,padding:'9px 14px',background:'var(--infoBg)',border:'1px solid var(--infoBorder)',borderRadius:'var(--r2)',color:'var(--info)',fontSize:12,fontWeight:600,textDecoration:'none',marginBottom:16}}>{t('open_pt_portal')}</a>
            <Btn onClick={confirmLocked} v="ok" sz="lg" full loading={ld==='lock'} disabled={!!ld} icon="🔒">{ld==='lock'?t('locking_phone'):t('confirm_lock_activate')}</Btn>
          </div>
        )}
      </Card>
    </div>
  );
};

// ── UNDERWRITER REVIEW FLOW ──────────────────────────────────
const FlagBtn=({fieldKey,requestedFields,onToggle,label=''})=>{
  const on=requestedFields.includes(fieldKey);
  return(
    <button type="button" onClick={()=>onToggle(fieldKey)} style={{flexShrink:0,padding:'3px 9px',fontSize:10,fontWeight:600,background:on?'var(--warn)':'var(--bg)',color:on?'white':'var(--textMid)',border:'1px solid '+(on?'var(--warn)':'var(--border)'),borderRadius:'var(--r2)',cursor:'pointer',whiteSpace:'nowrap'}} title={on?'Remove flag':'Flag for correction'}>{on?'⚑ Flagged':'Flag'}{label?' '+label:''}</button>
  );
};
const UWReviewFlow=({app,onUpdate,addToast,onBack})=>{
  const {user,users}=useContext(Ctx);
  const [step,setStep]=useState(1);
  const [requestedFields,setRequestedFields]=useState(()=>app.requestedChangeFields||[]);
  const [note,setNote]=useState(app.notes||'');
  const [ld,setLd]=useState(null);
  const [showRej,setShowRej]=useState(false);
  const [rejReason,setRejReason]=useState('');
  const [reviewed,setReviewed]=useState(()=>({1:false,2:false,3:false,4:false}));
  const isSuperuser=!!user.superuser;
  const toggleRequest=(key)=>setRequestedFields(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);
  const hasFlags=requestedFields.length>0;
  const c=app.c,d=app.dev;
  const tot=d.totalCost||(d.dep+(d.weekly||0)*(d.wks||12));
  const termMonths=d.wks||12;
  const ratio=c.income>0?(d.weekly/c.income*100):0;
  const affordOk=c.income>0&&ratio<30;
  const lockedByOther=app.reviewLock&&app.reviewLock.by!==user.id&&!isSuperuser;
  const reqReviewed=(n)=>!!reviewed[n];
  const reviewedAllCore=!!reviewed[1]&&!!reviewed[2]&&!!reviewed[3];
  const canContinue=step<4?reqReviewed(step):false;
  const canDecide=reviewedAllCore&&!!reviewed[4]&&!lockedByOther;
  React.useEffect(()=>{
    if(lockedByOther)return;
    const lock=app.reviewLock;
    if(lock&&lock.by===user.id)return;
    onUpdate(app.id,{reviewLock:{by:user.id,byName:user.name,at:new Date().toISOString()},tlEntry:{by:user.name,txt:'Review started'}});
  },[app.id]);// eslint-disable-line
  const _repEmail=()=>{const r=(users||[]).find(u=>u.id===app.repId);return r?.email||'';};
  const _repName=()=>app.repName||(users||[]).find(u=>u.id===app.repId)?.name||'Sales Rep';
  const approve=async()=>{setLd('ap');await sleep(1200);onUpdate(app.id,{status:ST.APPROVED,mboDecision:'APPROVED',notes:note,mboReviewedBy:user.name,reviewLock:null,tlEntry:{by:user.name,txt:'Approved — sales rep to sign contract, then proceed to IMEI verification'}});sendEmail('approved',{to_email:_repEmail(),to_name:_repName(),customer_name:app.application?.fullName||app.id,app_id:app.id,reviewer_name:user.name});addToast('ok','Application approved','Sales rep notified to proceed with contract signing');setLd(null);onBack();};
  const reject=async()=>{if(!rejReason.trim()){addToast('err','Reason required','Provide a rejection reason');return;}setLd('rej');await sleep(700);onUpdate(app.id,{status:ST.ARCHIVED,mboDecision:'REJECTED',mboRejectionReason:rejReason,mboReviewedBy:user.name,reviewLock:null,tlEntry:{by:user.name,txt:`Rejected: ${rejReason}`}});sendEmail('rejected',{to_email:_repEmail(),to_name:_repName(),customer_name:app.application?.fullName||app.id,app_id:app.id,rejection_reason:rejReason});addToast('info','Application rejected','Application is now closed');setLd(null);onBack();};
  const requestChanges=async()=>{if(requestedFields.length===0){addToast('err','Select fields','Flag at least one field using the Flag buttons');return;}if(!note.trim()){addToast('err','Note required','Explain what the rep needs to fix');return;}setLd('ch');await sleep(700);const ap=app.application||{};const reqs=ap.fieldCorrectionRequests||[];const added=requestedFields.filter(f=>!reqs.some(r=>r.fieldName===f&&!r.resolvedAt));const newReqs=[...reqs,...added.map(fieldName=>({fieldName,reason:note,resolvedAt:null}))];onUpdate(app.id,{status:ST.UNDER_REVIEW,notes:note,application:{...ap,fieldCorrectionRequests:newReqs},reviewLock:null,tlEntry:{by:user.name,txt:`Changes requested (${requestedFields.join(', ')}) — returned to sales rep`}});sendEmail('changes',{to_email:_repEmail(),to_name:_repName(),customer_name:ap.fullName||app.id,app_id:app.id,fields:requestedFields.join(', '),note});addToast('warn','Changes requested','Application returned to rep for correction');setLd(null);onBack();};
  const escalate=async()=>{if(!note.trim()){addToast('err','Note required','Explain why you are escalating.');return;}setLd('esc');await sleep(700);onUpdate(app.id,{status:ST.ESCALATED,notes:note,reviewer:user.name,reviewLock:null,tlEntry:{by:user.name,txt:`Escalated to ops: ${note}`}});const opsEmails=(users||[]).filter(u=>u.role==='ops').map(u=>u.email).join(',');sendEmail('escalated',{to_email:opsEmails||'',to_name:'Operations Team',customer_name:app.application?.fullName||app.id,app_id:app.id,escalated_by:user.name,note});addToast('warn','Escalated to ops','Awaiting action from operations team');setLd(null);onBack();};
  const STEPS=['Customer','Documents','Device & Deal','Decision'];
  const Declaration=({n,title,desc})=>{
    const checked=!!reviewed[n];
    return(
      <div className={`uw-declaration${checked?'':' uw-decl-unchecked'}`} style={{marginTop:22}}>
        <label>
          <input type="checkbox" checked={checked} onChange={e=>setReviewed(p=>({...p,[n]:e.target.checked}))}/>
          <div className="uw-decl-text">
            <div className="uw-decl-title" style={{color:checked?'var(--brand)':'var(--text)'}}>{title}</div>
            <div className="uw-decl-desc">{desc}</div>
          </div>
        </label>
      </div>
    );
  };
  const StepRow=()=>(
    <div className="uw-steps">
      {STEPS.map((s,i)=>{
        const n=i+1;const done=n<step;const active=n===step;
        return(
          <React.Fragment key={n}>
            <div onClick={()=>{if(n<step)setStep(n);}} style={{display:'flex',alignItems:'center',gap:7,cursor:n<step?'pointer':'default',opacity:n>step?0.4:1,flexShrink:0}}>
              <div style={{width:24,height:24,borderRadius:12,background:done?'var(--ok)':active?'var(--brand)':'var(--border)',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0,boxShadow:active?'0 0 0 3px var(--brandPale2)':'none',transition:'box-shadow .15s'}}>{done?'✓':n}</div>
              <span className="uw-step-label" style={{fontWeight:active?700:500,color:active?'var(--brand)':done?'var(--ok)':'var(--textLight)'}}>{s}</span>
            </div>
            {i<STEPS.length-1&&<div style={{flex:1,height:1.5,background:done?'var(--ok)':'var(--border)',margin:'0 10px',minWidth:16,transition:'background .3s'}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
  return(
    <div className="uw-shell">
      {/* Header */}
      <div className="uw-header">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:0}}>
          <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>
          <div style={{flex:1,minWidth:0}}><div style={{fontWeight:800,fontSize:17,letterSpacing:'-0.3px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{app.id} · {app.rep} · {fmtD(app.createdAt)}</div></div>
          <Badge st={app.status}/>
        </div>
        <StepRow/>
      </div>
      {/* Scrollable content */}
      <div className="uw-body">
        {lockedByOther&&step!==4&&(
          <div className="uw-content" style={{marginBottom:24}}>
            <div className="uw-section" style={{background:'var(--warnBg)',border:'2px solid var(--warnBorder)'}}>
              🔒 <strong>Under review by {app.reviewLock.byName}</strong> — you can review details but cannot make a decision.
            </div>
          </div>
        )}
        {/* Step 1: Customer */}
        {step===1&&(
          <div className="uw-content">
            <h2>Customer information</h2>
            <p className="uw-intro">Review customer details. Use the <strong>Flag</strong> button on any field to request a correction.</p>
            <div className="uw-section">
              <div className="uw-section-title">Personal details</div>
              <div className="uw-grid-2">
                <FldWithRequest fieldKey="name" label="Full name" val={c.name} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <FldWithRequest fieldKey="nid" label={c.idType==='passport'?'Passport number':'National ID'} val={c.nid} requestedFields={requestedFields} onToggle={toggleRequest} mono/>
                <FldWithRequest fieldKey="phone" label="Phone" val={c.phone} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <FldWithRequest fieldKey="occ" label="Occupation" val={c.occ} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <FldWithRequest fieldKey="addr" label="Address" val={c.addr} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <FldWithRequest fieldKey="income" label="Monthly income" val={fmtRWF(c.income)} requestedFields={requestedFields} onToggle={toggleRequest}/>
              </div>
            </div>
            <div className="uw-section">
              <div className="uw-section-title">Next of kin / Guarantor</div>
              <div className="uw-grid-3">
                <FldWithRequest fieldKey="kin_name" label="Name" val={c.kin.name} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <FldWithRequest fieldKey="kin_phone" label="Phone" val={c.kin.phone} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <FldWithRequest fieldKey="kin_rel" label="Relationship" val={c.kin.rel} requestedFields={requestedFields} onToggle={toggleRequest}/>
              </div>
            </div>
            <Declaration n={1} title="Declaration — Customer reviewed" desc="I have reviewed the customer and next-of-kin details."/>
          </div>
        )}
        {/* Step 2: Documents */}
        {step===2&&(
          <div className="uw-content">
            <h2>Documents & photos</h2>
            <p className="uw-intro">Verify the customer photo, ID document, and proof of income. Use <strong>Flag</strong> to request a re-upload.</p>
            {(app.customerPhoto||app.idPhoto)&&(
              <div className="uw-docs-grid uw-section">
                {app.customerPhoto&&(
                  <div className="uw-doc-block">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span className="uw-section-title" style={{marginBottom:0}}>Customer photo</span><FlagBtn fieldKey="customerPhoto" requestedFields={requestedFields} onToggle={toggleRequest}/></div>
                    <div style={{position:'relative',borderRadius:10,overflow:'hidden',border:`2px solid ${requestedFields.includes('customerPhoto')?'var(--warn)':'var(--border)'}`,cursor:'pointer'}} onClick={()=>window.open(app.customerPhoto,'_blank','noopener')}>
                      <img src={app.customerPhoto} alt="Customer" style={{width:'100%',maxHeight:340,objectFit:'cover',display:'block'}}/>
                      <div style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,0.5)',color:'white',fontSize:10,fontWeight:600,padding:'3px 9px',borderRadius:99}}>↗ Full size</div>
                    </div>
                  </div>
                )}
                {app.idPhoto&&(
                  <div className="uw-doc-block">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span className="uw-section-title" style={{marginBottom:0}}>ID document</span><FlagBtn fieldKey="idPhoto" requestedFields={requestedFields} onToggle={toggleRequest}/></div>
                    <div style={{position:'relative',borderRadius:10,overflow:'hidden',border:`2px solid ${requestedFields.includes('idPhoto')?'var(--warn)':'var(--border)'}`,cursor:'pointer'}} onClick={()=>window.open(app.idPhoto,'_blank','noopener')}>
                      <img src={app.idPhoto} alt="ID" style={{width:'100%',maxHeight:340,objectFit:'contain',display:'block',background:'var(--bg)'}}/>
                      <div style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,0.5)',color:'white',fontSize:10,fontWeight:600,padding:'3px 9px',borderRadius:99}}>↗ Full size</div>
                    </div>
                  </div>
                )}
              </div>
            )}
            {app.incomeProof&&(
              <div className="uw-section">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span className="uw-section-title" style={{marginBottom:0}}>Proof of income</span><FlagBtn fieldKey="incomeProof" requestedFields={requestedFields} onToggle={toggleRequest}/></div>
                {app.incomeProof.startsWith('data:application/pdf')?(
                  <div style={{display:'flex',alignItems:'center',gap:14,padding:'18px 20px',background:'var(--bg)',border:`2px solid ${requestedFields.includes('incomeProof')?'var(--warn)':'var(--border)'}`,borderRadius:10}}>
                    <span style={{fontSize:32}}>📄</span>
                    <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>PDF Document</div><div style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>Income proof attached</div></div>
                    <a href={app.incomeProof} download="income_proof.pdf" style={{display:'inline-flex',alignItems:'center',gap:6,padding:'9px 16px',background:'var(--brand)',color:'white',borderRadius:'var(--r2)',fontSize:12,fontWeight:600,textDecoration:'none'}}>⬇ Download PDF</a>
                  </div>
                ):(
                  <div style={{position:'relative',borderRadius:10,overflow:'hidden',border:`2px solid ${requestedFields.includes('incomeProof')?'var(--warn)':'var(--border)'}`,cursor:'pointer'}} onClick={()=>window.open(app.incomeProof,'_blank','noopener')}>
                    <img src={app.incomeProof} alt="Income proof" style={{width:'100%',maxHeight:400,objectFit:'contain',display:'block',background:'var(--bg)'}}/>
                    <div style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,0.5)',color:'white',fontSize:10,fontWeight:600,padding:'3px 9px',borderRadius:99}}>↗ Full size</div>
                  </div>
                )}
              </div>
            )}
            {!app.customerPhoto&&!app.idPhoto&&!app.incomeProof&&<div className="uw-section" style={{padding:'40px 24px',textAlign:'center',color:'var(--textMid)',fontSize:13}}>No documents uploaded with this application.</div>}
            <Declaration n={2} title="Declaration — Documents reviewed" desc="I have reviewed the uploaded documents and photos and they are acceptable."/>
          </div>
        )}
        {/* Step 3: Device & Deal */}
        {step===3&&(
          <div className="uw-content">
            <h2>Device & deal</h2>
            <p className="uw-intro">Review the device and payment terms. Check the affordability ratio.</p>
            <div className="uw-section">
              <div className="uw-section-title">Device</div>
              <div className="uw-grid-2">
                <FldWithRequest fieldKey="device_id" label="Device" val={`${d.brand} ${d.model}`} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <Fld label="Storage / RAM" val={d.specs}/>
              </div>
            </div>
            <div className="uw-section">
              <div className="uw-section-title">Payment terms</div>
              <div className="uw-grid-2">
                <FldWithRequest fieldKey="dep" label="Upfront deposit" val={fmtRWF(d.dep)} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <FldWithRequest fieldKey="weekly" label={`Monthly × ${termMonths}`} val={fmtRWF(d.weekly)} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <FldWithRequest fieldKey="tot" label="Total price" val={fmtRWF(tot)} requestedFields={requestedFields} onToggle={toggleRequest}/>
                <Fld label="Term" val={`${termMonths} months`}/>
              </div>
            </div>
            <div className="uw-section">
              <div className="uw-section-title">Affordability check</div>
              <div className="uw-afford">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
                  <span style={{fontSize:13,color:'var(--textMid)'}}>Monthly repayment / income</span>
                  <span style={{fontFamily:'DM Mono,monospace',fontWeight:800,fontSize:24,color:affordOk?'var(--ok)':'var(--err)'}}>{c.income>0?ratio.toFixed(1):'—'}%</span>
                </div>
                <div style={{height:8,background:'var(--bg)',borderRadius:4,overflow:'hidden',marginBottom:12}}>
                  <div style={{height:'100%',borderRadius:4,width:`${Math.min(100,ratio)}%`,background:affordOk?'var(--ok)':'var(--err)',transition:'width .6s'}}/>
                </div>
                <div className="uw-afford-stats">
                  <div style={{padding:'10px 14px',background:'var(--bg)',borderRadius:'var(--r2)'}}><div style={{fontSize:10,color:'var(--textLight)',marginBottom:2}}>Income</div><div style={{fontWeight:700,fontSize:14}}>{fmtRWF(c.income)}</div></div>
                  <div style={{padding:'10px 14px',background:'var(--bg)',borderRadius:'var(--r2)'}}><div style={{fontSize:10,color:'var(--textLight)',marginBottom:2}}>Monthly payment</div><div style={{fontWeight:700,fontSize:14}}>{fmtRWF(d.weekly)}</div></div>
                  <div style={{padding:'10px 14px',background:affordOk?'var(--okBg)':'var(--errBg)',border:`1px solid ${affordOk?'var(--okBorder)':'var(--errBorder)'}`,borderRadius:'var(--r2)'}}><div style={{fontSize:10,fontWeight:600,color:affordOk?'var(--ok)':'var(--err)',marginBottom:2}}>Policy (max 30%)</div><div style={{fontWeight:700,fontSize:14,color:affordOk?'var(--ok)':'var(--err)'}}>{affordOk?'✓ Within limit':'✗ Exceeds limit'}</div></div>
                </div>
              </div>
            </div>
            <Declaration n={3} title="Declaration — Deal reviewed" desc="I have reviewed the device, pricing, and affordability checks."/>
          </div>
        )}
        {/* Step 4: Decision */}
        {step===4&&(
          <div className="uw-content">
            <h2>Decision</h2>
            <p className="uw-intro">Make your credit decision. A note is required for Request changes, Escalate, and Reject.</p>
            {lockedByOther&&(
              <div className="uw-section" style={{background:'var(--warnBg)',borderColor:'var(--warnBorder)'}}>
                <div style={{fontWeight:700,fontSize:14,color:'var(--warn)',marginBottom:4}}>🔒 Under review by {app.reviewLock.byName}</div>
                <div style={{fontSize:12,color:'var(--warn)',lineHeight:1.5}}>Only {app.reviewLock.byName} or a superuser can make a credit decision on this application.</div>
              </div>
            )}
            {hasFlags&&(
              <div className="uw-section" style={{background:'var(--warnBg)',borderColor:'var(--warnBorder)'}}>
                <div style={{fontWeight:700,fontSize:12,color:'var(--warn)',marginBottom:4}}>⚑ {requestedFields.length} field{requestedFields.length!==1?'s':''} flagged for correction</div>
                <div style={{fontSize:11,color:'var(--warn)',marginBottom:4}}>{requestedFields.join(' · ')}</div>
                <div style={{fontSize:11,color:'var(--textMid)',lineHeight:1.5}}>Approve is not available — use <strong>Request changes</strong> or <strong>Escalate to ops</strong>.</div>
              </div>
            )}
            {!lockedByOther&&(
              <div className="uw-section">
                <FF label="Note (required for Request changes, Escalate, and Reject)">
                  <textarea value={note} onChange={ev=>setNote(ev.target.value)} placeholder="Explain your decision or what the rep needs to fix..." rows={5} style={{resize:'vertical'}}/>
                </FF>
              </div>
            )}
            <Declaration n={4} title="Declaration — Ready to decide" desc="I have completed all review steps and I am ready to record the final decision."/>
            {!reviewedAllCore&&(
              <div style={{marginTop:16,padding:'12px 14px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:12,color:'var(--warn)',lineHeight:1.6}}>
                You must complete the declarations in steps 1–3 before making a decision.
              </div>
            )}
          </div>
        )}
      </div>
      {/* Sticky footer */}
      <div className="uw-footer">
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {step>1&&<Btn onClick={()=>setStep(s=>s-1)} v="ghost" icon="←" sz="sm">Back</Btn>}
          {hasFlags&&<div style={{fontSize:11,fontWeight:600,color:'var(--warn)',padding:'3px 10px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:99}}>⚑ {requestedFields.length} flag{requestedFields.length!==1?'s':''}</div>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',justifyContent:'flex-end'}}>
          {step<4&&<Btn onClick={()=>setStep(s=>s+1)} v="primary" icon="→" disabled={!canContinue} title={!canContinue?'Complete the declaration to continue':''}>Continue</Btn>}
          {step===4&&!lockedByOther&&(<>
            {!hasFlags&&<Btn onClick={approve} v="ok" loading={ld==='ap'} icon="✓" disabled={!canDecide} title={!canDecide?'Complete all declarations to decide':''}>Approve</Btn>}
            <Btn onClick={requestChanges} v="warn" loading={ld==='ch'} icon="↩" disabled={requestedFields.length===0||!canDecide} title={!canDecide?'Complete all declarations to decide':''}>Request changes</Btn>
            <Btn onClick={escalate} v="pur" loading={ld==='esc'} icon="↑" disabled={!note.trim()||!canDecide} title={!canDecide?'Complete all declarations to decide':''}>Escalate to ops</Btn>
            <Btn onClick={()=>setShowRej(p=>!p)} v="err" icon="✕" disabled={!canDecide} title={!canDecide?'Complete all declarations to decide':''}>Reject</Btn>
          </>)}
        </div>
      </div>
      {/* Reject modal */}
      {showRej&&ReactDOM.createPortal(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1200}} onClick={()=>setShowRej(false)}>
          <div style={{background:'var(--surface)',borderRadius:'var(--r)',padding:26,maxWidth:420,width:'90%',boxShadow:'0 12px 40px rgba(0,0,0,0.25)'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:4,color:'var(--err)'}}>Reject application</div>
            <div style={{fontSize:12,color:'var(--textMid)',marginBottom:16}}>This action is <strong>permanent</strong> and cannot be undone.</div>
            <FF label="Rejection reason (required)">
              <textarea value={rejReason} onChange={ev=>setRejReason(ev.target.value)} placeholder="Explain why the application is being rejected..." rows={3} style={{borderColor:'var(--errBorder)',resize:'vertical'}}/>
            </FF>
            <div style={{display:'flex',gap:8,marginTop:16}}>
              <Btn onClick={reject} v="err" loading={ld==='rej'} disabled={!rejReason.trim()}>Confirm rejection</Btn>
              <Btn onClick={()=>setShowRej(false)} v="ghost" sz="sm">Cancel</Btn>
            </div>
          </div>
        </div>,document.body
      )}
    </div>
  );
};

// ── APP DETAIL ────────────────────────────────────────────────
const AppDetail=({app,onUpdate,addToast,onBack,devices})=>{
  const {user,companyInfo,users}=useContext(Ctx);
  const t=useT();
  const [note,setNote]=useState(app.notes||'');
  const [ld,setLd]=useState(null);
  const [showRej,setShowRej]=useState(false);
  const [rejReason,setRejReason]=useState('');
  const [requestedFields,setRequestedFields]=useState(()=>app.requestedChangeFields||[]);
  const [showImei,setShowImei]=useState(false);
  const [contractLang,setContractLang]=useState('en');
  const [sigDraft,setSigDraft]=useState(()=>app.application?.customerSignature||null);
  const [opsNote,setOpsNote]=useState('');
  const [showOpsRej,setShowOpsRej]=useState(false);
  const [opsRejReason,setOpsRejReason]=useState('');
  const [opsLd,setOpsLd]=useState(null);
  const toggleRequest=(key)=>{setRequestedFields(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);};
  const isSuperuser=!!user.superuser;
  const [showEditCustomer,setShowEditCustomer]=useState(false);
  const [editC,setEditC]=useState(()=>({...app.c,kin:app.c.kin?{...app.c.kin}:{name:'',phone:'',rel:''}}));
  const [editNotes,setEditNotes]=useState(app.notes||'');
  const [newTlTxt,setNewTlTxt]=useState('');
  const saveCustomer=()=>{const c={name:editC.name.trim(),idType:editC.idType||'nid',nid:editC.nid,phone:editC.phone.trim(),addr:editC.addr.trim(),occ:editC.occ,income:+editC.income,kin:{name:editC.kin.name.trim(),phone:editC.kin.phone.trim(),rel:editC.kin.rel}};onUpdate(app.id,{c,tlEntry:{by:user.name,txt:'Customer info updated (superuser)'}});addToast('ok','Customer updated','');setShowEditCustomer(false);};
  const saveNotes=()=>{onUpdate(app.id,{notes:editNotes});addToast('ok','Notes updated','');};
  const addTlEntry=()=>{if(!newTlTxt.trim())return;onUpdate(app.id,{tlEntry:{by:user.name,txt:newTlTxt.trim()}});addToast('ok','Timeline entry added','');setNewTlTxt('');};
  useEffect(()=>{setEditNotes(app.notes||'');},[app.id,app.notes]);
  useEffect(()=>{setSigDraft(app.application?.customerSignature||null);},[app.id]); // reset when switching records

  const _adRepEmail=()=>{const r=(users||[]).find(u=>u.id===app.repId);return r?.email||'';};
  const _adRepName=()=>app.repName||(users||[]).find(u=>u.id===app.repId)?.name||'Sales Rep';
  const approve=async()=>{
    setLd('ap');await sleep(1200);
    onUpdate(app.id,{status:ST.APPROVED,mboDecision:'APPROVED',notes:note,mboReviewedBy:user.name,reviewLock:null,tlEntry:{by:user.name,txt:'Approved — sales rep to sign contract, then proceed to IMEI verification'}});
    sendEmail('approved',{to_email:_adRepEmail(),to_name:_adRepName(),customer_name:app.application?.fullName||app.id,app_id:app.id,reviewer_name:user.name});
    addToast('ok','Application approved','Sales rep notified to proceed with IMEI verification');setLd(null);onBack();
  };
  const reject=async()=>{
    if(!rejReason.trim()){addToast('err','Reason required','Provide a rejection reason');return;}
    setLd('rej');await sleep(700);
    onUpdate(app.id,{status:ST.ARCHIVED,mboDecision:'REJECTED',mboRejectionReason:rejReason,mboReviewedBy:user.name,reviewLock:null,tlEntry:{by:user.name,txt:`Rejected: ${rejReason}`}});
    sendEmail('rejected',{to_email:_adRepEmail(),to_name:_adRepName(),customer_name:app.application?.fullName||app.id,app_id:app.id,rejection_reason:rejReason});
    addToast('info','Application rejected','Application is now closed');setLd(null);onBack();
  };
  const requestChanges=async()=>{
    if(requestedFields.length===0){addToast('err','Select fields','Select at least one field that needs to be changed');return;}
    if(!note.trim()){addToast('err','Note required','Explain what the rep needs to fix');return;}
    setLd('ch');await sleep(700);
    const ap=app.application||{};
    const reqs=ap.fieldCorrectionRequests||[];
    const added=requestedFields.filter(f=>!reqs.some(r=>r.fieldName===f&&!r.resolvedAt));
    const newReqs=[...reqs,...added.map(fieldName=>({fieldName,reason:note,resolvedAt:null}))];
    onUpdate(app.id,{status:ST.UNDER_REVIEW,notes:note,application:{...ap,fieldCorrectionRequests:newReqs},reviewLock:null,tlEntry:{by:user.name,txt:`Changes requested (${requestedFields.join(', ')}) — returned to sales rep`}});
    sendEmail('changes',{to_email:_adRepEmail(),to_name:_adRepName(),customer_name:ap.fullName||app.id,app_id:app.id,fields:requestedFields.join(', '),note});
    addToast('warn','Changes requested','Application returned to rep for correction');setLd(null);onBack();
  };
  const escalate=async()=>{
    if(!note.trim()){addToast('err','Note required','Explain why you are escalating.');return;}
    setLd('esc');await sleep(700);
    onUpdate(app.id,{status:ST.ESCALATED,notes:note,reviewer:user.name,reviewLock:null,tlEntry:{by:user.name,txt:`Escalated to ops: ${note}`}});
    const opsEmails=(users||[]).filter(u=>u.role==='ops').map(u=>u.email).join(',');
    sendEmail('escalated',{to_email:opsEmails||'',to_name:'Operations Team',customer_name:app.application?.fullName||app.id,app_id:app.id,escalated_by:user.name,note});
    addToast('warn','Escalated to ops','Awaiting action from operations team');setLd(null);onBack();
  };

  const opsApprove=async()=>{
    setOpsLd('ap');await sleep(900);
    onUpdate(app.id,{status:ST.APPROVED,mboDecision:'APPROVED',notes:opsNote||app.notes,mboReviewedBy:user.name,tlEntry:{by:user.name,txt:`Escalation resolved — Approved by ops (${user.name})`}});
    sendEmail('approved',{to_email:_adRepEmail(),to_name:_adRepName(),customer_name:app.application?.fullName||app.id,app_id:app.id,reviewer_name:user.name});
    addToast('ok','Approved','Sales rep can now proceed with IMEI verification');setOpsLd(null);onBack();
  };
  const opsReturn=async()=>{
    if(!opsNote.trim()){addToast('err','Note required','Explain what the underwriter should do');return;}
    setOpsLd('ret');await sleep(700);
    onUpdate(app.id,{status:ST.PENDING_APPROVAL,notes:opsNote,reviewLock:null,tlEntry:{by:user.name,txt:`Returned to underwriter queue by ops: ${opsNote}`}});
    const uwEmails=(users||[]).filter(u=>u.role==='underwriter').map(u=>u.email).join(',');
    sendEmail('submitted',{to_email:uwEmails||'',to_name:'Underwriter Team',rep_name:user.name,customer_name:app.application?.fullName||app.id,app_id:app.id});
    addToast('info','Returned to queue','Underwriter will review again');setOpsLd(null);onBack();
  };
  const opsReject=async()=>{
    if(!opsRejReason.trim()){addToast('err','Reason required','Provide a rejection reason');return;}
    setOpsLd('rej');await sleep(700);
    onUpdate(app.id,{status:ST.ARCHIVED,mboDecision:'REJECTED',mboRejectionReason:opsRejReason,mboReviewedBy:user.name,tlEntry:{by:user.name,txt:`Rejected by ops: ${opsRejReason}`}});
    sendEmail('rejected',{to_email:_adRepEmail(),to_name:_adRepName(),customer_name:app.application?.fullName||app.id,app_id:app.id,rejection_reason:opsRejReason});
    addToast('info','Rejected','Application is now closed');setOpsLd(null);onBack();
  };

  const c=app.c,d=app.dev,tot=d.totalCost||(d.dep+(d.weekly||0)*(d.wks||12));
  const termMonths=d.wks||12;
  const ratio=c.income>0?(d.weekly/c.income*100):0;
  const affordOk=c.income>0&&ratio<30;
  const isUnderwriter=user.role==='underwriter';
  const isRep=user.role==='rep';
  const reviewable=[ST.PENDING_APPROVAL,ST.UNDER_REVIEW].includes(app.status);
  const pendingCorrections=(app.application?.fieldCorrectionRequests||[]).filter(r=>!r.resolvedAt);
  // Auto-lock when underwriter opens a reviewable contract
  React.useEffect(()=>{
    if(!isUnderwriter||!reviewable)return;
    const lock=app.reviewLock;
    if(lock&&lock.by!==user.id)return; // already locked by someone else, don't overwrite
    if(lock&&lock.by===user.id)return; // already locked by me
    onUpdate(app.id,{reviewLock:{by:user.id,byName:user.name,at:new Date().toISOString()},tlEntry:{by:user.name,txt:'Review started'}});
  },[app.id]); // eslint-disable-line
  const lockedByOther=isUnderwriter&&reviewable&&app.reviewLock&&app.reviewLock.by!==user.id&&!isSuperuser;
  const statusOptions=Object.entries(ST).map(([k,v])=>[v,SM[v]?.label||v]);

  if(showImei){
    return <IMEIFlow app={app} onUpdate={onUpdate} addToast={addToast} onBack={()=>setShowImei(false)}/>;
  }
  return(
    <div className="fadeUp" style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,padding:'28px 32px'}}>
      <div className="detail-header-row" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22,flexWrap:'wrap',gap:12,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12,minWidth:0}}>
          <Btn onClick={onBack} v="ghost" icon="←" sz="sm">{t('back')}</Btn>
          <div style={{minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
              <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>{app.id}</span>
              <Badge st={app.status}/>
              {app.upya&&<span style={{fontSize:10,background:'var(--brandPale)',color:'var(--brand2)',padding:'2px 8px',borderRadius:99,fontFamily:'DM Mono,monospace'}}>{app.upya}</span>}
            </div>
            <h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>{c.name}</h1>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
          <div style={{textAlign:'right',fontSize:11,color:'var(--textLight)'}}><div>{fmtD(app.createdAt)} {fmtT(app.createdAt)}</div><div style={{marginTop:2}}>{app.rep}</div></div>
          <Btn v="def" sz="sm" icon="⬇" onClick={()=>{
            const ap=app.application||{};const deal=app.deal||{};
            const tp={total:deal.totalCost||0,dep:deal.upfrontPayment||0,monthly:deal.recurrentPayment||0,disc:deal.discountPct||0,savings:deal.discountPct>0?Math.round(deal.totalCost/(1-deal.discountPct))-deal.totalCost:0,term:deal.termOption||12};
            const term=deal.termOption||12;
            const discLabel=term===3?'Pay off in 3 months (30% early discount)':term===6?'Pay off in 6 months (20% early discount)':'Standard 12 months';
            const contractData={id:app.id,createdAt:app.createdAt,repName:app.rep||'',co:{...defaultCompanyInfo,...(companyInfo||{})},f:{name:ap.fullName||'',nid:ap.nationalIdNumber||'',idType:ap.idType||'nid',phone:ap.phoneNumber||'',addr:ap.address||'',occ:ap.employmentType||'',income:ap.monthlyIncomeRwf||0,kn:ap.guarantorName||'',kp:ap.guarantorPhone||'',kr:'',customerPhoto:ap.customerPhoto,idPhoto:ap.idPhoto},dev:{brand:deal.manufacturer||'',model:deal.deviceModel||'',ram:deal.RAM||'',rom:deal.ROM||'',retail:deal.cogs||0,markupRate:deal.markupRate||0},term,pricing:tp,date:new Date(app.createdAt||Date.now()).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}),discLabel,app:{fullName:ap.fullName||'',nationalIdNumber:ap.nationalIdNumber||'',idType:ap.idType||'nid',phoneNumber:ap.phoneNumber||'',address:ap.address||'',employmentType:ap.employmentType||'',monthlyIncomeRwf:ap.monthlyIncomeRwf||0,guarantorName:ap.guarantorName||'',guarantorPhone:ap.guarantorPhone||'',customerPhoto:ap.customerPhoto,idPhoto:ap.idPhoto},deal};
            // Default to EN download button; signed customers can also download RW from the signing panel
            generateContractPDF(contractData,companyInfo||defaultCompanyInfo,ap.customerSignature||null,'en');
          }}>{t('dl_contract_pdf')}</Btn>
        </div>
      </div>
      <div style={{flex:1,overflow:'auto',minHeight:0}}>
      <div className="detail-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <Card sx={{padding:'16px 18px'}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:13}}>{t('customer_lbl')}</div>
          {(isUnderwriter&&reviewable?[
            ['name',t('full_name'),c.name],['nid',(c.idType==='passport'?t('passport_number'):t('national_id')),c.nid],['phone',t('phone_number'),c.phone],['addr',t('address_loc'),c.addr],['occ',t('occupation'),c.occ],['income',t('monthly_income'),fmtRWF(c.income)]
          ]:[[ t('full_name'),c.name],[(c.idType==='passport'?t('passport_number'):t('national_id')),c.nid],[t('phone_number'),c.phone],[t('address_loc'),c.addr],[t('occupation'),c.occ],[t('monthly_income'),fmtRWF(c.income)]]).map((arr)=>{
            if(arr.length===3) return <FldWithRequest key={arr[0]} fieldKey={arr[0]} label={arr[1]} val={arr[2]} requestedFields={requestedFields} onToggle={toggleRequest}/>;
            return <Fld key={arr[0]} label={arr[0]} val={arr[1]}/>;
          })}
          <div style={{borderTop:'1.5px solid var(--border)',paddingTop:11,marginTop:4}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>{t('next_of_kin')}</div>
            {(isUnderwriter&&reviewable?[
              ['kin_name',t('kin_name'),c.kin.name],['kin_phone',t('kin_phone'),c.kin.phone],['kin_rel',t('relationship'),c.kin.rel]
            ]:[[ t('kin_name'),c.kin.name],[t('kin_phone'),c.kin.phone],[t('relationship'),c.kin.rel]]).map((arr)=>{
              if(arr.length===3) return <FldWithRequest key={arr[0]} fieldKey={arr[0]} label={arr[1]} val={arr[2]} requestedFields={requestedFields} onToggle={toggleRequest}/>;
              return <Fld key={arr[0]} label={arr[0]} val={arr[1]}/>;
            })}
          </div>
          {(app.customerPhoto||app.idPhoto||app.incomeProof)&&(
            <div style={{borderTop:'1.5px solid var(--border)',paddingTop:14,marginTop:4}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>{t('documents_lbl')}</div>
              {/* Customer photo + ID side by side */}

                  {app.customerPhoto&&(
                    <div style={{display:'flex',flexDirection:'column',gap:5}}>
                      <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.5px',color:'var(--textLight)'}}>{t('customer_photo')}</div>
                      <div style={{position:'relative',borderRadius:8,overflow:'hidden',border:'1.5px solid var(--border)',background:'var(--bg)',cursor:'pointer'}} onClick={()=>window.open(app.customerPhoto,'_blank','noopener')}>
                        <img src={app.customerPhoto} alt="Customer" style={{width:'100%',maxHeight:220,objectFit:'cover',display:'block'}}/>
                        <div style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,0.45)',color:'white',fontSize:9,fontWeight:600,padding:'2px 7px',borderRadius:99,pointerEvents:'none'}}>↗ Full size</div>
                      </div>
                    </div>
                  )}
                  {app.idPhoto&&(
                    <div style={{display:'flex',flexDirection:'column',gap:5}}>
                      <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.5px',color:'var(--textLight)'}}>{t('id_document')}</div>
                      <div style={{position:'relative',borderRadius:8,overflow:'hidden',border:'1.5px solid var(--border)',background:'var(--bg)',cursor:'pointer'}} onClick={()=>window.open(app.idPhoto,'_blank','noopener')}>
                        <img src={app.idPhoto} alt="ID" style={{width:'100%',maxHeight:220,objectFit:'contain',display:'block',background:'var(--bg)'}}/>
                        <div style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,0.45)',color:'white',fontSize:9,fontWeight:600,padding:'2px 7px',borderRadius:99,pointerEvents:'none'}}>↗ Full size</div>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {/* Proof of income */}
              {app.incomeProof&&(
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.5px',color:'var(--textLight)'}}>{t('proof_of_income')}</div>
                  {app.incomeProof.startsWith('data:application/pdf')?(
                    <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:8}}>
                      <span style={{fontSize:22}}>📄</span>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:12}}>PDF Document</div>
                        <div style={{fontSize:11,color:'var(--textMid)',marginTop:1}}>Income proof attached</div>
                      </div>
                      <a href={app.incomeProof} download="income_proof.pdf" style={{display:'inline-flex',alignItems:'center',gap:6,padding:'7px 13px',background:'var(--brand)',color:'white',borderRadius:'var(--r2)',fontSize:11,fontWeight:600,textDecoration:'none'}}>⬇ Download PDF</a>
                    </div>

                    </div>

                </div>
              )}
            </div>

            {!(isUnderwriter&&reviewable)&&<div style={{fontSize:11,color:'var(--textLight)',marginBottom:13}}>{d.specs}</div>}
            {(isUnderwriter&&reviewable?[
              ['device_id',t('device_lbl'),`${d.brand} ${d.model}`],['dep',t('deposit'),fmtRWF(d.dep)],['weekly',t('monthly_x12',termMonths),fmtRWF(d.weekly)],['tot',t('total_price'),fmtRWF(tot)]
            ]:[[ t('deposit'),fmtRWF(d.dep)],[t('monthly_x12',termMonths),fmtRWF(d.weekly)],[t('total_price'),fmtRWF(tot)]]).map((arr)=>{
              if(arr.length===3) return <FldWithRequest key={arr[0]} fieldKey={arr[0]} label={arr[1]} val={arr[2]} requestedFields={requestedFields} onToggle={toggleRequest}/>;
              return <Fld key={arr[0]} label={arr[0]} val={arr[1]}/>;
            })}

            {app.ptId&&<Fld label="PayTrigger ID" val={app.ptId} mono/>}

            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>{t('affordability_lbl')}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
              <span style={{fontSize:12,color:'var(--textMid)'}}>{t('monthly_ratio_lbl')}</span>
              <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16}}>{c.income>0?ratio.toFixed(1):'—'}%</span>
            </div>
            <div style={{height:7,background:'var(--bg)',borderRadius:4,overflow:'hidden',marginBottom:8}}>
              <div style={{height:'100%',borderRadius:4,width:`${Math.min(100,ratio)}%`,background:affordOk?'var(--ok)':'var(--err)',transition:'width .5s'}}/>
            </div>
            <div style={{fontSize:11,fontWeight:600,padding:'6px 10px',borderRadius:'var(--r2)',background:affordOk?'var(--okBg)':'var(--errBg)',color:affordOk?'var(--ok)':'var(--err)'}}>{affordOk?t('within_policy'):t('exceeds_policy')}</div>
          </Card>
        </div>
      </div>
      {lockedByOther&&(
        <Card sx={{padding:'14px 18px',marginBottom:14,border:'2px solid var(--warnBorder)',background:'var(--warnBg)'}}>
          <div style={{fontWeight:700,fontSize:14,color:'var(--warn)',marginBottom:4}}>🔒 Under review by {app.reviewLock.byName}</div>
          <div style={{fontSize:12,color:'var(--warn)'}}>This application is currently being reviewed by <strong>{app.reviewLock.byName}</strong> and cannot be acted on by another underwriter. Only they or a superuser can make a decision.</div>
        </Card>
      )}
      {isUnderwriter&&reviewable&&!lockedByOther&&(
        <Card sx={{padding:18,marginBottom:14,border:'2px solid var(--brandPale2)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>Credit decision</div>
          <div style={{fontSize:11,color:'var(--textMid)',marginBottom:14}}>
            <strong>Approve</strong> to move to IMEI verification. <strong>Request changes</strong> sends it back to the sales rep — select the fields to fix using the toggle buttons on each field above, then add a note below. <strong>Escalate</strong> sends to ops for review. <strong>Reject</strong> permanently closes the application.
          </div>
          {requestedFields.length>0&&(
            <div style={{marginBottom:12,padding:'8px 12px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:11}}>
              <span style={{fontWeight:600,color:'var(--warn)'}}>Fields flagged for correction: </span>
              <span style={{color:'var(--warn)'}}>{requestedFields.join(', ')}</span>
            </div>
          )}
          <FF label="Note (required for Request changes, Escalate, and Reject)"><textarea value={note} onChange={ev=>setNote(ev.target.value)} placeholder="Explain your decision or what the rep needs to fix..." rows={3}/></FF>
          <div style={{display:'flex',gap:8,marginTop:13,flexWrap:'wrap'}}>
            <Btn onClick={approve} v="ok" loading={ld==='ap'} icon="✓">Approve</Btn>
            <Btn onClick={requestChanges} v="warn" loading={ld==='ch'} icon="↩">Request changes</Btn>
            <Btn onClick={escalate} v="pur" loading={ld==='esc'} icon="↑" disabled={!note.trim()}>Escalate to ops</Btn>
            <Btn onClick={()=>setShowRej(p=>!p)} v="err" icon="✕">Reject</Btn>
          </div>
          {showRej&&(
            <div style={{marginTop:13,padding:'13px 15px',background:'var(--errBg)',border:'1px solid var(--errBorder)',borderRadius:'var(--r2)'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--err)',marginBottom:7}}>Rejection reason (required) — this action is permanent</div>
              <textarea value={rejReason} onChange={ev=>setRejReason(ev.target.value)} placeholder="Explain why the application is being rejected..." rows={2} style={{borderColor:'var(--errBorder)'}}/>
              <div style={{marginTop:9,display:'flex',gap:8}}><Btn onClick={reject} v="err" loading={ld==='rej'} disabled={!rejReason.trim()}>Confirm rejection</Btn><Btn onClick={()=>setShowRej(false)} v="ghost" sz="sm">Cancel</Btn></div>
            </div>
          )}
        </Card>
      )}
      {isSuperuser&&(
        <Card sx={{padding:18,marginBottom:14,border:'2px solid var(--purBorder)',background:'var(--purBg)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:'var(--pur)'}}>⚙ Superuser — manage application</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Set status</label><select value={app.status} onChange={ev=>{const v=ev.target.value;onUpdate(app.id,{status:v,tlEntry:{by:user.name,txt:`Status set to ${SM[v]?.label||v} (superuser)`}});addToast('ok','Status updated','');}} style={{padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid var(--border)',minWidth:180}}>{statusOptions.map(([val,label])=><option key={val} value={val}>{label}</option>)}</select></div>
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Notes</label><textarea value={editNotes} onChange={ev=>setEditNotes(ev.target.value)} placeholder="Internal notes..." rows={2} style={{width:'100%',padding:10,borderRadius:'var(--r2)',border:'1.5px solid var(--border)'}}/><div style={{marginTop:6}}><Btn onClick={saveNotes} v="def" sz="sm">Save notes</Btn></div></div>
            <div><Btn onClick={()=>{setShowEditCustomer(p=>{if(!p)setEditC({...app.c,kin:app.c.kin?{...app.c.kin}:{name:'',phone:'',rel:''}});return !p;});}} v="def" sz="sm">{showEditCustomer?'Cancel edit':'Edit customer info'}</Btn>{showEditCustomer&&(<div style={{marginTop:12,display:'flex',flexDirection:'column',gap:10}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><FF label="Name"><input value={editC.name} onChange={ev=>setEditC(p=>({...p,name:ev.target.value}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="ID type"><select value={editC.idType||'nid'} onChange={ev=>setEditC(p=>({...p,idType:ev.target.value}))}><option value="nid">National ID</option><option value="passport">Passport</option></select></FF></div><FF label={editC.idType==='passport'?'Passport number':'National ID'}><input value={editC.nid} onChange={ev=>setEditC(p=>({...p,nid:ev.target.value}))} style={{padding:'6px 10px',width:'100%',fontFamily:'DM Mono,monospace'}}/></FF><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><FF label="Phone"><input value={editC.phone} onChange={ev=>setEditC(p=>({...p,phone:ev.target.value}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Occupation"><select value={editC.occ} onChange={ev=>setEditC(p=>({...p,occ:ev.target.value}))}><option value="">Select</option>{OCCS.map(o=><option key={o} value={o}>{o}</option>)}</select></FF></div><FF label="Address"><input value={editC.addr} onChange={ev=>setEditC(p=>({...p,addr:ev.target.value}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Monthly income (RWF)"><input type="number" value={editC.income} onChange={ev=>setEditC(p=>({...p,income:ev.target.value}))} style={{padding:'6px 10px',width:'100%'}}/></FF><div style={{fontSize:11,fontWeight:600,color:'var(--textLight)',marginTop:8}}>Next of kin</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}><FF label="Name"><input value={editC.kin.name} onChange={ev=>setEditC(p=>({...p,kin:{...p.kin,name:ev.target.value}}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Phone"><input value={editC.kin.phone} onChange={ev=>setEditC(p=>({...p,kin:{...p.kin,phone:ev.target.value}}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Relationship"><select value={editC.kin.rel} onChange={ev=>setEditC(p=>({...p,kin:{...p.kin,rel:ev.target.value}}))}><option value="">Select</option>{RELS.map(r=><option key={r} value={r}>{r}</option>)}</select></FF></div><Btn onClick={saveCustomer} v="ok" sz="sm" style={{marginTop:10}}>Save customer</Btn></div>)}</div>
            {devices&&devices.length>0&&<div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Change device</label><select value={app.dev?.id} onChange={ev=>{const dev=(devices||[]).find(d=>d.id===ev.target.value);if(dev){onUpdate(app.id,{dev,tlEntry:{by:user.name,txt:`Device changed to ${dev.brand} ${dev.model} (superuser)`}});addToast('ok','Device updated','');}}} style={{padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid var(--border)',minWidth:200}}>{(devices||[]).map(d=> <option key={d.id} value={d.id}>{d.brand} {d.model} — {d.sku}</option>)}</select></div>}
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Add timeline entry</label><div style={{display:'flex',gap:8,alignItems:'center'}}><input value={newTlTxt} onChange={ev=>setNewTlTxt(ev.target.value)} placeholder="e.g. Data correction applied" style={{flex:1,padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid var(--border)'}}/><Btn onClick={addTlEntry} v="def" sz="sm" disabled={!newTlTxt.trim()}>Add</Btn></div></div>
          </div>
        </Card>
      )}
      {/* Draft — action for rep */}
      {isRep&&app.status===ST.DRAFT&&(
        <Card sx={{padding:'18px',marginBottom:14,background:'var(--infoBg)',border:'2px solid var(--infoBorder)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--info)',marginBottom:6}}>{t('draft_banner_title')}</div>
          <div style={{fontSize:12,color:'var(--textMid)',marginBottom:14}}>{t('draft_banner_desc')}</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <Btn onClick={()=>{onUpdate(app.id,{status:ST.PENDING_APPROVAL,tlEntry:{by:user.name,txt:'Draft submitted for approval'}});addToast('ok',t('submitted_toast'),t('submitted_toast_msg'));onBack();}} v="primary" icon="→">{t('submit_for_review')}</Btn>
            <Btn onClick={()=>{onUpdate(app.id,{status:ST.ARCHIVED,tlEntry:{by:user.name,txt:'Draft deleted'}});addToast('info',t('draft_deleted_toast'),'');onBack();}} v="ghost" icon="✕">{t('delete_draft_btn')}</Btn>
          </div>
        </Card>
      )}
      {/* Rejection notice for rep */}
      {isRep&&app.mboDecision==='REJECTED'&&(
        <Card sx={{padding:'14px 16px',marginBottom:14,background:'var(--errBg)',border:'2px solid var(--errBorder)'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--err)',marginBottom:5}}>{t('rejected_banner_title')}</div>
          <div style={{fontSize:12,color:'var(--err)',marginBottom:4}}>{t('rejected_banner_desc')}</div>
          {app.mboRejectionReason&&<div style={{fontSize:12,color:'var(--err)',fontStyle:'italic'}}>{t('reason_lbl')} {app.mboRejectionReason}</div>}
        </Card>
      )}
      {/* Changes requested — banner for rep */}
      {isRep&&app.status===ST.UNDER_REVIEW&&pendingCorrections.length>0&&(
        <Card sx={{padding:'14px 16px',marginBottom:14,background:'var(--warnBg)',border:'2px solid var(--warnBorder)'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--warn)',marginBottom:5}}>{t('changes_banner_title')}</div>
          {app.notes&&<div style={{fontSize:12,color:'var(--warn)',marginBottom:10,fontStyle:'italic'}}>"{app.notes}"</div>}
          <div style={{fontSize:11,fontWeight:600,color:'var(--warn)',marginBottom:6}}>{t('fields_to_correct')}</div>
          <ul style={{margin:0,paddingLeft:18}}>
            {pendingCorrections.map((r,i)=><li key={i} style={{fontSize:12,color:'var(--warn)',marginBottom:3}}><strong>{r.fieldName}</strong>{r.reason&&r.reason!==app.notes?` — ${r.reason}`:''}</li>)}
          </ul>
          <div style={{marginTop:12,fontSize:11,color:'var(--textMid)'}} dangerouslySetInnerHTML={{__html:t('edit_resubmit_hint')}}/>
        </Card>
      )}
      {/* Approved — IMEI entry / retry action for rep */}
      {isRep&&app.status===ST.APPROVED&&!app.application?.customerSignature&&(
        <Card sx={{padding:'18px',marginBottom:14,background:'var(--infoBg)',border:'2px solid var(--infoBorder)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--info)',marginBottom:6}}>{t('contract_signing_title')}</div>
          <div style={{fontSize:12,color:'var(--textMid)',marginBottom:14}}>{t('contract_signing_desc')}</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
            <button type="button" onClick={()=>setContractLang('en')} style={{padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid '+(contractLang==='en'?'var(--infoBorder)':'var(--border)'),background:contractLang==='en'?'var(--infoBg)':'white',color:contractLang==='en'?'var(--info)':'var(--textMid)',fontWeight:700,fontSize:12,cursor:'pointer'}}>{t('contract_lang_en')}</button>
            <button type="button" onClick={()=>setContractLang('rw')} style={{padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid '+(contractLang==='rw'?'var(--infoBorder)':'var(--border)'),background:contractLang==='rw'?'var(--infoBg)':'white',color:contractLang==='rw'?'var(--info)':'var(--textMid)',fontWeight:700,fontSize:12,cursor:'pointer'}}>{t('contract_lang_rw')}</button>
          </div>
          {(()=>{
            const ap=app.application||{};const deal=app.deal||{};
            const tp={total:deal.totalCost||0,dep:deal.upfrontPayment||0,monthly:deal.recurrentPayment||0,disc:deal.discountPct||0,savings:deal.discountPct>0?Math.round(deal.totalCost/(1-deal.discountPct))-deal.totalCost:0,term:deal.termOption||12};
            const term=deal.termOption||12;
            const discLabel=term===3?'Pay off in 3 months (30% early discount)':term===6?'Pay off in 6 months (20% early discount)':'Standard 12 months';
            const contractData={id:app.id,createdAt:app.createdAt,repName:app.rep||'',co:{...defaultCompanyInfo,...(companyInfo||{})},f:{name:ap.fullName||'',nid:ap.nationalIdNumber||'',idType:ap.idType||'nid',phone:ap.phoneNumber||'',addr:ap.address||'',occ:ap.employmentType||'',income:ap.monthlyIncomeRwf||0,kn:ap.guarantorName||'',kp:ap.guarantorPhone||'',kr:ap.guarantorRel||'',customerPhoto:ap.customerPhoto,idPhoto:ap.idPhoto},dev:{brand:deal.manufacturer||'',model:deal.deviceModel||'',ram:deal.RAM||'',rom:deal.ROM||'',retail:deal.cogs||0,markupRate:deal.markupRate||0},term,pricing:tp,date:new Date(app.createdAt||Date.now()).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}),discLabel,app:{fullName:ap.fullName||'',nationalIdNumber:ap.nationalIdNumber||'',idType:ap.idType||'nid',phoneNumber:ap.phoneNumber||'',address:ap.address||'',employmentType:ap.employmentType||'',monthlyIncomeRwf:ap.monthlyIncomeRwf||0,guarantorName:ap.guarantorName||'',guarantorPhone:ap.guarantorPhone||'',guarantorRel:ap.guarantorRel||'',customerPhoto:ap.customerPhoto,idPhoto:ap.idPhoto},deal};
            return(
              <>
                <div style={{maxHeight:320,overflow:'auto',border:'1.5px solid var(--border)',borderRadius:'var(--r)',marginBottom:14,padding:4,background:'white'}}>
                  <ContractDoc data={contractData} lang={contractLang}/>
                </div>
                <div style={{borderTop:'1.5px solid var(--border)',paddingTop:12}}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>{t('draw_signature')}</div>
                  <SignaturePad onChange={sig=>setSigDraft(sig)}/>
                  <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
                    <Btn v="primary" icon="✓" disabled={!sigDraft} onClick={()=>{
                      if(!sigDraft){addToast('warn',t('sign_contract_first'),t('sign_contract_first_msg'));return;}
                      const nextAp={...(app.application||{}),customerSignature:sigDraft,digitalSignatureConfirmed:true,contractSignedAt:new Date().toISOString(),contractSignedLangs:['en','rw']};
                      onUpdate(app.id,{application:nextAp,tlEntry:{by:user.name,txt:'Contract signed (EN & RW) — sales rep can proceed to IMEI verification'}});
                      addToast('ok',t('contract_signed_saved'),t('contract_signed_saved_msg'));
                    }}>{t('sign_contract_to_continue')}</Btn>
                    <Btn v="def" icon="⬇" sz="sm" onClick={()=>generateContractPDF(contractData,companyInfo||defaultCompanyInfo,sigDraft||null,'en')}>{t('dl_contract_pdf')} (EN)</Btn>
                    <Btn v="def" icon="⬇" sz="sm" onClick={()=>generateContractPDF(contractData,companyInfo||defaultCompanyInfo,sigDraft||null,'rw')}>{t('dl_contract_pdf')} (RW)</Btn>
                  </div>
                </div>
              </>
            );
          })()}
        </Card>
      )}
      {isRep&&app.status===ST.APPROVED&&!!app.application?.customerSignature&&(
        <Card sx={{padding:'18px',marginBottom:14,background:'var(--okBg)',border:'2px solid var(--okBorder)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--ok)',marginBottom:6}}>{t('approved_banner_title')}</div>
          {app.imei
            ? <div style={{fontSize:12,color:'var(--textMid)',marginBottom:14}}>{t('imei_retry_desc',app.imei)}</div>
            : <div style={{fontSize:12,color:'var(--textMid)',marginBottom:14}}>{t('imei_enter_desc')}</div>
          }
          <Btn onClick={()=>setShowImei(true)} v="ok" icon="→">{app.imei?t('retry_imei_btn'):t('enter_imei_verify')}</Btn>
        </Card>
      )}
      {/* Lock pending — reminder */}
      {isRep&&app.status===ST.LOCK_PENDING&&(
        <Card sx={{padding:'14px 16px',marginBottom:14,background:'var(--warnBg)',border:'2px solid var(--warnBorder)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--warn)',marginBottom:6}}>{t('lock_banner_title')}</div>
          <div style={{fontSize:12,color:'var(--textMid)',marginBottom:10}}>{t('lock_banner_desc')}</div>
          <Btn onClick={()=>setShowImei(true)} v="warn" icon="→">{t('continue_imei_lock')}</Btn>
        </Card>
      )}
      {isRep&&app.status===ST.AWAITING_PAYMENT&&(
        <Card sx={{padding:'14px 16px',marginBottom:14,background:'var(--infoBg)',border:'2px solid var(--infoBorder)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--info)',marginBottom:6}}>⏳ Awaiting first payment</div>
          <div style={{fontSize:12,color:'var(--textMid)'}}>The phone has been locked in PayTrigger. The contract will activate automatically once the customer makes their first payment.{app.ptId&&<span style={{display:'block',marginTop:6,fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>PayTrigger ID: {app.ptId}</span>}</div>
        </Card>
      )}
      {/* Escalated — ops action panel */}
      {isSuperuser&&app.status===ST.ESCALATED&&(
        <Card sx={{padding:18,marginBottom:14,border:'2px solid var(--purBorder)',background:'var(--purBg)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4,color:'var(--pur)'}}>↑ Escalated — ops action required</div>
          <div style={{fontSize:11,color:'var(--textMid)',marginBottom:10}}>This application was escalated by the underwriter. Review the details and take action below.</div>
          {app.notes&&<div style={{fontSize:12,color:'var(--pur)',marginBottom:14,padding:'8px 12px',background:'var(--purBg2,rgba(124,58,237,0.07))',borderRadius:'var(--r2)',fontStyle:'italic'}}>Underwriter note: "{app.notes}"</div>}
          <FF label="Ops note (required for Return to queue or Reject)"><textarea value={opsNote} onChange={ev=>setOpsNote(ev.target.value)} placeholder="Add your note or decision..." rows={2}/></FF>
          <div style={{display:'flex',gap:8,marginTop:11,flexWrap:'wrap'}}>
            <Btn onClick={opsApprove} v="ok" loading={opsLd==='ap'} icon="✓">Approve</Btn>
            <Btn onClick={opsReturn} v="warn" loading={opsLd==='ret'} icon="↩" disabled={!opsNote.trim()}>Return to underwriter</Btn>
            <Btn onClick={()=>setShowOpsRej(p=>!p)} v="err" icon="✕">Reject</Btn>
          </div>
          {showOpsRej&&(
            <div style={{marginTop:12,padding:'13px 15px',background:'var(--errBg)',border:'1px solid var(--errBorder)',borderRadius:'var(--r2)'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--err)',marginBottom:7}}>Rejection reason (required) — this is permanent</div>
              <textarea value={opsRejReason} onChange={ev=>setOpsRejReason(ev.target.value)} placeholder="Explain why..." rows={2} style={{borderColor:'var(--errBorder)'}}/>
              <div style={{marginTop:9,display:'flex',gap:8}}><Btn onClick={opsReject} v="err" loading={opsLd==='rej'} disabled={!opsRejReason.trim()}>Confirm rejection</Btn><Btn onClick={()=>setShowOpsRej(false)} v="ghost" sz="sm">Cancel</Btn></div>
            </div>
          )}
        </Card>
      )}

      {!isUnderwriter&&<Card sx={{padding:'16px 18px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>{t('activity_timeline')}</div>

            <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,paddingTop:3}}>

          </div>
        ))}
      </Card>}
      </div>
    </div>
  );
};

  return(
    <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}>

        {pg==='dash'&&(

            <div style={{marginBottom:24,textAlign:'center'}}><h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>{t('welcome',user.name.split(' ')[0])}</h1><p style={{fontSize:13,color:'var(--textMid)',marginTop:4}}>{t('what_to_do')}</p></div>

            {grps.awaiting.length>0&&<div style={{marginBottom:22}}><div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--info)',marginBottom:10}}>⏳ Awaiting first payment <span style={{background:'var(--infoBg)',color:'var(--info)',padding:'1px 7px',borderRadius:99}}>{grps.awaiting.length}</span></div><div style={{display:'flex',flexDirection:'column',gap:8}}>{grps.awaiting.map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div></div>}
            {grps.active.length>0&&<div style={{marginBottom:22}}><div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>{t('active_contracts')}</div><div style={{display:'flex',flexDirection:'column',gap:8}}>{grps.active.map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div></div>}

          </div>
        )}
        {pg==='completed'&&(

            {grps.closed.length>0?<div style={{display:'flex',flexDirection:'column',gap:8}}>{grps.closed.map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div>:<Empty ico="✓" title={t('no_closed')} sub={t('no_closed_sub')}/>}
          </div>

        {pg==='new'&&<div className="page-content new-app-fullpage" style={{flex:1,display:'flex',flexDirection:'column',minHeight:0,overflow:'hidden',padding:0}}><NewApp devices={devicesWithPricing} preSelDevId={preselDev?.id||null} preSelTerm={preselDev?.term||12}
          onBack={()=>{setActiveDraftId(null);setPg('dash');setPreselDev(null);}}
