// ── IMEI FLOW ─────────────────────────────────────────────────
// Phases: entry | autocheck | valid | mismatch | notfound | checking (manual fallback) | verified
const CARLCARE_MANUAL_URL='https://www.carlcare.com/rw/warranty-check/';
// Permanent Cloudflare Worker proxy — admin can override via Company info settings
const CARLCARE_PROXY_FALLBACK='https://green-breeze-55ec.georgeniyonshuti.workers.dev';
const DEVICE_BRANDS=['TECNO','INFINIX','itel'];

// Normalise a string for loose comparison
const ccNorm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
// Extract numeric value (e.g. "4GB" → 4, "128" → 128)
const ccNum=s=>parseInt(String(s||'').replace(/[^0-9]/g,''))||0;

// Parse the Carlcare imei-policy JSON response into a flat object.
// Actual API structure: { code:200, data:{ valid:[{ productModelCode, brandCategoryName, expiryDate, periodOfValid, status, warrantyName, isInvalid, ... }] } }
const parseCarlcareResp=(raw)=>{
  if(!raw||raw.code!==200)return null;

  // data.valid is an array of warranty entries (one per warranty type)
  const validList=raw?.data?.valid;
  if(!Array.isArray(validList)||validList.length===0)return null;

  // Pick the best entry: prefer ones with status="valid" and a months-based warranty
  const pickBest=(list)=>{
    const active=list.filter(e=>String(e.status||'').toLowerCase()==='valid'&&(e.isInvalid===0||e.isInvalid==='0'));
    if(active.length===0)return list[0];
    const monthsEntry=active.find(e=>(e.warrantyName||'').toLowerCase().includes('month'));
    return monthsEntry||active[0];
  };
  const entry=pickBest(validList);
  if(!entry)return null;

  // productModelCode = "X6728B 128+4" → model="X6728B", rom="128", ram="4"
  const modelCode=String(entry.productModelCode||'').trim();
  const spaceIdx=modelCode.indexOf(' ');
  const modelName=spaceIdx>-1?modelCode.slice(0,spaceIdx):modelCode;
  const specsPart=spaceIdx>-1?modelCode.slice(spaceIdx+1):'';
  const specNums=specsPart.split('+');
  const rom=specNums[0]?specNums[0].replace(/[^0-9]/g,''):'';
  const ram=specNums[1]?specNums[1].replace(/[^0-9]/g,''):'';

  // brandCategoryName = "Infinix-SP" or "TECNO-itel" → take part before first "-"
  const brandRaw=String(entry.brandCategoryName||'').trim();
  const brand=brandRaw.includes('-')?brandRaw.split('-')[0].trim():brandRaw;

  // Parse DD-MM-YYYY dates
  const parseDate=s=>{
    if(!s)return null;
    const iso=new Date(s);
    if(!isNaN(iso)&&s.includes('-')&&s.length>8)return iso;
    const m=String(s).match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if(m)return new Date(+m[3],+m[2]-1,+m[1]);
    return null;
  };
  const expiry=parseDate(entry.expiryDate||'');
  const warrantyValid=String(entry.status||'').toLowerCase()==='valid'&&
                      (entry.isInvalid===0||entry.isInvalid==='0')&&
                      (expiry?expiry>new Date():true);

  return{
    brand,model:modelName,ram,rom,
    warrantyValid,
    expiry:expiry?expiry.toLocaleDateString('en-GB'):entry.expiryDate||'',
    start:entry.periodOfValid||'',
    warrantyClass:entry.warrantyName||'',
    raw:entry
  };
};

// Compare expected device specs (from application) vs. Carlcare result
const compareSpecs=(dev,cc)=>{
  const expBrand=ccNorm(dev.brand);
  const expModel=ccNorm(dev.model);
  const expRam=ccNum(dev.ram||dev.RAM);
  const expRom=ccNum(dev.rom||dev.ROM);
  const ccBrand=ccNorm(cc.brand);
  const ccModel=ccNorm(cc.model);
  const ccRam=ccNum(cc.ram);
  const ccRom=ccNum(cc.rom);
  // Brand: partial match (e.g. "tecno" in "tecno mobile")
  const brandOk=!cc.brand||ccBrand.includes(expBrand)||expBrand.includes(ccBrand);
  // Model: partial match
  const modelOk=!cc.model||ccModel.includes(expModel)||expModel.includes(ccModel);
  // RAM/ROM: numeric, 0 means not reported by Carlcare → skip that check
  const ramOk=!ccRam||expRam===ccRam;
  const romOk=!ccRom||expRom===ccRom;
  return{brandOk,modelOk,ramOk,romOk,allOk:brandOk&&modelOk&&ramOk&&romOk};
};

const IMEIFlow=({app,onUpdate,addToast,onBack})=>{
  const {user,companyInfo}=useContext(Ctx);
  const proxyUrl=(companyInfo?.imeiProxyUrl||CARLCARE_PROXY_FALLBACK).trim();
  const [imei,setImei]=useState(app.imei||'');
  const [phase,setPhase]=useState(app.status===ST.LOCK_PENDING||app.status===ST.ACTIVE?'verified':app.imei&&app.status===ST.APPROVED?'autocheck_resume':'entry');
  const [ld,setLd]=useState(null);
  const [copied,setCopied]=useState(false);
  const [mismatchNote,setMismatchNote]=useState('');
  const [actualSpecs,setActualSpecs]=useState({brand:'',model:'',ram:'',rom:''});
  const [ccResult,setCcResult]=useState(null); // parsed Carlcare result
  const [autoError,setAutoError]=useState('');  // error message if auto-check fails
  const d=app.dev;

  const copyImei=()=>{navigator.clipboard?.writeText(imei).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};

  // ── Auto-check via proxy ──────────────────────────────────────
  const runAutoCheck=async(imeiVal)=>{
    setLd('check');setAutoError('');
    try{
      const resp=await fetch(`${proxyUrl}?imei=${imeiVal}`);
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const raw=await resp.json();
      const result=parseCarlcareResp(raw);
      setCcResult(result);

      if(!result){
        // API returned but no usable data → not found
        setPhase('notfound');
      }else if(!result.warrantyValid){
        setPhase('notfound');
      }else{
        const match=compareSpecs(d,result);
        if(match.allOk){
          setPhase('valid');
        }else{
          // Pre-fill actual specs from Carlcare
          setActualSpecs({brand:result.brand,model:result.model,ram:result.ram,rom:result.rom});
          setPhase('mismatch');
        }
      }
    }catch(err){
      setAutoError(`Auto-check failed: ${err.message}. Falling back to manual verification.`);
      setPhase('checking'); // manual fallback
    }finally{
      setLd(null);
    }
  };

  const proceedToCheck=()=>{
    if(imei.length!==15||!/^\d+$/.test(imei)){addToast('err','Invalid IMEI','Must be exactly 15 digits. Dial *#06# on the device.');return;}
    onUpdate(app.id,{imei,tlEntry:{by:user.name,txt:`IMEI entered: ${imei}`}});
    if(proxyUrl){
      setPhase('autocheck');
      runAutoCheck(imei);
    }else{
      setPhase('checking'); // manual
    }
  };

  // If already has IMEI and approved, try to resume auto-check
  useEffect(()=>{
    if(phase==='autocheck_resume'&&app.imei&&proxyUrl){
      setPhase('autocheck');
      runAutoCheck(app.imei);
    }else if(phase==='autocheck_resume'){
      setPhase(proxyUrl?'entry':'checking');
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // ── Confirm valid (auto or manual) ───────────────────────────
  const confirmValid=async(fromAuto)=>{
    setLd('pt');await sleep(800);
    const ptId='PT-2026-'+Math.floor(10000+Math.random()*90000);
    const ccDetail=fromAuto&&ccResult?` Carlcare: ${ccResult.model||''} RAM:${ccResult.ram} Storage:${ccResult.rom} · Warranty expires ${ccResult.expiry}.`:'';
    onUpdate(app.id,{imei,ptId,status:ST.LOCK_PENDING,carlcareResult:ccResult||null,tlEntry:{by:user.name,txt:`IMEI ${imei} — Carlcare warranty confirmed, specs match.${ccDetail} Registered in PayTrigger (${ptId})`}});
    addToast('ok','IMEI verified','Carlcare: warranty valid & specs match');
    setPhase('verified');setLd(null);
  };

  const sendBackFromImei=(reason)=>{
    onUpdate(app.id,{status:ST.PENDING_APPROVAL,notes:reason,imei:null,tlEntry:{by:user.name,txt:`IMEI check issue — returned to underwriter: ${reason}`}});
    addToast('warn','Returned to underwriter','Underwriter will be notified');onBack();
  };
  const escalateFromImei=(reason)=>{
    onUpdate(app.id,{status:ST.ESCALATED,notes:reason,imei:null,tlEntry:{by:user.name,txt:`IMEI check issue escalated: ${reason}`}});
    addToast('info','Escalated to ops','Issue logged');onBack();
  };
  const retryImei=()=>{
    // Clear the failed IMEI so auto-check doesn't replay it, stay in APPROVED
    onUpdate(app.id,{imei:null,tlEntry:{by:user.name,txt:'IMEI retry — clearing previous failed IMEI'}});
    setImei('');setCcResult(null);setPhase('entry');
  };
  const confirmLocked=async()=>{
    setLd('lock');await sleep(2000);
    onUpdate(app.id,{status:ST.ACTIVE,lockedAt:new Date().toISOString(),tlEntry:{by:user.name,txt:'Phone locked — contract activated, payments enabled'}});
    addToast('ok','Contract activated!','Device locked in PayTrigger. Customer can now make payments.');
    setLd(null);onBack();
  };

  const STEPS_DEF=[{l:'Enter IMEI',done:phase!=='entry'},{l:'Carlcare check',done:['valid','mismatch','notfound','verified'].includes(phase)},{l:'Lock & activate',done:phase==='verified'&&app.status===ST.ACTIVE}];

  return(
    <div className="fadeUp" style={{padding:'28px 32px',maxWidth:760}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>IMEI & warranty check</h1>
          <p style={{fontSize:11,color:'var(--textMid)',marginTop:1}}>{app.id} · {app.c.name}</p>
        </div>
        {proxyUrl&&<span style={{marginLeft:'auto',fontSize:10,fontWeight:600,padding:'3px 9px',borderRadius:99,background:'var(--okBg)',color:'var(--ok)',border:'1px solid var(--okBorder)'}}>⚡ Auto-check</span>}
      </div>

      {/* Step indicators */}
      <div style={{display:'flex',alignItems:'center',marginBottom:22}}>
        {STEPS_DEF.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div style={{width:26,height:26,borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,background:s.done?'var(--ok)':'var(--brand)',color:'white'}}>{s.done?'✓':i+1}</div>
              <span style={{fontSize:12,fontWeight:500,color:s.done?'var(--ok)':'var(--text)'}}>{s.l}</span>
            </div>
            {i<2&&<div style={{flex:1,height:1,background:'var(--border)',margin:'0 8px'}}/>}
          </React.Fragment>
        ))}
      </div>

      {/* Expected device specs */}
      <Card sx={{padding:'13px 16px',marginBottom:16,background:'var(--brandPale)',border:'1.5px solid var(--brandPale2)'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--brand)',marginBottom:8}}>Expected device (from application)</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:8}}>
          {[['Brand',d.brand],['Model',d.model],['RAM',d.ram||d.RAM],['Storage',d.rom||d.ROM]].map(([k,v])=>(
            <div key={k}><div style={{fontSize:9,color:'var(--brand2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>{k}</div><div style={{fontWeight:700,fontSize:13,color:'var(--brand)'}}>{v||'—'}</div></div>
          ))}
        </div>
      </Card>

      <Card sx={{padding:22}}>
        {/* ── Phase: entry ── */}
        {phase==='entry'&&(
          <div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>Enter device IMEI</div>
            <p style={{fontSize:12,color:'var(--textMid)',marginBottom:18,lineHeight:1.7}}>
              Dial <strong>*#06#</strong> on the <strong>{d.brand} {d.model}</strong> to get its IMEI. Enter it below.{' '}
              {proxyUrl?<span style={{color:'var(--ok)',fontWeight:600}}>Warranty will be checked automatically.</span>:<span>You will verify it manually on the Carlcare website.</span>}
            </p>
            <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap',marginBottom:6}}>
              <div style={{flex:1,minWidth:200}}>
                <label style={{fontSize:11,fontWeight:600,color:'var(--textLight)',display:'block',marginBottom:5}}>15-digit IMEI</label>
                <input value={imei} onChange={ev=>setImei(ev.target.value.replace(/\D/g,'').slice(0,15))} placeholder="e.g. 352876110123456" style={{fontFamily:'DM Mono,monospace',fontSize:18,letterSpacing:'2px'}} maxLength={15}/>
                <div style={{fontSize:10,color:'var(--textLight)',marginTop:4}}>{imei.length}/15 digits</div>
              </div>
              <Btn v="primary" sz="lg" disabled={imei.length!==15} onClick={proceedToCheck} icon={proxyUrl?'⚡':'→'}>{proxyUrl?'Check warranty automatically':'Proceed to manual check'}</Btn>
            </div>
          </div>
        )}

        {/* ── Phase: autocheck (spinner) ── */}
        {phase==='autocheck'&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'32px 0',gap:18}}>
            <Spin size={36}/>
            <div style={{fontWeight:700,fontSize:15}}>Checking with Carlcare…</div>
            <div style={{fontFamily:'DM Mono,monospace',fontSize:18,letterSpacing:'2px',color:'var(--brand)',padding:'10px 20px',background:'var(--brandPale)',borderRadius:'var(--r)'}}>{imei}</div>
            <div style={{fontSize:11,color:'var(--textMid)'}}>Verifying warranty status and device specs automatically</div>
          </div>
        )}

        {/* ── Phase: valid (auto-verified, all good) ── */}
        {phase==='valid'&&(
          <div>
            <div style={{padding:'16px 18px',background:'var(--okBg)',border:'2px solid var(--okBorder)',borderRadius:'var(--r)',marginBottom:20}}>
              <div style={{fontWeight:800,fontSize:15,color:'var(--ok)',marginBottom:8}}>✓ Warranty valid — all specs match</div>
              {ccResult&&(
                <>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8,marginBottom:10}}>
                    {[['Brand',ccResult.brand],['Model',ccResult.model],['RAM',`${ccResult.ram}GB`],['Storage',`${ccResult.rom}GB`]].map(([k,v])=>(
                      <div key={k} style={{background:'white',borderRadius:'var(--r2)',padding:'8px 10px',border:'1px solid var(--okBorder)'}}>
                        <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--textLight)',marginBottom:2}}>{k}</div>
                        <div style={{fontWeight:700,fontSize:13,color:'var(--ok)'}}>{v||'—'}</div>
                      </div>
                    ))}
                  </div>
                  {ccResult.expiry&&<div style={{fontSize:11,color:'var(--ok)',fontWeight:600}}>Warranty valid until: {ccResult.expiry}{ccResult.warrantyClass&&` · ${ccResult.warrantyClass}`}</div>}
                </>
              )}
            </div>
            <Btn onClick={()=>confirmValid(true)} v="ok" sz="lg" full loading={ld==='pt'} icon="→">
              {ld==='pt'?'Registering in PayTrigger…':'Confirm & proceed to PayTrigger'}
            </Btn>
            <div style={{marginTop:10,textAlign:'center'}}>
              <Btn v="ghost" sz="sm" onClick={()=>{setCcResult(null);setPhase('entry');}} icon="←">Re-enter IMEI</Btn>
            </div>
          </div>
        )}

        {/* ── Phase: mismatch ── */}
        {phase==='mismatch'&&(
          <div>
            <div style={{padding:'12px 15px',background:'var(--warnBg)',border:'1.5px solid var(--warnBorder)',borderRadius:'var(--r2)',marginBottom:18}}>
              <div style={{fontWeight:700,fontSize:13,color:'var(--warn)',marginBottom:4}}>⚠ Specs mismatch — action required</div>
              <div style={{fontSize:11,color:'var(--warn)',lineHeight:1.6}}>{ccResult?'Carlcare confirmed the IMEI is in warranty, but the device specs do not match the application.':'The device found on Carlcare does not match the application specs.'} Record the actual specs found and choose how to proceed.</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
              <div style={{padding:'12px 14px',background:'var(--bg)',borderRadius:'var(--r)',border:'1px solid var(--border)'}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--textLight)',marginBottom:8}}>Application says</div>
                {[['Brand',d.brand||'—'],['Model',d.model||'—'],['RAM',(d.ram||d.RAM)||'—'],['Storage',(d.rom||d.ROM)||'—']].map(([k,v])=>(
                  <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5}}>
                    <span style={{color:'var(--textMid)'}}>{k}</span>
                    <span style={{fontWeight:600}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{padding:'12px 14px',background:'var(--warnBg)',borderRadius:'var(--r)',border:'1.5px solid var(--warnBorder)'}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--warn)',marginBottom:8}}>
                  Carlcare shows {ccResult?<span style={{fontWeight:400,textTransform:'none',fontSize:10}}>(auto-detected — read only)</span>:<span style={{fontWeight:400,textTransform:'none',fontSize:10}}>(enter manually)</span>}
                </div>
                {[['Brand','brand'],['Model','model'],['RAM','ram'],['Storage','rom']].map(([label,key])=>(
                  ccResult
                    ? <div key={key} style={{marginBottom:6,padding:'6px 10px',background:'white',borderRadius:'var(--r2)',border:'1px solid var(--warnBorder)',fontSize:12,fontWeight:600}}>{actualSpecs[key]||'—'}</div>
                    : <input key={key} value={actualSpecs[key]} onChange={e=>setActualSpecs(p=>({...p,[key]:e.target.value}))} placeholder={label} style={{marginBottom:6,fontSize:12}}/>
                ))}
              </div>
            </div>
            <FF label="Note — describe the mismatch"><textarea value={mismatchNote} onChange={e=>setMismatchNote(e.target.value)} rows={2} placeholder="e.g. Carlcare shows 8GB RAM but application states 4GB RAM" style={{resize:'vertical'}}/></FF>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:14}}>
              <Btn v="ok" full icon="←" onClick={retryImei}>Try a different IMEI</Btn>
              <div style={{height:1,background:'var(--border)',margin:'2px 0'}}/>
              <Btn v="warn" full icon="↩" onClick={()=>sendBackFromImei(`Specs mismatch at IMEI check. ${mismatchNote||''} Carlcare shows: ${Object.entries(actualSpecs).map(([k,v])=>v?`${k}=${v}`:'').filter(Boolean).join(', ')}.`)}>Send back to underwriter for review</Btn>
              <Btn v="def" full icon="⬆" onClick={()=>escalateFromImei(`Specs mismatch — escalated. ${mismatchNote||''} IMEI: ${imei}. Carlcare: ${Object.entries(actualSpecs).map(([k,v])=>v?`${k}=${v}`:'').filter(Boolean).join(', ')}.`)}>Escalate to ops</Btn>
            </div>
          </div>
        )}

        {/* ── Phase: notfound ── */}
        {phase==='notfound'&&(
          <div>
            <div style={{padding:'12px 15px',background:'var(--errBg)',border:'1.5px solid var(--errBorder)',borderRadius:'var(--r2)',marginBottom:18}}>
              <div style={{fontWeight:700,fontSize:13,color:'var(--err)',marginBottom:4}}>✕ {ccResult&&!ccResult.warrantyValid?'Warranty expired or not valid':'IMEI not found on Carlcare'}</div>
              <div style={{fontSize:11,color:'var(--err)',lineHeight:1.6}}>{ccResult&&!ccResult.warrantyValid?`The device was found but the warranty is no longer valid (expired: ${ccResult.expiry||'unknown'}). Do not proceed with activation.`:'Carlcare could not find this IMEI. The device may not be genuine, may not be a supported brand (TECNO/itel/Infinix), or the warranty has expired.'}</div>
            </div>
            <div style={{padding:'11px 14px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--warn)',lineHeight:1.6,marginBottom:18}}>
              <strong>What to check:</strong> Confirm the IMEI was entered correctly (dial *#06# again). Try the second IMEI if dual-SIM. If still not found or expired, send back to underwriter.
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <Btn v="ok" full icon="←" onClick={retryImei}>Try a different IMEI</Btn>
              <div style={{height:1,background:'var(--border)',margin:'4px 0'}}/>
              <div style={{fontSize:11,color:'var(--textMid)',marginBottom:2}}>If the issue can't be resolved by retrying, send back to underwriter or escalate:</div>
              <FF label="Note for underwriter / ops"><textarea value={mismatchNote} onChange={e=>setMismatchNote(e.target.value)} rows={2} placeholder="Describe what was tried…" style={{resize:'vertical'}}/></FF>
              <Btn v="warn" full icon="↩" onClick={()=>sendBackFromImei(`IMEI ${imei} — ${ccResult&&!ccResult.warrantyValid?'warranty expired/invalid':'not found on Carlcare'}. ${mismatchNote||''}`)}>Send back to underwriter</Btn>
              <Btn v="def" full icon="⬆" onClick={()=>escalateFromImei(`IMEI ${imei} — ${ccResult&&!ccResult.warrantyValid?'warranty issue':'unverifiable'}. ${mismatchNote||''} — escalated from IMEI check.`)}>Escalate to ops</Btn>
            </div>
          </div>
        )}

        {/* ── Phase: checking (manual fallback — no proxy configured or auto-check failed) ── */}
        {phase==='checking'&&(
          <div>
            {autoError&&<div style={{padding:'9px 12px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--warn)',marginBottom:14}}>{autoError}</div>}
            <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>Check warranty on Carlcare</div>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',background:'var(--bg)',borderRadius:'var(--r)',border:'1.5px solid var(--border)',marginBottom:18}}>
              <div style={{flex:1}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--textLight)',marginBottom:3}}>IMEI to check</div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:22,fontWeight:700,letterSpacing:'2.5px',color:'var(--brand)'}}>{imei}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <Btn v="def" sz="sm" onClick={copyImei} icon={copied?'✓':'⎘'}>{copied?'Copied!':'Copy IMEI'}</Btn>
                <Btn v="primary" sz="sm" onClick={()=>window.open(CARLCARE_MANUAL_URL,'_blank','noopener')} icon="↗">Open Carlcare</Btn>
              </div>
            </div>
            <div style={{padding:'10px 14px',background:'var(--infoBg)',border:'1px solid var(--infoBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--info)',marginBottom:20,lineHeight:1.6}}>
              <strong>Instructions:</strong> Click "Open Carlcare" → paste the IMEI → check the result. Confirm brand, model, RAM and storage match the expected device above. Then select the outcome below.
            </div>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:12}}>What did Carlcare show?</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button type="button" onClick={()=>confirmValid(false)} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',border:'2px solid var(--okBorder)',borderRadius:'var(--r)',background:'var(--okBg)',cursor:'pointer',textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:18,background:'var(--ok)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>✓</div>
                <div><div style={{fontWeight:700,fontSize:13,color:'var(--ok)'}}>Warranty valid — specs match</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>IMEI found, in warranty, all specs match the application</div></div>
              </button>
              <button type="button" onClick={()=>{setActualSpecs({brand:d.brand||'',model:d.model||'',ram:d.ram||'',rom:d.rom||''});setPhase('mismatch');}} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',border:'2px solid var(--warnBorder)',borderRadius:'var(--r)',background:'var(--warnBg)',cursor:'pointer',textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:18,background:'var(--warn)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>⚠</div>
                <div><div style={{fontWeight:700,fontSize:13,color:'var(--warn)'}}>Device found but specs don't match</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>IMEI found and in warranty, but specs differ from the application</div></div>
              </button>
              <button type="button" onClick={()=>setPhase('notfound')} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',border:'2px solid var(--errBorder)',borderRadius:'var(--r)',background:'var(--errBg)',cursor:'pointer',textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:18,background:'var(--err)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>✕</div>
                <div><div style={{fontWeight:700,fontSize:13,color:'var(--err)'}}>IMEI not found or out of warranty</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>Carlcare did not recognise this IMEI or the warranty has expired</div></div>
              </button>
            </div>
            <div style={{marginTop:14,textAlign:'right'}}>
              <Btn v="ghost" sz="sm" onClick={()=>setPhase('entry')} icon="←">Re-enter IMEI</Btn>
            </div>
          </div>
        )}

        {/* ── Phase: verified (proceed to PayTrigger lock) ── */}
        {phase==='verified'&&(
          <div>
            <div style={{padding:'13px 15px',background:'var(--okBg)',border:'1.5px solid var(--okBorder)',borderRadius:'var(--r2)',marginBottom:20}}>
              <div style={{fontWeight:700,fontSize:13,color:'var(--ok)',marginBottom:4}}>✓ Carlcare warranty confirmed — IMEI verified</div>
              <div style={{fontSize:11,color:'var(--ok)',lineHeight:1.6}}>IMEI: <span style={{fontFamily:'DM Mono,monospace',fontWeight:700}}>{app.imei||imei}</span>{app.ptId&&<span> · PayTrigger: <span style={{fontFamily:'DM Mono,monospace'}}>{app.ptId}</span></span>}</div>
            </div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>Lock the phone in PayTrigger</div>
            <p style={{fontSize:12,color:'var(--textMid)',lineHeight:1.7,marginBottom:14}}>Open the PayTrigger portal, find this device by IMEI, and lock it. Once the customer's screen shows the PAYGO lock, confirm below to activate the contract.</p>
            <div style={{padding:'10px 13px',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',fontSize:11,color:'var(--warn)',lineHeight:1.6,marginBottom:18}}><strong>Only confirm once</strong> the lock screen is visible on the customer's phone.</div>
            <a href="https://paytrigger.shalltry.com/pay-trigger/" target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:6,padding:'9px 14px',background:'var(--infoBg)',border:'1px solid var(--infoBorder)',borderRadius:'var(--r2)',color:'var(--info)',fontSize:12,fontWeight:600,textDecoration:'none',marginBottom:16}}>↗ Open PayTrigger portal</a>
            <Btn onClick={confirmLocked} v="ok" sz="lg" full loading={ld==='lock'} disabled={!!ld} icon="🔒">{ld==='lock'?'Activating contract…':'Confirm phone is locked — activate contract'}</Btn>
          </div>
        )}
      </Card>
    </div>
  );
};

// ── APP DETAIL ────────────────────────────────────────────────
const AppDetail=({app,onUpdate,addToast,onBack,devices})=>{
  const {user,companyInfo}=useContext(Ctx);
  const [note,setNote]=useState(app.notes||'');
  const [ld,setLd]=useState(null);
  const [showRej,setShowRej]=useState(false);
  const [rejReason,setRejReason]=useState('');
  const [requestedFields,setRequestedFields]=useState(()=>app.requestedChangeFields||[]);
  const [showImei,setShowImei]=useState(false);
  const [opsNote,setOpsNote]=useState('');
  const [showOpsRej,setShowOpsRej]=useState(false);
  const [opsRejReason,setOpsRejReason]=useState('');
  const [opsLd,setOpsLd]=useState(null);
  const toggleRequest=(key)=>{setRequestedFields(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);};
  const isSuperuser=!!user.superuser;
  const [showEditCustomer,setShowEditCustomer]=useState(false);
  const [editC,setEditC]=useState(()=>({...app.c,kin:app.c.kin?{...app.c.kin}:{name:'',phone:'',rel:''}}));
  const [editNotes,setEditNotes]=useState(app.notes||'');
  const [newTlTxt,setNewTlTxt]=useState('');
  const saveCustomer=()=>{const c={name:editC.name.trim(),idType:editC.idType||'nid',nid:editC.nid,phone:editC.phone.trim(),addr:editC.addr.trim(),occ:editC.occ,income:+editC.income,kin:{name:editC.kin.name.trim(),phone:editC.kin.phone.trim(),rel:editC.kin.rel}};onUpdate(app.id,{c,tlEntry:{by:user.name,txt:'Customer info updated (superuser)'}});addToast('ok','Customer updated','');setShowEditCustomer(false);};
  const saveNotes=()=>{onUpdate(app.id,{notes:editNotes});addToast('ok','Notes updated','');};
  const addTlEntry=()=>{if(!newTlTxt.trim())return;onUpdate(app.id,{tlEntry:{by:user.name,txt:newTlTxt.trim()}});addToast('ok','Timeline entry added','');setNewTlTxt('');};
  useEffect(()=>{setEditNotes(app.notes||'');},[app.id,app.notes]);

  const approve=async()=>{
    setLd('ap');await sleep(1200);
    onUpdate(app.id,{status:ST.APPROVED,mboDecision:'APPROVED',notes:note,mboReviewedBy:user.name,tlEntry:{by:user.name,txt:'Approved — sales rep to enter IMEI and verify device'}});
    addToast('ok','Application approved','Sales rep notified to proceed with IMEI verification');setLd(null);onBack();
  };
  const reject=async()=>{
    if(!rejReason.trim()){addToast('err','Reason required','Provide a rejection reason');return;}
    setLd('rej');await sleep(700);
    onUpdate(app.id,{status:ST.ARCHIVED,mboDecision:'REJECTED',mboRejectionReason:rejReason,mboReviewedBy:user.name,tlEntry:{by:user.name,txt:`Rejected: ${rejReason}`}});
    addToast('info','Application rejected','Application is now closed');setLd(null);onBack();
  };
  const requestChanges=async()=>{
    if(requestedFields.length===0){addToast('err','Select fields','Select at least one field that needs to be changed');return;}
    if(!note.trim()){addToast('err','Note required','Explain what the rep needs to fix');return;}
    setLd('ch');await sleep(700);
    const ap=app.application||{};
    const reqs=ap.fieldCorrectionRequests||[];
    const added=requestedFields.filter(f=>!reqs.some(r=>r.fieldName===f&&!r.resolvedAt));
    const newReqs=[...reqs,...added.map(fieldName=>({fieldName,reason:note,resolvedAt:null}))];
    onUpdate(app.id,{status:ST.UNDER_REVIEW,notes:note,application:{...ap,fieldCorrectionRequests:newReqs},tlEntry:{by:user.name,txt:`Changes requested (${requestedFields.join(', ')}) — returned to sales rep`}});
    addToast('warn','Changes requested','Application returned to rep for correction');setLd(null);onBack();
  };
  const escalate=async()=>{
    if(!note.trim()){addToast('err','Note required','Explain why you are escalating.');return;}
    setLd('esc');await sleep(700);
    onUpdate(app.id,{status:ST.ESCALATED,notes:note,reviewer:user.name,tlEntry:{by:user.name,txt:`Escalated to ops: ${note}`}});
    addToast('warn','Escalated to ops','Awaiting action from operations team');setLd(null);onBack();
  };

  const opsApprove=async()=>{
    setOpsLd('ap');await sleep(900);
    onUpdate(app.id,{status:ST.APPROVED,mboDecision:'APPROVED',notes:opsNote||app.notes,mboReviewedBy:user.name,tlEntry:{by:user.name,txt:`Escalation resolved — Approved by ops (${user.name})`}});
    addToast('ok','Approved','Sales rep can now proceed with IMEI verification');setOpsLd(null);onBack();
  };
  const opsReturn=async()=>{
    if(!opsNote.trim()){addToast('err','Note required','Explain what the underwriter should do');return;}
    setOpsLd('ret');await sleep(700);
    onUpdate(app.id,{status:ST.PENDING_APPROVAL,notes:opsNote,tlEntry:{by:user.name,txt:`Returned to underwriter queue by ops: ${opsNote}`}});
    addToast('info','Returned to queue','Underwriter will review again');setOpsLd(null);onBack();
  };
  const opsReject=async()=>{
    if(!opsRejReason.trim()){addToast('err','Reason required','Provide a rejection reason');return;}
    setOpsLd('rej');await sleep(700);
    onUpdate(app.id,{status:ST.ARCHIVED,mboDecision:'REJECTED',mboRejectionReason:opsRejReason,mboReviewedBy:user.name,tlEntry:{by:user.name,txt:`Rejected by ops: ${opsRejReason}`}});
    addToast('info','Rejected','Application is now closed');setOpsLd(null);onBack();
  };

  const c=app.c,d=app.dev,tot=d.totalCost||(d.dep+(d.weekly||0)*(d.wks||12));
  const termMonths=d.wks||12;
  const ratio=c.income>0?(d.weekly/c.income*100):0;
  const affordOk=c.income>0&&ratio<30;
  const isUnderwriter=user.role==='underwriter';
  const isRep=user.role==='rep';
  const reviewable=[ST.PENDING_APPROVAL,ST.UNDER_REVIEW].includes(app.status);
  const pendingCorrections=(app.application?.fieldCorrectionRequests||[]).filter(r=>!r.resolvedAt);
  const statusOptions=Object.entries(ST).map(([k,v])=>[v,SM[v]?.label||v]);

  if(showImei){
    return <IMEIFlow app={app} onUpdate={onUpdate} addToast={addToast} onBack={()=>setShowImei(false)}/>;
  }
  return(
    <div className="fadeUp" style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,padding:'28px 32px'}}>
      <div className="detail-header-row" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22,flexWrap:'wrap',gap:12,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12,minWidth:0}}>
          <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>
          <div style={{minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
              <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>{app.id}</span>
              <Badge st={app.status}/>
              {app.upya&&<span style={{fontSize:10,background:'var(--brandPale)',color:'var(--brand2)',padding:'2px 8px',borderRadius:99,fontFamily:'DM Mono,monospace'}}>{app.upya}</span>}
            </div>
            <h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>{c.name}</h1>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
          <div style={{textAlign:'right',fontSize:11,color:'var(--textLight)'}}><div>{fmtD(app.createdAt)} {fmtT(app.createdAt)}</div><div style={{marginTop:2}}>{app.rep}</div></div>
          <Btn v="def" sz="sm" icon="⬇" onClick={()=>{
            const ap=app.application||{};const deal=app.deal||{};
            const tp={total:deal.totalCost||0,dep:deal.upfrontPayment||0,monthly:deal.recurrentPayment||0,disc:deal.discountPct||0,savings:deal.discountPct>0?Math.round(deal.totalCost/(1-deal.discountPct))-deal.totalCost:0,term:deal.termOption||12};
            const term=deal.termOption||12;
            const discLabel=term===3?'Pay off in 3 months (30% early discount)':term===6?'Pay off in 6 months (20% early discount)':'Standard 12 months';
            const contractData={id:app.id,createdAt:app.createdAt,repName:app.rep||'',co:companyInfo||defaultCompanyInfo,f:{name:ap.fullName||'',nid:ap.nationalIdNumber||'',idType:ap.idType||'nid',phone:ap.phoneNumber||'',addr:ap.address||'',occ:ap.employmentType||'',income:ap.monthlyIncomeRwf||0,kn:ap.guarantorName||'',kp:ap.guarantorPhone||'',kr:'',customerPhoto:ap.customerPhoto,idPhoto:ap.idPhoto},dev:{brand:deal.manufacturer||'',model:deal.deviceModel||'',ram:deal.RAM||'',rom:deal.ROM||'',retail:deal.cogs||0,markupRate:deal.markupRate||0},term,pricing:tp,date:new Date(app.createdAt||Date.now()).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}),discLabel,app:{fullName:ap.fullName||'',nationalIdNumber:ap.nationalIdNumber||'',idType:ap.idType||'nid',phoneNumber:ap.phoneNumber||'',address:ap.address||'',employmentType:ap.employmentType||'',monthlyIncomeRwf:ap.monthlyIncomeRwf||0,guarantorName:ap.guarantorName||'',guarantorPhone:ap.guarantorPhone||'',customerPhoto:ap.customerPhoto,idPhoto:ap.idPhoto},deal};
            generateContractPDF(contractData,companyInfo||defaultCompanyInfo,ap.customerSignature||null);
          }}>Download contract PDF</Btn>
        </div>
      </div>
      <div style={{flex:1,overflow:'auto',minHeight:0}}>
      <div className="detail-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <Card sx={{padding:'16px 18px'}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:13}}>Customer</div>
          {(isUnderwriter&&reviewable?[

            {(isUnderwriter&&reviewable?[
              ['device_id','Device',`${d.brand} ${d.model}`],['dep','Deposit',fmtRWF(d.dep)],['weekly',`Monthly × ${termMonths}`,fmtRWF(d.weekly)],['tot','Total price',fmtRWF(tot)]
            ]:[['Deposit',fmtRWF(d.dep)],[`Monthly × ${termMonths}`,fmtRWF(d.weekly)],['Total price',fmtRWF(tot)]]).map((arr)=>{

.p,kin:{...p.kin,name:ev.target.value}}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Phone"><input value={editC.kin.phone} onChange={ev=>setEditC(p=>({...p,kin:{...p.kin,phone:ev.target.value}}))} style={{padding:'6px 10px',width:'100%'}}/></FF><FF label="Relationship"><select value={editC.kin.rel} onChange={ev=>setEditC(p=>({...p,kin:{...p.kin,rel:ev.target.value}}))}><option value="">Select</option>{RELS.map(r=><option key={r} value={r}>{r}</option>)}</select></FF></div><Btn onClick={saveCustomer} v="ok" sz="sm" style={{marginTop:10}}>Save customer</Btn></div>)}</div>
            {devices&&devices.length>0&&<div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Change device</label><select value={app.dev?.id} onChange={ev=>{const dev=(devices||[]).find(d=>d.id===ev.target.value);if(dev){onUpdate(app.id,{dev,tlEntry:{by:user.name,txt:`Device changed to ${dev.brand} ${dev.model} (superuser)`}});addToast('ok','Device updated','');}}} style={{padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid var(--border)',minWidth:200}}>{(devices||[]).map(d=> <option key={d.id} value={d.id}>{d.brand} {d.model} — {d.sku}</option>)}</select></div>}
            <div><label style={{fontSize:11,fontWeight:600,color:'var(--textMid)',display:'block',marginBottom:6}}>Add timeline entry</label><div style={{display:'flex',gap:8,alignItems:'center'}}><input value={newTlTxt} onChange={ev=>setNewTlTxt(ev.target.value)} placeholder="e.g. Data correction applied" style={{flex:1,padding:'8px 12px',borderRadius:'var(--r2)',border:'1.5px solid var(--border)'}}/><Btn onClick={addTlEntry} v="def" sz="sm" disabled={!newTlTxt.trim()}>Add</Btn></div></div>
          </div>
        </Card>
      )}
      {/* Draft — action for rep */}
      {isRep&&app.status===ST.DRAFT&&(
        <Card sx={{padding:'18px',marginBottom:14,background:'var(--infoBg)',border:'2px solid var(--infoBorder)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--info)',marginBottom:6}}>📝 Draft application</div>
          <div style={{fontSize:12,color:'var(--textMid)',marginBottom:14}}>This application was saved as a draft. Review the details and submit for underwriter review when ready.</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <Btn onClick={()=>{onUpdate(app.id,{status:ST.PENDING_APPROVAL,tlEntry:{by:user.name,txt:'Draft submitted for approval'}});addToast('ok','Submitted','Sent to underwriter for review');onBack();}} v="primary" icon="→">Submit for review</Btn>
            <Btn onClick={()=>{onUpdate(app.id,{status:ST.ARCHIVED,tlEntry:{by:user.name,txt:'Draft deleted'}});addToast('info','Draft deleted','');onBack();}} v="ghost" icon="✕">Delete draft</Btn>
          </div>
        </Card>
      )}
      {/* Rejection notice for rep */}
      {isRep&&app.mboDecision==='REJECTED'&&(
        <Card sx={{padding:'14px 16px',marginBottom:14,background:'var(--errBg)',border:'2px solid var(--errBorder)'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--err)',marginBottom:5}}>✕ Application rejected</div>
          <div style={{fontSize:12,color:'var(--err)',marginBottom:4}}>This application was rejected and cannot be resubmitted.</div>
          {app.mboRejectionReason&&<div style={{fontSize:12,color:'var(--err)',fontStyle:'italic'}}>Reason: {app.mboRejectionReason}</div>}
        </Card>
      )}
      {/* Changes requested — banner for rep */}
      {isRep&&app.status===ST.UNDER_REVIEW&&pendingCorrections.length>0&&(
        <Card sx={{padding:'14px 16px',marginBottom:14,background:'var(--warnBg)',border:'2px solid var(--warnBorder)'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--warn)',marginBottom:5}}>↩ Changes requested by underwriter</div>
          {app.notes&&<div style={{fontSize:12,color:'var(--warn)',marginBottom:10,fontStyle:'italic'}}>"{app.notes}"</div>}
          <div style={{fontSize:11,fontWeight:600,color:'var(--warn)',marginBottom:6}}>Fields to correct:</div>
          <ul style={{margin:0,paddingLeft:18}}>
            {pendingCorrections.map((r,i)=><li key={i} style={{fontSize:12,color:'var(--warn)',marginBottom:3}}><strong>{r.fieldName}</strong>{r.reason&&r.reason!==app.notes?` — ${r.reason}`:''}</li>)}
          </ul>
          <div style={{marginTop:12,fontSize:11,color:'var(--textMid)'}}>Use <strong>Edit &amp; resubmit</strong> from your application list to make corrections and send back for review.</div>
        </Card>
      )}
      {/* Approved — IMEI entry / retry action for rep */}
      {isRep&&app.status===ST.APPROVED&&(
        <Card sx={{padding:'18px',marginBottom:14,background:'var(--okBg)',border:'2px solid var(--okBorder)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--ok)',marginBottom:6}}>✓ Application approved — action required</div>
          {app.imei
            ? <div style={{fontSize:12,color:'var(--textMid)',marginBottom:14}}>Previous IMEI <span style={{fontFamily:'DM Mono,monospace',fontWeight:600}}>{app.imei}</span> was checked but not fully confirmed. You can retry with the same or a different IMEI.</div>
            : <div style={{fontSize:12,color:'var(--textMid)',marginBottom:14}}>Enter the device IMEI and verify it on Carlcare to proceed to contract activation.</div>
          }
          <Btn onClick={()=>setShowImei(true)} v="ok" icon="→">{app.imei?'Retry IMEI verification':'Enter IMEI & verify device'}</Btn>
        </Card>
      )}
      {/* Lock pending — reminder */}
      {isRep&&app.status===ST.LOCK_PENDING&&(
        <Card sx={{padding:'14px 16px',marginBottom:14,background:'var(--warnBg)',border:'2px solid var(--warnBorder)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--warn)',marginBottom:6}}>⏳ Lock phone in PayTrigger</div>
          <div style={{fontSize:12,color:'var(--textMid)',marginBottom:10}}>IMEI verified. Lock the phone in PayTrigger to activate the contract.</div>
          <Btn onClick={()=>setShowImei(true)} v="warn" icon="→">Continue IMEI / lock flow</Btn>
        </Card>
      )}
      {/* Escalated — ops action panel */}
      {isSuperuser&&app.status===ST.ESCALATED&&(
        <Card sx={{padding:18,marginBottom:14,border:'2px solid var(--purBorder)',background:'var(--purBg)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4,color:'var(--pur)'}}>↑ Escalated — ops action required</div>
          <div style={{fontSize:11,color:'var(--textMid)',marginBottom:10}}>This application was escalated by the underwriter. Review the details and take action below.</div>
          {app.notes&&<div style={{fontSize:12,color:'var(--pur)',marginBottom:14,padding:'8px 12px',background:'var(--purBg2,rgba(124,58,237,0.07))',borderRadius:'var(--r2)',fontStyle:'italic'}}>Underwriter note: "{app.notes}"</div>}
          <FF label="Ops note (required for Return to queue or Reject)"><textarea value={opsNote} onChange={ev=>setOpsNote(ev.target.value)} placeholder="Add your note or decision..." rows={2}/></FF>
          <div style={{display:'flex',gap:8,marginTop:11,flexWrap:'wrap'}}>
            <Btn onClick={opsApprove} v="ok" loading={opsLd==='ap'} icon="✓">Approve</Btn>
            <Btn onClick={opsReturn} v="warn" loading={opsLd==='ret'} icon="↩" disabled={!opsNote.trim()}>Return to underwriter</Btn>
            <Btn onClick={()=>setShowOpsRej(p=>!p)} v="err" icon="✕">Reject</Btn>
          </div>
          {showOpsRej&&(
            <div style={{marginTop:12,padding:'13px 15px',background:'var(--errBg)',border:'1px solid var(--errBorder)',borderRadius:'var(--r2)'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--err)',marginBottom:7}}>Rejection reason (required) — this is permanent</div>
              <textarea value={opsRejReason} onChange={ev=>setOpsRejReason(ev.target.value)} placeholder="Explain why..." rows={2} style={{borderColor:'var(--errBorder)'}}/>
              <div style={{marginTop:9,display:'flex',gap:8}}><Btn onClick={opsReject} v="err" loading={opsLd==='rej'} disabled={!opsRejReason.trim()}>Confirm rejection</Btn><Btn onClick={()=>setShowOpsRej(false)} v="ghost" sz="sm">Cancel</Btn></div>
            </div>
          )}
        </Card>
      )}
      {app.notes&&!isRep&&!isUnderwriter&&!isSuperuser&&<Card sx={{padding:'13px 16px',marginBottom:14,background:'var(--warnBg)',border:'1px solid var(--warnBorder)'}}><div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--warn)',marginBottom:4}}>Underwriter notes</div><div style={{fontSize:12,color:'var(--warn)'}}>{app.notes}</div></Card>}
      {app.notes&&isSuperuser&&app.status!==ST.ESCALATED&&<Card sx={{padding:'13px 16px',marginBottom:14,background:'var(--warnBg)',border:'1px solid var(--warnBorder)'}}><div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--warn)',marginBottom:4}}>Notes</div><div style={{fontSize:12,color:'var(--warn)'}}>{app.notes}</div></Card>}
      <Card sx={{padding:'16px 18px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>Activity timeline</div>
        {(app.tl||[]).map((t,i)=>(
          <div key={i} style={{display:'flex',gap:12,marginBottom:12,alignItems:'flex-start'}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,paddingTop:3}}>
              <div style={{width:8,height:8,borderRadius:4,background:i===0?'var(--brand3)':'var(--border)',border:`2px solid ${i===0?'var(--brand)':'var(--borderMed)'}`}}/>
              {i<(app.tl||[]).length-1&&<div style={{width:1,flex:1,minHeight:18,background:'var(--border)',marginTop:3}}/>}
            </div>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{t.txt}</div><div style={{fontSize:11,color:'var(--textLight)',marginTop:1}}>{t.by} · {fmtD(t.at)} at {fmtT(t.at)}</div></div>
          </div>
        ))}
      </Card>
      </div>
    </div>
  );
};

// ── SALES REP VIEW ────────────────────────────────────────────
const SalesRepView=({apps,onUpdate,addToast,devices,pricingConfig})=>{
  const {user}=useContext(Ctx);
  const [pg,setPg]=useState('dash');
  const [sel,setSel]=useState(null);
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);
  const [preselDev,setPreselDev]=useState(null);
  const cfg=pricingConfig||defaultPricingConfig;
  const devicesWithPricing=React.useMemo(()=>(devices||[]).map(d=>{const deal=calcDealFromDevice(d,cfg);return{...d,...deal,dep:deal.upfrontPayment,weekly:deal.recurrentPayment,wks:deal.termOption,retail:deal.cogs};}),[devices,cfg]);
  const mine=apps.filter(a=>a.repId===user.id&&(!user.merchantCode||a.merchantCode===user.merchantCode));
  const grps={
    drafts:mine.filter(a=>a.status===ST.DRAFT),
    imei:mine.filter(a=>a.status===ST.APPROVED||a.status===ST.LOCK_PENDING),
    changes:mine.filter(a=>a.status===ST.UNDER_REVIEW&&(a.application?.fieldCorrectionRequests||[]).some(r=>!r.resolvedAt)),
    review:mine.filter(a=>a.status===ST.PENDING_APPROVAL),
    active:mine.filter(a=>a.status===ST.ACTIVE),
    closed:mine.filter(a=>(a.mboDecision==='REJECTED'||a.status===ST.ARCHIVED)&&a.status!==ST.DRAFT),
  };

// ── UNDERWRITER VIEW ──────────────────────────────────────────
const UnderwriterView=({apps,onUpdate,addToast})=>{
  const {user}=useContext(Ctx);
  const [pg,setPg]=useState('dash');
  const [sel,setSel]=useState(null);
  const [q,setQ]=useState('');
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);
  const sidebarProps={page:pg,setPage:p=>{setPg(p);setSel(null)},apps,open:mobileMenuOpen,onClose:()=>setMobileMenuOpen(false),onOpen:()=>setMobileMenuOpen(true)};
  const goHome=()=>{setPg('dash');setSel(null);};
  const HomeBtn=()=><button type="button" onClick={goHome} style={{padding:'6px 12px',fontSize:12,fontWeight:600,color:'var(--brand2)',background:'var(--brandPale)',border:'1px solid var(--brandPale2)',borderRadius:'var(--r2)',cursor:'pointer',whiteSpace:'nowrap'}}>Home</button>;

  if(sel){
    const app=apps.find(a=>a.id===sel);
    if(app) return <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}><Sidebar {...sidebarProps}/><div className="app-main" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}><TopBar onMenu={()=>setMobileMenuOpen(true)} homeBtn={<HomeBtn/>} title={APP_NAME}/><div className="page-content main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0,padding:'28px 32px'}}><AppDetail app={app} onUpdate={onUpdate} addToast={addToast} onBack={()=>setSel(null)}/></div></div></div>;
  }

  const merchantCodes=(user&&user.merchantCodes)||[];
  const queue=apps.filter(a=>[ST.PENDING_APPROVAL,ST.UNDER_REVIEW].includes(a.status)&&(!merchantCodes.length||merchantCodes.includes(a.merchantCode)));
  const escalated=apps.filter(a=>a.status===ST.ESCALATED&&(!merchantCodes.length||merchantCodes.includes(a.merchantCode)));
  const archived=apps.filter(a=>a.status===ST.ARCHIVED&&(!merchantCodes.length||merchantCodes.includes(a.merchantCode)));
  const all=apps.filter(a=>{if(!q.trim())return true;const s=q.toLowerCase();return (a.c&&a.c.name||'').toLowerCase().includes(s)||(a.id||'').toLowerCase().includes(s);});
  const pendingCount=queue.length+escalated.length;

  return(
    <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}>
      <Sidebar {...sidebarProps}/>
      <div className="app-main main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}>
        <TopBar onMenu={()=>setMobileMenuOpen(true)} homeBtn={<HomeBtn/>} title={pg==='dash'?'Home':pg==='queue'?'Review queue':'All applications'}/>
        {pg==='dash'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{marginBottom:24,textAlign:'center'}}><h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>Underwriter</h1><p style={{fontSize:13,color:'var(--textMid)',marginTop:4}}>What would you like to do?</p></div>
            <div className="home-actions">
              <button type="button" className="home-action-btn" style={{background:'var(--brand)',color:'white',borderColor:'var(--brand2)'}} onClick={()=>setPg('queue')}>📋 Review queue {pendingCount>0&&<span style={{background:'rgba(255,255,255,0.25)',fontSize:13,padding:'2px 10px',borderRadius:99,marginLeft:8}}>{pendingCount}</span>}</button>
              <button type="button" className="home-action-btn" style={{background:'var(--surface)',color:'var(--text)',borderColor:'var(--border)',boxShadow:'var(--sh)'}} onClick={()=>setPg('all')}>📄 All applications</button>
            </div>
          </div>
        )}
        {pg==='queue'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}><Btn onClick={()=>setPg('dash')} v="ghost" icon="←" sz="sm">Back</Btn><div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>Review queue</h1><p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>{pendingCount} application{pendingCount!==1?'s':''} awaiting attention</p></div></div>
            {queue.length>0&&(
              <div style={{marginBottom:24}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Pending decision <span style={{background:'var(--warnBg)',color:'var(--warn)',padding:'1px 7px',borderRadius:99}}>{queue.length}</span></div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {queue.map(a=>{
                    const tot=a.dev?(a.dev.totalCost||(a.dev.dep||0)+(a.dev.weekly||0)*12):0;
                    const repFirst=(a.repName||a.rep||'').split(' ')[0];
                    const hasPendingChanges=a.status===ST.UNDER_REVIEW&&(a.application?.fieldCorrectionRequests||[]).some(r=>!r.resolvedAt);
                    return (
                    <div key={a.id} onClick={()=>setSel(a.id)} style={{background:'white',border:`1.5px solid ${hasPendingChanges?'var(--warnBorder)':'var(--border)'}`,borderRadius:'var(--r)',padding:'13px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'all .13s'}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--brand2)';e.currentTarget.style.boxShadow='0 2px 10px rgba(11,61,46,0.1)'}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor=hasPendingChanges?'var(--warnBorder)':'var(--border)';e.currentTarget.style.boxShadow='none'}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:14}}>{a.c?a.c.name:''}</div>
                        <div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{a.dev?a.dev.brand:''} {a.dev?a.dev.model:''} · {a.dev?fmtRWF(tot):'—'} total · {fmtD(a.createdAt)} · {repFirst}</div>
                        {hasPendingChanges&&<div style={{fontSize:10,color:'var(--warn)',marginTop:3,fontWeight:600}}>↩ Changes sent — awaiting rep resubmission</div>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:10}}><Badge st={a.status}/><span style={{color:'var(--textLight)',fontSize:18}}>›</span></div>
                    </div>
                  );})}
                </div>
              </div>
            )}
            {escalated.length>0&&(
              <div style={{marginBottom:24}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--pur)',marginBottom:10}}>↑ Escalated to ops <span style={{background:'var(--purBg)',color:'var(--pur)',padding:'1px 7px',borderRadius:99}}>{escalated.length}</span></div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>{escalated.map(a=>(
                  <div key={a.id} onClick={()=>setSel(a.id)} style={{background:'var(--purBg)',border:'1.5px solid var(--purBorder)',borderRadius:'var(--r)',padding:'13px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div><div style={{fontWeight:600,fontSize:14}}>{a.c?a.c.name:''}</div><div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{a.dev?a.dev.brand:''} {a.dev?a.dev.model:''} · awaiting ops decision</div></div>
                    <div style={{display:'flex',alignItems:'center',gap:10}}><Badge st={a.status}/><span style={{color:'var(--textLight)',fontSize:18}}>›</span></div>
                  </div>
                ))}</div>
              </div>
            )}
            {queue.length===0&&escalated.length===0&&<Empty ico="✅" title="Queue is clear" sub="All applications have been reviewed"/>}
          </div>
        )}
        {pg==='all'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}><Btn onClick={()=>setPg('dash')} v="ghost" icon="←" sz="sm">Back</Btn><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>All applications</h1></div>
            <input value={q} onChange={ev=>setQ(ev.target.value)} placeholder="Search by name or ID…" style={{maxWidth:320,marginBottom:16,width:'100%'}}/>
            <div style={{fontSize:11,color:'var(--textLight)',marginBottom:10}}>{all.length} result{all.length!==1?'s':''}</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>{all.map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div>
            {all.length===0&&<Empty ico="🔍" title="No results"/>}
          </div>
        )}
      </div>
    </div>
  );
};
