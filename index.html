<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cleva Credit — Empowering access</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand — Royal Blue */
  --brand:#1E3A8A;--brand2:#1D4ED8;--brand3:#93C5FD;--brandPale:#EFF6FF;--brandPale2:#DBEAFE;
  /* Accent — Warm Amber */
  --accent:#F59E0B;
  /* Backgrounds */
  --bg:#F0F4FF;--surface:#FFFFFF;
  /* Borders */
  --border:rgba(15,23,42,0.10);--borderMed:rgba(15,23,42,0.18);
  /* Text */
  --text:#0F172A;--textMid:#334155;--textLight:#94A3B8;
  /* Status */
  --ok:#16A34A;--okBg:#F0FDF4;--okBorder:#86EFAC;
  --warn:#D97706;--warnBg:#FFFBEB;--warnBorder:#FCD34D;
  --err:#DC2626;--errBg:#FEF2F2;--errBorder:#FCA5A5;
  --info:#2563EB;--infoBg:#EFF6FF;--infoBorder:#BFDBFE;
  --pur:#7C3AED;--purBg:#F5F3FF;--purBorder:#DDD6FE;
  --r:10px;--r2:6px;
  --sh:0 1px 3px rgba(15,23,42,0.08),0 1px 2px rgba(15,23,42,0.04);
  --sh2:0 4px 16px rgba(15,23,42,0.12),0 1px 4px rgba(15,23,42,0.06);
}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;line-height:1.5}
input,select,textarea,button{font-family:'DM Sans',sans-serif;font-size:14px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r2);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand2);box-shadow:0 0 0 3px rgba(37,99,235,0.12)}
input.err,select.err{border-color:var(--err)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(15,23,42,0.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(37,99,235,0.35)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp .22s ease}
.slideRight{animation:slideRight .2s ease}
.spin{animation:spin .7s linear infinite}
.logo-brand-text{background:linear-gradient(90deg,#2ADBD2 0%,#5B4DD4 45%,#9740DB 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-family:'DM Sans',-apple-system,sans-serif;letter-spacing:-0.02em}

/* Mobile: touch-friendly and safe area */
@media (max-width:768px){
  body{font-size:15px;-webkit-tap-highlight-color:transparent}
  input,select,textarea,button{font-size:16px}
  button,.btn-touch{min-height:44px;min-width:44px}
}
@media (max-width:480px){
  body{font-size:14px}
}
/* Smooth scroll on iOS */
.main-scroll{-webkit-overflow-scrolling:touch}
/* Login: compact on small screens */
@media (max-width:480px){
  .login-wrap{padding:16px!important}
  .login-card{padding:20px 18px!important}
}

/* Sidebar: fixed size, no scroll; hamburger collapse on desktop; overlay on mobile */
.app-layout{display:flex;min-height:100vh;height:100vh;overflow:hidden}
.app-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.sidebar-wrapper{flex-shrink:0;height:100vh;overflow:hidden;display:flex;transition:width .22s ease}
.sidebar-backdrop{display:none}
.sidebar-collapsed-bar{display:none;width:52px;height:100vh;background:linear-gradient(180deg,#1E3A8A 0%,#1D4ED8 100%);flex-direction:column;align-items:center;padding-top:14px;border-right:1px solid rgba(255,255,255,0.08)}
.sidebar-collapsed-bar .hamburger-desk{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);border:none;border-radius:var(--r2);color:white;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sidebar-drawer{width:210px;height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#1E3A8A 0%,#1D4ED8 100%);flex-shrink:0;overflow:hidden}
.sidebar-drawer .sidebar-nav{flex:1;overflow-y:auto;padding:10px;min-height:0}
@media (min-width:769px){
  .sidebar-wrapper{width:52px}
  .sidebar-wrapper.desktop-collapsed{width:52px}
  .sidebar-wrapper.desktop-collapsed .sidebar-drawer{display:none}
  .sidebar-wrapper.desktop-collapsed .sidebar-collapsed-bar{display:flex}
  .sidebar-wrapper.desktop-expanded{width:210px}
  .sidebar-wrapper.desktop-expanded .sidebar-collapsed-bar{display:none}
  .sidebar-wrapper.desktop-expanded .sidebar-drawer{display:flex}
}
.sidebar-drawer .sidebar-collapse-btn{width:100%;padding:10px 14px;border:none;background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;text-align:left;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-drawer .sidebar-collapse-btn:hover{background:rgba(255,255,255,0.06);color:white}
@media (max-width:768px){
  .sidebar-wrapper{width:0!important;min-width:0}
  .sidebar-wrapper .sidebar-collapsed-bar{display:none!important}
  .sidebar-wrapper .sidebar-drawer{position:fixed;left:0;top:0;bottom:0;height:100vh;height:100dvh;max-height:100vh;width:260px;max-width:85vw;z-index:1001;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,0.15);padding-top:env(safe-area-inset-top)}
  .sidebar-wrapper .sidebar-drawer.mobile-open{transform:translateX(0)}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
  .sidebar-backdrop.visible{opacity:1;pointer-events:auto}
}
@media (min-width:769px){
  .sidebar-wrapper.desktop-expanded .sidebar-drawer .sidebar-collapse-btn{display:flex}
}
@media (max-width:768px){
  .sidebar-drawer .sidebar-collapse-btn{display:none}
}

/* Mobile header (hamburger + title) – fixed height, always visible on scroll */
.mobile-header{display:none;align-items:center;gap:12px;padding:12px 16px;padding-left:calc(16px + env(safe-area-inset-left));background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0}
.mobile-header .hamburger{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;color:var(--text);-webkit-tap-highlight-color:transparent}
@media (max-width:768px){
  .mobile-header{display:flex;position:sticky;top:0;z-index:50;min-height:56px;box-sizing:border-box}
  .app-main{overflow:auto;-webkit-overflow-scrolling:touch}
  .mobile-header .hamburger{min-height:44px!important;height:44px}
  .app-main button{min-height:44px!important}
}

/* Top bar – always visible on all screen sizes (used by Sales & Underwriter views) */
.top-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;padding-left:calc(16px + env(safe-area-inset-left));background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:50;min-height:52px;box-sizing:border-box}
.top-bar .hamburger{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;color:var(--text);-webkit-tap-highlight-color:transparent;flex-shrink:0}
.menu-bars{width:22px;display:flex;flex-direction:column;gap:5px}
.menu-bars span{display:block;height:3.5px;border-radius:4px;background:currentColor;width:100%}
.sidebar-collapsed-bar .menu-bars{width:20px;gap:4px}
.sidebar-collapsed-bar .menu-bars span{height:3px}
@media (min-width:769px){.top-bar .hamburger{display:none!important}}
@media (max-width:768px){.top-bar{min-height:56px}.top-bar .hamburger{width:44px;height:44px}.top-bar .lang-toggle-text{display:none}.top-bar .lang-toggle-btn{padding:6px 10px}}

/* Page content padding on mobile */
@media (max-width:768px){
  .page-content{padding:16px 14px 24px!important}
  .page-content h1{font-size:18px!important}
}
@media (max-width:480px){.page-content{padding:14px 12px 20px!important}}

/* New application: full-page form layout */
.new-app-fullpage{height:100%;min-height:0}
.new-app-form{box-sizing:border-box}
.new-app-form header .step-connector{flex:1;max-width:40px}
@media (max-width:640px){
  .new-app-form .new-app-step-label{display:none!important}
}
/* On mobile, new-app-fullpage is a true full-screen overlay (no nested-tab look) */
@media (max-width:768px){
  .new-app-fullpage{position:fixed;inset:0;z-index:200;background:var(--bg);overflow:hidden;padding-top:env(safe-area-inset-top);height:100dvh!important;}
  .new-app-form{padding:0!important;}
  .new-app-scroll-body{padding:0!important;-webkit-overflow-scrolling:touch;}
}

/* Stats grids: single column on mobile */
@media (max-width:768px){
  .stats-grid-4{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  .stats-grid-3{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
}
@media (max-width:400px){
  .stats-grid-4,.stats-grid-3{grid-template-columns:1fr!important}
}

/* Cards / detail grids: stack on mobile */
@media (max-width:768px){
  .detail-grid-2{grid-template-columns:1fr!important;gap:12px!important}
  .form-grid-2{grid-template-columns:1fr!important}
  .form-grid-3{grid-template-columns:1fr!important}
  .step-row{flex-wrap:wrap;gap:8px!important}
  .step-row .step-connector{display:none!important}
}

/* Price list & device grids */
@media (max-width:768px){
  .price-grid{grid-template-columns:1fr!important}
  .device-select-grid{grid-template-columns:1fr!important}
}

/* Toast on mobile: full width, bottom, safe area */
@media (max-width:768px){
  .toast-container{top:auto!important;bottom:calc(16px + env(safe-area-inset-bottom))!important;left:calc(12px + env(safe-area-inset-left))!important;right:calc(12px + env(safe-area-inset-right))!important;min-width:auto!important;max-width:none!important}
}

/* Admin two-column → single column */
@media (max-width:768px){
  .admin-two-col{grid-template-columns:1fr!important}
}

/* Application cards: stack meta on small screens */
@media (max-width:480px){
  .app-card-meta{flex-wrap:wrap!important}
}

/* ── Underwriter review layout ─────────────────────────────── */
.uw-shell{display:flex;flex-direction:column;flex:1;min-height:0;height:100%}
.uw-header{flex-shrink:0;border-bottom:1.5px solid var(--border);background:var(--surface)}
.uw-body{flex:1;overflow:auto;min-height:0;-webkit-overflow-scrolling:touch}
.uw-footer{flex-shrink:0;border-top:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.uw-declaration{margin-top:22px;padding:16px 20px;border:2px solid var(--brand3);border-radius:var(--r);background:var(--brandPale)}
.uw-decl-unchecked{border-color:var(--border);background:white}
.uw-declaration label{display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.uw-declaration input[type="checkbox"]{margin-top:3px;width:16px;height:16px;accent-color:var(--brand);flex-shrink:0}
.uw-decl-text{flex:1;min-width:0}
.uw-decl-title{font-weight:800;font-size:13px;margin-bottom:3px;line-height:1.25;word-break:break-word}
.uw-decl-desc{font-size:12px;color:var(--textMid);line-height:1.5;word-break:break-word}

/* Desktop: spacious layout, clear sections */
@media (min-width:769px){
  .uw-header{padding:20px 32px 18px}
  .uw-body{padding:32px 40px 140px}
  .uw-footer{padding:16px 32px;gap:12px}
  .uw-content{max-width:880px;margin:0 auto}
  .uw-content h2{font-size:18px;font-weight:800;margin-bottom:6px;letter-spacing:-0.2px}
  .uw-content .uw-intro{font-size:13px;color:var(--textMid);margin-bottom:28px;line-height:1.6}
  .uw-steps{display:flex;align-items:center;gap:0;margin-top:18px;overflow-x:auto;padding-bottom:2px}
  .uw-step-label{font-size:13px;white-space:nowrap}
  .uw-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:24px 28px;margin-bottom:24px}
  .uw-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--textLight);margin-bottom:16px}
  .uw-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .uw-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
  .uw-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .uw-fld{padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid rgba(0,0,0,0.06)}
  .uw-fld-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--textLight);margin-bottom:4px}
  .uw-fld-val{font-size:14px}
  .uw-docs-grid{display:grid;grid-template-columns:1fr 1.8fr;gap:24px}
  .uw-doc-block{margin-bottom:24px}
  .uw-afford{padding:22px 24px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r)}
  .uw-afford-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
}

/* Mobile: stacked, touch-friendly */
@media (max-width:768px){
  .uw-header{padding:14px 16px 14px}
  .uw-body{padding:20px 16px 120px}
  .uw-footer{padding:14px 16px;gap:10px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
  .uw-content{max-width:none}
  .uw-content h2{font-size:17px;font-weight:800;margin-bottom:6px}
  .uw-content .uw-intro{font-size:12px;color:var(--textMid);margin-bottom:20px;line-height:1.55}
  .uw-steps{display:flex;align-items:center;gap:0;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;padding-right:4px}
  .uw-step-label{display:none}
  .uw-section{padding:18px 16px;margin-bottom:18px}
  .uw-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--textLight);margin-bottom:12px}
  .uw-grid-2,.uw-grid-3,.uw-docs-grid{grid-template-columns:1fr!important;gap:14px}
  .uw-stats{grid-template-columns:1fr 1fr!important;gap:10px}
  .uw-fld{padding-bottom:10px;margin-bottom:10px}
  .uw-docs-grid{grid-template-columns:1fr!important;gap:18px}
  .uw-doc-block{margin-bottom:18px}
  .uw-afford{padding:16px 18px}
  .uw-afford-stats{grid-template-columns:1fr 1fr!important;gap:10px}
  .uw-declaration{margin-top:20px;padding:14px 16px}
  .uw-footer button{min-height:44px}
  .uw-decl-title{font-size:12px}
  .uw-decl-desc{font-size:12px}
}
@media (max-width:480px){
  .uw-body{padding:16px 14px 110px}
  .uw-stats{grid-template-columns:1fr!important}
  .uw-afford-stats{grid-template-columns:1fr!important}
}

/* Home action buttons (first page – big, touch-friendly) */
.home-actions{display:flex;flex-direction:column;gap:12px;max-width:400px;margin:0 auto}
.home-action-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:18px 24px;min-height:56px;font-size:16px;font-weight:600;border-radius:var(--r);border:2px solid transparent;cursor:pointer;transition:all .15s;text-align:center;text-decoration:none;color:inherit;box-sizing:border-box}
.home-action-btn:active{transform:scale(0.98)}
@media (max-width:768px){
  .home-actions{max-width:none;gap:10px;padding:0 4px}
  .home-action-btn{min-height:52px;padding:16px 20px;font-size:15px;-webkit-tap-highlight-color:transparent}
}
/* IMEI row: stack input and button on mobile */
@media (max-width:480px){
  .imei-row{flex-direction:column!important;align-items:stretch!important}
  .imei-row .btn-wrap{width:100%!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useContext,createContext,useEffect}=React;

// ── APP CONFIG ────────────────────────────────────────────────
const APP_NAME='Cleva Credit';
const APP_SLOGAN='Empowering access';
const LOGO_URL='assets/logo.png';
const EMAIL_DOMAIN='leout.rw';
const LS={MERCHANTS:'cleva_merchants_v1',MERCHANT_GROUPS:'cleva_merchant_groups_v1',SHOPS:'cleva_shops_v1',USERS:'cleva_users_v1',CONTRACTS:'cleva_contracts_v1',DEVICES:'cleva_devices_v1',PRICING_CONFIG:'cleva_pricing_config_v1',AUDIT_LOG:'cleva_audit_log_v1',COMPANY:'cleva_company_v1',EMAIL_TPL:'cleva_email_tpl_v1'};
const defaultCompanyInfo={name:'Cleva Financial Services Ltd',tagline:'Empowering access',address:'KG 15 Avenue, Kigali, Rwanda',phone:'+250 788 000 000',email:'info@clevapaygo.rw',website:'www.clevapaygo.rw',regNo:'RDB/2024/CL001',logo:LOGO_URL,signatoryName:'',signatoryTitle:'Authorised Signatory',signatorySig:null,imeiProxyUrl:''};
const readLS=(k,fallback)=>{try{const raw=localStorage.getItem(k);return raw?JSON.parse(raw):fallback;}catch{return fallback;}};
const writeLS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const normEmail=s=>(s||'').trim().toLowerCase();
const randPwd=()=>Math.random().toString(36).slice(2,6)+Math.random().toString(36).slice(2,6);

// ── EMAIL CONFIG (EmailJS) ────────────────────────────────────
// 1. Sign up free at https://emailjs.com
// 2. Add Zoho SMTP service (smtp.zoho.com, port 465, SSL)
// 3. Create ONE generic template with To={{to_email}}, Subject={{subject}}, Body={{message}}
// 4. Paste the template ID into EMAIL_CFG.templateId below
// Templates are editable live in the app: Admin → Email templates
const EMAIL_CFG={
  publicKey:'y_JAXxc3Ge2P4v9Bi',
  serviceId:'service_ox9fg2c',
  templateId:'template_puh4i31',
};
const EMAIL_TPL_KEYS=['welcome','tempPwd','submitted','approved','rejected','changes','escalated'];
const DEFAULT_EMAIL_TPLS={
  welcome:{
    label:'New user welcome',
    vars:'{{to_name}}, {{to_email}}, {{temp_password}}, {{role}}, {{must_change}}, {{login_url}}',
    subject:'Welcome to Cleva — Your login details',
    body:`Hi {{to_name}},\n\nYour Cleva account has been created.\n\nRole: {{role}}\nLogin: {{to_email}}\nPassword: {{temp_password}}\n{{must_change}}\n\nLog in here: {{login_url}}\n\n— Cleva Financial Services\nEmpowering access`,
  },
  tempPwd:{
    label:'Password reset',
    vars:'{{to_name}}, {{to_email}}, {{temp_password}}, {{login_url}}',
    subject:'Cleva — Your temporary password',
    body:`Hi {{to_name}},\n\nYour password was reset by an administrator.\n\nNew temporary password: {{temp_password}}\n\nPlease log in and change it immediately.\n\nLog in here: {{login_url}}\n\n— Cleva Financial Services\nEmpowering access`,
  },
  submitted:{
    label:'Application submitted',
    vars:'{{to_name}}, {{rep_name}}, {{customer_name}}, {{app_id}}',
    subject:'New application pending review — {{customer_name}}',
    body:`Hi {{to_name}},\n\nA new application is waiting for your review.\n\nCustomer: {{customer_name}}\nApplication ID: {{app_id}}\nSubmitted by: {{rep_name}}\n\nPlease log in to review it.\n\n— Cleva Financial Services\nEmpowering access`,
  },
  approved:{
    label:'Application approved',
    vars:'{{to_name}}, {{customer_name}}, {{app_id}}, {{reviewer_name}}',
    subject:'Application approved — {{customer_name}}',
    body:`Hi {{to_name}},\n\nGood news — the following application has been approved.\n\nCustomer: {{customer_name}}\nApplication ID: {{app_id}}\nReviewed by: {{reviewer_name}}\n\nPlease proceed with IMEI verification.\n\n— Cleva Financial Services\nEmpowering access`,
  },
  rejected:{
    label:'Application rejected',
    vars:'{{to_name}}, {{customer_name}}, {{app_id}}, {{rejection_reason}}',
    subject:'Application rejected — {{customer_name}}',
    body:`Hi {{to_name}},\n\nThe following application has been rejected.\n\nCustomer: {{customer_name}}\nApplication ID: {{app_id}}\nReason: {{rejection_reason}}\n\n— Cleva Financial Services\nEmpowering access`,
  },
  changes:{
    label:'Changes requested',
    vars:'{{to_name}}, {{customer_name}}, {{app_id}}, {{fields}}, {{note}}',
    subject:'Changes requested — {{customer_name}}',
    body:`Hi {{to_name}},\n\nChanges have been requested on an application.\n\nCustomer: {{customer_name}}\nApplication ID: {{app_id}}\nFields to update: {{fields}}\nNote: {{note}}\n\nPlease log in, make the corrections, and resubmit.\n\n— Cleva Financial Services\nEmpowering access`,
  },
  escalated:{
    label:'Escalated to ops',
    vars:'{{to_name}}, {{customer_name}}, {{app_id}}, {{escalated_by}}, {{note}}',
    subject:'Application escalated — {{customer_name}}',
    body:`Hi {{to_name}},\n\nAn application has been escalated and requires your attention.\n\nCustomer: {{customer_name}}\nApplication ID: {{app_id}}\nEscalated by: {{escalated_by}}\nReason: {{note}}\n\n— Cleva Financial Services\nEmpowering access`,
  },
};
const fillTpl=(str,params)=>str.replace(/\{\{(\w+)\}\}/g,(_,k)=>params[k]!=null?String(params[k]):'');
let _ejsReady=false;
const sendEmail=(tplKey,params)=>{

// Role-based transitions: who can move to what. Sales rep cannot set ACTIVE.
const ALLOWED_TRANSITIONS={
  rep:{[ST.DRAFT]:[ST.PENDING_APPROVAL],[ST.UNDER_REVIEW]:[ST.PENDING_APPROVAL]},
  underwriter:{[ST.PENDING_APPROVAL]:[ST.APPROVED,ST.UNDER_REVIEW,ST.ARCHIVED,ST.ESCALATED],[ST.UNDER_REVIEW]:[ST.APPROVED,ST.ARCHIVED,ST.ESCALATED]},
  support:{},ops_superuser:Object.values(ST),
};
const canTransition=(fromSt,toSt,role,isSuperuser)=>{
  if(isSuperuser&&role==='ops')return true;
  if(toSt===ST.ACTIVE)return isSuperuser&&role==='ops';
  const key=isSuperuser&&role==='ops'?'ops_superuser':role==='rep'?'rep':role==='underwriter'?'underwriter':role==='support'?'support':'rep';
  const allowed=ALLOWED_TRANSITIONS[key][fromSt];
  return Array.isArray(allowed)&&allowed.includes(toSt);
};

// ── PRICING ENGINE ────────────────────────────────────────────
// totalCost = cashPrice × (1 + markupRate); deposit = totalCost × depositPct; monthly = (totalCost - deposit) / 12
const defaultPricingConfig={markupRate:0.60,depositPct:0.20};
const calcDealFromDevice=(device,cfg)=>{
  const markupRate=cfg.markupRate??0.60;
  const depositPct=cfg.depositPct??0.20;
  const cashPrice=Math.round(device.cash||device.cogs||0);
  const totalCost=Math.round(cashPrice*(1+markupRate));
  const deposit=Math.round(totalCost*depositPct);
  const monthly=Math.round((totalCost-deposit)/12);
  return {deviceModel:device.model,manufacturer:device.brand,RAM:device.ram,ROM:device.rom,dealId:device.id,dealName:device.model,dealType:'PAYG',termOption:12,upfrontPayment:deposit,recurrentPayment:monthly,totalCost,cogs:cashPrice,markupRate,depositPct};
};

// ── TERM PRICING: apply discount for shorter terms ─────────────
// 3 months → 30% off total; 6 months → 20% off total; 12 months → standard
const calcTermPricing=(dev,term)=>{
  const disc=term===3?0.30:term===6?0.20:0;
  const baseTotal=dev.totalCost||(dev.dep||0)+(dev.weekly||0)*12||0;
  const total=Math.round(baseTotal*(1-disc));
  const depositPct=dev.depositPct||0.20;
  const dep=Math.round(total*depositPct);
  const monthly=Math.round((total-dep)/term);
  return {total,dep,monthly,disc,savings:baseTotal-total,term};
};

// ── IMEI: 15 digits + Luhn check ───────────────────────────────
const luhnCheck=(digits)=>{
  let sum=0;const n=digits.length;
  for(let i=0;i<n;i++){let d=parseInt(digits[i],10);if((n-i)%2===0){d*=2;if(d>9)d-=9;}sum+=d;}
  return sum%10===0;
};
const isValidImei=(imei)=>{
  const s=String(imei||'').replace(/\D/g,'');
  return s.length===15&&/^\d+$/.test(s)&&luhnCheck(s);
};

const useT=()=>{const {lang,user}=useContext(Ctx);const L=user?.role==='rep'?lang:'en';return (k,...args)=>{const val=(TR[L]||TR.en)[k];return typeof val==='function'?val(...args):val??k;};};

const Badge=({st})=>{
  const t=useT();
  const labelMap={draft:t('st_draft'),pending_approval:t('st_pending'),under_review:t('st_under_review'),approved:t('st_approved'),active:t('st_active'),completed:t('st_completed'),archived:t('st_archived'),escalated:t('st_escalated'),lock_pending:t('st_lock_pending'),awaiting_payment:t('st_awaiting'),offer_selection:t('st_offer')};
  const m=SM[st]||{label:st,c:'info'};const c=CC[m.c]||CC.info;
  return <span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:99,fontSize:11,fontWeight:600,letterSpacing:'0.3px',background:c.bg,color:c.fg,border:`1px solid ${c.bd}`}}>{labelMap[st]||m.label}</span>;
};
const Spin=({size=14,dark=false})=><span className="spin" style={{display:'inline-block',width:size,height:size,border:`2px solid ${dark?'rgba(11,61,46,0.15)':'rgba(255,255,255,0.3)'}`,borderTopColor:dark?'var(--brand2)':'white',borderRadius:'50%',verticalAlign:'middle'}}/>;

const Btn=({children,onClick,v='def',sz='md',disabled=false,loading=false,icon,full=false,style={}})=>{
  const vs={primary:{bg:'var(--brand2)',fg:'white',bd:'var(--brand2)',hov:'#1E40AF'},ok:{bg:'var(--okBg)',fg:'var(--ok)',bd:'var(--okBorder)',hov:'#DCFCE7'},warn:{bg:'var(--warnBg)',fg:'var(--warn)',bd:'var(--warnBorder)',hov:'#FEF9C3'},err:{bg:'var(--errBg)',fg:'var(--err)',bd:'var(--errBorder)',hov:'#FFE4E6'},info:{bg:'var(--infoBg)',fg:'var(--info)',bd:'var(--infoBorder)',hov:'#DBEAFE'},pur:{bg:'var(--purBg)',fg:'var(--pur)',bd:'var(--purBorder)',hov:'#EDE9FE'},def:{bg:'var(--surface)',fg:'var(--text)',bd:'var(--border)',hov:'var(--brandPale)'},ghost:{bg:'transparent',fg:'var(--textMid)',bd:'transparent',hov:'rgba(15,23,42,0.04)'}};
  const vv=vs[v]||vs.def;const pads={sm:'5px 11px',md:'9px 16px',lg:'12px 22px'};const fss={sm:12,md:14,lg:15};
  const [h,setH]=useState(false);
  return <button onClick={disabled||loading?undefined:onClick} disabled={disabled||loading} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',gap:6,padding:pads[sz],fontSize:fss[sz],fontWeight:500,borderRadius:'var(--r2)',cursor:disabled||loading?'not-allowed':'pointer',border:`1.5px solid ${disabled?'var(--border)':vv.bd}`,background:disabled?'var(--bg)':h?vv.hov:vv.bg,color:disabled?'var(--textLight)':vv.fg,opacity:disabled?0.6:1,width:full?'100%':'auto',justifyContent:full?'center':'flex-start',transition:'all .13s',userSelect:'none',whiteSpace:'nowrap',...style}}>{loading?<Spin dark={v==='def'||v==='ghost'} size={13}/>:icon&&<span style={{fontSize:13,lineHeight:1}}>{icon}</span>}{children}</button>;
};

const Card=({children,sx={},className=''})=><div className={className} style={{background:'var(--surface)',borderRadius:'var(--r)',border:'1.5px solid var(--border)',boxShadow:'var(--sh)',...sx}}>{children}</div>;

const CameraModal=({onCapture,onClose,facing:initFacing='user',mode='portrait',allowFlip=false})=>{
  const t=useT();
  const videoRef=React.useRef(null);
  const streamRef=React.useRef(null);
  const [activeFacing,setActiveFacing]=React.useState(initFacing);
  const [ready,setReady]=React.useState(false);
  const [err,setErr]=React.useState(null);
  const isPortrait=mode==='portrait';
  // target crop ratios
  const targetRatio=isPortrait?3/4:16/10;

  const startStream=React.useCallback((faceMode)=>{
    setReady(false);setErr(null);
    if(streamRef.current)streamRef.current.getTracks().forEach(tr=>tr.stop());
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:faceMode}},audio:false})
      .then(stream=>{
        streamRef.current=stream;
        if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}
        setReady(true);
      })
      .catch(e=>{setErr('Could not access camera: '+e.message);});
  },[]);

  React.useEffect(()=>{
    startStream(activeFacing);
    return()=>{if(streamRef.current)streamRef.current.getTracks().forEach(tr=>tr.stop());};
  },[activeFacing]);

  const flipCamera=()=>setActiveFacing(f=>f==='user'?'environment':'user');

  const capture=()=>{
    const v=videoRef.current;if(!v)return;
    const vw=v.videoWidth,vh=v.videoHeight;
    const vRatio=vw/vh;
    let sx=0,sy=0,sw=vw,sh=vh;
    if(vRatio>targetRatio){
      // video wider than target → crop sides
      sw=Math.round(vh*targetRatio);sx=Math.round((vw-sw)/2);
    } else {
      // video taller than target → crop top/bottom
      sh=Math.round(vw/targetRatio);sy=Math.round((vh-sh)/2);
    }
    const canvas=document.createElement('canvas');
    canvas.width=sw;canvas.height=sh;
    canvas.getContext('2d').drawImage(v,sx,sy,sw,sh,0,0,sw,sh);
    canvas.toBlob(blob=>{if(blob){const file=new File([blob],'camera.jpg',{type:'image/jpeg'});onCapture(file);}onClose();},'image/jpeg',0.92);
  };

  // video display: enforce aspect ratio via CSS
  const videoStyle={
    borderRadius:12,background:'#000',objectFit:'cover',
    ...(isPortrait
      ? {width:'min(75vw,320px)',height:'min(100vw,427px)',aspectRatio:'3/4'}
      : {width:'min(90vw,520px)',height:'min(56.25vw,292px)',aspectRatio:'16/10'}),
  };

  return ReactDOM.createPortal(
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.92)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,padding:20}}>
      <div style={{color:'rgba(255,255,255,0.55)',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'1px',marginBottom:2}}>
        {isPortrait?'Portrait — position face in frame':'Landscape — lay ID flat, fill frame'}
      </div>
      {err?(
        <div style={{color:'#fff',fontSize:14,textAlign:'center',maxWidth:320}}>
          {err}<br/>
          <button onClick={onClose} style={{marginTop:16,padding:'8px 20px',borderRadius:8,border:'none',background:'#fff',cursor:'pointer',fontWeight:600}}>Close</button>
        </div>
      ):(
        <>
          <div style={{position:'relative',display:'inline-block'}}>
            <video ref={videoRef} playsInline muted style={videoStyle}/>
            {/* Guide overlay */}
            <div style={{position:'absolute',inset:0,border:'2px solid rgba(255,255,255,0.35)',borderRadius:12,pointerEvents:'none'}}/>
            {/* Corner guides */}
            {[[0,0,'top:0;left:0'],[0,1,'top:0;right:0'],[1,0,'bottom:0;left:0'],[1,1,'bottom:0;right:0']].map((_,i)=>(
              <div key={i} style={{position:'absolute',width:18,height:18,borderColor:'white',borderStyle:'solid',borderWidth:0,borderTopWidth:i<2?2:0,borderBottomWidth:i>=2?2:0,borderLeftWidth:i%2===0?2:0,borderRightWidth:i%2===1?2:0,top:i<2?8:'auto',bottom:i>=2?8:'auto',left:i%2===0?8:'auto',right:i%2===1?8:'auto',borderRadius:i<2?(i%2===0?'4px 0 0 0':'0 4px 0 0'):(i%2===0?'0 0 0 4px':'0 0 4px 0'),pointerEvents:'none'}}/>
            ))}
            {!ready&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.5)',borderRadius:12,color:'#fff',fontSize:13}}>{t('starting_camera')}</div>}
          </div>
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <button onClick={onClose} style={{padding:'10px 22px',borderRadius:8,border:'2px solid rgba(255,255,255,0.35)',background:'transparent',color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>{t('cancel')}</button>
            {allowFlip&&(
              <button onClick={flipCamera} title="Flip camera" style={{padding:'10px 16px',borderRadius:8,border:'2px solid rgba(255,255,255,0.35)',background:'transparent',color:'#fff',cursor:'pointer',fontSize:18,lineHeight:1}}>🔄</button>
            )}
            <button onClick={capture} disabled={!ready} style={{padding:'10px 28px',borderRadius:8,border:'none',background:ready?'var(--brand)':'#555',color:'#fff',cursor:ready?'pointer':'not-allowed',fontWeight:700,fontSize:14}}>{t('capture')}</button>
          </div>
        </>
      )}
    </div>,document.body
  );
};

// ── SIGNATURE PAD ─────────────────────────────────────────────
const SignaturePad=({onChange})=>{
  const canvasRef=React.useRef(null);
  const drawing=React.useRef(false);
  const [hasDrawn,setHasDrawn]=React.useState(false);
  const getPos=(e,canvas)=>{const r=canvas.getBoundingClientRect();const t=e.touches?.[0];const src=t||e;const scaleX=canvas.width/r.width;const scaleY=canvas.height/r.height;return{x:(src.clientX-r.left)*scaleX,y:(src.clientY-r.top)*scaleY};};
  const start=e=>{e.preventDefault();drawing.current=true;const canvas=canvasRef.current;const ctx=canvas.getContext('2d');const p=getPos(e,canvas);ctx.beginPath();ctx.moveTo(p.x,p.y);};
  const move=e=>{e.preventDefault();if(!drawing.current)return;const canvas=canvasRef.current;const ctx=canvas.getContext('2d');const p=getPos(e,canvas);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#0B3D2E';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();setHasDrawn(true);};
  const end=e=>{e.preventDefault();if(!drawing.current)return;drawing.current=false;if(hasDrawn||canvasRef.current)onChange(canvasRef.current.toDataURL('image/png'));};
  const clear=()=>{const canvas=canvasRef.current;canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);setHasDrawn(false);onChange(null);};
  return(
    <div>
      <div style={{border:'1.5px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden',background:'white',position:'relative',cursor:'crosshair'}}>
        <canvas ref={canvasRef} width={900} height={220} style={{width:'100%',height:140,display:'block',touchAction:'none'}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        {!hasDrawn&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
          <span style={{fontSize:13,color:'var(--textLight)'}}>Draw your signature here</span>
        </div>}
      </div>
      <div style={{display:'flex',gap:8,marginTop:8}}>
        <Btn v="def" sz="sm" onClick={clear} icon="✕">Clear</Btn>
        {hasDrawn&&<span style={{fontSize:11,color:'var(--ok)',display:'flex',alignItems:'center',gap:4}}>✓ Signature captured</span>}
      </div>
    </div>
  );
};

const resolveLogoForPdf=async(logo)=>{
  if(!logo)return null;
  if(typeof logo==='string'&&logo.startsWith('data:'))return logo;
  try{const r=await fetch(logo);const b=await r.blob();return new Promise((ok,err)=>{const fr=new FileReader();fr.onload=()=>ok(fr.result);fr.onerror=err;fr.readAsDataURL(b);});}catch{return null;}
};
const resolveLogoWithFallback=async(co)=>{
  const primary=co.logo||LOGO_URL;
  let data=await resolveLogoForPdf(primary);
  if(!data&&primary!==LOGO_URL)data=await resolveLogoForPdf(LOGO_URL);
  return data;
};

    const idW=CW-pW-gap,idH=Math.round(idW*10/16); // ID landscape 16:10
    const photoRowH=Math.max(pH,idH);
    if(app.customerPhoto){
      try{
        doc.setDrawColor(...light);doc.setLineWidth(0.3);doc.rect(M-0.5,y-0.5,pW+1,pH+1);
        const ext=app.customerPhoto.includes('jpeg')||app.customerPhoto.includes('jpg')?'JPEG':'PNG';
        doc.addImage(app.customerPhoto,ext,M,y,pW,pH);
      }catch(e){}
      doc.setFont('helvetica','normal').setFontSize(7).setTextColor(...light).text('Customer Photo',M+pW/2,y+pH+3,{align:'center'});
    }
    if(app.idPhoto){
      const idX=M+pW+gap;
      const idY=y+Math.round((photoRowH-idH)/2); // vertically centre the ID photo
      try{
        doc.setDrawColor(...light);doc.setLineWidth(0.3);doc.rect(idX-0.5,idY-0.5,idW+1,idH+1);
        const ext=app.idPhoto.includes('jpeg')||app.idPhoto.includes('jpg')?'JPEG':'PNG';
        doc.addImage(app.idPhoto,ext,idX,idY,idW,idH,undefined,'FAST');
      }catch(e){}
      doc.setFont('helvetica','normal').setFontSize(7).setTextColor(...light).text('Identity Document',idX+idW/2,y+photoRowH+3,{align:'center'});
    }
    y+=photoRowH+8;
  }
  hline();

  // ── Device & Financing ──────────────────────────────────────
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text(L.deviceFin,M,y);y+=6;
  kv('Device',`${deal.manufacturer||''} ${deal.deviceModel||''} — ${deal.RAM||''} RAM / ${deal.ROM||''} Storage`);
  kv('Cash price',`RWF ${Number(deal.cogs||0).toLocaleString()}`);
  kv('Total contract price',`RWF ${Number(deal.totalCost||0).toLocaleString()} (${Math.round((deal.markupRate||0)*100)}% financing rate)`);
  kv('Upfront deposit',`RWF ${Number(deal.upfrontPayment||0).toLocaleString()}`);
  kv('Monthly installment',`RWF ${Number(deal.recurrentPayment||0).toLocaleString()} × 12 months`);
  kv('Payoff plan',discLabel);
  if(deal.discountPct>0)kv('Early payoff discount',`${Math.round(deal.discountPct*100)}% — saving RWF ${Number(pricing.savings||0).toLocaleString()}`);
  y+=2;hline();

  // ── Next of Kin ─────────────────────────────────────────────
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text(L.kin,M,y);y+=6;
  kv('Name',app.guarantorName||'');kv('Phone',app.guarantorPhone||'');y+=2;hline();

  // ── Terms ───────────────────────────────────────────────────
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text(L.terms,M,y);y+=6;
  const TERMS=L.termsArr(co,deal,pricing,discLabel);
  TERMS.forEach(([heading,body])=>{
    chk(22);
    doc.setFont('helvetica','bold').setFontSize(8.5).setTextColor(...brand).text(heading,M,y);y+=4.5;
    doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
    doc.splitTextToSize(body,CW-3).forEach(l=>{chk(5);doc.text(l,M+2,y);y+=4;});
    y+=3;
  });

  // ── Acknowledgement & Signature ─────────────────────────────
  chk(35);hline(brand,0.5);
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text(L.ack,M,y);y+=5;
  doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
  doc.splitTextToSize(L.ackText,CW).forEach(l=>{doc.text(l,M,y);y+=4;});
  y+=5;chk(55);
  const sigStartY=y;
  // Customer sig
  doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...brand).text(L.custSig,M,sigStartY);
  if(customerSignature){try{doc.addImage(customerSignature,'PNG',M,sigStartY+3,CW/2-8,28);}catch(e){}}
  doc.setDrawColor(...light);doc.setLineWidth(0.3);doc.line(M,sigStartY+33,M+CW/2-8,sigStartY+33);
  doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
  doc.text(app.fullName||'',M,sigStartY+38);
  doc.text(L.date+': '+date,M,sigStartY+43);
  // Company signatory sig (pre-loaded from company settings)
  doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...brand).text(L.onBehalf(co.name),colMid,sigStartY);
  if(co.signatorySig){try{doc.addImage(co.signatorySig,'PNG',colMid,sigStartY+3,CW/2-8,28);}catch(e){}}
  doc.setDrawColor(...light);doc.setLineWidth(0.3);doc.line(colMid,sigStartY+33,colMid+CW/2-8,sigStartY+33);
  doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
  doc.text(co.signatoryName||co.name,colMid,sigStartY+38);
  if(co.signatoryTitle)doc.text(co.signatoryTitle,colMid,sigStartY+43);
  doc.text(L.date+': '+date,colMid,co.signatoryTitle?sigStartY+48:sigStartY+43);
  y=sigStartY+55;

  // (photos are embedded inline in the parties section — no separate attachment page)

  const suffix=lang==='rw'?'RW':'EN';
  doc.save(`PAYGO_Contract_${suffix}_${(contractData.id||'draft').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`);
};

// ── NEW APPLICATION ───────────────────────────────────────────
const NewApp=({onSubmit,onBack,onSaveDraft,onAutoSave,devices,preSelDevId=null,preSelTerm=12,initialData=null})=>{

    if(!autoSaveRef.current)return;

    return()=>clearTimeout(timer);
  },[f]);

  const openCam=(field,facing,mode='portrait',allowFlip=false)=>setCam({field,facing,mode,allowFlip});
  const closeCam=()=>setCam(null);
  const onCamCapture=(file)=>{if(cam)handleFile(cam.field,file);};
  const v1=()=>{
    const er={};
    if(!f.name.trim())er.name=t('err_required');
    if(f.idType==='nid'){if(f.nid.replace(/\D/g,'').length!==16)er.nid=t('err_nid_16');}
    else{if(!f.nid.trim())er.nid=t('err_passport');}
    if(!f.phone.trim())er.phone=t('err_required');if(!f.addr.trim())er.addr=t('err_required');if(!f.occ)er.occ=t('err_required');if(!f.income||isNaN(f.income)||+f.income<1)er.income=t('err_income');if(!f.kn.trim())er.kn=t('err_required');if(!f.kp.trim())er.kp=t('err_required');if(!f.kr)er.kr=t('err_required');
    if(!f.customerPhoto)er.customerPhoto=t('err_customer_photo');if(!f.idPhoto)er.idPhoto=t('err_id_photo');if(!f.incomeProof)er.incomeProof=t('err_income_proof');
    setE(er);return!Object.keys(er).length;
  };
  const v2=()=>{const er={};if(!f.did)er.did=t('err_device');setE(er);return!Object.keys(er).length;};
  const next=()=>{if(step===1&&v1())setStep(2);else if(step===2&&v2())setStep(3);};
  const dev=(devices||[]).find(d=>d.id===f.did);
  const STEPS=[t('step_customer'),t('step_device'),t('step_review')];
  const goStep=(s)=>{if(s<step)setStep(s);else if(s===step){}else if(s===2&&v1())setStep(2);else if(s===3&&v1()&&v2())setStep(3);};

    <div className="fadeUp new-app-form" style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,width:'100%',padding:'0 24px'}}>

        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>

          <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>{t('new_application')}</h1><p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>{t('step_of',step,3)} — {STEPS[step-1]}</p></div>
        </div>

            <React.Fragment key={i}>

            </FF>

            <div style={{borderTop:'1.5px solid var(--border)',paddingTop:14,marginTop:4}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>{t('documents')}</div>
              <FF label={t('customer_photo')} req err={e.customerPhoto}><div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><button type="button" onClick={()=>openCam('customerPhoto','user','portrait',true)} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 16px',background:'var(--brand)',color:'white',borderRadius:'var(--r2)',cursor:'pointer',fontSize:13,fontWeight:500,border:'none'}}>{t('take_photo')}</button>{f.customerPhoto&&<span style={{fontSize:12,color:'var(--ok)'}}>{t('photo_taken')}</span>}</div></FF>

                      })}
                    </div>
                  </div>
                  <div style={{background:'var(--bg)',borderRadius:'var(--r)',padding:'14px 16px'}}>
                    {pricing2.disc>0&&(
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,padding:'8px 12px',background:'var(--okBg)',border:'1px solid var(--okBorder)',borderRadius:'var(--r2)'}}>

                        <span style={{fontFamily:'DM Mono,monospace',fontWeight:800,fontSize:13,color:'var(--ok)'}}>− {fmtRWF(pricing2.savings)}</span>

                      <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>

                        <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:14}}>{v}</span>
                      </div>
                    ))}
                  </div>

// ── IMEI FLOW ─────────────────────────────────────────────────
// Phases: entry | autocheck | valid | mismatch | notfound | checking (manual fallback) | verified
const CARLCARE_MANUAL_URL='https://www.carlcare.com/rw/warranty-check/';
// Permanent Cloudflare Worker proxy — admin can override via Company info settings
const CARLCARE_PROXY_FALLBACK='https://green-breeze-55ec.georgeniyonshuti.workers.dev';
const DEVICE_BRANDS=['TECNO','INFINIX','itel'];

// Normalise a string for loose comparison
const ccNorm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
// Extract numeric value (e.g. "4GB" → 4, "128" → 128)
const ccNum=s=>parseInt(String(s||'').replace(/[^0-9]/g,''))||0;

// Parse the Carlcare imei-policy JSON response into a flat object.
// Actual API structure: { code:200, data:{ valid:[{ productModelCode, brandCategoryName, expiryDate, periodOfValid, status, warrantyName, isInvalid, ... }] } }
const parseCarlcareResp=(raw)=>{
  if(!raw||raw.code!==200)return null;

  // data.valid is an array of warranty entries (one per warranty type)
  const validList=raw?.data?.valid;
  if(!Array.isArray(validList)||validList.length===0)return null;

  // Pick the best entry: prefer ones with status="valid" and a months-based warranty
  const pickBest=(list)=>{
    const active=list.filter(e=>String(e.status||'').toLowerCase()==='valid'&&(e.isInvalid===0||e.isInvalid==='0'));
    if(active.length===0)return list[0];
    const monthsEntry=active.find(e=>(e.warrantyName||'').toLowerCase().includes('month'));
    return monthsEntry||active[0];
  };
  const entry=pickBest(validList);
  if(!entry)return null;

  // productModelCode = "X6728B 128+4" → model="X6728B", rom="128", ram="4"
  const modelCode=String(entry.productModelCode||'').trim();
  const spaceIdx=modelCode.indexOf(' ');
  const modelName=spaceIdx>-1?modelCode.slice(0,spaceIdx):modelCode;
  const specsPart=spaceIdx>-1?modelCode.slice(spaceIdx+1):'';
  const specNums=specsPart.split('+');
  const rom=specNums[0]?specNums[0].replace(/[^0-9]/g,''):'';
  const ram=specNums[1]?specNums[1].replace(/[^0-9]/g,''):'';

  // brandCategoryName = "Infinix-SP" or "TECNO-itel" → take part before first "-"
  const brandRaw=String(entry.brandCategoryName||'').trim();
  const brand=brandRaw.includes('-')?brandRaw.split('-')[0].trim():brandRaw;

  // Parse DD-MM-YYYY dates
  const parseDate=s=>{
    if(!s)return null;
    const iso=new Date(s);
    if(!isNaN(iso)&&s.includes('-')&&s.length>8)return iso;
    const m=String(s).match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if(m)return new Date(+m[3],+m[2]-1,+m[1]);
    return null;
  };
  const expiry=parseDate(entry.expiryDate||'');
  const warrantyValid=String(entry.status||'').toLowerCase()==='valid'&&
                      (entry.isInvalid===0||entry.isInvalid==='0')&&
                      (expiry?expiry>new Date():true);

  return{
    brand,model:modelName,ram,rom,
    warrantyValid,
    expiry:expiry?expiry.toLocaleDateString('en-GB'):entry.expiryDate||'',
    start:entry.periodOfValid||'',
    warrantyClass:entry.warrantyName||'',
    raw:entry
  };
};

// Compare expected device specs (from application) vs. Carlcare result
const compareSpecs=(dev,cc)=>{
  const expBrand=ccNorm(dev.brand);
  const expModel=ccNorm(dev.model);
  const expRam=ccNum(dev.ram||dev.RAM);
  const expRom=ccNum(dev.rom||dev.ROM);
  const ccBrand=ccNorm(cc.brand);
  const ccModel=ccNorm(cc.model);
  const ccRam=ccNum(cc.ram);
  const ccRom=ccNum(cc.rom);
  // Brand: partial match (e.g. "tecno" in "tecno mobile")
  const brandOk=!cc.brand||ccBrand.includes(expBrand)||expBrand.includes(ccBrand);
  // Model: partial match
  const modelOk=!cc.model||ccModel.includes(expModel)||expModel.includes(ccModel);
  // RAM/ROM: numeric, 0 means not reported by Carlcare → skip that check
  const ramOk=!ccRam||expRam===ccRam;
  const romOk=!ccRom||expRom===ccRom;
  return{brandOk,modelOk,ramOk,romOk,allOk:brandOk&&modelOk&&ramOk&&romOk};
};

const IMEIFlow=({app,onUpdate,addToast,onBack})=>{
  const {user,companyInfo}=useContext(Ctx);
  const t=useT();
  const proxyUrl=(companyInfo?.imeiProxyUrl||CARLCARE_PROXY_FALLBACK).trim();
  const [imei,setImei]=useState(app.imei||'');
  const [phase,setPhase]=useState([ST.LOCK_PENDING,ST.AWAITING_PAYMENT,ST.ACTIVE].includes(app.status)?'verified':app.imei&&app.status===ST.APPROVED?'autocheck_resume':'entry');
  const [ld,setLd]=useState(null);
  const [copied,setCopied]=useState(false);
  const [mismatchNote,setMismatchNote]=useState('');
  const [actualSpecs,setActualSpecs]=useState({brand:'',model:'',ram:'',rom:''});
  const [ccResult,setCcResult]=useState(null); // parsed Carlcare result
  const [autoError,setAutoError]=useState('');  // error message if auto-check fails
  const d=app.dev;

  const copyImei=()=>{navigator.clipboard?.writeText(imei).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};

  // ── Auto-check via proxy ──────────────────────────────────────
  const runAutoCheck=async(imeiVal)=>{
    setLd('check');setAutoError('');
    try{
      const resp=await fetch(`${proxyUrl}?imei=${imeiVal}`);
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const raw=await resp.json();
      const result=parseCarlcareResp(raw);
      setCcResult(result);

      if(!result){
        // API returned but no usable data → not found
        setPhase('notfound');
      }else if(!result.warrantyValid){
        setPhase('notfound');
      }else{
        const match=compareSpecs(d,result);
        if(match.allOk){
          setPhase('valid');
        }else{
          // Pre-fill actual specs from Carlcare
          setActualSpecs({brand:result.brand,model:result.model,ram:result.ram,rom:result.rom});
          setPhase('mismatch');
        }
      }
    }catch(err){
      setAutoError(`Auto-check failed: ${err.message}. Falling back to manual verification.`);
      setPhase('checking'); // manual fallback
    }finally{
      setLd(null);
    }
  };

  const proceedToCheck=()=>{
    if(imei.length!==15||!/^\d+$/.test(imei)){addToast('err','Invalid IMEI','Must be exactly 15 digits. Dial *#06# on the device.');return;}
    onUpdate(app.id,{imei,tlEntry:{by:user.name,txt:`IMEI entered: ${imei}`}});
    if(proxyUrl){
      setPhase('autocheck');
      runAutoCheck(imei);
    }else{
      setPhase('checking'); // manual
    }
  };

  // If already has IMEI and approved, try to resume auto-check
  useEffect(()=>{
    if(phase==='autocheck_resume'&&app.imei&&proxyUrl){
      setPhase('autocheck');
      runAutoCheck(app.imei);
    }else if(phase==='autocheck_resume'){
      setPhase(proxyUrl?'entry':'checking');
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // ── Confirm valid (auto or manual) ───────────────────────────
  const confirmValid=async(fromAuto)=>{
    setLd('pt');await sleep(800);
    const ptId='PT-2026-'+Math.floor(10000+Math.random()*90000);
    const ccDetail=fromAuto&&ccResult?` Carlcare: ${ccResult.model||''} RAM:${ccResult.ram} Storage:${ccResult.rom} · Warranty expires ${ccResult.expiry}.`:'';
    onUpdate(app.id,{imei,ptId,status:ST.LOCK_PENDING,carlcareResult:ccResult||null,tlEntry:{by:user.name,txt:`IMEI ${imei} — Carlcare warranty confirmed, specs match.${ccDetail} Registered in PayTrigger (${ptId})`}});
    addToast('ok',t('imei_verified_toast'),t('imei_verified_msg'));
    setPhase('verified');setLd(null);
  };

  const sendBackFromImei=(reason)=>{
    onUpdate(app.id,{status:ST.PENDING_APPROVAL,notes:reason,imei:null,tlEntry:{by:user.name,txt:`IMEI check issue — returned to underwriter: ${reason}`}});
    addToast('warn','Returned to underwriter','Underwriter will be notified');onBack();
  };
  const escalateFromImei=(reason)=>{
    onUpdate(app.id,{status:ST.ESCALATED,notes:reason,imei:null,tlEntry:{by:user.name,txt:`IMEI check issue escalated: ${reason}`}});
    addToast('info','Escalated to ops','Issue logged');onBack();
  };
  const retryImei=()=>{
    // Clear the failed IMEI so auto-check doesn't replay it, stay in APPROVED
    onUpdate(app.id,{imei:null,tlEntry:{by:user.name,txt:'IMEI retry — clearing previous failed IMEI'}});
    setImei('');setCcResult(null);setPhase('entry');
  };
  const confirmLocked=async()=>{
    setLd('lock');await sleep(1200);
    onUpdate(app.id,{status:ST.AWAITING_PAYMENT,lockedAt:new Date().toISOString(),tlEntry:{by:user.name,txt:'Phone locked in PayTrigger — awaiting first payment to activate contract'}});
    addToast('ok',t('phone_locked_toast'),t('phone_locked_msg'));
    setLd(null);onBack();
  };

  const STEPS_DEF=[{l:t('imei_step1'),done:phase!=='entry'},{l:t('imei_step2'),done:['valid','mismatch','notfound','verified'].includes(phase)},{l:t('imei_step3'),done:phase==='verified'&&[ST.AWAITING_PAYMENT,ST.ACTIVE].includes(app.status)}];

  return(
    <div className="fadeUp" style={{padding:'28px 32px',maxWidth:760}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <Btn onClick={onBack} v="ghost" icon="←" sz="sm">{t('back')}</Btn>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>{t('imei_check_title')}</h1>
          <p style={{fontSize:11,color:'var(--textMid)',marginTop:1}}>{app.id} · {app.c.name}</p>
        </div>
        {proxyUrl&&<span style={{marginLeft:'auto',fontSize:10,fontWeight:600,padding:'3px 9px',borderRadius:99,background:'var(--okBg)',color:'var(--ok)',border:'1px solid var(--okBorder)'}}>⚡ Auto-check</span>}
      </div>

      {/* Step indicators */}
      <div style={{display:'flex',alignItems:'center',marginBottom:22}}>
        {STEPS_DEF.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div style={{width:26,height:26,borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,background:s.done?'var(--ok)':'var(--brand)',color:'white'}}>{s.done?'✓':i+1}</div>
              <span style={{fontSize:12,fontWeight:500,color:s.done?'var(--ok)':'var(--text)'}}>{s.l}</span>
            </div>
            {i<2&&<div style={{flex:1,height:1,background:'var(--border)',margin:'0 8px'}}/>}
          </React.Fragment>
        ))}
      </div>

      {/* Expected device specs */}
      <Card sx={{padding:'13px 16px',marginBottom:16,background:'var(--brandPale)',border:'1.5px solid var(--brandPale2)'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--brand)',marginBottom:8}}>{t('imei_expected_device')}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:8}}>
          {[['Brand',d.brand],['Model',d.model],['RAM',d.ram||d.RAM],['Storage',d.rom||d.ROM]].map(([k,v])=>(
            <div key={k}><div style={{fontSize:9,color:'var(--brand2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>{k}</div><div style={{fontWeight:700,fontSize:13,color:'var(--brand)'}}>{v||'—'}</div></div>
          ))}
        </div>
      </Card>

      <Card sx={{padding:22}}>
        {/* ── Phase: entry ── */}
        {phase==='entry'&&(
          <div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>{t('imei_enter_title')}</div>
            <p style={{fontSize:12,color:'var(--textMid)',marginBottom:18,lineHeight:1.7}}>
              {t('imei_dial_hint',d.brand,d.model)}{' '}
              {proxyUrl?<span style={{color:'var(--ok)',fontWeight:600}}>{t('imei_auto_warranty')}</span>:<span>{t('imei_manual_verify')}</span>}
            </p>
            <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap',marginBottom:6}}>

                <input value={imei} onChange={ev=>setImei(ev.target.value.replace(/\D/g,'').slice(0,15))} placeholder="e.g. 352876110123456" style={{fontFamily:'DM Mono,monospace',fontSize:18,letterSpacing:'2px'}} maxLength={15}/>
                <div style={{fontSize:10,color:'var(--textLight)',marginTop:4}}>{t('imei_digit_count',imei.length)}</div>
              </div>
              <Btn v="primary" sz="lg" disabled={imei.length!==15} onClick={proceedToCheck} icon={proxyUrl?'⚡':'→'}>{proxyUrl?t('imei_auto_btn'):t('imei_manual_btn')}</Btn>
            </div>

        {/* ── Phase: autocheck (spinner) ── */}
        {phase==='autocheck'&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'32px 0',gap:18}}>

            <div style={{fontWeight:700,fontSize:15}}>{t('imei_checking_title')}</div>
            <div style={{fontFamily:'DM Mono,monospace',fontSize:18,letterSpacing:'2px',color:'var(--brand)',padding:'10px 20px',background:'var(--brandPale)',borderRadius:'var(--r)'}}>{imei}</div>

        {phase==='valid'&&(
