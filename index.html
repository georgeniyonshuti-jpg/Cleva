        {tab==='pricing'&&(
          <div style={{maxWidth:520}}>
            <Card sx={{padding:20,marginBottom:14}}>
              <div style={{fontWeight:800,marginBottom:4}}>Global pricing rates</div>
              <div style={{fontSize:12,color:'var(--textMid)',marginBottom:16,lineHeight:1.6}}>These rates apply to all devices automatically. Total price = Cash price × (1 + Markup). Deposit = Total × Deposit %. Monthly = (Total − Deposit) ÷ 12.</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
                <FF label="Markup rate (%)"><input type="number" min="0" max="200" value={cfgDraft.markupRate} onChange={e=>setCfgDraft(p=>({...p,markupRate:e.target.value}))} placeholder="e.g. 60"/></FF>
                <FF label="Deposit rate (%)"><input type="number" min="0" max="100" value={cfgDraft.depositPct} onChange={e=>setCfgDraft(p=>({...p,depositPct:e.target.value}))} placeholder="e.g. 20"/></FF>
              </div>
              <div style={{background:'var(--bg)',borderRadius:'var(--r2)',padding:'12px 14px',marginBottom:16,fontSize:12}}>
                <div style={{fontWeight:700,marginBottom:8,fontSize:11,textTransform:'uppercase',letterSpacing:'0.5px',color:'var(--textLight)'}}>Preview — device at RWF 179,000 cash price</div>
                {(()=>{const p=calcPreview('179000');return [['Cash price',fmtRWF(p.cash)],['Total price',fmtRWF(p.total)],['Deposit',fmtRWF(p.deposit)],['Monthly × 12',fmtRWF(p.monthly)]].map(([k,v])=>(<div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:5}}><span style={{color:'var(--textMid)'}}>{k}</span><span style={{fontFamily:'DM Mono,monospace',fontWeight:600}}>{v}</span></div>));})()}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <Btn v="primary" onClick={savePricing} icon="✓">Save pricing</Btn>
                <div style={{fontSize:11,color:'var(--textLight)'}}>Current: Markup {Math.round((cfg.markupRate||0.60)*100)}% · Deposit {Math.round((cfg.depositPct||0.20)*100)}%</div>
              </div>
            </Card>
          </div>
        )}

        {tab==='devices'&&(
          <div className="admin-two-col" style={{display:'grid',gridTemplateColumns:showAddDevice?'1.1fr .9fr':'1fr',gap:14,alignItems:'start'}}>
            <Card sx={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
                <div style={{fontWeight:700}}>Devices</div>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <input value={du} onChange={e=>setDu(e.target.value)} placeholder="Search…" style={{width:160}}/>
                  <Btn v="def" sz="sm" onClick={downloadCsvTemplate} icon="↓">CSV template</Btn>
                  <label style={{cursor:'pointer'}}><span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 12px',fontSize:12,fontWeight:600,borderRadius:'var(--r2)',border:'1.5px solid var(--border)',background:'white',color:'var(--text)',whiteSpace:'nowrap'}}>↑ Upload CSV</span><input type="file" accept=".csv,text/csv" style={{display:'none'}} onChange={handleCsvUpload}/></label>
                  <Btn v="primary" sz="sm" onClick={()=>setShowAddDevice(true)} icon="＋">Add device</Btn>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {devs.map(d=>{
                  const deal=calcDealFromDevice(d,cfg);
                  return(
                    <Card key={d.id} sx={{padding:14,boxShadow:'none'}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:10}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:800}}>{d.brand} {d.model} <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>({d.id})</span></div>
                          <div style={{fontSize:11,color:'var(--textLight)',marginTop:2}}>{[d.ram,d.rom].filter(Boolean).join(' / ')}</div>
                        </div>
                        <Btn v="err" sz="sm" onClick={()=>rmDev(d.id)}>Remove</Btn>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                        <FF label="Brand"><select value={d.brand||''} onChange={e=>upDev(d.id,{brand:e.target.value})}><option value="">Select…</option>{BRAND_ORDER.map(b=><option key={b} value={b}>{b}</option>)}</select></FF>
                        <FF label="Model"><input value={d.model||''} onChange={e=>upDev(d.id,{model:e.target.value})}/></FF>
                        <FF label="RAM"><input value={d.ram||''} onChange={e=>upDev(d.id,{ram:e.target.value})} placeholder="e.g. 4GB"/></FF>
                        <FF label="Storage"><input value={d.rom||''} onChange={e=>upDev(d.id,{rom:e.target.value})} placeholder="e.g. 128GB"/></FF>
                        <FF label="Cash price (RWF)"><input type="number" value={d.cash||d.cogs||''} onChange={e=>upDev(d.id,{cash:+e.target.value,cogs:+e.target.value})}/></FF>
                      </div>
                      <div style={{background:'var(--bg)',borderRadius:'var(--r2)',padding:'10px 12px',fontSize:11,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                        {[['Total price',fmtRWF(deal.totalCost)],['Deposit',fmtRWF(deal.upfrontPayment)],['Monthly × 12',fmtRWF(deal.recurrentPayment)]].map(([k,v])=>(
                          <div key={k}><div style={{color:'var(--textLight)',marginBottom:1}}>{k}</div><div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:12}}>{v}</div></div>
                        ))}
                      </div>
                    </Card>
                  );
                })}
                {devs.length===0&&<Empty ico="📱" title="No devices found"/>}
              </div>
            </Card>

            {showAddDevice&&(
            <Card sx={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{fontWeight:800}}>Add device</div>
                <Btn v="def" sz="sm" onClick={()=>{setShowAddDevice(false);setNewDev({brand:'',model:'',ram:'',rom:'',cash:''});}}>Cancel</Btn>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <FF label="Brand" req>
                  <div style={{marginTop:4}}>
                    <BrandPicker devices={[]} selectedBrand={newDev.brand} onSelect={b=>setNewDev(p=>({...p,brand:b||''}))} allBrands compact/>
                    {!newDev.brand&&<div style={{fontSize:11,color:'var(--err)',marginTop:4}}>Select a brand above</div>}
                  </div>
                </FF>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <FF label="Model name" req><input value={newDev.model} onChange={e=>setNewDev(p=>({...p,model:e.target.value}))} placeholder="e.g. Spark 40 Pro+"/></FF>
                  <FF label="RAM"><input value={newDev.ram} onChange={e=>setNewDev(p=>({...p,ram:e.target.value}))} placeholder="e.g. 4GB"/></FF>
                  <FF label="Storage (ROM)"><input value={newDev.rom} onChange={e=>setNewDev(p=>({...p,rom:e.target.value}))} placeholder="e.g. 128GB"/></FF>
                </div>
                <FF label="Cash price (RWF)" req><input type="number" value={newDev.cash} onChange={e=>setNewDev(p=>({...p,cash:e.target.value}))} placeholder="e.g. 179000"/></FF>
                {newDev.cash&&+newDev.cash>0&&(
                  <div style={{background:'var(--brandPale)',borderRadius:'var(--r2)',padding:'10px 13px',fontSize:11}}>
                    <div style={{fontWeight:700,marginBottom:6,color:'var(--brand2)'}}>Calculated pricing</div>
                    {[['Total price',fmtRWF(prev.total)],['Deposit',fmtRWF(prev.deposit)],['Monthly × 12',fmtRWF(prev.monthly)]].map(([k,v])=>(
                      <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{color:'var(--textMid)'}}>{k}</span><span style={{fontFamily:'DM Mono,monospace',fontWeight:600}}>{v}</span></div>
                    ))}
                  </div>
                )}
                <Btn v="primary" onClick={addDev} full icon="＋">Add device</Btn>
              </div>
            </Card>
            )}
          </div>
        )}

        {tab==='users'&&(
          <div className="admin-two-col" style={{display:'grid',gridTemplateColumns:showAddUser?'1.1fr .9fr':'1fr',gap:14,alignItems:'start'}}>
            <Card sx={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
                <div style={{fontWeight:800}}>Users</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input value={uu} onChange={e=>setUu(e.target.value)} placeholder="Search users…" style={{width:240}}/>
                  <Btn v="primary" sz="sm" onClick={()=>setShowAddUser(true)} icon="＋">Add user</Btn>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {us.map(u=>(
                  <Card key={u.id} sx={{padding:14,boxShadow:'none'}}>
                    <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:10}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:800}}>{u.name} <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>({u.id})</span></div>
                        <div style={{fontSize:11,color:'var(--textLight)',marginTop:2}}>{u.email}</div>
                      </div>
                      <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
                        <Btn v="info" sz="sm" onClick={()=>resetPwd(u.id)}>Reset password</Btn>
                        <Btn v="err" sz="sm" onClick={()=>rmUser(u.id)}>Remove</Btn>
                      </div>
                    </div>
                    {u.role==='rep'&&u.shopId&&<div style={{fontSize:11,color:'var(--brand2)',background:'var(--brandPale)',border:'1px solid var(--brandPale2)',borderRadius:99,padding:'2px 10px',display:'inline-block',marginBottom:8}}>🏪 {shopName(u.shopId)}</div>}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      <FF label="Name"><input value={u.name} onChange={e=>upUser(u.id,{name:e.target.value})}/></FF>
                      <FF label="Email (any domain)"><input type="email" value={u.email||''} onChange={e=>upUser(u.id,{email:normEmail(e.target.value.trim())})} placeholder="user@domain.com"/></FF>
                      <FF label="Role">
                        <select value={u.role} onChange={e=>upUser(u.id,{role:e.target.value,roleLabel:roleLabelFor(e.target.value)})}>
                          <option value="rep">Sales Representative</option>
                          <option value="underwriter">Underwriter</option>
                          <option value="ops">Ops & Support</option>
                          <option value="merchant">Retail Manager</option>
                          <option value="groupadmin">Group Admin</option>
                        </select>
                      </FF>
                      {u.role==='rep'&&(
                        <FF label="Shop">
                          <select value={u.shopId||''} onChange={e=>upUser(u.id,{shopId:e.target.value})}>
                            <option value="">No shop assigned</option>
                            {(shops||[]).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                          </select>
                        </FF>
                      )}
                      {u.role==='merchant'&&(
                        <FF label="Retail group">
                          <select value={u.merchantGroupId||''} onChange={e=>upUser(u.id,{merchantGroupId:e.target.value||null})}>
                            <option value="">— Unassigned —</option>
                            {(merchantGroups||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                          </select>
                        </FF>
                      )}
                      <FF label="Superuser (ops only)">
                        <select value={u.superuser?'yes':'no'} onChange={e=>upUser(u.id,{superuser:e.target.value==='yes'})} disabled={u.role!=='ops'}>
                          <option value="no">No</option>
                          <option value="yes">Yes</option>
                        </select>
                      </FF>
                    </div>
                    {u.mustChangePassword&&<div style={{marginTop:10,fontSize:11,color:'var(--warn)',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',padding:'8px 10px'}}>User must change password on next login</div>}
                  </Card>
                ))}
                {us.length===0&&<Empty ico="👤" title="No users found"/>}
              </div>
            </Card>

            {showAddUser&&(
            <Card sx={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{fontWeight:800}}>Add user</div>
                <Btn v="def" sz="sm" onClick={()=>{setShowAddUser(false);setNewUser({name:'',email:'',password:'',role:'rep',shopId:'',merchantGroupId:'',superuser:false});}}>Cancel</Btn>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <FF label="Full name" req><input value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))} placeholder="e.g. Grace Mukamana"/></FF>
                <FF label="Email (any domain)" req><input type="email" value={newUser.email} onChange={e=>setNewUser(p=>({...p,email:e.target.value}))} placeholder="e.g. grace@company.com or grace@leout.rw"/></FF>
                <FF label="Password (optional – superuser can set custom)">
                  <input type="password" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))} placeholder="Leave blank to auto-generate temp password"/>
                </FF>
                <FF label="Role">
                  <select value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value,superuser:false,shopId:'',merchantGroupId:''}))}>
                    <option value="rep">Sales Representative</option>
                    <option value="underwriter">Underwriter</option>
                    <option value="ops">Ops & Support</option>
                    <option value="merchant">Retail Manager</option>
                    <option value="groupadmin">Group Admin</option>
                  </select>
                </FF>
                {newUser.role==='rep'&&(
                  <FF label="Shop (required for sales reps)" req>
                    <select value={newUser.shopId} onChange={e=>setNewUser(p=>({...p,shopId:e.target.value}))}>
                      <option value="">Select shop…</option>
                      {(shops||[]).map(s=><option key={s.id} value={s.id}>{s.name}{s.location?` — ${s.location}`:''}</option>)}
                    </select>
                  </FF>
                )}
                {newUser.role==='merchant'&&(
                  <FF label="Retail group" req>
                    <select value={newUser.merchantGroupId||''} onChange={e=>setNewUser(p=>({...p,merchantGroupId:e.target.value}))}>
                      <option value="">Select group…</option>
                      {(merchantGroups||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                    </select>
                  </FF>
                )}
                <FF label="Make superuser (ops only)">
                  <select value={newUser.superuser?'yes':'no'} onChange={e=>setNewUser(p=>({...p,superuser:e.target.value==='yes'}))} disabled={newUser.role!=='ops'}>
                    <option value="no">No</option>
                    <option value="yes">Yes</option>
                  </select>
                </FF>
                <Btn v="primary" onClick={addUser} full icon="＋">Create user</Btn>
                <div style={{fontSize:11,color:'var(--textLight)',lineHeight:1.5}}>
                  New users appear in the login page demo accounts. If you leave password blank, a temporary password is generated.
                </div>
              </div>
            </Card>
            )}
          </div>
        )}
        {tab==='groups'&&user.superuser&&<RetailGroupsTab/>}

        {tab==='shops'&&user.superuser&&(
          <div className="admin-two-col" style={{display:'grid',gridTemplateColumns:showAddShop?'1.1fr .9fr':'1fr',gap:14,alignItems:'start'}}>
            <Card sx={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
                <div style={{fontWeight:800}}>Shops <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>({(shops||[]).length})</span></div>
                <Btn v="primary" sz="sm" onClick={()=>setShowAddShop(true)} icon="＋">Add shop</Btn>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {(shops||[]).map(s=>{
                  const repCount=(users||[]).filter(u=>u.shopId===s.id).length;
                  const appCount=(apps||[]).filter(a=>a.shopId===s.id).length;
                  return(
                    <Card key={s.id} sx={{padding:14,boxShadow:'none'}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:10}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:800}}>{s.name} <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>({s.id})</span></div>
                          <div style={{fontSize:11,color:'var(--textLight)',marginTop:2}}>{s.location||'—'}</div>
                          <div style={{display:'flex',gap:10,marginTop:6,fontSize:11,color:'var(--textMid)'}}>
                            <span>👤 {repCount} rep{repCount!==1?'s':''}</span>
                            <span>📋 {appCount} application{appCount!==1?'s':''}</span>
                          </div>
                        </div>
                        <Btn v="err" sz="sm" onClick={()=>{
                          if(repCount>0){addToast('err','Cannot remove shop','Remove or reassign all reps first');return;}
                          setShops((shops||[]).filter(sh=>sh.id!==s.id));
                          addToast('ok','Shop removed','');
                        }}>Remove</Btn>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                        <FF label="Shop name"><input value={s.name} onChange={e=>setShops((shops||[]).map(sh=>sh.id===s.id?{...sh,name:e.target.value}:sh))}/></FF>
                        <FF label="Location"><input value={s.location||''} onChange={e=>setShops((shops||[]).map(sh=>sh.id===s.id?{...sh,location:e.target.value}:sh))} placeholder="e.g. KG 15 Ave, Kigali"/></FF>
                        <FF label="Retail group">
                          <select value={s.merchantGroupId||''} onChange={e=>setShops((shops||[]).map(sh=>sh.id===s.id?{...sh,merchantGroupId:e.target.value||null}:sh))}>
                            <option value="">— Unassigned —</option>
                            {(merchantGroups||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                          </select>
                        </FF>
                      </div>
                    </Card>
                  );
                })}
                {(shops||[]).length===0&&<Empty ico="🏪" title="No shops yet"/>}
              </div>
            </Card>
            {showAddShop&&(
              <Card sx={{padding:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div style={{fontWeight:800}}>Add shop</div>
                  <Btn v="def" sz="sm" onClick={()=>{setShowAddShop(false);setNewShop({name:'',location:''});}}>Cancel</Btn>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  <FF label="Shop name" req><input value={newShop.name} onChange={e=>setNewShop(p=>({...p,name:e.target.value}))} placeholder="e.g. Remera Branch"/></FF>
                  <FF label="Location"><input value={newShop.location} onChange={e=>setNewShop(p=>({...p,location:e.target.value}))} placeholder="e.g. Remera, Kigali"/></FF>
                  <FF label="Retail group">
                    <select value={newShop.merchantGroupId||''} onChange={e=>setNewShop(p=>({...p,merchantGroupId:e.target.value||null}))}>
                      <option value="">— Unassigned —</option>
                      {(merchantGroups||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                    </select>
                  </FF>
                  <div style={{background:'var(--bg)',borderRadius:'var(--r2)',padding:'10px 13px',fontSize:11,color:'var(--textMid)'}}>
                    Shop ID will be auto-generated (e.g. <span style={{fontFamily:'DM Mono,monospace',fontWeight:700}}>{mkShopId()}</span>)
                  </div>
                  <Btn v="primary" full icon="＋" onClick={()=>{
                    if(!newShop.name.trim()){addToast('err','Shop name required','');return;}
                    const id=mkShopId();
                    setShops([...(shops||[]),{id,name:newShop.name.trim(),location:newShop.location.trim(),merchantGroupId:newShop.merchantGroupId||null,createdAt:new Date().toISOString()}]);
                    setNewShop({name:'',location:'',merchantGroupId:''});setShowAddShop(false);
                    addToast('ok','Shop added',`${newShop.name.trim()} (${id})`);
                  }}>Create shop</Btn>
                </div>
              </Card>
            )}
          </div>
        )}
        {tab==='company'&&user.superuser&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Card sx={{padding:'16px 18px'}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>Company identity — appears on all contracts</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <FF label="Company name" req><input value={coDraft.name} onChange={e=>sco('name',e.target.value)} placeholder="e.g. Cleva Financial Services Ltd"/></FF>
                <FF label="Registration number"><input value={coDraft.regNo||''} onChange={e=>sco('regNo',e.target.value)} placeholder="e.g. RDB/2024/CL001"/></FF>
              </div>
              <FF label="Tagline / slogan"><input value={coDraft.tagline||''} onChange={e=>sco('tagline',e.target.value)} placeholder="e.g. Empowering access"/></FF>
              <div style={{marginTop:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <FF label="Address"><input value={coDraft.address||''} onChange={e=>sco('address',e.target.value)} placeholder="e.g. KG 15 Avenue, Kigali"/></FF>
                <FF label="Phone"><input value={coDraft.phone||''} onChange={e=>sco('phone',e.target.value)} placeholder="+250 788 000 000"/></FF>
                <FF label="Email"><input type="email" value={coDraft.email||''} onChange={e=>sco('email',e.target.value)} placeholder="info@company.rw"/></FF>
                <FF label="Website"><input value={coDraft.website||''} onChange={e=>sco('website',e.target.value)} placeholder="www.company.rw"/></FF>
              </div>
              <div style={{marginTop:14,borderTop:'1.5px solid var(--border)',paddingTop:14}}>
                <FF label="Company logo (PNG/JPEG — shown at top of all contract PDFs)">
                  <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                    <label style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 16px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--r2)',cursor:'pointer',fontSize:13}}>
                      📤 Upload logo<input type="file" accept="image/*" style={{display:'none'}} onChange={handleCoLogo}/>
                    </label>
                    {coDraft.logo&&<div style={{display:'flex',alignItems:'center',gap:8}}><img src={coDraft.logo} alt="logo" style={{height:40,maxWidth:120,objectFit:'contain',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:4}}/><Btn v="def" sz="sm" onClick={()=>sco('logo',null)}>Remove</Btn></div>}
                    {!coDraft.logo&&<span style={{fontSize:11,color:'var(--textLight)'}}>No logo — company name will appear as text</span>}
                  </div>
                </FF>
              </div>
            </Card>

            <Card sx={{padding:'16px 18px'}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:6}}>Company signatory — pre-loaded on all contracts</div>
              <p style={{fontSize:11,color:'var(--textMid)',marginBottom:14,lineHeight:1.5}}>This person's signature and name will appear as the company representative on every contract PDF. Upload once, applies to all contracts.</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                <FF label="Signatory full name"><input value={coDraft.signatoryName||''} onChange={e=>sco('signatoryName',e.target.value)} placeholder="e.g. Jean Pierre Habimana"/></FF>
                <FF label="Title / designation"><input value={coDraft.signatoryTitle||''} onChange={e=>sco('signatoryTitle',e.target.value)} placeholder="e.g. Chief Executive Officer"/></FF>
              </div>
              <FF label="Signatory signature (draw or upload — appears on every contract PDF)">
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  <label style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 16px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--r2)',cursor:'pointer',fontSize:13,alignSelf:'flex-start'}}>
                    📤 Upload signature image<input type="file" accept="image/*" style={{display:'none'}} onChange={handleCoSig}/>
                  </label>
                  {coDraft.signatorySig&&(
                    <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',border:'1.5px solid var(--okBorder)',borderRadius:'var(--r)',background:'var(--okBg)'}}>
                      <img src={coDraft.signatorySig} alt="signatory sig" style={{height:48,maxWidth:160,objectFit:'contain',background:'white',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:4}}/>
                      <div>
                        <div style={{fontSize:12,fontWeight:600,color:'var(--ok)'}}>✓ Signature loaded</div>
                        <div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{coDraft.signatoryName||'No name set'} · {coDraft.signatoryTitle||''}</div>
                      </div>
                      <Btn v="def" sz="sm" onClick={()=>sco('signatorySig',null)} style={{marginLeft:'auto'}}>Remove</Btn>
                    </div>
                  )}
                  {!coDraft.signatorySig&&<span style={{fontSize:11,color:'var(--textLight)'}}>No signature — a blank line will appear on the contract</span>}
                </div>
              </FF>
            </Card>

            <Card sx={{padding:'16px 18px'}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:4}}>Carlcare IMEI auto-check</div>
              <div style={{fontSize:11,color:'var(--textMid)',marginBottom:12,lineHeight:1.6}}>Deploy the <strong>carlcare-worker.js</strong> file to a free Cloudflare Worker, then paste the worker URL here. Once set, IMEI verification will happen automatically — no manual Carlcare website visit needed.</div>
              <FF label="Carlcare proxy URL (e.g. https://cleva-imei.YOUR-NAME.workers.dev)">
                <input value={coDraft.imeiProxyUrl||''} onChange={e=>sco('imeiProxyUrl',e.target.value)} placeholder="https://cleva-imei.your-name.workers.dev" style={{fontFamily:'DM Mono,monospace',fontSize:12}}/>
              </FF>
              {coDraft.imeiProxyUrl&&<div style={{fontSize:11,color:'var(--ok)',marginTop:6,fontWeight:600}}>✓ Auto-check enabled — IMEI verification will be automatic</div>}
              {!coDraft.imeiProxyUrl&&<div style={{fontSize:11,color:'var(--textLight)',marginTop:6}}>Not configured — agents will verify IMEI manually on the Carlcare website</div>}
            </Card>

            <Card sx={{padding:'16px 18px',background:'var(--bg)'}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Contract header preview</div>
              <div style={{background:'white',border:'1.5px solid var(--border)',borderRadius:'var(--r)',padding:'16px 20px'}}>
                {coDraft.logo&&<img src={coDraft.logo} alt="logo" style={{height:36,marginBottom:8,display:'block'}}/>}
                <div style={{fontWeight:800,fontSize:16,color:'var(--brand)'}}>{coDraft.name||'Company name'}</div>
                <div style={{fontSize:11,color:'var(--textLight)',marginTop:2}}>{coDraft.tagline}</div>
                <div style={{fontSize:10,color:'var(--textLight)',marginTop:2}}>{[coDraft.address,coDraft.phone,coDraft.email].filter(Boolean).join(' · ')}</div>
                {coDraft.regNo&&<div style={{fontSize:9,color:'var(--textLight)',marginTop:1}}>Reg: {coDraft.regNo}</div>}
              </div>
            </Card>
            <Btn v="primary" icon="✓" onClick={saveCompany}>Save company settings</Btn>
          </div>
        )}

        {tab==='emailtpl'&&user.superuser&&<EmailTplEditor addToast={addToast}/>}
      </div>
    );
  };

  const mobileTitle=pg==='overview'?'Overview':pg==='all'?'All applications':pg==='admin'?'Admin':APP_NAME;
  return(
    <div className="app-layout" style={{display:'flex',flex:1,minHeight:0}}>
      <Sidebar {...sidebarProps}/>
      <div className="app-main main-scroll" style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}>
        <div className="mobile-header"><button type="button" className="hamburger" onClick={()=>setMobileMenuOpen(true)} aria-label="Open menu">☰</button><LogoBrand iconSize={30} textSize={14} style={{marginRight:4}}/><span style={{fontWeight:700,fontSize:16}}>{mobileTitle}</span></div>
        {pg==='overview'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{marginBottom:22}}><h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>Operations overview</h1><p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>{APP_NAME} Rwanda · Live pipeline</p></div>
            <div className="stats-grid-3" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:24}}>
              {[['Total applications',apps.length,'var(--brand)'],['Active contracts',apps.filter(a=>a.status===ST.ACTIVE).length,'var(--ok)'],['Pending review',apps.filter(a=>[ST.PENDING_APPROVAL,ST.UNDER_REVIEW].includes(a.status)).length,'var(--warn)'],['Approved — IMEI pending',apps.filter(a=>a.status===ST.APPROVED).length,'var(--info)'],['Escalated',apps.filter(a=>a.status===ST.ESCALATED).length,'var(--pur)'],['Rejected',apps.filter(a=>a.mboDecision==='REJECTED').length,'var(--err)']].map(([l,v,c])=>(
                <Card key={l} sx={{padding:'14px 16px'}}><div style={{fontSize:10,color:'var(--textLight)',marginBottom:5}}>{l}</div><div style={{fontSize:26,fontWeight:800,color:c}}>{v}</div></Card>
              ))}
            </div>
            <Card sx={{padding:'16px 18px',marginBottom:22}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>Pipeline status</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[[ST.PENDING_APPROVAL,'Pending approval','var(--warn)'],[ST.UNDER_REVIEW,'Changes requested','var(--warn)'],[ST.APPROVED,'Approved — IMEI pending','var(--ok)'],[ST.LOCK_PENDING,'Lock pending','var(--warn)'],[ST.ESCALATED,'Escalated','var(--pur)'],[ST.ACTIVE,'Active','var(--ok)'],[ST.COMPLETED,'Completed','var(--ok)'],[ST.ARCHIVED,'Archived/Rejected','var(--pur)']].map(([st,l,c])=>{
                  const n=apps.filter(a=>a.status===st).length;
                  return <div key={st} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',background:'var(--bg)',borderRadius:'var(--r2)',border:'1px solid var(--border)'}}><div style={{width:8,height:8,borderRadius:4,background:c}}/><span style={{fontSize:12,color:'var(--textMid)'}}>{l}</span><span style={{fontSize:12,fontWeight:700}}>{n}</span></div>;
                })}
              </div>
            </Card>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>RECENT ACTIVITY</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>{[...apps].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,8).map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div>
          </div>
        )}
        {pg==='all'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:10}}>
              <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px',margin:0}}>All applications</h1>
              <Btn v="def" sz="sm" icon="⬇" onClick={()=>{
                const rows=[['ID','Date','Status','Customer','Phone','ID No','Rep','Shop','Device','Total (RWF)','Deposit (RWF)','Monthly (RWF)','IMEI']];
                filtered.forEach(a=>{
                  rows.push([a.id,a.createdAt?new Date(a.createdAt).toLocaleDateString('en-GB'):'',SM[a.status]?.label||a.status,a.c.name||'',a.c.phone||'',a.c.nid||'',a.rep||'',shopName(a.shopId),(a.dev?.brand?`${a.dev.brand} ${a.dev.model}`:''),a.dev?.totalCost||'',a.dev?.dep||'',a.dev?.weekly||'',a.imei||'']);
                });
                const csv=rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
                const el=document.createElement('a');el.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);el.download=`applications_${new Date().toISOString().slice(0,10)}.csv`;el.click();
              }}>Export CSV</Btn>
            </div>
            <Card sx={{padding:'14px 16px',marginBottom:14}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
                <FF label="Search (name / ID / rep)"><input value={q} onChange={ev=>setQ(ev.target.value)} placeholder="Search…"/></FF>
                <FF label="Status">
                  <select value={fst} onChange={ev=>setFst(ev.target.value)}>
                    <option value="">All statuses</option>
                    {Object.entries(SM).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                  </select>
                </FF>
                <FF label="Retail group">
                  <select value={fGroup} onChange={ev=>{setFGroup(ev.target.value);setFShop('');}}>
                    <option value="">All groups</option>
                    {(merchantGroups||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                    <option value="__none__">— Unassigned —</option>
                  </select>
                </FF>
                <FF label="Shop">
                  <select value={fShop} onChange={ev=>setFShop(ev.target.value)}>
                    <option value="">All shops</option>
                    {(fGroup&&fGroup!=='__none__'?(shops||[]).filter(s=>s.merchantGroupId===fGroup):(shops||[])).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </FF>
                <FF label="Sales rep">
                  <select value={fRep} onChange={ev=>setFRep(ev.target.value)}>
                    <option value="">All reps</option>
                    {(users||[]).filter(u=>u.role==='rep').map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </FF>
                <FF label="Date from"><input type="date" value={fDateFrom} onChange={ev=>setFDateFrom(ev.target.value)}/></FF>
                <FF label="Date to"><input type="date" value={fDateTo} onChange={ev=>setFDateTo(ev.target.value)}/></FF>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10}}>
                <span style={{fontSize:11,color:'var(--textLight)'}}>{filtered.length} result{filtered.length!==1?'s':''}</span>
                {(q||fst||fGroup||fShop||fRep||fDateFrom||fDateTo)&&<Btn v="ghost" sz="sm" onClick={()=>{setQ('');setFst('');setFGroup('');setFShop('');setFRep('');setFDateFrom('');setFDateTo('');}}>Clear filters</Btn>}
              </div>
            </Card>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>{filtered.map(a=>{
              const sn=shopName(a.shopId);
              const gid=groupOfShop(a.shopId);
              const gn=(merchantGroups||[]).find(g=>g.id===gid)?.name;
              return <div key={a.id}><ACard app={a} onClick={()=>setSel(a.id)}/>{(a.shopId||a.rep||gn)&&<div style={{display:'flex',gap:8,paddingLeft:8,marginTop:-4,marginBottom:4,flexWrap:'wrap'}}>{gn&&<span style={{fontSize:10,color:'var(--pur)',background:'var(--purBg)',padding:'1px 7px',borderRadius:99,border:'1px solid var(--purBorder)'}}>🏢 {gn}</span>}{a.shopId&&<span style={{fontSize:10,color:'var(--brand2)',background:'var(--brandPale)',padding:'1px 7px',borderRadius:99,border:'1px solid var(--brandPale2)'}}>🏪 {sn}</span>}{a.rep&&<span style={{fontSize:10,color:'var(--textMid)',background:'var(--bg)',padding:'1px 7px',borderRadius:99,border:'1px solid var(--border)'}}>👤 {a.rep}</span>}</div>}</div>;
            })}</div>
            {filtered.length===0&&<Empty ico="🔍" title="No results found"/>}
          </div>
        )}
        {pg==='admin'&&user.superuser&&(
          <Admin/>
        )}
      </div>
    </div>
  );
};

// ── CONTRACT ↔ LEGACY APP ADAPTER ─────────────────────────────
function contractToLegacyApp(c){
  const app=c;const ap=c.application||{};const deal=c.deal||{};
  return {
    ...app,
    c:{name:ap.fullName||ap.name||'',nid:ap.nationalIdNumber||'',phone:ap.phoneNumber||'',addr:ap.address||'',occ:ap.employmentType||'',income:ap.monthlyIncomeRwf||0,kin:{name:ap.guarantorName||'',phone:ap.guarantorPhone||'',rel:ap.guarantorRel||'Guarantor'},idType:ap.idType||'nid'},
    dev:{id:deal.dealId,brand:deal.manufacturer,model:deal.deviceModel,sku:deal.dealId,specs:[deal.RAM,deal.ROM].filter(Boolean).join(' '),ram:deal.RAM||'',rom:deal.ROM||'',dep:deal.upfrontPayment||0,weekly:deal.recurrentPayment||0,wks:deal.termOption||12,retail:deal.cogs,totalCost:deal.totalCost},
    rep:app.repName||'',repId:app.repId,shopId:app.shopId||null,
    notes:app.mboRejectionReason||app.notes||'',reviewer:app.mboReviewedBy||null,upya:app.upya||null,imei:app.imei,ptId:app.ptId,lockedAt:app.lockedAt,
    customerPhoto:ap.customerPhoto,idPhoto:ap.idPhoto,incomeProof:ap.incomeProof,
    requestedChangeFields:(ap.fieldCorrectionRequests||[]).filter(r=>!r.resolvedAt).map(r=>r.fieldName),
  };
}

// ── ROOT ──────────────────────────────────────────────────────
const App=()=>{
  const [user,setUser]=useState(null);
  const [toasts,setToasts]=useState([]);

  useEffect(()=>{seedIfMissing();const list=readLS(LS.CONTRACTS,[]);const nums=list.map(c=>parseInt(String(c.id).replace(/\D/g,''),10)).filter(n=>!isNaN(n));if(nums.length)contractSeq=Math.max(contractSeq,...nums);},[]);

  const [users,setUsers]=useState(()=>readLS(LS.USERS,USERS_SEED));
  useEffect(()=>{
    const stored=readLS(LS.USERS,USERS_SEED);
    const toAdd=USERS_SEED.filter(s=>!stored.some(u=>u.id===s.id));
    if(toAdd.length){const merged=[...stored,...toAdd];writeLS(LS.USERS,merged);setUsers(merged);}
  },[]);
  const [merchantGroups,setMerchantGroups]=useState(()=>readLS(LS.MERCHANT_GROUPS,MERCHANT_GROUPS_SEED));
  const [shops,setShops]=useState(()=>readLS(LS.SHOPS,SHOPS_SEED));
  const [devices,setDevices]=useState(()=>readLS(LS.DEVICES,DEVICES_SEED));
  const [contracts,setContracts]=useState(()=>readLS(LS.CONTRACTS,[]));
  const [pricingConfig,setPricingConfig]=useState(()=>readLS(LS.PRICING_CONFIG,defaultPricingConfig));
  const [companyInfo,setCompanyInfo]=useState(()=>readLS(LS.COMPANY,defaultCompanyInfo)||defaultCompanyInfo);
  useEffect(()=>{writeLS(LS.COMPANY,companyInfo);},[companyInfo]);
  useEffect(()=>{writeLS(LS.SHOPS,shops);},[shops]);
  const apps=React.useMemo(()=>(contracts||[]).map(contractToLegacyApp),[contracts]);

  const addToast=useCallback((c,title,msg='')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,c,title,msg}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4200);
  },[]);

  useEffect(()=>writeLS(LS.USERS,users),[users]);
  useEffect(()=>writeLS(LS.MERCHANT_GROUPS,merchantGroups),[merchantGroups]);
  useEffect(()=>writeLS(LS.DEVICES,devices),[devices]);
  useEffect(()=>writeLS(LS.CONTRACTS,contracts),[contracts]);
  useEffect(()=>writeLS(LS.PRICING_CONFIG,pricingConfig),[pricingConfig]);

  const updateApp=useCallback((id,upd,newContract)=>{
    if(newContract){setContracts(p=>[...p,newContract]);return;}
    setContracts(p=>p.map(c=>{
      if(c.id!==id)return c;
      const entry=upd.tlEntry;
      const tl=entry?[...(c.tl||[]),{at:new Date().toISOString(),by:entry.by,txt:entry.txt}]:c.tl;
      const {tlEntry,...rest}=upd;
      const patch=Object.fromEntries(Object.entries(rest).filter(([,v])=>v!==undefined));
      if(patch.application&&c.application)patch.application={...c.application,...patch.application};
      return{...c,...patch,tl,updatedAt:new Date().toISOString()};
    }));
  },[]);

  const [lang,setLang]=useState(()=>readLS('cleva_lang_v1','en'));
  const toggleLang=useCallback(()=>setLang(l=>{const nl=l==='en'?'rw':'en';writeLS('cleva_lang_v1',nl);return nl;}),[]);
  const ctx={user,logout:()=>setUser(null),companyInfo,setCompanyInfo,lang,toggleLang,shops,setShops,users,merchantGroups};

  if(!user) return(
    <Ctx.Provider value={ctx}>
      <Login onLogin={setUser} users={users}/>
      <Toast toasts={toasts}/>
    </Ctx.Provider>
  );

  return(
    <Ctx.Provider value={ctx}>
      <div className="app-layout" style={{display:'flex',minHeight:'100vh',height:'100vh'}}>
        {user.role==='rep'&&<SalesRepView apps={apps} onUpdate={updateApp} addToast={addToast} devices={devices} pricingConfig={pricingConfig} companyInfo={companyInfo}/>}
        {user.role==='underwriter'&&<UnderwriterView apps={apps} onUpdate={updateApp} addToast={addToast}/>}
        {user.role==='support'&&<SupportView apps={apps} onUpdate={updateApp} addToast={addToast}/>}
        {user.role==='groupadmin'&&<GroupAdminView apps={apps} addToast={addToast} users={users} setUsers={setUsers} shops={shops} setShops={setShops} merchantGroups={merchantGroups} setMerchantGroups={setMerchantGroups}/>}
        {user.role==='merchant'&&<MerchantView apps={apps} addToast={addToast} users={users} setUsers={setUsers} shops={shops}/>}
        {user.role==='ops'&&<OpsView apps={apps} onUpdate={updateApp} addToast={addToast} devices={devices} setDevices={setDevices} users={users} setUsers={setUsers} shops={shops} setShops={setShops} setContracts={setContracts} pricingConfig={pricingConfig} setPricingConfig={setPricingConfig} merchantGroups={merchantGroups} setMerchantGroups={setMerchantGroups}/>}
      </div>
      <Toast toasts={toasts}/>
    </Ctx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
