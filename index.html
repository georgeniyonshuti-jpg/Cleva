<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cleva</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0B3D2E;--brand2:#146344;--brand3:#1D8A5E;--brandPale:#E6F3EE;--brandPale2:#D0E9DE;
  --accent:#D4700A;
  --bg:#F2F0EB;--surface:#FFFFFF;
  --border:rgba(11,61,46,0.11);--borderMed:rgba(11,61,46,0.2);
  --text:#111B15;--textMid:#4A5E52;--textLight:#8FA898;
  --ok:#1E6B3A;--okBg:#E8F5EE;--okBorder:#A8D8BC;
  --warn:#A05800;--warnBg:#FEF3E2;--warnBorder:#F0C882;
  --err:#B01C1C;--errBg:#FEE8E8;--errBorder:#F0AAAA;
  --info:#1549A0;--infoBg:#E8EFFE;--infoBorder:#A8BCEC;
  --pur:#5B21B6;--purBg:#EEE9FD;--purBorder:#C4AFEF;
  --r:10px;--r2:6px;
  --sh:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --sh2:0 4px 16px rgba(0,0,0,0.10),0 1px 4px rgba(0,0,0,0.06);
}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;line-height:1.5}
input,select,textarea,button{font-family:'DM Sans',sans-serif;font-size:14px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r2);background:white;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand2);box-shadow:0 0 0 3px rgba(20,99,68,0.10)}
input.err,select.err{border-color:var(--err)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.13);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp .22s ease}
.slideRight{animation:slideRight .2s ease}
.spin{animation:spin .7s linear infinite}

/* Mobile: touch-friendly and safe area */
@media (max-width:768px){
  body{font-size:15px;-webkit-tap-highlight-color:transparent}
  input,select,textarea,button{font-size:16px}
  button,.btn-touch{min-height:44px;min-width:44px}
}
@media (max-width:480px){
  body{font-size:14px}
}
/* Smooth scroll on iOS */
.main-scroll{-webkit-overflow-scrolling:touch}
/* Login: compact on small screens */
@media (max-width:480px){
  .login-wrap{padding:16px!important}
  .login-card{padding:20px 18px!important}
}

/* Sidebar: fixed size, no scroll; hamburger collapse on desktop; overlay on mobile */
.app-layout{display:flex;min-height:100vh;height:100vh;overflow:hidden}
.app-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.sidebar-wrapper{flex-shrink:0;height:100vh;overflow:hidden;display:flex;transition:width .22s ease}
.sidebar-backdrop{display:none}
.sidebar-collapsed-bar{display:none;width:52px;height:100vh;background:var(--brand);flex-direction:column;align-items:center;padding-top:14px;border-right:1px solid rgba(255,255,255,0.08)}
.sidebar-collapsed-bar .hamburger-desk{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);border:none;border-radius:var(--r2);color:white;cursor:pointer;font-size:18px}
.sidebar-drawer{width:210px;height:100vh;display:flex;flex-direction:column;background:var(--brand);flex-shrink:0;overflow:hidden}
.sidebar-drawer .sidebar-nav{flex:1;overflow-y:auto;padding:10px;min-height:0}
@media (min-width:769px){
  .sidebar-wrapper{width:52px}
  .sidebar-wrapper.desktop-collapsed{width:52px}
  .sidebar-wrapper.desktop-collapsed .sidebar-drawer{display:none}
  .sidebar-wrapper.desktop-collapsed .sidebar-collapsed-bar{display:flex}
  .sidebar-wrapper.desktop-expanded{width:210px}
  .sidebar-wrapper.desktop-expanded .sidebar-collapsed-bar{display:none}
  .sidebar-wrapper.desktop-expanded .sidebar-drawer{display:flex}
}
.sidebar-drawer .sidebar-collapse-btn{width:100%;padding:10px 14px;border:none;background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;text-align:left;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-drawer .sidebar-collapse-btn:hover{background:rgba(255,255,255,0.06);color:white}
@media (max-width:768px){
  .sidebar-wrapper{width:0!important;min-width:0}
  .sidebar-wrapper .sidebar-collapsed-bar{display:none!important}
  .sidebar-wrapper .sidebar-drawer{position:fixed;left:0;top:0;bottom:0;height:100vh;height:100dvh;max-height:100vh;width:260px;max-width:85vw;z-index:1001;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,0.15);padding-top:env(safe-area-inset-top)}
  .sidebar-wrapper .sidebar-drawer.mobile-open{transform:translateX(0)}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
  .sidebar-backdrop.visible{opacity:1;pointer-events:auto}
}
@media (min-width:769px){
  .sidebar-wrapper.desktop-expanded .sidebar-drawer .sidebar-collapse-btn{display:flex}
}
@media (max-width:768px){
  .sidebar-drawer .sidebar-collapse-btn{display:none}
}

/* Mobile header (hamburger + title) – fixed height, always visible on scroll */
.mobile-header{display:none;align-items:center;gap:12px;padding:12px 16px;padding-left:calc(16px + env(safe-area-inset-left));background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0}
.mobile-header .hamburger{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;font-size:18px;color:var(--text);-webkit-tap-highlight-color:transparent}
@media (max-width:768px){
  .mobile-header{display:flex;position:sticky;top:0;z-index:50;min-height:56px;box-sizing:border-box}
  .app-main{overflow:auto;-webkit-overflow-scrolling:touch}
  .mobile-header .hamburger{min-height:44px!important;height:44px}
  .app-main button{min-height:44px!important}
}

/* Top bar – always visible on all screen sizes (used by Sales & Underwriter views) */
.top-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;padding-left:calc(16px + env(safe-area-inset-left));background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:50;min-height:52px;box-sizing:border-box}
.top-bar .hamburger{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;font-size:18px;color:var(--text);-webkit-tap-highlight-color:transparent;flex-shrink:0}
@media (min-width:769px){.top-bar .hamburger{display:none!important}}
@media (max-width:768px){.top-bar{min-height:56px}.top-bar .hamburger{width:44px;height:44px}}

/* Page content padding on mobile */
@media (max-width:768px){
  .page-content{padding:16px 14px 24px!important}
  .page-content h1{font-size:18px!important}
}
@media (max-width:480px){.page-content{padding:14px 12px 20px!important}}

/* New application: full-page form layout */
.new-app-fullpage{height:100%;min-height:0}
.new-app-form{box-sizing:border-box}
.new-app-form header .step-connector{flex:1;max-width:40px}
@media (max-width:640px){
  .new-app-form .new-app-step-label{display:none!important}
}
/* On mobile, new-app-fullpage is a true full-screen overlay (no nested-tab look) */
@media (max-width:768px){
  .new-app-fullpage{position:fixed;inset:0;z-index:200;background:var(--bg);overflow:hidden;padding-top:env(safe-area-inset-top);height:100dvh!important;}
  .new-app-form{padding:0!important;}
  .new-app-scroll-body{padding:0!important;-webkit-overflow-scrolling:touch;}
}

/* Stats grids: single column on mobile */
@media (max-width:768px){
  .stats-grid-4{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  .stats-grid-3{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
}
@media (max-width:400px){
  .stats-grid-4,.stats-grid-3{grid-template-columns:1fr!important}
}

/* Cards / detail grids: stack on mobile */
@media (max-width:768px){
  .detail-grid-2{grid-template-columns:1fr!important;gap:12px!important}
  .form-grid-2{grid-template-columns:1fr!important}
  .form-grid-3{grid-template-columns:1fr!important}
  .step-row{flex-wrap:wrap;gap:8px!important}
  .step-row .step-connector{display:none!important}
}

/* Price list & device grids */
@media (max-width:768px){
  .price-grid{grid-template-columns:1fr!important}
  .device-select-grid{grid-template-columns:1fr!important}
}

/* Toast on mobile: full width, bottom, safe area */
@media (max-width:768px){
  .toast-container{top:auto!important;bottom:calc(16px + env(safe-area-inset-bottom))!important;left:calc(12px + env(safe-area-inset-left))!important;right:calc(12px + env(safe-area-inset-right))!important;min-width:auto!important;max-width:none!important}
}

/* Admin two-column → single column */
@media (max-width:768px){
  .admin-two-col{grid-template-columns:1fr!important}
}

/* Application cards: stack meta on small screens */
@media (max-width:480px){
  .app-card-meta{flex-wrap:wrap!important}
}

/* Home action buttons (first page – big, touch-friendly) */
.home-actions{display:flex;flex-direction:column;gap:12px;max-width:400px;margin:0 auto}
.home-action-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:18px 24px;min-height:56px;font-size:16px;font-weight:600;border-radius:var(--r);border:2px solid transparent;cursor:pointer;transition:all .15s;text-align:center;text-decoration:none;color:inherit;box-sizing:border-box}
.home-action-btn:active{transform:scale(0.98)}
@media (max-width:768px){
  .home-actions{max-width:none;gap:10px;padding:0 4px}
  .home-action-btn{min-height:52px;padding:16px 20px;font-size:15px;-webkit-tap-highlight-color:transparent}
}
/* IMEI row: stack input and button on mobile */
@media (max-width:480px){
  .imei-row{flex-direction:column!important;align-items:stretch!important}
  .imei-row .btn-wrap{width:100%!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useContext,createContext,useEffect}=React;

// ── APP CONFIG ────────────────────────────────────────────────
const APP_NAME='Cleva';
const EMAIL_DOMAIN='leout.rw';
const LS={MERCHANTS:'cleva_merchants_v1',USERS:'cleva_users_v1',CONTRACTS:'cleva_contracts_v1',DEVICES:'cleva_devices_v1',PRICING_CONFIG:'cleva_pricing_config_v1',AUDIT_LOG:'cleva_audit_log_v1',COMPANY:'cleva_company_v1'};
const defaultCompanyInfo={name:'Cleva Financial Services Ltd',tagline:'Smart PAYGO Solutions — Empowering Access',address:'KG 15 Avenue, Kigali, Rwanda',phone:'+250 788 000 000',email:'info@clevapaygo.rw',website:'www.clevapaygo.rw',regNo:'RDB/2024/CL001',logo:null,signatoryName:'',signatoryTitle:'Authorised Signatory',signatorySig:null,imeiProxyUrl:''};
const readLS=(k,fallback)=>{try{const raw=localStorage.getItem(k);return raw?JSON.parse(raw):fallback;}catch{return fallback;}};
const writeLS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const normEmail=s=>(s||'').trim().toLowerCase();
const randPwd=()=>Math.random().toString(36).slice(2,6)+Math.random().toString(36).slice(2,6);

// ── CONTRACT STATE MACHINE ────────────────────────────────────
const ST={DRAFT:'draft',PENDING_APPROVAL:'pending_approval',UNDER_REVIEW:'under_review',OFFER_SELECTION:'offer_selection',APPROVED:'approved',LOCK_PENDING:'lock_pending',AWAITING_PAYMENT:'awaiting_payment',ACTIVE:'active',COMPLETED:'completed',ARCHIVED:'archived',ESCALATED:'escalated'};
const SM={
  draft:{label:'Draft',c:'info'},pending_approval:{label:'Pending approval',c:'warn'},under_review:{label:'Changes requested',c:'warn'},
  offer_selection:{label:'Offer selection',c:'info'},approved:{label:'Approved',c:'ok'},lock_pending:{label:'Lock pending',c:'warn'},
  awaiting_payment:{label:'Awaiting payment',c:'warn'},active:{label:'Active',c:'ok'},completed:{label:'Completed',c:'ok'},archived:{label:'Archived',c:'info'},
  escalated:{label:'Escalated',c:'pur'}
};
const CC={warn:{bg:'var(--warnBg)',fg:'var(--warn)',bd:'var(--warnBorder)'},info:{bg:'var(--infoBg)',fg:'var(--info)',bd:'var(--infoBorder)'},ok:{bg:'var(--okBg)',fg:'var(--ok)',bd:'var(--okBorder)'},err:{bg:'var(--errBg)',fg:'var(--err)',bd:'var(--errBorder)'},pur:{bg:'var(--purBg)',fg:'var(--pur)',bd:'var(--purBorder)'}};

// Role-based transitions: who can move to what. Sales rep cannot set ACTIVE.
const ALLOWED_TRANSITIONS={
  rep:{[ST.DRAFT]:[ST.PENDING_APPROVAL],[ST.UNDER_REVIEW]:[ST.PENDING_APPROVAL]},
  mbo:{[ST.PENDING_APPROVAL]:[ST.APPROVED,ST.UNDER_REVIEW,ST.ARCHIVED,ST.ESCALATED],[ST.UNDER_REVIEW]:[ST.APPROVED,ST.ARCHIVED,ST.ESCALATED]},
  support:{},ops_superuser:Object.values(ST),
};
const canTransition=(fromSt,toSt,role,isSuperuser)=>{
  if(isSuperuser&&role==='ops')return true;
  if(toSt===ST.ACTIVE)return isSuperuser&&role==='ops';
  const key=isSuperuser&&role==='ops'?'ops_superuser':role==='rep'?'rep':role==='underwriter'?'mbo':role==='support'?'support':'rep';
  const allowed=ALLOWED_TRANSITIONS[key][fromSt];
  return Array.isArray(allowed)&&allowed.includes(toSt);
};

// ── AUDIT LOG ──────────────────────────────────────────────────
const appendAudit=(auditLog,entry)=>{
  const e={timestamp:new Date().toISOString(),actorEmail:entry.actorEmail,actorRole:entry.actorRole,action:entry.action,contractId:entry.contractId||null,previousValue:entry.previousValue,newValue:entry.newValue};
  const next=[...(auditLog||[]),e];
  writeLS(LS.AUDIT_LOG,next);
  return next;
};

// ── PRICING ENGINE ────────────────────────────────────────────
// totalCost = cashPrice × (1 + markupRate); deposit = totalCost × depositPct; monthly = (totalCost - deposit) / 12
const defaultPricingConfig={markupRate:0.60,depositPct:0.20};
const calcDealFromDevice=(device,cfg)=>{
  const markupRate=cfg.markupRate??0.60;
  const depositPct=cfg.depositPct??0.20;
  const cashPrice=Math.round(device.cash||device.cogs||0);
  const totalCost=Math.round(cashPrice*(1+markupRate));
  const deposit=Math.round(totalCost*depositPct);
  const monthly=Math.round((totalCost-deposit)/12);
  return {deviceModel:device.model,manufacturer:device.brand,RAM:device.ram,ROM:device.rom,dealId:device.id,dealName:device.model,dealType:'PAYG',termOption:12,upfrontPayment:deposit,recurrentPayment:monthly,totalCost,cogs:cashPrice,markupRate,depositPct};
};

// ── TERM PRICING: apply discount for shorter terms ─────────────
// 3 months → 30% off total; 6 months → 20% off total; 12 months → standard
const calcTermPricing=(dev,term)=>{
  const disc=term===3?0.30:term===6?0.20:0;
  const baseTotal=dev.totalCost||(dev.dep||0)+(dev.weekly||0)*12||0;
  const total=Math.round(baseTotal*(1-disc));
  const depositPct=dev.depositPct||0.20;
  const dep=Math.round(total*depositPct);
  const monthly=Math.round((total-dep)/term);
  return {total,dep,monthly,disc,savings:baseTotal-total,term};
};

// ── IMEI: 15 digits + Luhn check ───────────────────────────────
const luhnCheck=(digits)=>{
  let sum=0;const n=digits.length;
  for(let i=0;i<n;i++){let d=parseInt(digits[i],10);if((n-i)%2===0){d*=2;if(d>9)d-=9;}sum+=d;}
  return sum%10===0;
};
const isValidImei=(imei)=>{
  const s=String(imei||'').replace(/\D/g,'');
  return s.length===15&&/^\d+$/.test(s)&&luhnCheck(s);
};

// ── SEED (only if key missing) ─────────────────────────────────
const EMAIL_DOMAIN_SEED=EMAIL_DOMAIN;
const MERCHANTS_SEED=[{merchantCode:'M01',merchantName:'Kigali Central Store',country:'RW'},{merchantCode:'M02',merchantName:'Gasabo Branch',country:'RW'}];
const USERS_SEED=[
  {id:'SR01',name:'Alice Ndayisaba',email:`alice@${EMAIL_DOMAIN_SEED}`,password:'alice123',role:'rep',roleLabel:'Sales Representative',agentCode:'AG01',merchantCode:'M01',seniority:2,mustChangePassword:false},
  {id:'SR02',name:'Bob Nzeyimana',email:`bob@${EMAIL_DOMAIN_SEED}`,password:'bob123',role:'rep',roleLabel:'Sales Representative',agentCode:'AG02',merchantCode:'M01',seniority:1,mustChangePassword:false},
  {id:'SR03',name:'Claire Uwera',email:`claire@${EMAIL_DOMAIN_SEED}`,password:'claire123',role:'rep',roleLabel:'Sales Representative',agentCode:'AG03',merchantCode:'M02',seniority:1,mustChangePassword:false},
  {id:'UW01',name:'Jane Murekatete',email:`jane@${EMAIL_DOMAIN_SEED}`,password:'jane123',role:'underwriter',roleLabel:'Underwriter',merchantCodes:['M01','M02'],mustChangePassword:false},
  {id:'SU01',name:'Support User',email:`support@${EMAIL_DOMAIN_SEED}`,password:'support123',role:'support',roleLabel:'Support User',mustChangePassword:false},
  {id:'OP01',name:'Ops Superuser',email:`ops@${EMAIL_DOMAIN_SEED}`,password:'ops123',role:'ops',roleLabel:'Ops Superuser',superuser:true,mustChangePassword:false},
];
const DEVICES_SEED=[
  {id:'D01',brand:'Tecno',model:'Spark 40 Pro+',ram:'4GB',rom:'128GB',cash:179000},
  {id:'D02',brand:'Tecno',model:'Spark Slim',ram:'4GB',rom:'128GB',cash:155000},
  {id:'D03',brand:'Infinix',model:'Hot 60 Pro+',ram:'4GB',rom:'128GB',cash:168000},
];
const PRICING_CONFIG_SEED=defaultPricingConfig;
function seedIfMissing(){
  if(!readLS(LS.MERCHANTS))writeLS(LS.MERCHANTS,MERCHANTS_SEED);
  if(!readLS(LS.USERS))writeLS(LS.USERS,USERS_SEED);
  if(!readLS(LS.PRICING_CONFIG))writeLS(LS.PRICING_CONFIG,PRICING_CONFIG_SEED);
  if(!readLS(LS.DEVICES))writeLS(LS.DEVICES,DEVICES_SEED);
  if(!readLS(LS.AUDIT_LOG))writeLS(LS.AUDIT_LOG,[]);
  if(!readLS(LS.CONTRACTS)){
    const cfg=readLS(LS.PRICING_CONFIG,PRICING_CONFIG_SEED);
    const devs=readLS(LS.DEVICES,DEVICES_SEED);
    const d0=devs[0];const deal0=calcDealFromDevice(d0,cfg);
    const contracts=[{id:'C-0001',merchantCode:'M01',status:ST.PENDING_APPROVAL,createdAt:new Date(Date.now()-10800000).toISOString(),updatedAt:new Date(Date.now()-10800000).toISOString(),repId:'SR01',repName:'Alice Ndayisaba',application:{fullName:'Jean Baptiste Habimana',dateOfBirth:'1990-05-15',nationalIdNumber:'1199880123456001',phoneNumber:'0781234567',address:'Kimironko, Gasabo',kycStatus:'pending',guarantorName:'Marie Habimana',guarantorPhone:'0789876543',neighbourName:'Pierre Habimana',neighbourPhone:'0781111111',employerName:'Self',employmentType:'self-employed',monthlyIncomeRwf:150000,monthlyExpensesRwf:50000,pledgeVideoUploaded:false,pledgeReviewNotes:'',digitalSignatureConfirmed:false,fieldCorrectionRequests:[],freeCashflowRwf:100000},deal:deal0,dealLocked:false,mboDecision:null,mboRejectionReason:null,underwritingChecklist:null,imei:null,riskGroup:1,tl:[{at:new Date(Date.now()-10800000).toISOString(),by:'Alice Ndayisaba',txt:'Application submitted for approval'}]}];
    writeLS(LS.CONTRACTS,contracts);
  }
}

// ── HELPERS ───────────────────────────────────────────────────
const fmtRWF=n=>'RWF '+Number(n).toLocaleString();
const fmtD=d=>new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const fmtT=d=>new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let contractSeq=1;const nextContractId=()=>{const id='C-'+String(++contractSeq).padStart(4,'0');contractSeq=Math.max(contractSeq,parseInt(id.slice(2),10));return id;};
const OCCS=['Trader / Business owner','Teacher','Civil servant','Driver / Transport','Farmer','Healthcare worker','Student','Other'];
const EMPLOYMENT_TYPES=['formal','informal','self-employed'];
const KYC_STATUSES=['pending','passed','failed'];
const RELS=['Spouse','Parent','Sibling','Child','Colleague','Friend','Other'];
const readFileAsDataURL=(file)=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
const UNDERWRITING_CHECKS=['identity_kyc','contactability','customer_education','employment_affordability','social_contacts','pledge_video'];
const elapsedMinutes=(createdAt)=>{const ms=Date.now()-new Date(createdAt).getTime();return Math.floor(ms/60000);};

// ── CONTEXT ───────────────────────────────────────────────────
const Ctx=createContext(null);

// ── UI COMPONENTS ─────────────────────────────────────────────
const Badge=({st})=>{const m=SM[st]||{label:st,c:'info'};const c=CC[m.c]||CC.info;return <span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:99,fontSize:11,fontWeight:600,letterSpacing:'0.3px',background:c.bg,color:c.fg,border:`1px solid ${c.bd}`}}>{m.label}</span>;};
const Spin=({size=14,dark=false})=><span className="spin" style={{display:'inline-block',width:size,height:size,border:`2px solid ${dark?'rgba(11,61,46,0.15)':'rgba(255,255,255,0.3)'}`,borderTopColor:dark?'var(--brand2)':'white',borderRadius:'50%',verticalAlign:'middle'}}/>;

const CameraModal=({onCapture,onClose,facing='user'})=>{
  const videoRef=React.useRef(null);
  const streamRef=React.useRef(null);
  const [ready,setReady]=React.useState(false);
  const [err,setErr]=React.useState(null);
  React.useEffect(()=>{
    navigator.mediaDevices.getUserMedia({video:{facingMode:facing},audio:false})
      .then(stream=>{streamRef.current=stream;if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}setReady(true);})
      .catch(e=>{setErr('Could not access camera: '+e.message);});
    return()=>{if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());};
  },[facing]);
  const capture=()=>{
    const v=videoRef.current;if(!v)return;
    const canvas=document.createElement('canvas');canvas.width=v.videoWidth;canvas.height=v.videoHeight;
    canvas.getContext('2d').drawImage(v,0,0);
    canvas.toBlob(blob=>{if(blob){const file=new File([blob],'camera.jpg',{type:'image/jpeg'});onCapture(file);}onClose();},'image/jpeg',0.92);
  };
  return ReactDOM.createPortal(
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.85)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,padding:20}}>
      {err?<div style={{color:'#fff',fontSize:14,textAlign:'center',maxWidth:320}}>{err}<br/><button onClick={onClose} style={{marginTop:16,padding:'8px 20px',borderRadius:8,border:'none',background:'#fff',cursor:'pointer',fontWeight:600}}>Close</button></div>:(
        <>
          <video ref={videoRef} playsInline muted style={{width:'100%',maxWidth:480,maxHeight:'60vh',borderRadius:12,background:'#000',objectFit:'cover'}}/>
          {!ready&&<div style={{color:'#fff',fontSize:13}}>Starting camera…</div>}
          <div style={{display:'flex',gap:12}}>
            <button onClick={onClose} style={{padding:'10px 24px',borderRadius:8,border:'2px solid rgba(255,255,255,0.4)',background:'transparent',color:'#fff',cursor:'pointer',fontWeight:600,fontSize:14}}>Cancel</button>
            <button onClick={capture} disabled={!ready} style={{padding:'10px 28px',borderRadius:8,border:'none',background:ready?'var(--brand)':'#555',color:'#fff',cursor:ready?'pointer':'not-allowed',fontWeight:700,fontSize:14}}>📷 Capture</button>
          </div>
        </>
      )}
    </div>,document.body
  );
};

const Login=({onLogin,users})=>{

  const submit=async()=>{
    setErr('');
    if(!email.trim()||!pass.trim()){setErr('Enter your email and password');return;}
    setLoading(true);
    await sleep(600);
    const user=(users||[]).find(u=>u.email.toLowerCase()===email.toLowerCase().trim()&&u.password===pass);

const EditAndResubmit=({app,devices,onUpdate,addToast,onBack})=>{
  const {user}=useContext(Ctx);
  const pendingReqs=(app.application?.fieldCorrectionRequests||[]).filter(r=>!r.resolvedAt);
  const requested=pendingReqs.map(r=>r.fieldName);
  const highlight=(key)=>requested.includes(key)?{borderLeft:'3px solid var(--warn)',background:'var(--warnBg)',padding:'8px 10px',margin:'0 -10px 8px -10px',borderRadius:'var(--r2)'}:{};

  const [e,setE]=useState({});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));

    const er={};
    if(!f.name.trim())er.name='Required';
    if(f.idType==='nid'){if(f.nid.replace(/\D/g,'').length!==16)er.nid='National ID must be 16 digits';}else{if(!f.nid.trim())er.nid='Passport number required';}

    setE(er);return!Object.keys(er).length;
  };
  const submit=()=>{
    if(!validate())return;
    const dev=(devices||[]).find(d=>d.id===f.did);if(!dev){addToast('err','Device required','');return;}
    const ap=app.application||{};
    const application={...ap,fullName:f.name.trim(),nationalIdNumber:f.nid,phoneNumber:f.phone.trim(),address:f.addr.trim(),employmentType:f.occ,monthlyIncomeRwf:+f.income,guarantorName:f.kn.trim(),guarantorPhone:f.kp.trim(),fieldCorrectionRequests:(ap.fieldCorrectionRequests||[]).map(r=>({...r,resolvedAt:r.resolvedAt||new Date().toISOString()}))};
    const deal=app.deal?{...app.deal,dealId:dev.id,manufacturer:dev.brand,deviceModel:dev.model,upfrontPayment:dev.dep,recurrentPayment:dev.weekly,termOption:dev.wks||12,totalCost:dev.totalCost||(dev.dep||0)+(dev.weekly||0)*12,cogs:dev.retail}:{dealId:dev.id,manufacturer:dev.brand,deviceModel:dev.model,upfrontPayment:dev.dep,recurrentPayment:dev.weekly,termOption:dev.wks||12,totalCost:dev.totalCost||(dev.dep||0)+(dev.weekly||0)*12,cogs:dev.retail};
    onUpdate(app.id,{application,deal,status:ST.PENDING_APPROVAL,tlEntry:{by:user.name,txt:'Resubmitted after changes — returned to reviewer'}});
    addToast('ok','Application resubmitted','Sent back to the reviewer');onBack();

        <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>

// ── SIGNATURE PAD ─────────────────────────────────────────────
const SignaturePad=({onChange})=>{
  const canvasRef=React.useRef(null);
  const drawing=React.useRef(false);
  const [hasDrawn,setHasDrawn]=React.useState(false);
  const getPos=(e,canvas)=>{const r=canvas.getBoundingClientRect();const t=e.touches?.[0];const src=t||e;const scaleX=canvas.width/r.width;const scaleY=canvas.height/r.height;return{x:(src.clientX-r.left)*scaleX,y:(src.clientY-r.top)*scaleY};};
  const start=e=>{e.preventDefault();drawing.current=true;const canvas=canvasRef.current;const ctx=canvas.getContext('2d');const p=getPos(e,canvas);ctx.beginPath();ctx.moveTo(p.x,p.y);};
  const move=e=>{e.preventDefault();if(!drawing.current)return;const canvas=canvasRef.current;const ctx=canvas.getContext('2d');const p=getPos(e,canvas);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#0B3D2E';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();setHasDrawn(true);};
  const end=e=>{e.preventDefault();if(!drawing.current)return;drawing.current=false;if(hasDrawn||canvasRef.current)onChange(canvasRef.current.toDataURL('image/png'));};
  const clear=()=>{const canvas=canvasRef.current;canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);setHasDrawn(false);onChange(null);};
  return(
    <div>
      <div style={{border:'1.5px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden',background:'white',position:'relative',cursor:'crosshair'}}>
        <canvas ref={canvasRef} width={900} height={220} style={{width:'100%',height:140,display:'block',touchAction:'none'}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        {!hasDrawn&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
          <span style={{fontSize:13,color:'var(--textLight)'}}>Draw your signature here</span>
        </div>}
      </div>
      <div style={{display:'flex',gap:8,marginTop:8}}>
        <Btn v="def" sz="sm" onClick={clear} icon="✕">Clear</Btn>
        {hasDrawn&&<span style={{fontSize:11,color:'var(--ok)',display:'flex',alignItems:'center',gap:4}}>✓ Signature captured</span>}
      </div>
    </div>
  );
};

const generateContractPDF=async(contractData,companyInfo,customerSignature)=>{
  if(!window.jspdf){alert('PDF library not available. Please refresh the page.');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const PW=210,PH=297,M=18,CW=PW-2*M;
  let y=M;
  const brand=[11,61,46],dark=[40,40,40],mid=[90,105,95],light=[160,170,165];
  const chk=(need=12)=>{if(y+need>PH-M){doc.addPage();y=M;}};
  const hline=(col=light,w=0.3)=>{doc.setDrawColor(...col);doc.setLineWidth(w);doc.line(M,y,PW-M,y);y+=4;};
  const txt=(t,sz=9,bold=false,col=dark,indent=0,align='left')=>{
    chk(sz*0.5+3);
    doc.setFont('helvetica',bold?'bold':'normal');doc.setFontSize(sz);doc.setTextColor(...col);
    const maxW=align==='center'?CW:CW-indent;
    const lines=doc.splitTextToSize(String(t),maxW);
    lines.forEach(l=>{chk(sz*0.45+1);doc.text(l,align==='center'?PW/2:M+indent,y,align==='center'?{align:'center'}:{});y+=sz*0.44;});
    y+=1;
  };
  const kv=(k,v,indent=0)=>{
    chk(7);
    const kw=doc.setFontSize(8).setFont('helvetica','bold').getTextWidth(k+': ');
    doc.setTextColor(...light);doc.text(k+':',M+indent,y);
    doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
    const valLines=doc.splitTextToSize(String(v||'—'),CW-indent-kw-2);
    valLines.forEach((l,i)=>{if(i>0){y+=4.5;chk(5);}doc.text(l,M+indent+kw+2,y);});
    y+=5;
  };
  const {co,f,dev,term,pricing,date,discLabel,repName,app,deal}=contractData;

  // ── Header ──────────────────────────────────────────────────
  if(co.logo){try{doc.addImage(co.logo,'PNG',M,y,22,22);}catch(e){}
    doc.setFont('helvetica','bold').setFontSize(16).setTextColor(...brand).text(co.name,M+26,y+8);
    doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...mid).text(co.tagline||'',M+26,y+14);
    y+=26;
  }else{
    doc.setFillColor(...brand);doc.rect(M,y,CW,1,'F');y+=5;
    doc.setFont('helvetica','bold').setFontSize(18).setTextColor(...brand).text(co.name,M,y);y+=8;
    doc.setFont('helvetica','normal').setFontSize(9).setTextColor(...mid);
    if(co.tagline)doc.text(co.tagline,M,y),y+=5;
    const contact=[co.address,co.phone,co.email].filter(Boolean).join('  |  ');
    if(contact){doc.setFontSize(8).setTextColor(...light).text(contact,M,y);y+=4;}
    if(co.regNo){doc.text('Reg: '+co.regNo,M,y);y+=3;}
    y+=3;
  }
  hline(brand,0.6);
  doc.setFont('helvetica','bold').setFontSize(13).setTextColor(...brand).text('PAYGO DEVICE FINANCING AGREEMENT',PW/2,y,{align:'center'});y+=7;
  doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...light);
  doc.text('Agreement No: '+(contractData.id||'DRAFT'),PW/2,y,{align:'center'});y+=4;
  doc.text('Date: '+date,PW/2,y,{align:'center'});y+=6;
  hline();

  // ── Parties ─────────────────────────────────────────────────
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text('PARTIES TO THIS AGREEMENT',M,y);y+=6;
  const colMid=M+CW/2+4;
  const startY=y;
  // Service provider col
  doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...brand).text('SERVICE PROVIDER',M,y);
  let ly=y+5;
  [[co.name||''],[co.address||''],[co.phone||''],[co.email||''],[co.regNo?'Reg: '+co.regNo:'']].filter(([v])=>v).forEach(([v])=>{doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark).text(v,M,ly);ly+=4.5;});
  // Customer col
  doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...brand).text('CUSTOMER',colMid,startY);
  let ry=startY+5;
  [[app.fullName||''],[`${app.idType==='passport'?'Passport':'National ID'}: ${app.nationalIdNumber||''}`],[`Phone: ${app.phoneNumber||''}`],[`Address: ${app.address||''}`],[`Occupation: ${app.employmentType||''}`],[`Income: RWF ${Number(app.monthlyIncomeRwf||0).toLocaleString()}`]].filter(([v])=>v).forEach(([v])=>{doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);const lines=doc.splitTextToSize(v,CW/2-6);lines.forEach(l=>{doc.text(l,colMid,ry);ry+=4.5;});});
  y=Math.max(ly,ry)+4;
  hline();

  // ── Device & Financing ──────────────────────────────────────
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text('DEVICE & FINANCING DETAILS',M,y);y+=6;
  kv('Device',`${deal.manufacturer||''} ${deal.deviceModel||''} — ${deal.RAM||''} RAM / ${deal.ROM||''} Storage`);
  kv('Cash price',`RWF ${Number(deal.cogs||0).toLocaleString()}`);
  kv('Total contract price',`RWF ${Number(deal.totalCost||0).toLocaleString()} (${Math.round((deal.markupRate||0)*100)}% financing rate)`);
  kv('Upfront deposit',`RWF ${Number(deal.upfrontPayment||0).toLocaleString()}`);
  kv('Monthly installment',`RWF ${Number(deal.recurrentPayment||0).toLocaleString()} × 12 months`);
  kv('Payoff plan',discLabel);
  if(deal.discountPct>0)kv('Early payoff discount',`${Math.round(deal.discountPct*100)}% — saving RWF ${Number(pricing.savings||0).toLocaleString()}`);
  y+=2;hline();

  // ── Next of Kin ─────────────────────────────────────────────
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text('NEXT OF KIN / GUARANTOR',M,y);y+=6;
  kv('Name',app.guarantorName||'');kv('Phone',app.guarantorPhone||'');y+=2;hline();

  // ── Terms ───────────────────────────────────────────────────
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text('TERMS AND CONDITIONS',M,y);y+=6;
  const TERMS=[
    ['1. PAYGO Technology','The device is fitted with PAYGO remote management technology. It will be disabled automatically if monthly payments are not received within 7 calendar days of the due date, and permanently unlocked upon full payment. The Customer must not bypass, tamper with, or disable the PAYGO system.'],
    ['2. Ownership','The device remains the sole property of '+co.name+' until all payments are received in full. The Customer may not sell, pledge, transfer, or otherwise encumber the device. In the event of default the Company may remotely disable and/or repossess the device.'],
    ['3. Payment Obligations',`Upfront deposit of RWF ${Number(deal.upfrontPayment||0).toLocaleString()} is due before device delivery. Monthly installments of RWF ${Number(deal.recurrentPayment||0).toLocaleString()} are due on the same calendar date each month. Late payments attract a penalty fee in addition to device disabling.`],
    ['4. Early Payoff',deal.discountPct>0?`A ${Math.round(deal.discountPct*100)}% early payoff discount has been applied. The Customer may settle the full remaining balance at any time without additional penalty.`:'The Customer may pay off the remaining balance at any time without penalty. Early payoff discounts may be available at the Company\'s discretion.'],
    ['5. Customer Obligations','The Customer shall maintain the device in good condition, promptly notify the Company of changes in contact information, not relocate outside Rwanda without prior written consent, and allow reasonable access for device inspection.'],
    ['6. Default & Remedies','Default occurs if: (a) any payment is not received within 7 days of the due date; (b) materially false information was provided; (c) the device is found outside Rwanda without prior consent; or (d) the PAYGO system is tampered with. Upon default the Company may disable the device, accelerate all payments, repossess the device, and/or pursue legal remedies.'],
    ['7. Data & Privacy','The Customer consents to the Company collecting and processing personal data for the purposes of this agreement, credit assessment, and compliance with applicable law. Data will not be shared with third parties except as required by law or for contract performance.'],
    ['8. Governing Law','This Agreement is governed by the laws of the Republic of Rwanda. Disputes shall first be subject to good-faith negotiation; failing that, either party may refer to the competent courts of Rwanda.'],
  ];
  TERMS.forEach(([heading,body])=>{
    chk(22);
    doc.setFont('helvetica','bold').setFontSize(8.5).setTextColor(...brand).text(heading,M,y);y+=4.5;
    doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
    doc.splitTextToSize(body,CW-3).forEach(l=>{chk(5);doc.text(l,M+2,y);y+=4;});
    y+=3;
  });

  // ── Acknowledgement & Signature ─────────────────────────────
  chk(35);hline(brand,0.5);
  doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...brand).text('ACKNOWLEDGEMENT AND SIGNATURE',M,y);y+=5;
  doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
  doc.splitTextToSize('The Customer confirms they have read and fully understood all terms of this Agreement, that all information provided is true and accurate, and that they agree to be bound by all terms and conditions herein.',CW).forEach(l=>{doc.text(l,M,y);y+=4;});
  y+=5;chk(55);
  const sigStartY=y;
  // Customer sig
  doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...brand).text('CUSTOMER SIGNATURE',M,sigStartY);
  if(customerSignature){try{doc.addImage(customerSignature,'PNG',M,sigStartY+3,CW/2-8,28);}catch(e){}}
  doc.setDrawColor(...light);doc.setLineWidth(0.3);doc.line(M,sigStartY+33,M+CW/2-8,sigStartY+33);
  doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
  doc.text(app.fullName||'',M,sigStartY+38);
  doc.text('Date: '+date,M,sigStartY+43);
  // Company signatory sig (pre-loaded from company settings)
  doc.setFont('helvetica','bold').setFontSize(8).setTextColor(...brand).text('FOR AND ON BEHALF OF '+co.name.toUpperCase(),colMid,sigStartY);
  if(co.signatorySig){try{doc.addImage(co.signatorySig,'PNG',colMid,sigStartY+3,CW/2-8,28);}catch(e){}}
  doc.setDrawColor(...light);doc.setLineWidth(0.3);doc.line(colMid,sigStartY+33,colMid+CW/2-8,sigStartY+33);
  doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...dark);
  doc.text(co.signatoryName||co.name,colMid,sigStartY+38);
  if(co.signatoryTitle)doc.text(co.signatoryTitle,colMid,sigStartY+43);
  doc.text('Date: '+date,colMid,co.signatoryTitle?sigStartY+48:sigStartY+43);
  y=sigStartY+55;

  // ── Photos page ─────────────────────────────────────────────
  if(app.customerPhoto||app.idPhoto){
    doc.addPage();y=M;
    doc.setFont('helvetica','bold').setFontSize(13).setTextColor(...brand).text('ATTACHMENT: CUSTOMER IDENTIFICATION',PW/2,y,{align:'center'});y+=6;
    doc.setFont('helvetica','normal').setFontSize(8).setTextColor(...light).text('Agreement No: '+(contractData.id||'DRAFT')+' · '+app.fullName,PW/2,y,{align:'center'});y+=7;
    hline(brand,0.5);
    if(app.customerPhoto){
      doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...dark).text('Customer Photograph',M,y);y+=5;
      try{const ext=app.customerPhoto.includes('jpeg')||app.customerPhoto.includes('jpg')?'JPEG':'PNG';doc.addImage(app.customerPhoto,ext,M,y,55,70);}catch(e){}
      y+=76;
    }
    if(app.idPhoto){
      chk(90);
      doc.setFont('helvetica','bold').setFontSize(9).setTextColor(...dark).text('Identity Document',M,y);y+=5;
      try{const ext=app.idPhoto.includes('jpeg')||app.idPhoto.includes('jpg')?'JPEG':'PNG';doc.addImage(app.idPhoto,ext,M,y,100,68);}catch(e){}
      y+=74;
    }
  }

  doc.save(`PAYGO_Contract_${(contractData.id||'draft').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`);
};

// ── NEW APPLICATION ───────────────────────────────────────────
const NewApp=({onSubmit,onBack,onSaveDraft,devices,preSelDevId=null,preSelTerm=12})=>{
  const {user,companyInfo}=useContext(Ctx);
  const [step,setStep]=useState(1);
  const [f,setF]=useState({name:'',idType:'nid',nid:'',phone:'',addr:'',occ:'',income:'',kn:'',kp:'',kr:'',did:preSelDevId||'',term:preSelTerm,sig:null,customerPhoto:null,idPhoto:null,incomeProof:null});
  const [e,setE]=useState({});
  const [cam,setCam]=useState(null);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const handleFile=(k,file)=>{if(!file)return;readFileAsDataURL(file).then(url=>s(k,url)).catch(()=>{});};
  const openCam=(field,facing)=>setCam({field,facing});
  const closeCam=()=>setCam(null);
  const onCamCapture=(file)=>{if(cam)handleFile(cam.field,file);};
  const v1=()=>{
    const er={};
    if(!f.name.trim())er.name='Required';
    if(f.idType==='nid'){if(f.nid.replace(/\D/g,'').length!==16)er.nid='National ID must be 16 digits';}
    else{if(!f.nid.trim())er.nid='Passport number required';}
    if(!f.phone.trim())er.phone='Required';if(!f.addr.trim())er.addr='Required';if(!f.occ)er.occ='Required';if(!f.income||isNaN(f.income)||+f.income<1)er.income='Enter a valid amount';if(!f.kn.trim())er.kn='Required';if(!f.kp.trim())er.kp='Required';if(!f.kr)er.kr='Required';
    if(!f.customerPhoto)er.customerPhoto='Take customer photo (camera)';if(!f.idPhoto)er.idPhoto='Add ID document (photo or upload)';if(!f.incomeProof)er.incomeProof='Add proof of income (upload image or PDF)';
    setE(er);return!Object.keys(er).length;
  };
  const v2=()=>{const er={};if(!f.did)er.did='Please select a device';setE(er);return!Object.keys(er).length;};
  const v3=()=>{const er={};if(!f.sig)er.sig='Please sign the contract to continue';setE(er);return!Object.keys(er).length;};
  const next=()=>{if(step===1&&v1())setStep(2);else if(step===2&&v2())setStep(3);else if(step===3&&v3())setStep(4);};
  const dev=(devices||[]).find(d=>d.id===f.did);
  const STEPS=['Customer & documents','Select device','Sign contract','Review & submit'];
  const goStep=(s)=>{if(s<step)setStep(s);else if(s===step){}else if(s===2&&v1())setStep(2);else if(s===3&&v1()&&v2())setStep(3);else if(s===4&&v1()&&v2()&&v3())setStep(4);};
  return(
    <div className="fadeUp new-app-form" style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,width:'100%',padding:'0 24px'}}>
      {cam&&<CameraModal facing={cam.facing} onCapture={onCamCapture} onClose={closeCam}/>}
      <header style={{flexShrink:0,padding:'20px 0 16px',borderBottom:'1.5px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
          <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Cancel</Btn>
          <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>New application</h1><p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>Step {step} of 4 — {STEPS[step-1]}</p></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:0}}>
          {STEPS.map((l,i)=>(
            <React.Fragment key={i}>
              <button type="button" onClick={()=>goStep(i+1)} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',border:'none',background:'transparent',cursor:step>i+1?'pointer':'default',borderRadius:'var(--r2)',fontSize:13,fontWeight:step===i+1?700:500,color:step>i+1?'var(--ok)':step===i+1?'var(--brand2)':'var(--textLight)'}}>
                <span style={{width:28,height:28,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,background:step>i+1?'var(--ok)':step===i+1?'var(--brand)':'var(--border)',color:step>i+1||step===i+1?'white':'var(--textLight)'}}>{step>i+1?'✓':i+1}</span>
                <span className="new-app-step-label">{l}</span>
              </button>
              {i<2&&<div style={{width:24,height:1,background:'var(--border)',margin:'0 4px',alignSelf:'center'}}/>}
            </React.Fragment>
          ))}
        </div>
      </header>
      <div style={{flex:1,minHeight:0,overflow:'auto',overflowX:'hidden',padding:'20px 0',WebkitOverflowScrolling:'touch'}} className="new-app-scroll-body">
      <div style={{padding:22,minHeight:'min-content'}}>
        {step===1&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:2}}>Customer information</div>
            <div className="form-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <FF label="Full name" req err={e.name}><input value={f.name} onChange={ev=>s('name',ev.target.value)} placeholder="As on ID" className={e.name?'err':''}/></FF>
              <FF label="ID type" req><select value={f.idType} onChange={ev=>{s('idType',ev.target.value);if(ev.target.value==='nid')s('nid',f.nid.replace(/\D/g,'').slice(0,16));}}><option value="nid">National ID</option><option value="passport">Passport</option></select></FF>
            </div>
            <FF label={f.idType==='nid'?'National ID number (16 digits)':'Passport number'} req err={e.nid}>
              <input value={f.nid} onChange={ev=>s('nid',f.idType==='nid'?ev.target.value.replace(/\D/g,'').slice(0,16):ev.target.value)} placeholder={f.idType==='nid'?'16 digits':'e.g. AB1234567'} className={e.nid?'err':''} style={{fontFamily:'DM Mono,monospace'}}/>
            </FF>
            <div className="form-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <FF label="Phone number" req err={e.phone}><input value={f.phone} onChange={ev=>s('phone',ev.target.value)} placeholder="07XXXXXXXX" className={e.phone?'err':''}/></FF>
              <FF label="Occupation" req err={e.occ}><select value={f.occ} onChange={ev=>s('occ',ev.target.value)} className={e.occ?'err':''}><option value="">Select...</option>{OCCS.map(o=><option key={o}>{o}</option>)}</select></FF>
            </div>
            <FF label="Address / location" req err={e.addr}><input value={f.addr} onChange={ev=>s('addr',ev.target.value)} placeholder="Sector, district — e.g. Kimironko, Gasabo" className={e.addr?'err':''}/></FF>
            <FF label="Monthly income (RWF)" req err={e.income}><input type="number" value={f.income} onChange={ev=>s('income',ev.target.value)} placeholder="e.g. 150000" className={e.income?'err':''}/></FF>
            <div style={{borderTop:'1.5px solid var(--border)',paddingTop:14,marginTop:4}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>Documents</div>
              <FF label="Customer photo" req err={e.customerPhoto}><div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><button type="button" onClick={()=>openCam('customerPhoto','user')} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 16px',background:'var(--brand)',color:'white',borderRadius:'var(--r2)',cursor:'pointer',fontSize:13,fontWeight:500,border:'none'}}>📷 Take photo (camera only)</button>{f.customerPhoto&&<span style={{fontSize:12,color:'var(--ok)'}}>✓ Photo taken</span>}</div></FF>
              <FF label="ID document (photo)" req err={e.idPhoto}><div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><button type="button" onClick={()=>openCam('idPhoto','environment')} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 16px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--r2)',cursor:'pointer',fontSize:13,fontWeight:500}}>📷 Take picture</button><label style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 16px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--r2)',cursor:'pointer',fontSize:13,fontWeight:500}}>📤 Upload picture<input type="file" accept="image/*" style={{display:'none'}} onChange={ev=>{const file=ev.target.files?.[0];if(file)handleFile('idPhoto',file);ev.target.value='';}}/></label>{f.idPhoto&&<span style={{fontSize:12,color:'var(--ok)'}}>✓ ID added</span>}</div></FF>
              <FF label="Proof of income" req err={e.incomeProof}><div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><label style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 16px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'var(--r2)',cursor:'pointer',fontSize:13,fontWeight:500}}>📎 Upload (image or PDF)<input type="file" accept="image/*,.pdf,application/pdf" style={{display:'none'}} onChange={ev=>{const file=ev.target.files?.[0];if(file)handleFile('incomeProof',file);ev.target.value='';}}/></label>{f.incomeProof&&<span style={{fontSize:12,color:'var(--ok)'}}>✓ Document added</span>}</div></FF>
            </div>
            <div style={{borderTop:'1.5px solid var(--border)',paddingTop:14,marginTop:4}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>Next of kin</div>
              <div className="form-grid-3" style={{display:'grid',gridTemplateColumns:'1fr 1fr 160px',gap:12}}>
                <FF label="Full name" req err={e.kn}><input value={f.kn} onChange={ev=>s('kn',ev.target.value)} placeholder="Next of kin name" className={e.kn?'err':''}/></FF>
                <FF label="Phone" req err={e.kp}><input value={f.kp} onChange={ev=>s('kp',ev.target.value)} placeholder="07XXXXXXXX" className={e.kp?'err':''}/></FF>
                <FF label="Relationship" req err={e.kr}><select value={f.kr} onChange={ev=>s('kr',ev.target.value)} className={e.kr?'err':''}><option value="">Select...</option>{RELS.map(r=><option key={r}>{r}</option>)}</select></FF>
              </div>
            </div>
          </div>
        )}
        {step===2&&(()=>{
          const selDev2=(devices||[]).find(d=>d.id===f.did);
          const pricing2=selDev2?calcTermPricing(selDev2,f.term):null;
          return(
            <div>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Choose device</div>
              {e.did&&<div style={{padding:'9px 13px',background:'var(--errBg)',border:'1px solid var(--errBorder)',borderRadius:'var(--r2)',fontSize:12,color:'var(--err)',marginBottom:12}}>{e.did}</div>}
              <div className="device-select-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:10,marginBottom:selDev2?20:0}}>
                {(devices||[]).map(d=>{
                  const isSel=f.did===d.id;
                  const cashPrice=d.retail||d.cogs||d.cash||0;
                  const specs=d.specs||[d.ram,d.rom].filter(Boolean).join(' / ');
                  return(
                    <div key={d.id} onClick={()=>s('did',d.id)} style={{border:`${isSel?2:1.5}px solid ${isSel?'var(--brand2)':'var(--border)'}`,borderRadius:'var(--r)',padding:'13px 14px',cursor:'pointer',background:isSel?'var(--brandPale)':'white',transition:'all .13s',position:'relative',overflow:'hidden'}}>
                      <div style={{height:3,background:isSel?'linear-gradient(90deg,var(--brand),var(--brand3))':'var(--border)',margin:'-13px -14px 11px'}}/>
