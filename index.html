<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cleva</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0B3D2E;--brand2:#146344;--brand3:#1D8A5E;--brandPale:#E6F3EE;--brandPale2:#D0E9DE;
  --accent:#D4700A;
  --bg:#F2F0EB;--surface:#FFFFFF;
  --border:rgba(11,61,46,0.11);--borderMed:rgba(11,61,46,0.2);
  --text:#111B15;--textMid:#4A5E52;--textLight:#8FA898;
  --ok:#1E6B3A;--okBg:#E8F5EE;--okBorder:#A8D8BC;
  --warn:#A05800;--warnBg:#FEF3E2;--warnBorder:#F0C882;
  --err:#B01C1C;--errBg:#FEE8E8;--errBorder:#F0AAAA;
  --info:#1549A0;--infoBg:#E8EFFE;--infoBorder:#A8BCEC;
  --pur:#5B21B6;--purBg:#EEE9FD;--purBorder:#C4AFEF;
  --r:10px;--r2:6px;
  --sh:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --sh2:0 4px 16px rgba(0,0,0,0.10),0 1px 4px rgba(0,0,0,0.06);
}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;line-height:1.5}
input,select,textarea,button{font-family:'DM Sans',sans-serif;font-size:14px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r2);background:white;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand2);box-shadow:0 0 0 3px rgba(20,99,68,0.10)}
input.err,select.err{border-color:var(--err)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.13);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadeUp{animation:fadeUp .22s ease}
.slideRight{animation:slideRight .2s ease}
.spin{animation:spin .7s linear infinite}

/* Mobile: touch-friendly and safe area */
@media (max-width:768px){
  body{font-size:15px;-webkit-tap-highlight-color:transparent}
  input,select,textarea,button{font-size:16px}
  button,.btn-touch{min-height:44px;min-width:44px}
}
@media (max-width:480px){
  body{font-size:14px}
}
/* Smooth scroll on iOS */
.main-scroll{-webkit-overflow-scrolling:touch}
/* Login: compact on small screens */
@media (max-width:480px){
  .login-wrap{padding:16px!important}
  .login-card{padding:20px 18px!important}
}

/* Sidebar: drawer on mobile */
.sidebar-wrapper{flex-shrink:0}
.sidebar-backdrop{display:none}
.sidebar-drawer{width:210px}
@media (max-width:768px){
  .sidebar-wrapper{width:0;min-width:0;overflow:visible}
  .sidebar-drawer{position:fixed;left:0;top:0;bottom:0;width:260px;max-width:85vw;z-index:1001;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,0.15);padding-top:env(safe-area-inset-top)}
  .sidebar-drawer.mobile-open{transform:translateX(0)}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
  .sidebar-backdrop.visible{opacity:1;pointer-events:auto}
}

/* Mobile header (hamburger + title) */
.mobile-header{display:none;align-items:center;gap:12px;padding:12px 16px;padding-left:calc(16px + env(safe-area-inset-left));background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0}
.mobile-header .hamburger{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;font-size:18px;color:var(--text);-webkit-tap-highlight-color:transparent}
@media (max-width:768px){.mobile-header{display:flex}}

/* Page content padding on mobile */
@media (max-width:768px){
  .page-content{padding:16px 14px 24px!important}
  .page-content h1{font-size:18px!important}
}
@media (max-width:480px){.page-content{padding:14px 12px 20px!important}}

/* Stats grids: single column on mobile */
@media (max-width:768px){
  .stats-grid-4{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  .stats-grid-3{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
}
@media (max-width:400px){
  .stats-grid-4,.stats-grid-3{grid-template-columns:1fr!important}
}

/* Cards / detail grids: stack on mobile */
@media (max-width:768px){
  .detail-grid-2{grid-template-columns:1fr!important;gap:12px!important}
  .form-grid-2{grid-template-columns:1fr!important}
  .form-grid-3{grid-template-columns:1fr!important}
  .step-row{flex-wrap:wrap;gap:8px!important}
  .step-row .step-connector{display:none!important}
}

/* Price list & device grids */
@media (max-width:768px){
  .price-grid{grid-template-columns:1fr!important}
  .device-select-grid{grid-template-columns:1fr!important}
}

/* Toast on mobile: full width, bottom, safe area */
@media (max-width:768px){
  .toast-container{top:auto!important;bottom:calc(16px + env(safe-area-inset-bottom))!important;left:calc(12px + env(safe-area-inset-left))!important;right:calc(12px + env(safe-area-inset-right))!important;min-width:auto!important;max-width:none!important}
}

/* Admin two-column → single column */
@media (max-width:768px){
  .admin-two-col{grid-template-columns:1fr!important}
}

/* Application cards: stack meta on small screens */
@media (max-width:480px){
  .app-card-meta{flex-wrap:wrap!important}
}
/* IMEI row: stack input and button on mobile */
@media (max-width:480px){
  .imei-row{flex-direction:column!important;align-items:stretch!important}
  .imei-row .btn-wrap{width:100%!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useContext,createContext,useEffect}=React;

// ── APP CONFIG ────────────────────────────────────────────────
const APP_NAME='Cleva';
const EMAIL_DOMAIN='leout.rw';
const LS={USERS:'clevafin_users_v1',DEVICES:'clevafin_devices_v1',APPS:'clevafin_apps_v1',CFG:'clevafin_cfg_v1'};
const readLS=(k,fallback)=>{try{const raw=localStorage.getItem(k);return raw?JSON.parse(raw):fallback;}catch{return fallback;}};
const writeLS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const normEmail=s=>(s||'').trim().toLowerCase();
const randPwd=()=>Math.random().toString(36).slice(2,6)+Math.random().toString(36).slice(2,6);

// ── USERS ─────────────────────────────────────────────────────
// In production, replace with real auth API. Passwords shown for demo purposes.
const USERS_SEED=[
  {id:'SR01',name:'Alice Ndayisaba',email:`alice@${EMAIL_DOMAIN}`,password:'alice123',role:'rep',roleLabel:'Sales Representative',superuser:false,mustChangePassword:false},
  {id:'SR02',name:'Bob Nzeyimana',email:`bob@${EMAIL_DOMAIN}`,password:'bob123',role:'rep',roleLabel:'Sales Representative',superuser:false,mustChangePassword:false},
  {id:'UW01',name:'Jane Murekatete',email:`jane@${EMAIL_DOMAIN}`,password:'jane123',role:'underwriter',roleLabel:'Underwriter',superuser:false,mustChangePassword:false},
  {id:'UW02',name:'Eric Bizimana',email:`eric@${EMAIL_DOMAIN}`,password:'eric123',role:'underwriter',roleLabel:'Underwriter',superuser:false,mustChangePassword:false},
  {id:'OP01',name:'Ops Superuser',email:`ops@${EMAIL_DOMAIN}`,password:'ops123',role:'ops',roleLabel:'Ops & Support',superuser:true,mustChangePassword:false},
  {id:'OP02',name:'Ops Support',email:`ops2@${EMAIL_DOMAIN}`,password:'ops123',role:'ops',roleLabel:'Ops & Support',superuser:false,mustChangePassword:false},
];

// ── DEVICES & PRICING MODEL ───────────────────────────────────
// Seed devices only store cash price; financing terms are derived from config.
const DEVICES_SEED=[
  {id:'D01',brand:'Tecno',model:'Spark 40 Pro+',sku:'T-SP40PP',specs:'6.7″ AMOLED · 5000mAh · 4+128GB · A14',cash:179000},
  {id:'D02',brand:'Tecno',model:'Spark Slim',sku:'T-SLIM',specs:'6.67″ AMOLED · 5000mAh · 4+128GB · A14',cash:155000},
  {id:'D03',brand:'Infinix',model:'Hot 60 Pro+',sku:'I-H60PP',specs:'6.78″ AMOLED · 5000mAh · 4+128GB · A14',cash:168000},
  {id:'D04',brand:'Itel',model:'S25 Ultra',sku:'IT-S25U',specs:'6.6″ HD+ · 5000mAh · 3+64GB · A13',cash:128000},
  {id:'D05',brand:'Samsung',model:'Galaxy A06',sku:'S-A06',specs:'6.7″ HD+ · 5000mAh · 3+64GB · A14',cash:142000},
  {id:'D06',brand:'Tecno',model:'Pop 9',sku:'T-POP9',specs:'6.6″ HD+ · 5000mAh · 2+64GB · A13',cash:92000},
  {id:'D07',brand:'Infinix',model:'Smart 9 Plus',sku:'I-S9P',specs:'6.6″ HD+ · 5000mAh · 3+64GB · A13',cash:108000},
  {id:'D08',brand:'Tecno',model:'Spark 40 Pro',sku:'T-SP40P',specs:'6.7″ HD+ · 5000mAh · 4+128GB · A14',cash:152000},
];

// Default devices use the legacy weekly contract structure used across the UI.
// Superuser edits will persist in localStorage and update existing applications.
const DEVICES_DEFAULT=DEVICES_SEED.map(d=>({id:d.id,brand:d.brand,model:d.model,sku:d.sku,specs:d.specs,retail:d.cash,dep:Math.round(d.cash*0.2),weekly:Math.round((d.cash*1.27 - d.cash*0.2)/26),wks:26}));
// interestRate is applied on cash to get total price.
// depositPct is taken on total price; monthly is over 12 months.
const defaultCfg={interestRate:0.27,depositPct:0.2};
const calcDevicePricing=(d,cfg)=>{
  const rate=cfg.interestRate??defaultCfg.interestRate;
  const depPct=cfg.depositPct??defaultCfg.depositPct;
  const total=Math.round(d.cash*(1+rate));
  const deposit=Math.round(total*depPct);
  const months=12;
  const monthly=Math.round((total-deposit)/months);
  return {...d,total,deposit,monthly,months};
};

// ── STATUS ────────────────────────────────────────────────────
const ST={SUBMITTED:'submitted',IN_REVIEW:'in_review',CHANGES:'changes_requested',REJECTED:'rejected',ESCALATED:'escalated',IMEI_PENDING:'imei_pending',IMEI_VERIFIED:'imei_verified',LOCK_PENDING:'lock_pending',AWAITING_PAYMENT:'awaiting_payment',ACTIVE:'active'};
const SM={
  submitted:{label:'Pending review',c:'warn'},
  in_review:{label:'Under review',c:'info'},
  changes_requested:{label:'Changes needed',c:'warn'},
  rejected:{label:'Rejected',c:'err'},
  escalated:{label:'Escalated',c:'pur'},
  imei_pending:{label:'IMEI needed',c:'warn'},
  imei_verified:{label:'IMEI verified',c:'info'},
  lock_pending:{label:'Waiting for lock',c:'info'},
  awaiting_payment:{label:'Awaiting payment',c:'warn'},
  active:{label:'Active',c:'ok'},
};
const CC={warn:{bg:'var(--warnBg)',fg:'var(--warn)',bd:'var(--warnBorder)'},info:{bg:'var(--infoBg)',fg:'var(--info)',bd:'var(--infoBorder)'},ok:{bg:'var(--okBg)',fg:'var(--ok)',bd:'var(--okBorder)'},err:{bg:'var(--errBg)',fg:'var(--err)',bd:'var(--errBorder)'},pur:{bg:'var(--purBg)',fg:'var(--pur)',bd:'var(--purBorder)'}};

// ── HELPERS ───────────────────────────────────────────────────
const fmtRWF=n=>'RWF '+Number(n).toLocaleString();
const fmtD=d=>new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const fmtT=d=>new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let seq=4;const gid=()=>'FF-'+String(++seq).padStart(4,'0');
const OCCS=['Trader / Business owner','Teacher','Civil servant','Driver / Transport','Farmer','Healthcare worker','Student','Other'];
const RELS=['Spouse','Parent','Sibling','Child','Colleague','Friend','Other'];

// ── SEED DATA ─────────────────────────────────────────────────
const SEED=[
  {id:'FF-0001',status:ST.SUBMITTED,createdAt:new Date(Date.now()-10800000).toISOString(),updatedAt:new Date(Date.now()-10800000).toISOString(),
   rep:'Alice Ndayisaba',repId:'SR01',
   c:{name:'Jean Baptiste Habimana',nid:'1199880123456001',phone:'0781234567',addr:'Kimironko, Gasabo',occ:'Trader / Business owner',income:150000,kin:{name:'Marie Habimana',phone:'0789876543',rel:'Spouse'}},
   dev:DEVICES_DEFAULT[0],notes:'',reviewer:null,upya:null,imei:null,ptId:null,lockedAt:null,
   tl:[{at:new Date(Date.now()-10800000).toISOString(),by:'Alice Ndayisaba',txt:'Application submitted for review'}]},
  {id:'FF-0002',status:ST.IMEI_PENDING,createdAt:new Date(Date.now()-172800000).toISOString(),updatedAt:new Date(Date.now()-3600000).toISOString(),
   rep:'Alice Ndayisaba',repId:'SR01',
   c:{name:'Claudette Uwase',nid:'1200180123456002',phone:'0782345678',addr:'Nyamirambo, Nyarugenge',occ:'Teacher',income:180000,kin:{name:'Patrick Uwase',phone:'0786543210',rel:'Brother'}},
   dev:DEVICES_DEFAULT[2],notes:'Income confirmed via employer letter. Stable profile.',reviewer:'Jane Murekatete',upya:'UPYA-RW-2025-0892',imei:null,ptId:null,lockedAt:null,
   tl:[{at:new Date(Date.now()-172800000).toISOString(),by:'Alice Ndayisaba',txt:'Application submitted for review'},{at:new Date(Date.now()-86400000).toISOString(),by:'Jane Murekatete',txt:'Placed under review'},{at:new Date(Date.now()-3600000).toISOString(),by:'Jane Murekatete',txt:'Approved — UPYA contract UPYA-RW-2025-0892 created'}]},
  {id:'FF-0003',status:ST.ACTIVE,createdAt:new Date(Date.now()-604800000).toISOString(),updatedAt:new Date(Date.now()-432000000).toISOString(),
   rep:'Alice Ndayisaba',repId:'SR01',
   c:{name:'Emmanuel Nkurunziza',nid:'1198180123456003',phone:'0783456789',addr:'Remera, Gasabo',occ:'Driver / Transport',income:200000,kin:{name:'Grace Nkurunziza',phone:'0785432109',rel:'Spouse'}},
   dev:DEVICES_DEFAULT[4],notes:'Very stable income. Strong profile.',reviewer:'Jane Murekatete',upya:'UPYA-RW-2025-0887',imei:'353456789012345',ptId:'PT-2025-04892',lockedAt:new Date(Date.now()-432000000).toISOString(),
   tl:[{at:new Date(Date.now()-604800000).toISOString(),by:'Alice Ndayisaba',txt:'Application submitted'},{at:new Date(Date.now()-518400000).toISOString(),by:'Jane Murekatete',txt:'Approved — UPYA contract UPYA-RW-2025-0887 created'},{at:new Date(Date.now()-475200000).toISOString(),by:'Alice Ndayisaba',txt:'IMEI 353456789012345 verified via Carlcare'},{at:new Date(Date.now()-475100000).toISOString(),by:'System',txt:'Registered in PayTrigger (PT-2025-04892)'},{at:new Date(Date.now()-432000000).toISOString(),by:'Alice Ndayisaba',txt:'Phone locked — contract activated, payments enabled'}]},
  {id:'FF-0004',status:ST.ESCALATED,createdAt:new Date(Date.now()-86400000).toISOString(),updatedAt:new Date(Date.now()-1800000).toISOString(),
   rep:'Bob Nzeyimana',repId:'SR02',
   c:{name:'Florentine Mukamana',nid:'1200480123456004',phone:'0784567890',addr:'Gisozi, Gasabo',occ:'Trader / Business owner',income:350000,kin:{name:'Théogène Mukama',phone:'0784321098',rel:'Parent'}},
   dev:DEVICES_DEFAULT[1],notes:'Customer reported existing financing. Escalated to credit committee.',reviewer:'Jane Murekatete',upya:null,imei:null,ptId:null,lockedAt:null,
   tl:[{at:new Date(Date.now()-86400000).toISOString(),by:'Bob Nzeyimana',txt:'Application submitted'},{at:new Date(Date.now()-1800000).toISOString(),by:'Jane Murekatete',txt:'Escalated to credit committee — prior financing flagged'}]},
];

// ── CONTEXT ───────────────────────────────────────────────────
const Ctx=createContext(null);

// ── UI COMPONENTS ─────────────────────────────────────────────
const Badge=({st})=>{const m=SM[st]||{label:st,c:'info'};const c=CC[m.c]||CC.info;return <span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:99,fontSize:11,fontWeight:600,letterSpacing:'0.3px',background:c.bg,color:c.fg,border:`1px solid ${c.bd}`}}>{m.label}</span>;};
const Spin=({size=14,dark=false})=><span className="spin" style={{display:'inline-block',width:size,height:size,border:`2px solid ${dark?'rgba(11,61,46,0.15)':'rgba(255,255,255,0.3)'}`,borderTopColor:dark?'var(--brand2)':'white',borderRadius:'50%',verticalAlign:'middle'}}/>;

const Btn=({children,onClick,v='def',sz='md',disabled=false,loading=false,icon,full=false,style={}})=>{
  const vs={primary:{bg:'var(--brand)',fg:'white',bd:'var(--brand)',hov:'var(--brand2)'},ok:{bg:'var(--okBg)',fg:'var(--ok)',bd:'var(--okBorder)',hov:'#C0E8D0'},warn:{bg:'var(--warnBg)',fg:'var(--warn)',bd:'var(--warnBorder)',hov:'#F5DFA8'},err:{bg:'var(--errBg)',fg:'var(--err)',bd:'var(--errBorder)',hov:'#F5C0C0'},info:{bg:'var(--infoBg)',fg:'var(--info)',bd:'var(--infoBorder)',hov:'#C0D0F5'},pur:{bg:'var(--purBg)',fg:'var(--pur)',bd:'var(--purBorder)',hov:'#D8CCF8'},def:{bg:'white',fg:'var(--text)',bd:'var(--border)',hov:'var(--bg)'},ghost:{bg:'transparent',fg:'var(--textMid)',bd:'transparent',hov:'rgba(0,0,0,0.05)'}};
  const vv=vs[v]||vs.def;const pads={sm:'5px 11px',md:'9px 16px',lg:'12px 22px'};const fss={sm:12,md:14,lg:15};
  const [h,setH]=useState(false);
  return <button onClick={disabled||loading?undefined:onClick} disabled={disabled||loading} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:'inline-flex',alignItems:'center',gap:6,padding:pads[sz],fontSize:fss[sz],fontWeight:500,borderRadius:'var(--r2)',cursor:disabled||loading?'not-allowed':'pointer',border:`1.5px solid ${disabled?'var(--border)':vv.bd}`,background:disabled?'var(--bg)':h?vv.hov:vv.bg,color:disabled?'var(--textLight)':vv.fg,width:full?'100%':'auto',justifyContent:full?'center':'flex-start',transition:'all .13s',userSelect:'none',whiteSpace:'nowrap',...style}}>{loading?<Spin dark={v==='def'||v==='ghost'} size={13}/>:icon&&<span style={{fontSize:13,lineHeight:1}}>{icon}</span>}{children}</button>;
};

const Card=({children,sx={}})=><div style={{background:'var(--surface)',borderRadius:'var(--r)',border:'1.5px solid var(--border)',boxShadow:'var(--sh)',...sx}}>{children}</div>;
const Fld=({label,val,mono=false})=><div style={{paddingBottom:8,marginBottom:8,borderBottom:'1px solid rgba(0,0,0,0.05)'}}><div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--textLight)',marginBottom:2}}>{label}</div><div style={{fontSize:13,fontFamily:mono?'DM Mono,monospace':undefined,color:val?'var(--text)':'var(--textLight)'}}>{val||'—'}</div></div>;
const FF=({label,err,children,req=false})=><div style={{display:'flex',flexDirection:'column',gap:3}}>{label&&<label style={{fontSize:11,fontWeight:600,color:'var(--textMid)'}}>{label}{req&&<span style={{color:'var(--err)',marginLeft:2}}>*</span>}</label>}{children}{err&&<span style={{fontSize:11,color:'var(--err)'}}>{err}</span>}</div>;
const Empty=({ico='📋',title,sub})=><div style={{textAlign:'center',padding:'56px 24px',color:'var(--textMid)'}}><div style={{fontSize:36,marginBottom:12}}>{ico}</div><div style={{fontWeight:600,fontSize:15,color:'var(--text)',marginBottom:4}}>{title}</div>{sub&&<div style={{fontSize:12,color:'var(--textLight)'}}>{sub}</div>}</div>;

const ACard=({app,onClick})=>(
  <div onClick={onClick} style={{background:'white',border:'1.5px solid var(--border)',borderRadius:'var(--r)',padding:'13px 16px',cursor:'pointer',transition:'border-color .13s,box-shadow .13s'}}
    onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--brand3)';e.currentTarget.style.boxShadow='0 2px 10px rgba(11,61,46,0.1)'}}
    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.boxShadow='none'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
      <div><div style={{fontWeight:600,fontSize:14}}>{app.c.name}</div><div style={{fontSize:10,color:'var(--textLight)',fontFamily:'DM Mono,monospace',marginTop:1}}>{app.id}</div></div>
      <Badge st={app.status}/>
    </div>
    <div className="app-card-meta" style={{display:'flex',gap:10,fontSize:11,color:'var(--textMid)'}}>
      <span>{app.dev.brand} {app.dev.model}</span><span>·</span><span>{fmtD(app.createdAt)}</span><span>·</span><span>{app.rep.split(' ')[0]}</span>
    </div>
  </div>
);

const Toast=({toasts})=>(
  <div className="toast-container" style={{position:'fixed',top:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none',minWidth:280,maxWidth:360}}>
    {toasts.map(t=>{const c=CC[t.c]||CC.info;return <div key={t.id} className="slideRight" style={{background:c.bg,border:`1.5px solid ${c.bd}`,color:c.fg,borderRadius:'var(--r)',padding:'12px 16px',boxShadow:'var(--sh2)'}}><div style={{fontWeight:600,fontSize:13}}>{t.title}</div>{t.msg&&<div style={{fontSize:11,marginTop:2,opacity:.85}}>{t.msg}</div>}</div>;})}
  </div>
);

// ── SIDEBAR ───────────────────────────────────────────────────
const Sidebar=({page,setPage,apps,mobileOpen=false,onClose})=>{
  const {user,logout}=useContext(Ctx);
  const pending=apps.filter(a=>a.status===ST.SUBMITTED).length;
  const imeiNeeded=apps.filter(a=>a.status===ST.IMEI_PENDING&&a.repId===user.id).length;
  const navItems={
    rep:[{k:'dash',l:'My Applications',badge:imeiNeeded>0?imeiNeeded:0},{k:'new',l:'New Application'},{k:'prices',l:'Price List'}],
    underwriter:[{k:'queue',l:'Review Queue',badge:pending},{k:'all',l:'All Applications'}],

// ── LOGIN ─────────────────────────────────────────────────────
const Login=({onLogin,users})=>{
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [showPass,setShowPass]=useState(false);

  const submit=async()=>{
    setErr('');
    if(!email.trim()||!pass.trim()){setErr('Enter your email and password');return;}
    setLoading(true);
    await sleep(600);
    const user=(users||[]).find(u=>u.email.toLowerCase()===email.toLowerCase().trim()&&u.password===pass);
    if(!user){setErr('Incorrect email or password');setLoading(false);return;}
    onLogin(user);
  };

  return(
    <div className="login-wrap" style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(145deg,var(--brand) 0%,#1D6B4C 60%,#155239 100%)',padding:24,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-80,right:-80,width:320,height:320,borderRadius:'50%',border:'1px solid rgba(255,255,255,0.05)'}}/>

        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{fontSize:42,fontWeight:900,color:'white',letterSpacing:'-1.5px',marginBottom:6}}>{APP_NAME}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'3px'}}>PAYGO Underwriting Platform</div>
        </div>
        <div className="login-card" style={{background:'rgba(255,255,255,0.06)',backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:'var(--r)',padding:'28px 26px'}}>
          <div style={{fontSize:15,fontWeight:600,color:'white',marginBottom:20}}>Sign in to your account</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>

              <label style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.55)',display:'block',marginBottom:5}}>Email address</label>

            </div>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.55)',display:'block',marginBottom:5}}>Password</label>
              <div style={{position:'relative'}}>
                <input type={showPass?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="••••••••" style={{background:'rgba(255,255,255,0.10)',border:'1.5px solid rgba(255,255,255,0.15)',color:'white',borderRadius:'var(--r2)',paddingRight:44}} className={err?'err':''}/>
                <button onClick={()=>setShowPass(p=>!p)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'rgba(255,255,255,0.45)',cursor:'pointer',fontSize:12,padding:4}}>{showPass?'Hide':'Show'}</button>

const NewApp=({onSubmit,onBack,devices})=>{
  const {user}=useContext(Ctx);
  const [step,setStep]=useState(1);
  const [f,setF]=useState({name:'',nid:'',phone:'',addr:'',occ:'',income:'',kn:'',kp:'',kr:'',did:''});
  const [e,setE]=useState({});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const v1=()=>{const er={};if(!f.name.trim())er.name='Required';if(f.nid.replace(/\D/g,'').length<16)er.nid='Must be 16 digits';if(!f.phone.trim())er.phone='Required';if(!f.addr.trim())er.addr='Required';if(!f.occ)er.occ='Required';if(!f.income||isNaN(f.income)||+f.income<1)er.income='Enter a valid amount';if(!f.kn.trim())er.kn='Required';if(!f.kp.trim())er.kp='Required';if(!f.kr)er.kr='Required';setE(er);return!Object.keys(er).length;};
  const v2=()=>{const er={};if(!f.did)er.did='Please select a device';setE(er);return!Object.keys(er).length;};
  const next=()=>{if(step===1&&v1())setStep(2);else if(step===2&&v2())setStep(3);};
  const dev=(devices||[]).find(d=>d.id===f.did);

    <div className="fadeUp" style={{padding:'28px 32px',maxWidth:820}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>

              <span style={{fontSize:12,fontWeight:step===i+1?600:400,color:step===i+1?'var(--text)':'var(--textLight)'}}>{l}</span>
            </div>

        {step===1&&(

              <FF label="National ID number" req err={e.nid}><input value={f.nid} onChange={ev=>s('nid',ev.target.value.replace(/\D/g,'').slice(0,16))} placeholder="16 digits" className={e.nid?'err':''} style={{fontFamily:'DM Mono,monospace'}}/></FF>
            </div>

              <div className="form-grid-3" style={{display:'grid',gridTemplateColumns:'1fr 1fr 160px',gap:12}}>
                <FF label="Full name" req err={e.kn}><input value={f.kn} onChange={ev=>s('kn',ev.target.value)} placeholder="Next of kin name" className={e.kn?'err':''}/></FF>
                <FF label="Phone" req err={e.kp}><input value={f.kp} onChange={ev=>s('kp',ev.target.value)} placeholder="07XXXXXXXX" className={e.kp?'err':''}/></FF>
                <FF label="Relationship" req err={e.kr}><select value={f.kr} onChange={ev=>s('kr',ev.target.value)} className={e.kr?'err':''}><option value="">Select...</option>{RELS.map(r=><option key={r}>{r}</option>)}</select></FF>

                  {sel&&<div style={{position:'absolute',top:9,right:9,width:18,height:18,borderRadius:9,background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'white',fontWeight:700}}>✓</div>}
                  <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:1}}>{d.brand}</div>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{d.model}</div>
                  <div style={{fontSize:10,color:'var(--textLight)',marginBottom:10,lineHeight:1.5}}>{d.specs}</div>
                  {[['Deposit',fmtRWF(d.dep)],['Weekly',fmtRWF(d.weekly)],['Total',fmtRWF(tot)]].map(([k,v])=>(
                    <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:4}}><span style={{color:'var(--textMid)'}}>{k}</span><span style={{fontFamily:'DM Mono,monospace',fontWeight:600}}>{v}</span></div>
                  ))}
                </div>
              );})}
            </div>
          </div>
        )}
        {step===3&&dev&&(
          <div className="detail-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:22}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>Customer</div>
              {[['Full name',f.name],['National ID',f.nid],['Phone',f.phone],['Address',f.addr],['Occupation',f.occ],['Monthly income',fmtRWF(+f.income)],['Next of kin',`${f.kn} (${f.kr})`],['Kin phone',f.kp]].map(([k,v])=><Fld key={k} label={k} val={v}/>)}

            <div>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>Selected device</div>

              <div style={{fontSize:11,color:'var(--textLight)',marginBottom:14}}>{dev.specs}</div>
              {[['SKU',dev.sku],['Deposit',fmtRWF(dev.dep)],['Weekly × 26',fmtRWF(dev.weekly)],['Total contract',fmtRWF(dev.dep+dev.weekly*dev.wks)]].map(([k,v])=><Fld key={k} label={k} val={v}/>)}

            </div>
          </div>
        )}
        <div style={{display:'flex',justifyContent:'space-between',marginTop:22,paddingTop:18,borderTop:'1.5px solid var(--border)'}}>
          {step>1?<Btn onClick={()=>setStep(p=>p-1)} v="def" icon="←">Back</Btn>:<div/>}
          {step<3?<Btn onClick={next} v="primary" icon="→">Continue</Btn>:<Btn onClick={()=>onSubmit(f,dev)} v="primary" icon="✓">Submit for review</Btn>}
        </div>
      </Card>
    </div>
  );

// ── IMEI FLOW ─────────────────────────────────────────────────
const IMEIFlow=({app,onUpdate,addToast,onBack})=>{
  const {user}=useContext(Ctx);
  const [imei,setImei]=useState(app.imei||'');
  const [phase,setPhase]=useState(app.status===ST.IMEI_VERIFIED?'verified':'entry');
  const [ld,setLd]=useState(null);

  const verify=async()=>{
    if(imei.length!==15||!/^\d+$/.test(imei)){addToast('err','Invalid IMEI','Must be exactly 15 digits');return;}
    setLd('carlcare');await sleep(2400);
    setLd('pt');await sleep(1700);
    const ptId='PT-2026-'+Math.floor(10000+Math.random()*90000);
    onUpdate(app.id,{imei,ptId,status:ST.IMEI_VERIFIED,tlEntry:{by:user.name,txt:`IMEI ${imei} verified via Carlcare`}});
    onUpdate(app.id,{tlEntry:{by:'System',txt:`Registered in PayTrigger (${ptId})`}});
    addToast('ok','IMEI verified','Carlcare confirmed · Registered in PayTrigger');
    setPhase('verified');setLd(null);
  };

  const confirmLocked=async()=>{
    setLd('lock');await sleep(2000);
    onUpdate(app.id,{status:ST.ACTIVE,lockedAt:new Date().toISOString(),tlEntry:{by:user.name,txt:'Phone locked — contract activated, payments enabled'}});
    addToast('ok','Contract activated!','Device added to UPYA inventory. Customer can now make payments.');
    setLd(null);onBack();
  };

  return(
    <div className="fadeUp" style={{padding:'28px 32px',maxWidth:640}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>
        <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>IMEI & activation</h1><p style={{fontSize:11,color:'var(--textMid)',marginTop:1}}>{app.id} · {app.c.name} · {app.dev.brand} {app.dev.model}</p></div>
      </div>
      <div style={{display:'flex',alignItems:'center',marginBottom:24}}>
        {[{l:'Enter & verify IMEI',done:phase==='verified'||app.status===ST.ACTIVE},{l:'Lock phone & activate',done:app.status===ST.ACTIVE}].map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div style={{width:26,height:26,borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,background:s.done?'var(--ok)':'var(--brand)',color:'white'}}>{s.done?'✓':i+1}</div>
              <span style={{fontSize:12,fontWeight:500,color:s.done?'var(--ok)':'var(--text)'}}>{s.l}</span>
            </div>
            {i<1&&<div style={{flex:1,height:1,background:'var(--border)',margin:'0 10px'}}/>}
          </React.Fragment>
        ))}
      </div>
      {app.upya&&<div style={{padding:'8px 12px',background:'var(--brandPale)',border:'1px solid var(--brandPale2)',borderRadius:'var(--r2)',fontSize:12,color:'var(--brand2)',marginBottom:16}}>UPYA Contract: <strong style={{fontFamily:'DM Mono,monospace'}}>{app.upya}</strong></div>}
      <Card sx={{padding:22}}>

// ── APP DETAIL ────────────────────────────────────────────────
const AppDetail=({app,onUpdate,addToast,onBack})=>{
  const {user}=useContext(Ctx);
  const [note,setNote]=useState(app.notes||'');
  const [ld,setLd]=useState(null);
  const [showRej,setShowRej]=useState(false);
  const [rejReason,setRejReason]=useState('');

  const approve=async()=>{
    setLd('ap');await sleep(2200);
    const uid='UPYA-RW-2026-'+Math.floor(1000+Math.random()*9000);
    onUpdate(app.id,{status:ST.IMEI_PENDING,notes:note,reviewer:user.name,upya:uid,tlEntry:{by:user.name,txt:`Approved — UPYA contract ${uid} created`}});
    addToast('ok','Application approved',`UPYA contract ${uid} created`);setLd(null);onBack();
  };
  const reject=async()=>{
    if(!rejReason.trim()){addToast('err','Reason required','Provide a rejection reason');return;}
    setLd('rej');await sleep(700);
    onUpdate(app.id,{status:ST.REJECTED,notes:rejReason,reviewer:user.name,tlEntry:{by:user.name,txt:`Rejected: ${rejReason}`}});
    addToast('info','Application rejected','Rep notified');setLd(null);onBack();
  };
  const requestChanges=async()=>{
    setLd('ch');await sleep(700);
    onUpdate(app.id,{status:ST.CHANGES,notes:note,reviewer:user.name,tlEntry:{by:user.name,txt:'Changes requested — returned to sales rep'}});
    addToast('warn','Changes requested','Application returned to rep');setLd(null);onBack();
  };
  const escalate=async()=>{
    setLd('esc');await sleep(700);
    onUpdate(app.id,{status:ST.ESCALATED,notes:note,reviewer:user.name,tlEntry:{by:user.name,txt:'Escalated to credit committee'}});
    addToast('info','Escalated','Sent to credit committee');setLd(null);onBack();
  };

  const c=app.c,d=app.dev,tot=d.dep+d.weekly*d.wks;
  const ratio=c.income>0?(d.weekly/c.income*100):0;
  const affordOk=c.income>0&&ratio<30;
  const isUnderwriter=user.role==='underwriter';
  const reviewable=[ST.SUBMITTED,ST.IN_REVIEW,ST.ESCALATED].includes(app.status);
  return(
    <div className="fadeUp" style={{padding:'28px 32px'}}>
      <div className="detail-header-row" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22,flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:12,minWidth:0}}>
          <Btn onClick={onBack} v="ghost" icon="←" sz="sm">Back</Btn>
          <div style={{minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
              <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>{app.id}</span>
              <Badge st={app.status}/>
              {app.upya&&<span style={{fontSize:10,background:'var(--brandPale)',color:'var(--brand2)',padding:'2px 8px',borderRadius:99,fontFamily:'DM Mono,monospace'}}>{app.upya}</span>}
            </div>
            <h1 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.3px'}}>{c.name}</h1>
          </div>
        </div>
        <div style={{textAlign:'right',fontSize:11,color:'var(--textLight)'}}><div>{fmtD(app.createdAt)} {fmtT(app.createdAt)}</div><div style={{marginTop:2}}>{app.rep}</div></div>
      </div>
      <div className="detail-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <Card sx={{padding:'16px 18px'}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:13}}>Customer</div>
          {[['Full name',c.name],['National ID',c.nid],['Phone',c.phone],['Address',c.addr],['Occupation',c.occ],['Monthly income',fmtRWF(c.income)]].map(([k,v])=><Fld key={k} label={k} val={v}/>)}
          <div style={{borderTop:'1.5px solid var(--border)',paddingTop:11,marginTop:4}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Next of kin</div>
            {[['Name',c.kin.name],['Phone',c.kin.phone],['Relationship',c.kin.rel]].map(([k,v])=><Fld key={k} label={k} val={v}/>)}
          </div>
        </Card>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card sx={{padding:'16px 18px'}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:12}}>Device</div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:1}}>{d.brand} {d.model}</div>
            <div style={{fontSize:11,color:'var(--textLight)',marginBottom:13}}>{d.specs}</div>
            {[['SKU',d.sku],['Deposit',fmtRWF(d.dep)],['Weekly × 26',fmtRWF(d.weekly)],['Total contract',fmtRWF(tot)]].map(([k,v])=><Fld key={k} label={k} val={v}/>)}
            {app.imei&&<Fld label="IMEI" val={app.imei} mono/>}
            {app.ptId&&<Fld label="PayTrigger ID" val={app.ptId} mono/>}
          </Card>
          <Card sx={{padding:'14px 16px'}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>Affordability check</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
              <span style={{fontSize:12,color:'var(--textMid)'}}>Weekly repayment / income</span>
              <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16}}>{c.income>0?ratio.toFixed(1):'—'}%</span>
            </div>
            <div style={{height:7,background:'var(--bg)',borderRadius:4,overflow:'hidden',marginBottom:8}}>
              <div style={{height:'100%',borderRadius:4,width:`${Math.min(100,ratio)}%`,background:affordOk?'var(--ok)':'var(--err)',transition:'width .5s'}}/>
            </div>
            <div style={{fontSize:11,fontWeight:600,padding:'6px 10px',borderRadius:'var(--r2)',background:affordOk?'var(--okBg)':'var(--errBg)',color:affordOk?'var(--ok)':'var(--err)'}}>{affordOk?'✓ Within policy (< 30% of income)':'⚠ Exceeds policy limit (> 30% of income)'}</div>
          </Card>
        </div>
      </div>
      {isUnderwriter&&reviewable&&(
        <Card sx={{padding:18,marginBottom:14,border:'2px solid var(--brandPale2)'}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Credit decision</div>
          <FF label="Underwriter notes"><textarea value={note} onChange={ev=>setNote(ev.target.value)} placeholder="Add notes (recommended for all decisions)..." rows={3}/></FF>
          <div style={{display:'flex',gap:8,marginTop:13,flexWrap:'wrap'}}>
            <Btn onClick={approve} v="ok" loading={ld==='ap'} icon="✓">Approve</Btn>
            <Btn onClick={requestChanges} v="warn" loading={ld==='ch'} icon="↩">Request changes</Btn>
            <Btn onClick={escalate} v="pur" loading={ld==='esc'} icon="↑">Escalate</Btn>
            <Btn onClick={()=>setShowRej(p=>!p)} v="err" icon="✕">Reject</Btn>
          </div>
          {showRej&&(
            <div style={{marginTop:13,padding:'13px 15px',background:'var(--errBg)',border:'1px solid var(--errBorder)',borderRadius:'var(--r2)'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--err)',marginBottom:7}}>Rejection reason (required)</div>
              <textarea value={rejReason} onChange={ev=>setRejReason(ev.target.value)} placeholder="Explain why the application is being rejected..." rows={2} style={{borderColor:'var(--errBorder)'}}/>
              <div style={{marginTop:9}}><Btn onClick={reject} v="err" loading={ld==='rej'}>Confirm rejection</Btn></div>
            </div>
          )}
        </Card>
      )}
      {app.notes&&!isUnderwriter&&<Card sx={{padding:'13px 16px',marginBottom:14,background:'var(--warnBg)',border:'1px solid var(--warnBorder)'}}><div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.6px',color:'var(--warn)',marginBottom:4}}>Underwriter notes</div><div style={{fontSize:12,color:'var(--warn)'}}>{app.notes}</div></Card>}
      <Card sx={{padding:'16px 18px'}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>Activity timeline</div>
        {(app.tl||[]).map((t,i)=>(
          <div key={i} style={{display:'flex',gap:12,marginBottom:12,alignItems:'flex-start'}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,paddingTop:3}}>
              <div style={{width:8,height:8,borderRadius:4,background:i===0?'var(--brand3)':'var(--border)',border:`2px solid ${i===0?'var(--brand)':'var(--borderMed)'}`}}/>
              {i<(app.tl||[]).length-1&&<div style={{width:1,flex:1,minHeight:18,background:'var(--border)',marginTop:3}}/>}
            </div>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{t.txt}</div><div style={{fontSize:11,color:'var(--textLight)',marginTop:1}}>{t.by} · {fmtD(t.at)} at {fmtT(t.at)}</div></div>
          </div>
        ))}
      </Card>
    </div>
  );
};

// ── SALES REP VIEW ────────────────────────────────────────────

        {pg==='dash'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{marginBottom:22}}><h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>My applications</h1><p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>Welcome back, {user.name.split(' ')[0]}</p></div>
            <div className="stats-grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:26}}>
              {[['Total',mine.length,'var(--brand)'],['Active',grps.active.length,'var(--ok)'],['Under review',grps.review.length,'var(--info)'],['Action needed',grps.action.length,'var(--warn)']].map(([l,v,c])=>(
                <Card key={l} sx={{padding:'13px 15px'}}><div style={{fontSize:10,color:'var(--textLight)',marginBottom:4}}>{l}</div><div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div></Card>

                <div style={{display:'flex',flexDirection:'column',gap:8}}>

                    <div key={a.id} onClick={()=>setSel(a.id)} style={{background:'white',border:'2px solid var(--warnBorder)',borderRadius:'var(--r)',padding:'13px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

            {mine.length===0&&<Empty ico="📋" title="No applications yet" sub="Tap 'New Application' to get started"/>}
          </div>
        )}
        {pg==='new'&&<div className="page-content" style={{padding:'28px 32px'}}><NewApp devices={devices} onBack={()=>setPg('dash')} onSubmit={(f,dev)=>{

          onUpdate(null,null,na);addToast('ok','Application submitted','Sent to the review queue');setPg('dash');
        }}/></div>}
        {pg==='prices'&&<div className="page-content" style={{padding:'28px 32px'}}><PriceList devices={devices}/></div>}
      </div>
    </div>
  );
};

// ── UNDERWRITER VIEW ──────────────────────────────────────────

  const [q,setQ]=useState('');

        {pg==='queue'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>

              <div style={{marginBottom:24}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>PENDING DECISION <span style={{background:'var(--warnBg)',color:'var(--warn)',padding:'1px 7px',borderRadius:99}}>{queue.length}</span></div>

                        <div style={{fontWeight:600,fontSize:14}}>{a.c.name}</div>
                        <div style={{fontSize:11,color:'var(--textMid)',marginTop:2}}>{a.dev.brand} {a.dev.model} · {fmtRWF(a.dev.dep+a.dev.weekly*a.dev.wks)} total · {fmtD(a.createdAt)} · {a.rep.split(' ')[0]}</div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:10}}><Badge st={a.status}/><span style={{color:'var(--textLight)',fontSize:18}}>›</span></div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {esc.length>0&&(
              <div>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>ESCALATED — CREDIT COMMITTEE <span style={{background:'var(--purBg)',color:'var(--pur)',padding:'1px 7px',borderRadius:99}}>{esc.length}</span></div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>{esc.map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div>
              </div>
            )}
            {queue.length===0&&esc.length===0&&<Empty ico="✅" title="Queue is clear" sub="All applications have been reviewed"/>}
          </div>
        )}
        {pg==='all'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px',marginBottom:16}}>All applications</h1>
            <input value={q} onChange={ev=>setQ(ev.target.value)} placeholder="Search by name or ID…" style={{maxWidth:320,marginBottom:16}}/>
            <div style={{fontSize:11,color:'var(--textLight)',marginBottom:10}}>{all.length} result{all.length!==1?'s':''}</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>{all.map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div>
            {all.length===0&&<Empty ico="🔍" title="No results"/>}
          </div>
        )}
      </div>
    </div>
  );
};

// ── OPS VIEW ──────────────────────────────────────────────────
const OpsView=({apps,onUpdate,addToast,devices,setDevices,users,setUsers,setApps})=>{
  const [pg,setPg]=useState('overview');
  const [sel,setSel]=useState(null);
  const [q,setQ]=useState('');
  const [fst,setFst]=useState('');
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);
  const {user}=useContext(Ctx);
  const sidebarProps={page:pg,setPage:p=>{setPg(p);setSel(null)},apps,mobileOpen:mobileMenuOpen,onClose:()=>setMobileMenuOpen(false)};

  if(sel){
    const app=apps.find(a=>a.id===sel);
    if(app) return <div style={{display:'flex',flex:1}}><Sidebar {...sidebarProps}/><div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}><div className="mobile-header"><button type="button" className="hamburger" onClick={()=>setMobileMenuOpen(true)} aria-label="Open menu">☰</button><span style={{fontWeight:700,fontSize:16}}>{APP_NAME}</span></div><div className="page-content" style={{flex:1,overflow:'auto',padding:'28px 32px'}}><AppDetail app={app} onUpdate={onUpdate} addToast={addToast} onBack={()=>setSel(null)}/></div></div></div>;
  }

  const filtered=apps.filter(a=>{const ms=!q||a.c.name.toLowerCase().includes(q.toLowerCase())||a.id.toLowerCase().includes(q.toLowerCase());const mst=!fst||a.status===fst;return ms&&mst;});

  const roleLabelFor=r=>({rep:'Sales Representative',underwriter:'Underwriter',ops:'Ops & Support'}[r]||r);
  const mkUserId=r=>{
    const pref=r==='rep'?'SR':r==='underwriter'?'UW':'OP';
    const nums=(users||[]).filter(u=>u.id?.startsWith(pref)).map(u=>parseInt(String(u.id).slice(2),10)).filter(n=>!isNaN(n));
    const next=(nums.length?Math.max(...nums):0)+1;
    return pref+String(next).padStart(2,'0');
  };
  const mkDevId=()=>{
    const nums=(devices||[]).map(d=>parseInt(String(d.id).replace(/\D/g,''),10)).filter(n=>!isNaN(n));
    const next=(nums.length?Math.max(...nums):0)+1;
    return 'D'+String(next).padStart(2,'0');
  };

  const Admin=()=>{
    const [tab,setTab]=useState('devices');
    const [du,setDu]=useState('');
    const [uu,setUu]=useState('');
    const [newDev,setNewDev]=useState({brand:'',model:'',sku:'',specs:'',retail:'',dep:'',weekly:'',wks:26});
    const [newUser,setNewUser]=useState({name:'',local:'',role:'rep',superuser:false});

    const devs=(devices||[]).filter(d=>{
      if(!du.trim()) return true;
      const s=du.toLowerCase();
      return (d.brand||'').toLowerCase().includes(s)||(d.model||'').toLowerCase().includes(s)||(d.sku||'').toLowerCase().includes(s)||String(d.id).toLowerCase().includes(s);
    });
    const us=(users||[]).filter(u=>{
      if(!uu.trim()) return true;
      const s=uu.toLowerCase();
      return (u.name||'').toLowerCase().includes(s)||(u.email||'').toLowerCase().includes(s)||String(u.id).toLowerCase().includes(s);
    });

    const patchAppsDevice=(devId,devObj)=>{
      setApps(p=>(p||[]).map(a=>a?.dev?.id===devId?{...a,dev:devObj,updatedAt:new Date().toISOString()}:a));
    };

    const upDev=(id,patch)=>{
      const next=(devices||[]).map(d=>d.id===id?{...d,...patch}:d);
      setDevices(next);
      const updated=next.find(d=>d.id===id);
      if(updated) patchAppsDevice(id,updated);
    };
    const rmDev=(id)=>{
      const used=(apps||[]).some(a=>a?.dev?.id===id);
      if(used){addToast('err','Cannot remove device','Device is used by existing applications');return;}
      setDevices((devices||[]).filter(d=>d.id!==id));
      addToast('ok','Device removed','');
    };
    const addDev=()=>{
      const er=[];
      if(!newDev.brand.trim()) er.push('brand');
      if(!newDev.model.trim()) er.push('model');
      const retail=+newDev.retail;
      const dep=+newDev.dep;
      const weekly=+newDev.weekly;
      const wks=+newDev.wks||26;
      if(!retail||retail<1) er.push('retail');
      if(dep<0) er.push('dep');
      if(weekly<0) er.push('weekly');
      if(er.length){addToast('err','Missing fields','Please fill the required fields');return;}
      const id=mkDevId();
      const d={id,brand:newDev.brand.trim(),model:newDev.model.trim(),sku:newDev.sku.trim(),specs:newDev.specs.trim(),retail,dep,weekly,wks};
      setDevices([...(devices||[]),d]);
      setNewDev({brand:'',model:'',sku:'',specs:'',retail:'',dep:'',weekly:'',wks:26});
      addToast('ok','Device added',`${d.brand} ${d.model}`);
    };

    const upUser=(id,patch)=>{
      setUsers((users||[]).map(u=>u.id===id?{...u,...patch,roleLabel:roleLabelFor(patch.role||u.role)}:u));
    };
    const rmUser=(id)=>{
      if(id===user.id){addToast('err','Not allowed','You cannot remove your own account');return;}
      setUsers((users||[]).filter(u=>u.id!==id));
      addToast('ok','User removed','');
    };
    const resetPwd=(id)=>{
      const tmp=randPwd();
      const u=(users||[]).find(x=>x.id===id);
      if(!u) return;
      upUser(id,{password:tmp,mustChangePassword:true});
      addToast('info','Temporary password set',`Email to ${u.email}: temp password ${tmp}`);
    };
    const addUser=()=>{
      const name=newUser.name.trim();
      const local=normEmail(newUser.local).replace(/@.*/,'').replace(/[^a-z0-9._-]/g,'');
      if(!name||!local){addToast('err','Missing fields','Name and email are required');return;}
      const email=`${local}@${EMAIL_DOMAIN}`;
      if((users||[]).some(u=>normEmail(u.email)===email)){addToast('err','Email already exists',email);return;}
      const id=mkUserId(newUser.role);
      const tmp=randPwd();
      const u={id,name,email,password:tmp,role:newUser.role,roleLabel:roleLabelFor(newUser.role),superuser:!!newUser.superuser,mustChangePassword:true};
      setUsers([...(users||[]),u]);
      setNewUser({name:'',local:'',role:'rep',superuser:false});
      addToast('ok','User added',`Email to ${email}: temp password ${tmp}`);
    };

    return(
      <div className="fadeUp" style={{padding:'28px 32px'}}>
        <div style={{marginBottom:18}}>
          <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>Admin</h1>
          <p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>Superuser management for devices (prices) and users</p>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
          <Btn v={tab==='devices'?'primary':'def'} onClick={()=>setTab('devices')}>Devices & prices</Btn>
          <Btn v={tab==='users'?'primary':'def'} onClick={()=>setTab('users')}>Users</Btn>
        </div>

        {tab==='devices'&&(
          <div className="admin-two-col" style={{display:'grid',gridTemplateColumns:'1.1fr .9fr',gap:14,alignItems:'start'}}>
            <Card sx={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontWeight:700}}>Devices</div>
                <input value={du} onChange={e=>setDu(e.target.value)} placeholder="Search devices…" style={{width:240}}/>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {devs.map(d=>{
                  const tot=(+d.dep)+(+d.weekly)*(+d.wks||0);
                  return(
                    <Card key={d.id} sx={{padding:14,boxShadow:'none'}}>
                      <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:10}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:800}}>{d.brand} {d.model} <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>({d.id})</span></div>
                          <div style={{fontSize:11,color:'var(--textLight)',marginTop:2}}>{d.sku} · {d.specs}</div>
                        </div>
                        <div style={{display:'flex',gap:8}}>
                          <Btn v="err" sz="sm" onClick={()=>rmDev(d.id)}>Remove</Btn>
                        </div>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                        <FF label="Brand"><input value={d.brand} onChange={e=>upDev(d.id,{brand:e.target.value})}/></FF>
                        <FF label="Model"><input value={d.model} onChange={e=>upDev(d.id,{model:e.target.value})}/></FF>
                        <FF label="SKU"><input value={d.sku} onChange={e=>upDev(d.id,{sku:e.target.value})}/></FF>
                        <FF label="Specs"><input value={d.specs} onChange={e=>upDev(d.id,{specs:e.target.value})}/></FF>
                        <FF label="Cash price (retail)"><input type="number" value={d.retail} onChange={e=>upDev(d.id,{retail:+e.target.value})}/></FF>
                        <FF label="Deposit"><input type="number" value={d.dep} onChange={e=>upDev(d.id,{dep:+e.target.value})}/></FF>
                        <FF label="Weekly payment"><input type="number" value={d.weekly} onChange={e=>upDev(d.id,{weekly:+e.target.value})}/></FF>
                        <FF label="Weeks"><input type="number" value={d.wks} onChange={e=>upDev(d.id,{wks:+e.target.value})}/></FF>
                      </div>
                      <div style={{marginTop:10,fontSize:11,color:'var(--textMid)'}}>
                        Total payable: <span style={{fontFamily:'DM Mono,monospace',fontWeight:700}}>{fmtRWF(tot)}</span>
                      </div>
                    </Card>
                  );
                })}
                {devs.length===0&&<Empty ico="📱" title="No devices found"/>}
              </div>
            </Card>

            <Card sx={{padding:16}}>
              <div style={{fontWeight:800,marginBottom:10}}>Add device</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <FF label="Brand" req><input value={newDev.brand} onChange={e=>setNewDev(p=>({...p,brand:e.target.value}))}/></FF>
                <FF label="Model" req><input value={newDev.model} onChange={e=>setNewDev(p=>({...p,model:e.target.value}))}/></FF>
                <FF label="SKU"><input value={newDev.sku} onChange={e=>setNewDev(p=>({...p,sku:e.target.value}))}/></FF>
                <FF label="Specs"><input value={newDev.specs} onChange={e=>setNewDev(p=>({...p,specs:e.target.value}))}/></FF>
                <FF label="Cash price (retail)" req><input type="number" value={newDev.retail} onChange={e=>setNewDev(p=>({...p,retail:e.target.value}))}/></FF>
                <FF label="Deposit"><input type="number" value={newDev.dep} onChange={e=>setNewDev(p=>({...p,dep:e.target.value}))}/></FF>
                <FF label="Weekly payment"><input type="number" value={newDev.weekly} onChange={e=>setNewDev(p=>({...p,weekly:e.target.value}))}/></FF>
                <FF label="Weeks"><input type="number" value={newDev.wks} onChange={e=>setNewDev(p=>({...p,wks:+e.target.value}))}/></FF>
              </div>
              <div style={{marginTop:12}}>
                <Btn v="primary" onClick={addDev} full icon="＋">Add device</Btn>
              </div>
              <div style={{marginTop:10,fontSize:11,color:'var(--textLight)',lineHeight:1.5}}>
                Note: this admin screen edits the current “weekly × weeks” pricing used across the app. (We can switch to the interest-rate monthly model next.)
              </div>
            </Card>
          </div>
        )}

        {tab==='users'&&(
          <div className="admin-two-col" style={{display:'grid',gridTemplateColumns:'1.1fr .9fr',gap:14,alignItems:'start'}}>
            <Card sx={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontWeight:800}}>Users</div>
                <input value={uu} onChange={e=>setUu(e.target.value)} placeholder="Search users…" style={{width:240}}/>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {us.map(u=>(
                  <Card key={u.id} sx={{padding:14,boxShadow:'none'}}>
                    <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:10}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:800}}>{u.name} <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--textLight)'}}>({u.id})</span></div>
                        <div style={{fontSize:11,color:'var(--textLight)',marginTop:2}}>{u.email}</div>
                      </div>
                      <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
                        <Btn v="info" sz="sm" onClick={()=>resetPwd(u.id)}>Reset password</Btn>
                        <Btn v="err" sz="sm" onClick={()=>rmUser(u.id)}>Remove</Btn>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      <FF label="Name"><input value={u.name} onChange={e=>upUser(u.id,{name:e.target.value})}/></FF>
                      <FF label="Email (local part)">
                        <div style={{display:'flex',gap:6,alignItems:'center'}}>
                          <input value={String(u.email||'').split('@')[0]} onChange={e=>{
                            const local=normEmail(e.target.value).replace(/@.*/,'').replace(/[^a-z0-9._-]/g,'');
                            upUser(u.id,{email:`${local}@${EMAIL_DOMAIN}`});
                          }}/>
                          <span style={{fontSize:12,color:'var(--textLight)'}}>@{EMAIL_DOMAIN}</span>
                        </div>
                      </FF>
                      <FF label="Role">
                        <select value={u.role} onChange={e=>upUser(u.id,{role:e.target.value,roleLabel:roleLabelFor(e.target.value)})}>
                          <option value="rep">Sales Representative</option>
                          <option value="underwriter">Underwriter</option>
                          <option value="ops">Ops & Support</option>
                        </select>
                      </FF>
                      <FF label="Superuser (ops only)">
                        <select value={u.superuser?'yes':'no'} onChange={e=>upUser(u.id,{superuser:e.target.value==='yes'})} disabled={u.role!=='ops'}>
                          <option value="no">No</option>
                          <option value="yes">Yes</option>
                        </select>
                      </FF>
                    </div>
                    {u.mustChangePassword&&<div style={{marginTop:10,fontSize:11,color:'var(--warn)',background:'var(--warnBg)',border:'1px solid var(--warnBorder)',borderRadius:'var(--r2)',padding:'8px 10px'}}>User must change password on next login</div>}
                  </Card>
                ))}
                {us.length===0&&<Empty ico="👤" title="No users found"/>}
              </div>
            </Card>

            <Card sx={{padding:16}}>
              <div style={{fontWeight:800,marginBottom:10}}>Add user</div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <FF label="Full name" req><input value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))} placeholder="e.g. Grace Mukamana"/></FF>
                <FF label="Email" req>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <input value={newUser.local} onChange={e=>setNewUser(p=>({...p,local:e.target.value}))} placeholder="e.g. grace"/>
                    <span style={{fontSize:12,color:'var(--textLight)'}}>@{EMAIL_DOMAIN}</span>
                  </div>
                </FF>
                <FF label="Role">
                  <select value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value,superuser:false}))}>
                    <option value="rep">Sales Representative</option>
                    <option value="underwriter">Underwriter</option>
                    <option value="ops">Ops & Support</option>
                  </select>
                </FF>
                <FF label="Make superuser (ops only)">
                  <select value={newUser.superuser?'yes':'no'} onChange={e=>setNewUser(p=>({...p,superuser:e.target.value==='yes'}))} disabled={newUser.role!=='ops'}>
                    <option value="no">No</option>
                    <option value="yes">Yes</option>
                  </select>
                </FF>
                <Btn v="primary" onClick={addUser} full icon="＋">Create user & email temp password</Btn>
                <div style={{fontSize:11,color:'var(--textLight)',lineHeight:1.5}}>
                  New users get a temporary password and are forced to change it on first login (simulated email via toast).
                </div>
              </div>
            </Card>
          </div>
        )}
      </div>
    );
  };

  const mobileTitle=pg==='overview'?'Overview':pg==='all'?'All applications':pg==='admin'?'Admin':APP_NAME;
  return(
    <div style={{display:'flex',flex:1,minHeight:0}}>
      <Sidebar {...sidebarProps}/>
      <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',minHeight:0}}>
        <div className="mobile-header"><button type="button" className="hamburger" onClick={()=>setMobileMenuOpen(true)} aria-label="Open menu">☰</button><span style={{fontWeight:700,fontSize:16}}>{mobileTitle}</span></div>
        {pg==='overview'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <div style={{marginBottom:22}}><h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px'}}>Operations overview</h1><p style={{fontSize:12,color:'var(--textMid)',marginTop:2}}>{APP_NAME} Rwanda · Live pipeline</p></div>
            <div className="stats-grid-3" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:24}}>
              {[['Total applications',apps.length,'var(--brand)'],['Active contracts',apps.filter(a=>a.status===ST.ACTIVE).length,'var(--ok)'],['Pending review',apps.filter(a=>a.status===ST.SUBMITTED).length,'var(--warn)'],['IMEI needed',apps.filter(a=>a.status===ST.IMEI_PENDING).length,'var(--warn)'],['Escalated',apps.filter(a=>a.status===ST.ESCALATED).length,'var(--pur)'],['Rejected',apps.filter(a=>a.status===ST.REJECTED).length,'var(--err)']].map(([l,v,c])=>(
                <Card key={l} sx={{padding:'14px 16px'}}><div style={{fontSize:10,color:'var(--textLight)',marginBottom:5}}>{l}</div><div style={{fontSize:26,fontWeight:800,color:c}}>{v}</div></Card>
              ))}
            </div>
            <Card sx={{padding:'16px 18px',marginBottom:22}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:14}}>Pipeline status</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[[ST.SUBMITTED,'Submitted','var(--warn)'],[ST.IN_REVIEW,'In review','var(--info)'],[ST.ESCALATED,'Escalated','var(--pur)'],[ST.IMEI_PENDING,'IMEI pending','var(--warn)'],[ST.ACTIVE,'Active','var(--ok)'],[ST.REJECTED,'Rejected','var(--err)']].map(([st,l,c])=>{
                  const n=apps.filter(a=>a.status===st).length;
                  return <div key={st} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',background:'var(--bg)',borderRadius:'var(--r2)',border:'1px solid var(--border)'}}><div style={{width:8,height:8,borderRadius:4,background:c}}/><span style={{fontSize:12,color:'var(--textMid)'}}>{l}</span><span style={{fontSize:12,fontWeight:700}}>{n}</span></div>;
                })}
              </div>
            </Card>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--textLight)',marginBottom:10}}>RECENT ACTIVITY</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>{[...apps].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,8).map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div>
          </div>
        )}
        {pg==='all'&&(
          <div className="fadeUp page-content" style={{padding:'28px 32px'}}>
            <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.3px',marginBottom:16}}>All applications</h1>
            <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
              <input value={q} onChange={ev=>setQ(ev.target.value)} placeholder="Search by name or ID…" style={{flex:1,minWidth:0,maxWidth:280}}/>
              <select value={fst} onChange={ev=>setFst(ev.target.value)} style={{width:180,minWidth:0}}><option value="">All statuses</option>{Object.entries(SM).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
            </div>
            <div style={{fontSize:11,color:'var(--textLight)',marginBottom:10}}>{filtered.length} result{filtered.length!==1?'s':''}</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>{filtered.map(a=><ACard key={a.id} app={a} onClick={()=>setSel(a.id)}/>)}</div>
            {filtered.length===0&&<Empty ico="🔍" title="No results found"/>}
          </div>
        )}
        {pg==='admin'&&user.superuser&&(
          <Admin/>
        )}
      </div>
    </div>
  );
};

// ── ROOT ──────────────────────────────────────────────────────
const App=()=>{
  const [user,setUser]=useState(null);
  const [toasts,setToasts]=useState([]);

  const [users,setUsers]=useState(()=>readLS(LS.USERS,USERS_SEED));
  const [devices,setDevices]=useState(()=>readLS(LS.DEVICES,DEVICES_DEFAULT));
  const [apps,setApps]=useState(()=>readLS(LS.APPS,SEED));

  const addToast=useCallback((c,title,msg='')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,c,title,msg}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4200);
  },[]);

  useEffect(()=>writeLS(LS.USERS,users),[users]);
  useEffect(()=>writeLS(LS.DEVICES,devices),[devices]);
  useEffect(()=>writeLS(LS.APPS,apps),[apps]);

  const updateApp=useCallback((id,upd,newApp)=>{
    if(newApp){setApps(p=>[...p,newApp]);return;}
    setApps(p=>p.map(a=>{
      if(a.id!==id)return a;
      const entry=upd.tlEntry;
      const tl=entry?[...(a.tl||[]),{at:new Date().toISOString(),by:entry.by,txt:entry.txt}]:a.tl;
      const {tlEntry,...rest}=upd;
      return{...a,...rest,tl,updatedAt:new Date().toISOString()};
    }));
  },[]);

  const ctx={user,logout:()=>setUser(null)};

  if(!user) return(
    <Ctx.Provider value={ctx}>
      <Login onLogin={setUser} users={users}/>
      <Toast toasts={toasts}/>
    </Ctx.Provider>
  );

  return(
    <Ctx.Provider value={ctx}>
      <div style={{display:'flex',minHeight:'100vh'}}>
        {user.role==='rep'&&<SalesRepView apps={apps} onUpdate={updateApp} addToast={addToast} devices={devices}/>}
        {user.role==='underwriter'&&<UnderwriterView apps={apps} onUpdate={updateApp} addToast={addToast}/>}
        {user.role==='ops'&&<OpsView apps={apps} onUpdate={updateApp} addToast={addToast} devices={devices} setDevices={setDevices} users={users} setUsers={setUsers} setApps={setApps}/>}
      </div>
      <Toast toasts={toasts}/>
    </Ctx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
